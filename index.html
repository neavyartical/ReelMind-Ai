
<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- GOOGLE ADSENSE -->
  <script async 
  src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1714638410489429"
  crossorigin="anonymous"></script>

  <style>
    body {
      margin: 0;
      background: #0b0b0b;
      font-family: Arial;
      color: white;
    }

    #nav {
      background: #111;
      padding: 10px;
      text-align: center;
    }

    #chat {
      height: 70vh;
      overflow-y: auto;
      padding: 15px;
    }

    .user, .ai {
      padding: 12px;
      margin: 10px;
      border-radius: 12px;
      max-width: 80%;
    }

    .user {
      background: #1f1f1f;
      margin-left: auto;
      text-align: right;
    }

    .ai {
      background: #2b2b2b;
      margin-right: auto;
    }

    #inputArea {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      padding: 10px;
      background: #111;
    }

    #userInput {
      flex: 1;
      padding: 12px;
      border-radius: 20px;
      border: none;
      outline: none;
    }

    .btn {
      margin-left: 5px;
      border: none;
      border-radius: 20px;
      padding: 10px;
      font-weight: bold;
    }

    #generateBtn {
      background: #00ffc3;
      color: black;
    }

    footer {
      text-align: center;
      font-size: 12px;
      color: gray;
      padding: 20px;
    }
  </style>
</head>

<body>

<!-- NAV -->
<div id="nav">
  ReelMind AI
</div>

<!-- ADS -->
<div style="text-align:center; margin:10px;">
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-1714638410489429"
       data-ad-slot="1234567890"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
</div>

<script>
  (adsbygoogle = window.adsbygoogle || []).push({});
</script>

<!-- CHAT -->
<div id="chat"></div>

<!-- INPUT -->
<div id="inputArea">
  <button class="btn" onclick="triggerUpload()">＋</button>
  <button class="btn" onclick="startMic()">🎤</button>
  <input id="userInput" placeholder="Ask anything..." />
  <button id="generateBtn" onclick="sendPrompt()">Generate</button>
</div>

<input type="file" id="fileInput" hidden />

<footer>
  © 2026 ReelMind AI
</footer>

<script>
const BASE_URL = "https://reelmindbackend-1.onrender.com";

// SEND PROMPT (FIXED)
async function sendPrompt() {
  const input = document.getElementById("userInput").value;
  const chat = document.getElementById("chat");

  if (!input) return;

  chat.innerHTML += `<div class="user">${input}</div>`;

  try {
    const res = await fetch(BASE_URL + "/generate-text", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ prompt: input })
    });

    const data = await res.json();

    // FIXED RESPONSE HANDLING
    const reply =
      data?.choices?.[0]?.message?.content ||
      data?.result ||
      "⚠️ No response";

    chat.innerHTML += `<div class="ai">${reply}</div>`;

  } catch (err) {
    chat.innerHTML += `<div class="ai">⚠️ Backend connection failed</div>`;
  }

  document.getElementById("userInput").value = "";
  chat.scrollTop = chat.scrollHeight;
}

// FILE UPLOAD
function triggerUpload() {
  document.getElementById("fileInput").click();
}

document.getElementById("fileInput").addEventListener("change", function () {
  const file = this.files[0];
  if (file) {
    document.getElementById("chat").innerHTML += `<div class="user">📁 ${file.name}</div>`;
  }
});

// MIC
function startMic() {
  if (!('webkitSpeechRecognition' in window)) {
    alert("Mic not supported");
    return;
  }

  const recognition = new webkitSpeechRecognition();
  recognition.lang = "en-US";

  recognition.onresult = function (event) {
    document.getElementById("userInput").value =
      event.results[0][0].transcript;
  };

  recognition.start();
}
</script>

</body>
</html>
