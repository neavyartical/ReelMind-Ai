<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ReelMind AI</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
    }

    h1 {
      text-align: center;
      color: #38bdf8;
      margin: 10px;
    }

    #chat {
      height: 70vh;
      overflow-y: auto;
      padding: 15px;
    }

    .message {
      margin: 10px 0;
      padding: 12px;
      border-radius: 10px;
      max-width: 80%;
    }

    .user {
      background: #38bdf8;
      color: black;
      margin-left: auto;
    }

    .bot {
      background: #1e293b;
    }

    #inputArea {
      display: flex;
      gap: 10px;
      padding: 10px;
      background: #020617;
      position: sticky;
      bottom: 0;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    /* 🧊 GLOW BUTTON */
    button {
      padding: 12px 18px;
      border: none;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
      background: linear-gradient(145deg, #67e8f9, #38bdf8);
      color: black;
      box-shadow: 0 0 15px #38bdf8;
    }

    button:hover {
      box-shadow: 0 0 25px #67e8f9;
    }

    img {
      width: 100%;
      border-radius: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>ReelMind AI 🧊</h1>

<div id="chat"></div>

<div id="inputArea">
  <input id="prompt" placeholder="Type something...">
  <button onclick="generate()">🧊</button>
</div>

<script>
function addMessage(text, type) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "message " + type;
  div.innerHTML = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function generate() {
  const input = document.getElementById("prompt");
  const prompt = input.value.trim().toLowerCase();

  if (!prompt) return;

  addMessage(prompt, "user");
  input.value = "";

  // IMAGE
  if (prompt.includes("image") || prompt.includes("photo")) {
    const url = "https://image.pollinations.ai/prompt/" + encodeURIComponent(prompt);
    addMessage("<img src='" + url + "'>", "bot");
    return;
  }

  // AI TEXT
  fetch("https://reelmindbackend-1.onrender.com/generate", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ prompt: prompt })
  })
  .then(res => res.json())
  .then(data => addMessage(data.result, "bot"))
  .catch(() => addMessage("Error", "bot"));
}
</script>

</body>
</html>
