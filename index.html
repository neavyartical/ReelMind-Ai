<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  color:white;
  font-family:sans-serif;
  text-align:center;
  background:linear-gradient(135deg,#0f2027,#2c5364,#1c92d2);
  background-size:400% 400%;
  animation:bg 10s infinite;
}
@keyframes bg{
  0%{background-position:0%}
  50%{background-position:100%}
  100%{background-position:0%}
}

#app{display:none;}

.scene{
  width:250px;
  height:250px;
  margin:40px auto;
  perspective:800px;
}
.cube{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  animation:spin 10s linear infinite;
}
@keyframes spin{
  from{transform:rotateX(0) rotateY(0)}
  to{transform:rotateX(360deg) rotateY(360deg)}
}

.face{
  position:absolute;
  width:250px;height:250px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,0.1);
  border-radius:20px;
}

.front{transform:translateZ(125px)}
.back{transform:rotateY(180deg) translateZ(125px)}
.right{transform:rotateY(90deg) translateZ(125px)}
.left{transform:rotateY(-90deg) translateZ(125px)}
.top{transform:rotateX(90deg) translateZ(125px)}
.bottom{transform:rotateX(-90deg) translateZ(125px)}

input{padding:10px;width:70%;border-radius:10px;border:none}
button{padding:10px;border:none;border-radius:10px;background:#00c6ff;color:white}

#output{margin:20px}
</style>
</head>

<body>

<div id="login">
<h2>Login</h2>
<input id="user" placeholder="Username"><br><br>
<input id="pass" type="password" placeholder="Password"><br><br>
<button onclick="login()">Enter</button>
</div>

<div id="app">
<h2>ReelMind AI</h2>

<div class="scene">
<div class="cube">
<div class="face front" onclick="mode='chat'">Chat</div>
<div class="face back" onclick="mode='story'">Story</div>
<div class="face right" onclick="mode='image'">Image</div>
<div class="face left" onclick="mode='video'">Video</div>
<div class="face top" onclick="mode='music'">Music</div>
<div class="face bottom" onclick="mode='money'">Money</div>
</div>
</div>

<input id="prompt" placeholder="Enter idea"><br><br>

<button onclick="generate()">Generate</button>
<button onclick="logout()">Logout</button>

<div id="output"></div>

<button onclick="buy()">Unlock Premium ($9)</button>

<!-- ADS -->
<div>
<script>
/* AdMob will go in APK */
</script>
</div>

</div>

<script>
let mode="chat";
let user="";

// AUTO LOGIN (FIXED 🚀)
window.onload=()=>{
  let saved=localStorage.getItem("user");
  if(saved){
    user=saved;
    showApp();
  }
};

function login(){
  user=document.getElementById("user").value;
  let pass=document.getElementById("pass").value;

  if(!user||!pass){alert("Enter details");return;}

  fetch("https://reelmindbackend-1.onrender.com/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username:user,password:pass})
  })
  .then(r=>r.json())
  .then(d=>{
    if(d.success){
      localStorage.setItem("user",user); // 🔥 NEVER LOGOUT AGAIN
      showApp();
    }else alert("Login failed");
  });
}

function showApp(){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
}

function logout(){
  localStorage.removeItem("user");
  location.reload();
}

// GENERATE (FIXED)
async function generate(){
  let prompt=document.getElementById("prompt").value;

  if(!prompt){
    alert("Enter prompt");
    return;
  }

  document.getElementById("output").innerText="Loading...";

  try{
    let res=await fetch("https://reelmindbackend-1.onrender.com/generate",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({prompt,type:mode})
    });

    let data=await res.json();

    if(mode==="image"){
      document.getElementById("output").innerHTML=
        `<img src="${data.result}" width="250">`;
    }else{
      document.getElementById("output").innerText=data.result;
    }

  }catch(e){
    document.getElementById("output").innerText="Offline mode";
  }
}

// PAYPAL (SIMPLIFIED)
function buy(){
  window.open("https://www.paypal.com/paypalme/YOURNAME/9");

  // AFTER PAYMENT USER RETURNS → VERIFY
  setTimeout(()=>{
    fetch("https://reelmindbackend-1.onrender.com/verify-payment",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({username:user})
    });
    alert("Premium activated!");
  },5000);
}
</script>

</body>
</html>
