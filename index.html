<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <style>
    body {
      background: #0b1a2b;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 40px;
    }

    input {
      width: 80%;
      padding: 12px;
      border-radius: 6px;
      border: none;
      margin-bottom: 15px;
    }

    button {
      width: 80%;
      padding: 12px;
      background: #22c55e;
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    img {
      margin-top: 20px;
      width: 90%;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <h1>🎬 ReelMind AI</h1>

  <input id="prompt" placeholder="Generate a lion" />

  <br>

  <button onclick="generateImage()">Generate</button>

  <p id="status"></p>

  <img id="result" />

  <script>
    async function generateImage() {
      const prompt = document.getElementById("prompt").value;
      const status = document.getElementById("status");
      const img = document.getElementById("result");

      status.innerText = "Generating...";
      img.src = "";

      try {
        const res = await fetch("https://backend-ppyz.onrender.com/generate", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ prompt })
        });

        const data = await res.json();

        if (data.image) {
          img.src = data.image;
          status.innerText = "Done!";
        } else {
          status.innerText = "Error: " + JSON.stringify(data);
        }

      } catch (err) {
        status.innerText = "Error generating image";
      }
    }
  </script>

</body>
</html>
