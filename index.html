<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI PRO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle, #000, #020617);
      color: white;
      text-align: center;
      font-family: Arial;
    }

    h1 {
      margin-top: 20px;
      font-size: 28px;
    }

    input {
      padding: 14px;
      width: 85%;
      border-radius: 12px;
      border: none;
      margin-top: 15px;
      font-size: 16px;
    }

    /* 🔥 ROTATING CUBE */
    .cube {
      width: 200px;
      height: 200px;
      margin: 50px auto;
      background: rgba(0,255,200,0.1);
      border-radius: 25px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: rotate 6s infinite linear;
      box-shadow: 0 0 40px rgba(0,255,200,0.4);
    }

    @keyframes rotate {
      0% { transform: rotateY(0deg) rotateX(0deg); }
      100% { transform: rotateY(360deg) rotateX(360deg); }
    }

    button {
      padding: 14px 22px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(45deg, #00ffcc, #00ffaa);
      color: black;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
    }

    #result {
      margin: 20px;
      padding: 20px;
      text-align: left;
      white-space: pre-wrap;
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
    }

    .loading {
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0% { opacity: 0.3; }
      50% { opacity: 1; }
      100% { opacity: 0.3; }
    }
  </style>
</head>

<body>

<h1>🧠 ReelMind AI • PRO</h1>

<input id="prompt" placeholder="Enter your viral idea..." />

<div class="cube">
  <button onclick="generate()">Generate ⚡</button>
</div>

<button onclick="download()">⬇ Download</button>

<div id="result"></div>

<script>
let lastResult = "";

async function generate() {
  const prompt = document.getElementById("prompt").value;
  const result = document.getElementById("result");

  if (!prompt) {
    result.innerText = "Enter a prompt ❌";
    return;
  }

  result.innerHTML = "<div class='loading'>🚀 Generating cinematic ideas...</div>";

  try {
    const res = await fetch("https://reelmindbackend-1.onrender.com/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt })
    });

    const data = await res.json();

    lastResult = data.result;
    result.innerText = lastResult;

  } catch (err) {
    result.innerText = "Connection error ❌";
  }
}

function download() {
  if (!lastResult) return;

  const blob = new Blob([lastResult], { type: "text/plain" });
  const a = document.createElement("a");

  a.href = URL.createObjectURL(blob);
  a.download = "reelmind-pro.txt";
  a.click();
}
</script>

</body>
</html>
