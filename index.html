<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReelMind AI</title>

<style>
body {
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;
}

/* BACKGROUND */
body::before {
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:url("logo.jpg") center/cover no-repeat;
  filter:brightness(0.4) blur(6px);
  z-index:-2;
}

/* GLOW */
body::after {
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background: radial-gradient(circle, rgba(0,255,255,0.2), transparent);
  z-index:-1;
}

input {
  width:80%;
  padding:15px;
  border-radius:10px;
  border:none;
  margin-top:20px;
}

/* ICE CUBE */
.cube {
  width:160px;
  height:160px;
  margin:40px auto;
  background:rgba(255,255,255,0.1);
  backdrop-filter: blur(25px);
  border-radius:25px;
  display:flex;
  justify-content:center;
  align-items:center;
  box-shadow:0 0 50px cyan;
}

/* BUTTON */
button {
  padding:12px 25px;
  border:none;
  border-radius:10px;
  background:cyan;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

/* OUTPUT */
#output {
  margin-top:20px;
  padding:15px;
}

/* IMAGE */
#imagePreview {
  max-width:90%;
  margin-top:20px;
  display:none;
  border-radius:15px;
}

/* DOWNLOAD */
#downloadBtn {
  display:none;
  margin-top:10px;
}
</style>
</head>

<body>

<h1>🧠 ReelMind AI</h1>

<input id="prompt" placeholder="Ask anything (image, story, video...)">

<div class="cube">
  <button onclick="generate()">Generate</button>
</div>

<div id="output"></div>

<img id="imagePreview">
<br>
<button id="downloadBtn">Download Image</button>

<script>
async function generate() {
  const prompt = document.getElementById("prompt").value;
  const output = document.getElementById("output");
  const img = document.getElementById("imagePreview");
  const downloadBtn = document.getElementById("downloadBtn");

  output.innerHTML = "⚡ Generating...";
  img.style.display = "none";
  downloadBtn.style.display = "none";

  try {
    const res = await fetch("https://reelmindbackend-1.onrender.com/generate", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({prompt})
    });

    const data = await res.json();
    console.log(data);

    /* TEXT */
    output.innerHTML = `<pre style="white-space:pre-wrap;">${data.result}</pre>`;

    /* IMAGE */
    if (data.image) {
      img.src = data.image;
      img.style.display = "block";

      downloadBtn.style.display = "inline-block";
      downloadBtn.onclick = () => {
        const a = document.createElement("a");
        a.href = data.image;
        a.download = "image.png";
        a.click();
      };
    }

  } catch (err) {
    console.error(err);
    output.innerHTML = "❌ Failed to connect";
  }
}
</script>

</body>
</html>
