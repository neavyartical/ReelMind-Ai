 <script>

let tiktok = false;

// QUEUE SYSTEM
let queue = [];
let processing = false;

// USER SYSTEM
function saveUser(name){
  localStorage.setItem("user", name);
}

function getUser(){
  return localStorage.getItem("user") || "Guest";
}

// PROJECT STORAGE
function saveProject(data){
  let projects = JSON.parse(localStorage.getItem("projects") || "[]");
  projects.unshift(data);
  localStorage.setItem("projects", JSON.stringify(projects));
}

function viewProjects(){
  let projects = JSON.parse(localStorage.getItem("projects") || "[]");

  if(projects.length === 0){
    addMessage("📂 No saved projects yet","ai");
    return;
  }

  addMessage("📂 Your Projects:<br><br>" + projects.slice(0,10).join("<br><br>"),"ai");
}

// ADD MESSAGE
function addMessage(text,type){
  let chat = document.getElementById("chat");
  let div = document.createElement("div");
  div.className = "msg " + type;
  div.innerHTML = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// TYPE ENGINE (NO CUT)
function typeMessage(text){
  return new Promise(resolve => {
    let i = 0;
    let chat = document.getElementById("chat");

    let div = document.createElement("div");
    div.className = "msg ai";
    chat.appendChild(div);

    function typing(){
      if(i < text.length){
        div.innerHTML += text.charAt(i);
        i++;
        chat.scrollTop = chat.scrollHeight;
        setTimeout(typing, 12);
      } else {
        resolve();
      }
    }

    typing();
  });
}

// QUEUE PROCESS
async function processQueue(){
  if(processing) return;
  processing = true;

  while(queue.length > 0){
    let job = queue.shift();
    await job();
  }

  processing = false;
}

// VOICE
function speak(text){
  let speech = new SpeechSynthesisUtterance(text);
  speech.rate = 1;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(speech);
}

// REAL AI (FREE)
async function realAI(prompt){
  try{
    let res = await fetch("https://api-inference.huggingface.co/models/google/flan-t5-large",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify({inputs: prompt})
    });

    let data = await res.json();
    return data[0]?.generated_text || "AI could not respond properly.";
  }catch(e){
    return "⚠️ AI connection failed. Try again.";
  }
}

// QUICK
function quick(text){
  document.getElementById("input").value = text;
}

// TIKTOK
function toggleTikTok(){
  tiktok = !tiktok;
  alert("TikTok Mode: " + (tiktok ? "ON 🔥" : "OFF"));
}

// DOWNLOADS
function downloadImage(url){
  let a = document.createElement("a");
  a.href = url;
  a.download = "image.jpg";
  a.click();
}

function downloadVideo(url){
  let a = document.createElement("a");
  a.href = url;
  a.download = "video.mp4";
  a.click();
}

// IMAGE UPLOAD → VIDEO
function handleUpload(){
  let file = document.getElementById("upload").files[0];
  if(!file) return;

  let url = URL.createObjectURL(file);

  addMessage(`
    🖼 Uploaded Image:
    <img src="${url}">
    🎬 Converted Video:
    <video controls>
      <source src="https://samplelib.com/lib/preview/mp4/sample-5s.mp4">
    </video>
  `,"ai");

  saveProject("Uploaded image turned into video");
}

// MAIN SEND
function send(){
  let input = document.getElementById("input").value.trim();
  if(!input) return;

  addMessage(input,"user");
  saveProject(input);

  let lower = input.toLowerCase();

  // IMAGE
  if(lower.includes("image")){
    let url = "https://image.pollinations.ai/prompt/" + encodeURIComponent(input);

    addMessage(`
      🖼 Image:
      <img src="${url}">
      <button onclick="downloadImage('${url}')">⬇ Download</button>
    `,"ai");

    return;
  }

  // VIDEO
  if(lower.includes("video")){
    let videoUrl = "https://samplelib.com/lib/preview/mp4/sample-5s.mp4";

    addMessage(`
      🎬 Video:
      <video controls>
        <source src="${videoUrl}">
      </video>
      <button onclick="downloadVideo('${videoUrl}')">⬇ Download</button>
    `,"ai");

    speak("Your video is ready");
    return;
  }

  // STORY (FIXED ENGINE)
  if(lower.includes("story")){
    queue.push(async () => {

      let story = `
📖 Story:

Once upon a time, ${input}, in a world driven by ambition and hidden power.

At first, everything seemed simple. But beneath the surface, something greater was unfolding. Every step forward revealed deeper meaning.

Challenges came — fear, doubt, and unexpected twists. But strength grew stronger with each moment.

Then came the turning point. A bold decision changed everything.

In the end, what started as an idea became a legacy.

✨ And this was only the beginning...
`;

      await typeMessage(story);
      speak(story);

      if(tiktok){
        addMessage("🔥 Caption: This will break the internet! #viral #fyp","ai");
      }

    });

    processQueue();
    return;
  }

  // REAL AI CHAT
  queue.push(async () => {

    let reply = await realAI(input);

    await typeMessage("🤖 " + reply);
    speak(reply);

  });

  processQueue();
}

</script>
