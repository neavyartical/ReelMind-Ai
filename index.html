<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReelMind Global</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0d0d0d;
  color: white;
  text-align: center;
  margin: 0;
}

h1 {
  color: #00ffcc;
  margin-top: 20px;
}

input {
  width: 80%;
  padding: 15px;
  border-radius: 10px;
  border: none;
  margin-top: 20px;
  font-size: 16px;
}

button {
  margin-top: 15px;
  padding: 12px 25px;
  border: none;
  border-radius: 10px;
  background: #00ff66;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

.section {
  margin: 20px;
  padding: 15px;
  border-radius: 15px;
  background: #1a1a1a;
}

img, video {
  max-width: 100%;
  border-radius: 15px;
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>🧠 ReelMind Global</h1>

<input id="prompt" placeholder="Enter cinematic idea..." />
<br>
<button onclick="generate()">Generate</button>

<div class="section">
  <h2>✍️ Story</h2>
  <p id="story">Waiting...</p>
</div>

<div class="section">
  <h2>🖼 Image</h2>
  <img id="image" />
</div>

<div class="section">
  <h2>🎬 Video</h2>
  <video id="video" controls></video>
</div>

<script>
const API_BASE = "https://reelmindbackend-1.onrender.com";

async function generate() {
  const prompt = document.getElementById("prompt").value;

  if (!prompt) {
    alert("Enter prompt first");
    return;
  }

  // Reset UI (IMPORTANT FIX)
  document.getElementById("story").innerText = "Generating...";
  document.getElementById("image").src = "";
  document.getElementById("video").src = "";

  try {
    // STORY
    const storyRes = await fetch(`${API_BASE}/story`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt })
    });

    const storyData = await storyRes.json();
    document.getElementById("story").innerText =
      storyData.story || "Story failed";

    // IMAGE
    const imageRes = await fetch(`${API_BASE}/image`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt })
    });

    const imageData = await imageRes.json();
    document.getElementById("image").src =
      imageData.image || "";

    // VIDEO (IMPORTANT FIX)
    const videoRes = await fetch(`${API_BASE}/video`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt })
    });

    const videoData = await videoRes.json();

    if (videoData.video) {
      document.getElementById("video").src = videoData.video;
    } else {
      document.getElementById("video").poster = "";
      console.log("Runway not active yet");
    }

  } catch (err) {
    console.error(err);
    document.getElementById("story").innerText = "⚠️ AI not responding";
  }
}
</script>

</body>
</html>
