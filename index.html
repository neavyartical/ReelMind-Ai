<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #0d0d0d;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    h2 {
      color: #00ff88;
    }

    input, button {
      width: 90%;
      padding: 12px;
      margin: 8px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      background: #00ff88;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #00cc6a;
    }

    #output {
      margin-top: 20px;
      white-space: pre-wrap;
    }

    img {
      max-width: 100%;
      margin-top: 10px;
      border-radius: 10px;
    }

    #history {
      margin-top: 30px;
      text-align: left;
      max-height: 300px;
      overflow-y: auto;
      border-top: 1px solid #333;
      padding-top: 10px;
    }

    .history-item {
      margin-bottom: 10px;
      padding: 10px;
      background: #1a1a1a;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h2>🚀 ReelMind AI</h2>

<!-- LOGIN -->
<input id="email" placeholder="Enter your email" />
<button onclick="login()">Login</button>

<!-- PROMPT -->
<input id="prompt" placeholder="Type your prompt..." />

<button onclick="generateText()">Generate Text</button>
<button onclick="generateImage()">Generate Image</button>
<button onclick="loadHistory()">📜 View History</button>

<!-- OUTPUT -->
<div id="output"></div>

<!-- HISTORY -->
<div id="history"></div>

<script>
const API = "https://reelmindbackend-1.onrender.com";

// ===== LOGIN =====
async function login() {
  const email = document.getElementById("email").value;
  const output = document.getElementById("output");

  if (!email) {
    output.innerText = "⚠️ Enter email";
    return;
  }

  output.innerText = "⏳ Logging in...";

  try {
    const res = await fetch(API + "/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email })
    });

    const data = await res.json();

    if (data.token) {
      localStorage.setItem("token", data.token);
      output.innerText = "✅ Logged in successfully!";
    } else {
      output.innerText = "❌ Login failed";
    }

  } catch (err) {
    output.innerText = "❌ Server error";
  }
}

// ===== GENERATE TEXT =====
async function generateText() {
  const token = localStorage.getItem("token");
  const prompt = document.getElementById("prompt").value;
  const output = document.getElementById("output");

  if (!token) {
    output.innerText = "⚠️ Please login first!";
    return;
  }

  if (!prompt) {
    output.innerText = "⚠️ Enter a prompt";
    return;
  }

  output.innerText = "⏳ Generating text...";

  try {
    const res = await fetch(API + "/generate-text", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({ prompt })
    });

    const data = await res.json();

    if (data.error) {
      output.innerText = "❌ " + data.error;
    } else {
      output.innerText = data.result + "\n\n💎 Credits: " + data.credits;
    }

  } catch (err) {
    output.innerText = "❌ Error generating text";
  }
}

// ===== GENERATE IMAGE =====
async function generateImage() {
  const token = localStorage.getItem("token");
  const prompt = document.getElementById("prompt").value;
  const output = document.getElementById("output");

  if (!token) {
    output.innerText = "⚠️ Please login first!";
    return;
  }

  if (!prompt) {
    output.innerText = "⚠️ Enter a prompt";
    return;
  }

  output.innerText = "⏳ Generating image...";

  try {
    const res = await fetch(API + "/generate-image", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({ prompt })
    });

    const data = await res.json();

    if (data.error) {
      output.innerText = "❌ " + data.error;
    } else {
      output.innerHTML =
        `<p>💎 Credits: ${data.credits}</p><img src="${data.image}" />`;
    }

  } catch (err) {
    output.innerText = "❌ Error generating image";
  }
}

// ===== LOAD HISTORY =====
async function loadHistory() {
  const token = localStorage.getItem("token");
  const historyDiv = document.getElementById("history");

  if (!token) {
    historyDiv.innerHTML = "⚠️ Login first";
    return;
  }

  historyDiv.innerHTML = "⏳ Loading history...";

  try {
    const res = await fetch(API + "/history", {
      headers: {
        "Authorization": "Bearer " + token
      }
    });

    const data = await res.json();

    historyDiv.innerHTML = data.map(p => `
      <div class="history-item">
        <b>${p.prompt}</b><br/>
        ${p.result}
      </div>
    `).join("");

  } catch {
    historyDiv.innerHTML = "❌ Failed to load history";
  }
}
</script>

</body>
</html>
