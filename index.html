<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
</head>

<body style="background:black;color:white;text-align:center;font-family:sans-serif">

  <h1>🔥 ReelMind AI</h1>

  <!-- BUTTON -->
  <button onclick="generateAI()">Generate</button>

  <script>
    const API_URL = "https://reelmindbackend-1.onrender.com/generate";

    // 🔥 THIS FUNCTION MUST MATCH BUTTON
    async function generateAI() {
      let userInput = prompt("Enter your idea:");

      if (!userInput) {
        alert("Type something!");
        return;
      }

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            prompt: userInput
          })
        });

        const data = await res.json();

        alert(data.result);

      } catch (err) {
        alert("❌ Error connecting to server");
        console.error(err);
      }
    }
  </script>

</body>
</html>
