<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🚀 ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 40px;
    }

    input {
      width: 80%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-bottom: 15px;
    }

    button {
      padding: 12px 25px;
      border-radius: 10px;
      border: none;
      background: #06b6d4;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    #app {
      display: none;
    }
  </style>
</head>

<body>

<h1>🚀 ReelMind AI</h1>

<!-- LOGIN -->
<div id="loginBox">
  <button onclick="login()">Login with Google</button>
</div>

<!-- APP -->
<div id="app">
  <p id="user"></p>

  <input id="prompt" placeholder="Type something like: image of lion" />
  <br>
  <button onclick="generate()">⚡ Generate</button>

  <br><br>
  <button onclick="logout()">Logout</button>

  <div id="result"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import {
    getAuth,
    GoogleAuthProvider,
    signInWithPopup,
    signOut,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

  // 🔥 YOUR CORRECT CONFIG
  const firebaseConfig = {
    apiKey: "AIzaSyCz9rReG2zuaj0AGuafpTzpCUopuHMD_wQ",
    authDomain: "reelmind-ai-f07cb.firebaseapp.com",
    projectId: "reelmind-ai-f07cb",
    storageBucket: "reelmind-ai-f07cb.appspot.com",
    messagingSenderId: "731354245603",
    appId: "1:731354245603:web:7810ca9154efda2f82d8d6"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  let TOKEN = null;

  // 🔐 LOGIN
  window.login = async () => {
    try {
      const result = await signInWithPopup(auth, provider);
      TOKEN = await result.user.getIdToken();
    } catch (err) {
      alert("❌ " + err.message);
    }
  };

  // 🔓 LOGOUT
  window.logout = async () => {
    await signOut(auth);
  };

  // 🔁 AUTH STATE (fixes login loop)
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      document.getElementById("loginBox").style.display = "none";
      document.getElementById("app").style.display = "block";
      document.getElementById("user").innerText = "Logged in as: " + user.email;

      TOKEN = await user.getIdToken();
    } else {
      document.getElementById("loginBox").style.display = "block";
      document.getElementById("app").style.display = "none";
    }
  });

  // 🚀 GENERATE (test version)
  window.generate = async () => {
    const prompt = document.getElementById("prompt").value;

    if (!prompt) return alert("Type something");

    if (!TOKEN) return alert("Login first");

    document.getElementById("result").innerHTML = "⏳ Generating...";

    try {
      const res = await fetch("https://reelmindbackend-1.onrender.com/generate-text", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + TOKEN
        },
        body: JSON.stringify({ prompt })
      });

      const data = await res.json();

      if (data.error) {
        document.getElementById("result").innerHTML = "❌ " + data.error;
        return;
      }

      document.getElementById("result").innerHTML =
        "<p>" + data.data.content + "</p>";

    } catch (err) {
      document.getElementById("result").innerHTML = "❌ " + err.message;
    }
  };
</script>

</body>
</html>
