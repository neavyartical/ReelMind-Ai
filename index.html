<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ReelMind AI</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

h1 {
  text-align:center;
  color:#38bdf8;
}

#chat {
  height:70vh;
  overflow-y:auto;
  padding:15px;
}

.message {
  margin:10px 0;
  padding:12px;
  border-radius:10px;
  max-width:80%;
}

.user {
  background:#38bdf8;
  color:black;
  margin-left:auto;
}

.bot {
  background:#1e293b;
}

#inputArea {
  display:flex;
  gap:10px;
  padding:10px;
  background:#020617;
  position:sticky;
  bottom:0;
}

input {
  flex:1;
  padding:12px;
  border-radius:10px;
  border:none;
}

button {
  padding:12px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>ReelMind AI ⚡</h1>

<div id="chat"></div>

<div id="inputArea">
  <input id="prompt" placeholder="Ask fast...">
  <button onclick="generate()">⚡</button>
</div>

<script>
const BACKEND = "https://reelmindbackend-1.onrender.com";

let isLoading = false;

function addMessage(text, type) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "message " + type;
  div.innerHTML = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

// ⚡ FAST TYPING (almost instant)
function fastType(element, text) {
  element.innerHTML = text;
}

// ⚡ GENERATE
function generate() {
  if (isLoading) return;

  const input = document.getElementById("prompt");
  const prompt = input.value.trim();

  if (!prompt) return;

  isLoading = true;

  addMessage(prompt, "user");
  input.value = "";

  const botMsg = addMessage("⚡ Thinking...", "bot");

  fetch(BACKEND + "/generate", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ prompt })
  })
  .then(res => res.json())
  .then(data => {
    fastType(botMsg, data.result);
    isLoading = false;
  })
  .catch(() => {
    botMsg.innerHTML = "❌ Error";
    isLoading = false;
  });
}

// ENTER KEY
document.getElementById("prompt").addEventListener("keypress", function(e){
  if(e.key === "Enter") generate();
});
</script>

</body>
</html>
