<script>
function generate() {
  const input = document.getElementById("prompt");
  const result = document.getElementById("result");

  if (!input || !result) {
    console.log("Missing elements");
    return;
  }

  const prompt = input.value.trim().toLowerCase();

  if (!prompt) {
    result.textContent = "Please enter something.";
    return;
  }

  result.textContent = "Generating...";

  // 🖼 IMAGE MODE
  if (
    prompt.includes("image") ||
    prompt.includes("photo") ||
    prompt.includes("picture")
  ) {
    const imgUrl = "https://image.pollinations.ai/prompt/" + encodeURIComponent(prompt);

    result.innerHTML = "<img src='" + imgUrl + "' style='width:100%;border-radius:10px;' />";
    return;
  }

  // 🎬 VIDEO MODE
  if (
    prompt.includes("video") ||
    prompt.includes("reel") ||
    prompt.includes("cinematic")
  ) {
    fetch("https://reelmindbackend-1.onrender.com/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        prompt: "Create a cinematic viral video idea about: " + prompt
      })
    })
      .then(res => res.json())
      .then(data => {
        result.textContent = data.result || "No response.";
      })
      .catch(() => {
        result.textContent = "Error generating video idea.";
      });

    return;
  }

  // 📖 DEFAULT AI
  fetch("https://reelmindbackend-1.onrender.com/generate", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ prompt: prompt })
  })
    .then(res => res.json())
    .then(data => {
      result.textContent = data.result || "No response.";
    })
    .catch(() => {
      result.textContent = "Error connecting to server.";
    });
}
</script>
