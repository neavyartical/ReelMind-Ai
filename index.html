<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReelMind AI | The Ultimate Solver</title>
    <style>
        :root {
            --ice: rgba(200, 233, 255, 0.15);
            --neon-blue: #00d4ff;
        }
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #000;
            color: white;
            /* Ice Cube Aesthetic Background */
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
                url('https://www.transparenttextures.com/patterns/ice-age.png');
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 90%;
            max-width: 900px;
            text-align: center;
            padding-top: 50px;
        }

        .logo-img {
            width: 300px;
            filter: drop-shadow(0 0 15px var(--neon-blue));
            margin-bottom: 30px;
        }

        .ice-card {
            background: var(--ice);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        textarea {
            width: 100%;
            height: 120px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--neon-blue);
            border-radius: 12px;
            color: white;
            padding: 15px;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .solver-btn {
            background: linear-gradient(45deg, #00d4ff, #0055ff);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        .solver-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.8);
        }

        #output-window {
            margin-top: 30px;
            min-height: 200px;
            width: 100%;
        }

        .result-box {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid var(--ice);
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="442630.png" alt="ReelMind AI" class="logo-img">

        <div class="ice-card">
            <textarea id="userInput" placeholder="Ask anything, generate 4K images, or create cinematic videos..."></textarea>
            
            <div style="display: flex; justify-content: center; gap: 15px; flex-wrap: wrap;">
                <button class="solver-btn" onclick="process('chat')">Solve Problem</button>
                <button class="solver-btn" style="background: #ff007a;" onclick="process('image')">Generate 4K</button>
                <button class="solver-btn" style="background: #7a00ff;" onclick="process('video')">Create Video</button>
            </div>

            <div id="output-window"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
