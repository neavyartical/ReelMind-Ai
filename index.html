<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReelMind AI</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#ff7e5f,#feb47b);
  text-align:center;
  color:white;
}

h1 {
  margin-top:20px;
}

.scene {
  width:250px;
  height:250px;
  margin:50px auto;
  perspective:800px;
}

.cube {
  width:100%;
  height:100%;
  position:relative;
  transform-style: preserve-3d;
  animation: spin 10s infinite linear;
}

.face {
  position:absolute;
  width:100%;
  height:100%;
  border:1px solid rgba(255,255,255,0.2);
  display:flex;
  align-items:center;
  justify-content:center;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  cursor:pointer;
}

.face:hover {
  background: rgba(255,255,255,0.2);
}

.front  { transform: rotateY(0deg) translateZ(125px); }
.back   { transform: rotateY(180deg) translateZ(125px); }
.right  { transform: rotateY(90deg) translateZ(125px); }
.left   { transform: rotateY(-90deg) translateZ(125px); }
.top    { transform: rotateX(90deg) translateZ(125px); }
.bottom { transform: rotateX(-90deg) translateZ(125px); }

@keyframes spin {
  from { transform: rotateX(0) rotateY(0); }
  to { transform: rotateX(360deg) rotateY(360deg); }
}

button {
  padding:10px;
  border:none;
  border-radius:10px;
  background:#fff;
  color:#000;
  cursor:pointer;
}

#output {
  margin:20px;
}
</style>
</head>

<body>

<h1>🔥 ReelMind AI</h1>
<p>Powered by Artical Neavy</p>

<div class="scene">
  <div class="cube" id="cube">

    <div class="face front" onclick="selectFeature('chat')">Chat</div>
    <div class="face back" onclick="selectFeature('story')">Story</div>
    <div class="face right" onclick="selectFeature('image')">Image</div>
    <div class="face left" onclick="selectFeature('video')">Video</div>
    <div class="face top" onclick="selectFeature('funny')">Funny</div>
    <div class="face bottom" onclick="selectFeature('money')">Money</div>

  </div>
</div>

<input id="prompt" placeholder="Enter your idea..." style="padding:10px;width:80%;">
<br><br>

<button onclick="generate()">Generate</button>

<div id="output"></div>

<script>

let selected = "chat";
let startX = 0;
let cube = document.getElementById("cube");

function selectFeature(f){
  selected = f;
  alert("Selected: " + f);
}

// Swipe control
document.addEventListener("touchstart", e=>{
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e=>{
  let endX = e.changedTouches[0].clientX;
  let diff = endX - startX;

  if(diff > 50){
    cube.style.transform = "rotateY(90deg)";
  } else if(diff < -50){
    cube.style.transform = "rotateY(-90deg)";
  }
});

// MAIN GENERATE FUNCTION
async function generate(){
  let prompt = document.getElementById("prompt").value;

  if(!prompt){
    alert("Enter prompt!");
    return;
  }

  document.getElementById("output").innerHTML = "⏳ Generating...";

  try{
    let res = await fetch("https://reelmindbackend-1.onrender.com/generate", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        prompt: prompt,
        type: selected
      })
    });

    let data = await res.json();

    if(selected === "image"){
      document.getElementById("output").innerHTML =
        `<img src="${data.result}" width="300">`;
    } else {
      document.getElementById("output").innerHTML =
        `<p>${data.result}</p>`;
    }

  }catch(err){
    document.getElementById("output").innerHTML =
      "❌ Error connecting to server";
  }
}

</script>

</body>
</html>
