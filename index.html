<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:Arial;
      color:white;
      background: radial-gradient(circle at top,#0f2027,#000);
    }

    #nav{
      background:#111;
      padding:10px;
      text-align:center;
    }

    #chat{
      height:60vh;
      overflow:auto;
      padding:10px;
    }

    .msg{
      margin:10px;
      padding:10px;
      border-radius:10px;
    }

    .user{background:#1f1f1f;text-align:right;}
    .ai{background:#2b2b2b;}

    input{
      width:70%;
      padding:10px;
      border-radius:20px;
      border:none;
    }

    button{
      padding:10px;
      border:none;
      border-radius:20px;
      background:#00ffc3;
      margin:3px;
    }

    img{
      width:100%;
      border-radius:10px;
    }

    .loader{
      border:4px solid #333;
      border-top:4px solid #00ffc3;
      border-radius:50%;
      width:20px;
      height:20px;
      animation:spin 1s linear infinite;
      margin:10px auto;
    }

    @keyframes spin{100%{transform:rotate(360deg);}}
  </style>
</head>

<body>

<div id="nav">
  ReelMind AI 🚀 |
  Credits: <span id="credits">0</span>
</div>

<div style="text-align:center">
  <input id="email" placeholder="Enter Email">
  <button onclick="login()">Login</button>
</div>

<div id="chat"></div>

<div style="text-align:center">
  <button onclick="setMode('text')">AI</button>
  <button onclick="setMode('image')">Image</button>
  <button onclick="setMode('reel')">Reel</button>
  <button onclick="loadDashboard()">Dashboard</button>
</div>

<div style="text-align:center;margin-top:10px;">
  <input id="input" placeholder="Ask anything...">
  <button onclick="send()">Send</button>
</div>

<script>
const API = "https://reelmindbackend-1.onrender.com";

let token = localStorage.getItem("token");
let mode = "text";

// LOGIN
async function login(){
  const email = document.getElementById("email").value;

  const res = await fetch(API + "/login", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ email })
  });

  const data = await res.json();

  token = data.token;
  localStorage.setItem("token", token);

  alert("✅ Logged in");

  loadDashboard();
}

// DASHBOARD (REAL)
async function loadDashboard(){
  const res = await fetch(API + "/dashboard", {
    headers:{
      "Authorization":"Bearer " + token
    }
  });

  const data = await res.json();

  document.getElementById("credits").innerText = data.credits;
}

// MODE
function setMode(m){
  mode = m;
}

// SEND (REAL)
async function send(){
  const input = document.getElementById("input").value;
  if(!input) return;

  const chat = document.getElementById("chat");

  chat.innerHTML += `<div class="msg user">${input}</div>`;

  const loader = document.createElement("div");
  loader.className = "loader";
  chat.appendChild(loader);

  let endpoint = "/generate-text";

  if(mode==="image") endpoint="/generate-image";
  if(mode==="reel") endpoint="/viral-reel";

  try{

    const res = await fetch(API + endpoint,{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer " + token
      },
      body:JSON.stringify({ prompt: input })
    });

    const data = await res.json();
    loader.remove();

    // ❌ ERROR HANDLING
    if(data.error){
      chat.innerHTML += `<div class="msg ai">⚠️ ${data.error}</div>`;
      return;
    }

    // 🧠 TEXT
    if(mode==="text"){
      const reply = data?.choices?.[0]?.message?.content || "No response";
      chat.innerHTML += `<div class="msg ai">${reply}</div>`;
    }

    // 🖼 IMAGE
    if(mode==="image"){
      chat.innerHTML += `
      <div class="msg ai">
        <img src="${data.image}">
        <br><a href="${data.image}" download>⬇ Download</a>
      </div>`;
    }

    // 🎬 REEL
    if(mode==="reel"){
      const reel = data?.choices?.[0]?.message?.content || "No reel generated";
      chat.innerHTML += `<div class="msg ai">🎬 ${reel}</div>`;
    }

    loadDashboard();

  }catch(e){
    loader.remove();
    chat.innerHTML += `<div class="msg ai">⚠️ Server error</div>`;
  }

  document.getElementById("input").value="";
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
