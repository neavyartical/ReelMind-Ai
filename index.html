<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:linear-gradient(135deg,#0f0018,#ff6a00);
  color:white;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* MODES */
#topBar{
  display:flex;
  gap:8px;
  padding:10px;
}

.mode{
  flex:1;
  padding:10px;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,0.1);
  color:white;
}

.active{
  background:linear-gradient(90deg,#ff6a00,#ff00cc);
}

/* CHAT */
#chat{
  flex:1;
  overflow:auto;
  padding:12px;
}

.msg{
  margin:10px;
  padding:14px;
  border-radius:16px;
  max-width:85%;
}

.user{
  background:linear-gradient(135deg,#ff6a00,#ff00cc);
  margin-left:auto;
}

.ai{
  background:rgba(0,0,0,0.65);
}

/* INPUT */
#bottomBar{
  display:flex;
  padding:10px;
  background:rgba(0,0,0,0.5);
}

#bottomBar input{
  flex:1;
  padding:14px;
  border:none;
  border-radius:14px;
  background:rgba(255,255,255,0.1);
  color:white;
}

#bottomBar button{
  margin-left:6px;
  padding:14px;
  border:none;
  border-radius:14px;
  background:linear-gradient(90deg,#ff6a00,#ff00cc);
  color:white;
}

.small{
  margin-top:6px;
  padding:6px;
  border:none;
  border-radius:8px;
  background:#ff6a00;
  color:white;
}

#branding{
  text-align:center;
  font-size:12px;
  opacity:0.6;
}
</style>
</head>

<body>

<div id="topBar">
  <button class="mode active" onclick="setMode('chat',this)">💬</button>
  <button class="mode" onclick="setMode('story',this)">📖</button>
  <button class="mode" onclick="setMode('image',this)">🖼</button>
  <button class="mode" onclick="setMode('video',this)">🎬</button>
</div>

<div id="chat"></div>

<div id="branding">Powered by Artical Neavy</div>

<div id="bottomBar">
  <input id="input" placeholder="Create anything...">
  <button onclick="send()">➤</button>
  <button onclick="voice()">🎤</button>
</div>

<script>

let mode="chat";
let queue=[];
let processing=false;

// MODE SWITCH
function setMode(m,btn){
  mode=m;
  document.querySelectorAll(".mode").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

// MESSAGE
function add(text,type){
  let d=document.createElement("div");
  d.className="msg "+type;
  d.innerHTML=text;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

// TYPE
function type(text){
  return new Promise(r=>{
    let i=0;
    let d=document.createElement("div");
    d.className="msg ai";
    chat.appendChild(d);

    function t(){
      if(i<text.length){
        d.innerHTML+=text[i++];
        setTimeout(t,7);
      }else r();
    }
    t();
  });
}

// QUEUE
async function run(){
  if(processing) return;
  processing=true;
  while(queue.length) await queue.shift()();
  processing=false;
}

// THINKING
function think(){
  let d=document.createElement("div");
  d.id="t";
  d.className="msg ai";
  d.innerHTML="🤖 Generating...";
  chat.appendChild(d);
}
function stop(){
  let t=document.getElementById("t");
  if(t) t.remove();
}

// VOICE
function voice(){
  let r=new (window.SpeechRecognition||webkitSpeechRecognition)();
  r.onresult=e=>{
    input.value=e.results[0][0].transcript;
  };
  r.start();
}

// COPY
function copyAll(txt){
  navigator.clipboard.writeText(txt);
  alert("Copied");
}

// SEND
function send(){
  let txt=input.value.trim();
  if(!txt) return;

  add(txt,"user");

  // IMAGE MODE
  if(mode==="image"){
    let url="https://image.pollinations.ai/prompt/"+encodeURIComponent(txt);

    add(`
      🖼 AI Image
      <img src="${url}">
      <button class="small" onclick="copyAll('${url}')">Copy Link</button>
    `,"ai");
    return;
  }

  // VIDEO MODE
  if(mode==="video"){
    add(`
      🎬 AI Video
      <video controls>
      <source src="https://samplelib.com/lib/preview/mp4/sample-5s.mp4">
      </video>
      🔥 Viral caption ready
    `,"ai");
    return;
  }

  // STORY MODE
  if(mode==="story"){
    queue.push(async()=>{
      think();
      await new Promise(r=>setTimeout(r,800));
      stop();

      let s=`
🎬 Cinematic Story

${txt}

A powerful journey begins...

Everything changes in one moment.

🔥 This will go viral.
`;

      await type(s);
      add(`<button class="small" onclick="copyAll(\`${s}\`)">Copy</button>`,"ai");
    });

    run();
    return;
  }

  // CHAT MODE
  queue.push(async()=>{
    think();
    await new Promise(r=>setTimeout(r,500));
    stop();

    let rply=`
🤖 Smart AI

"${txt}"

Think bigger.
Move smarter.
Stay consistent.

🔥 You're building something powerful.
`;

    await type(rply);
  });

  run();
}

</script>

</body>
</html>
