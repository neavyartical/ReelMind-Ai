<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReelMind AI</title>
<style>
body { background:black;color:white;text-align:center;font-family:Arial }
input,button { padding:10px;margin:5px;border-radius:8px;border:none }
button { background:cyan;color:black;font-weight:bold }
img { margin-top:10px;border-radius:10px }
</style>
</head>

<body>

<h2>🧠 ReelMind AI</h2>

<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

<hr>

<input id="prompt" placeholder="Ask anything"><br>

<button onclick="generate()">Generate</button>
<button onclick="image()">Image</button>
<button onclick="video()">Video Edit</button>
<button onclick="admin()">Admin</button>

<div id="out"></div>

<script>
const API = "https://reelmindbackend-1.onrender.com";
let token = "";

// AUTH
async function register(){
  const r = await fetch(API+"/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email:email.value,password:password.value})
  });
  alert((await r.json()).msg);
}

async function login(){
  const r = await fetch(API+"/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email:email.value,password:password.value})
  });
  const d = await r.json();
  token = d.token;
  alert("Logged in");
}

// TEXT
async function generate(){
  out.innerText="Loading...";
  const r = await fetch(API+"/generate",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({prompt:prompt.value})
  });
  const d = await r.json();
  out.innerText=d.result;
}

// IMAGE
async function image(){
  const r = await fetch(API+"/image",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({prompt:prompt.value})
  });
  const d = await r.json();
  out.innerHTML=`<img src="${d.image}" width="300">`;
}

// VIDEO
async function video(){
  const r = await fetch(API+"/video-edit",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({prompt:prompt.value})
  });
  const d = await r.json();
  out.innerText=d.edit;
}

// ADMIN
async function admin(){
  const r = await fetch(API+"/admin");
  const d = await r.json();
  out.innerText=JSON.stringify(d,null,2);
}
</script>

</body>
</html>
