<!DOCTYPE html>
<html>
<head>
<link rel="manifest" href="manifest.json">

<style>
body{
margin:0;
font-family:Arial;
color:white;
background:radial-gradient(circle,#001f3f,#000);
overflow:hidden;
}

/* 🧠 BACKGROUND */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle,#00ffcc22,#000);
animation:pulse 5s infinite;
z-index:-1;
}

@keyframes pulse{
0%{opacity:0.3;}
50%{opacity:0.8;}
100%{opacity:0.3;}
}

/* 🌐 GLOBE */
.globe{
width:200px;
height:200px;
margin:20px auto;
border-radius:50%;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
display:flex;
flex-wrap:wrap;
justify-content:center;
align-items:center;
animation:spin 12s linear infinite;
}

.globe button{
margin:5px;
border:none;
background:rgba(0,255,204,0.2);
color:white;
padding:10px;
border-radius:50%;
}

@keyframes spin{
0%{transform:rotate(0);}
100%{transform:rotate(360deg);}
}

/* 🔐 AUTH */
#authBox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:1000;
}
</style>
</head>

<body>

<!-- 🚀 ONBOARDING -->
<div id="onboarding">
  <h1>🧠 ReelMind AI</h1>
  <button onclick="startApp()">Enter</button>
</div>

<!-- 🔐 AUTH -->
<div id="authBox">
  <h2>Login / Register</h2>
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<div style="max-width:500px;margin:auto;padding:20px;">

<h2>🧠 ReelMind AI</h2>

<input id="prompt" placeholder="Enter idea..." style="width:100%;padding:10px;">

<!-- 🤖 AVATAR -->
<img id="avatar" src="https://i.imgur.com/6VBx3io.png"
style="width:100px;border-radius:50%;display:block;margin:auto;">

<div class="globe">
<button onclick="generate()">🧠</button>
<button onclick="renderVideo()">🎬</button>
<button onclick="talk()">🤖</button>
<button onclick="music()">🎵</button>
<button onclick="saveProject()">💾</button>
</div>

<canvas id="canvas" width="360" height="640"></canvas>
<video id="preview" controls style="width:100%;"></video>

<pre id="output"></pre>

<h3>Projects</h3>
<div id="projects"></div>

</div>

<audio id="bg"></audio>

<script>
const API="YOUR_BACKEND_URL";

/* ONBOARD */
function startApp(){
  onboarding.style.display="none";
}

/* AUTH */
async function register(){
  await fetch(API+"/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email:email.value,password:password.value})
  });
  alert("Registered");
}

async function login(){
  const r=await fetch(API+"/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email:email.value,password:password.value})
  });

  const d=await r.json();

  localStorage.setItem("token",d.token);
  authBox.style.display="none";
  renderProjects(d.projects);
}

/* AI */
async function generate(){
  const r=await fetch(API+"/generate",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":localStorage.getItem("token")
    },
    body:JSON.stringify({prompt:prompt.value})
  });

  const d=await r.json();
  output.innerText=d.result;
}

/* VIDEO */
async function renderVideo(){
  const canvas=document.getElementById("canvas");
  const ctx=canvas.getContext("2d");

  const stream=canvas.captureStream();
  const rec=new MediaRecorder(stream);

  let chunks=[];
  rec.ondataavailable=e=>chunks.push(e.data);

  rec.onstop=()=>{
    preview.src=URL.createObjectURL(new Blob(chunks));
    window.lastVideo=preview.src;
  };

  rec.start();

  const words=prompt.value.split(" ");
  let i=0;

  const interval=setInterval(()=>{
    ctx.fillStyle="black";
    ctx.fillRect(0,0,360,640);

    ctx.fillStyle="#00ffcc";
    ctx.font="bold 30px Arial";
    ctx.fillText(words[i]||"",30,320);

    i++;

    if(i>=words.length){
      clearInterval(interval);
      setTimeout(()=>rec.stop(),1000);
    }
  },300);
}

/* AVATAR TALK */
function talk(){
  const text=output.innerText||prompt.value;
  const speech=new SpeechSynthesisUtterance(text);

  const avatar=document.getElementById("avatar");

  speech.onstart=()=>{
    avatar.style.transform="scale(1.2)";
  };

  speech.onend=()=>{
    avatar.style.transform="scale(1)";
  };

  speechSynthesis.speak(speech);
}

/* MUSIC */
function music(){
  bg.src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3";
  bg.play();
}

/* SAVE */
async function saveProject(){
  const r=await fetch(API+"/save-project",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":localStorage.getItem("token")
    },
    body:JSON.stringify({
      title:prompt.value,
      content:output.innerText,
      video:window.lastVideo
    })
  });

  const d=await r.json();
  renderProjects(d.projects);
}

/* LOAD */
function renderProjects(list){
  projects.innerHTML="";
  list.forEach(p=>{
    projects.innerHTML+=`
    <div style="background:#111;margin:5px;padding:10px;">
      ${p.title}
      <video src="${p.video}" width="100%" controls></video>
    </div>`;
  });
}
</script>

</body>
</html>
