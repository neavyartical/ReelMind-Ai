<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family: Arial;
      background: radial-gradient(circle at center, #0a0a0a, #1a0033);
      color:white;
      text-align:center;
    }

    h2 {
      background: linear-gradient(90deg,#ff6a00,#6a00ff);
      -webkit-background-clip:text;
      color:transparent;
    }

    input, select {
      width:85%;
      padding:12px;
      margin:8px;
      border-radius:10px;
      border:none;
      background:#111;
      color:white;
    }

    button {
      padding:12px;
      margin:6px;
      border:none;
      border-radius:10px;
      background: linear-gradient(90deg,#ff6a00,#6a00ff);
      color:white;
      cursor:pointer;
      width:85%;
    }

    .card {
      margin-top:20px;
      padding:15px;
      background:#111;
      border-radius:15px;
      box-shadow:0 0 20px rgba(255,106,0,0.3);
    }

    img, video {
      width:100%;
      border-radius:10px;
    }

    pre {
      text-align:left;
      white-space:pre-wrap;
    }

    #ads {
      margin-top:15px;
      height:60px;
      background:#222;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:12px;
    }

    .hidden { display:none; }

    #splash {
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background: radial-gradient(circle, #0a0a0a, #1a0033);
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      z-index:9999;
    }

    #splash h1 {
      font-size:28px;
      background: linear-gradient(90deg,#ff6a00,#6a00ff);
      -webkit-background-clip:text;
      color:transparent;
    }

    #splash p {
      color:#aaa;
    }
  </style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <h1>🎬 ReelMind AI</h1>
  <p>Powered by Neavy</p>
</div>

<h2>🎬 ReelMind AI</h2>

<div class="card">
  <h3>🔥 Create Viral Content Instantly</h3>
  <p>
    Videos 🎬 • Anime 🎌 • Stories 🧠
  </p>
</div>

<!-- AUTH -->
<div id="auth">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <div class="card">
    <h3>🎯 Choose Mode</h3>
    <button onclick="setMode('story')">🧠 Story</button>
    <button onclick="setMode('image')">🖼 Image</button>
    <button onclick="setMode('video')">🎬 Video</button>

    <h3>🎨 Choose Style</h3>
    <select id="style">
      <option value="realistic">Realistic</option>
      <option value="anime">Anime</option>
      <option value="cartoon">Cartoon</option>
    </select>
  </div>

  <input id="prompt" placeholder="Describe what you want...">
  <button onclick="generate()">✨ Generate</button>

  <button onclick="shareApp()">📤 Share App</button>

  <div id="output"></div>

  <div class="card">
    <h3>💎 Premium</h3>
    <p>$9/month • $99/year</p>
    <button onclick="subscribe()">Upgrade</button>
  </div>

  <div id="ads">🤖 Ad Space</div>

  <div class="card">
    <h4>🛡 Policy</h4>
    <p>No harmful or illegal content allowed</p>
  </div>

  <button onclick="logout()" style="background:#ff4444;margin-top:30px;">
    Logout
  </button>

</div>

<script>

// ADMIN
const ADMIN_EMAILS = [
  "neavyartical@gmail.com",
  "arsesay89@gmail.com"
];

let premium = false;
let currentMode = "image";

// AUTH
function signup(){
  const email = emailInput();
  const pass = passInput();

  if(!email || !pass){
    alert("Enter email & password");
    return;
  }

  const isAdmin = ADMIN_EMAILS.includes(email);
  const user = { email, pass, premium: isAdmin };

  localStorage.setItem("user", JSON.stringify(user));
  premium = user.premium;
  startApp();
}

function login(){
  const email = emailInput();
  const pass = passInput();
  const saved = JSON.parse(localStorage.getItem("user"));

  if(saved && saved.email === email && saved.pass === pass){
    premium = saved.premium || ADMIN_EMAILS.includes(saved.email);
    startApp();
  } else {
    alert("Invalid login");
  }
}

function logout(){
  const saved = JSON.parse(localStorage.getItem("user"));

  if(saved && ADMIN_EMAILS.includes(saved.email)){
    alert("Admin cannot logout 🔒");
    return;
  }

  localStorage.removeItem("user");
  location.reload();
}

function emailInput(){
  return document.getElementById("email").value.trim();
}

function passInput(){
  return document.getElementById("password").value.trim();
}

function startApp(){
  document.getElementById("auth").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");

  if(premium){
    document.getElementById("ads").style.display="none";
  }
}

// AUTO LOGIN
window.onload = function(){
  const saved = JSON.parse(localStorage.getItem("user"));
  if(saved){
    premium = saved.premium || ADMIN_EMAILS.includes(saved.email);
    startApp();
  }
}

// SPLASH
setTimeout(()=>{
  document.getElementById("splash").style.display = "none";
}, 2500);

// MODE
function setMode(mode){
  currentMode = mode;
  alert("Mode: " + mode.toUpperCase());
}

// PREMIUM
function subscribe(){
  premium = true;
  let saved = JSON.parse(localStorage.getItem("user"));
  saved.premium = true;
  localStorage.setItem("user", JSON.stringify(saved));
  document.getElementById("ads").style.display="none";
}

// SHARE
function shareApp(){
  const text = "🔥 Try ReelMind AI – create videos, anime & viral ideas instantly!";
  if(navigator.share){
    navigator.share({ title:"ReelMind AI", text, url:window.location.href });
  } else {
    alert("Copy this link:\n" + window.location.href);
  }
}

// DOWNLOAD
function downloadFile(url){
  const a = document.createElement("a");
  a.href = url;
  a.download = "ReelMind_AI";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

// AI
async function generate(){
  const promptInput = document.getElementById("prompt");
  const output = document.getElementById("output");
  const style = document.getElementById("style").value;

  let prompt = promptInput.value.trim();

  if(!prompt){
    alert("Enter something");
    return;
  }

  const blocked = ["nude","porn","illegal"];
  if(blocked.some(w => prompt.toLowerCase().includes(w))){
    output.innerHTML = "❌ Blocked";
    return;
  }

  output.innerHTML = "🤖 Creating...";

  // STORY
  if(currentMode === "story"){
    let story = "";
    for(let i=1;i<=20;i++){
      story += `${i}. A creative story about ${prompt}\n`;
    }
    output.innerHTML = `<div class="card"><pre>${story}\n...more 🔥</pre></div>`;
    return;
  }

  // STYLE
  if(style === "anime") prompt += ", anime style, vibrant colors";
  if(style === "cartoon") prompt += ", cartoon style, 3D animated";
  if(style === "realistic") prompt += ", ultra realistic, 4k";

  if(currentMode === "video"){
    prompt += ", cinematic lighting, dramatic scene";
  }

  try{
    const res = await fetch("https://backend-ppyz.onrender.com/generate",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({prompt})
    });

    const data = await res.json();

    if(currentMode === "video"){
      output.innerHTML = `
        <div class="card">
          <video src="${data.url}" controls autoplay loop muted></video>
          <button onclick="downloadFile('${data.url}')">⬇ Download Video</button>
        </div>
      `;
    } else {
      output.innerHTML = `
        <div class="card">
          <img src="${data.url}">
          <button onclick="downloadFile('${data.url}')">⬇ Download Image</button>
        </div>
      `;
    }

  } catch {
    output.innerHTML = "❌ Error";
  }
}

</script>

</body>
</html>
