<!DOCTYPE html>
<html>
<head>
<title>ReelMind Global</title>

<style>
body {
  background: #0f0f0f;
  color: white;
  text-align: center;
  font-family: Arial;
}

input {
  width: 90%;
  padding: 12px;
  border-radius: 10px;
}

button {
  padding: 12px;
  background: #00ff99;
  border: none;
  border-radius: 10px;
  margin-top: 10px;
}

.section {
  margin-top: 20px;
  background: #1a1a1a;
  padding: 15px;
  border-radius: 10px;
}

img, video {
  width: 100%;
  margin-top: 10px;
  border-radius: 10px;
}
</style>

</head>

<body>

<h1>🧠 ReelMind Global</h1>

<input id="prompt" placeholder="Enter idea...">
<br>
<button onclick="generate()">Generate</button>

<div class="section">
<h3>Story</h3>
<div id="story">Waiting...</div>
</div>

<div class="section">
<h3>Image</h3>
<img id="image">
</div>

<div class="section">
<h3>Video</h3>
<video id="video" controls></video>
</div>

<script>
const BACKEND = "https://reelmindbackend-1.onrender.com";

let loading = false;

async function generate() {
  if (loading) return;
  loading = true;

  const prompt = document.getElementById("prompt").value;

  document.getElementById("story").innerText = "Generating...";

  try {
    const res = await fetch(BACKEND + "/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt })
    });

    const data = await res.json();

    document.getElementById("story").innerText = data.story || "Failed";

    if (data.image) {
      document.getElementById("image").src = data.image;
    }

    if (data.video) {
      const vid = document.getElementById("video");
      vid.src = data.video;
      vid.pause(); // stop auto replay bug
    }

  } catch (err) {
    document.getElementById("story").innerText = "❌ Server error";
  }

  loading = false;
}
</script>

</body>
</html>
