<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReelMind AI</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  color:white;
  text-align:center;
  background:linear-gradient(135deg,#0f2027,#2c5364,#1c92d2);
  background-size:400% 400%;
  animation:water 12s infinite ease-in-out;
}

@keyframes water{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* LOGIN */
#loginBox{
  margin-top:120px;
}

#app{
  display:none;
}

/* PREMIUM GLASS CARD */
.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  border-radius:20px;
  padding:15px;
  margin:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* CUBE */
.scene{
  width:250px;
  height:250px;
  margin:40px auto;
  perspective:900px;
}

.cube{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  animation:spin 12s infinite linear;
}

@keyframes spin{
  from{transform:rotateX(0deg) rotateY(0deg);}
  to{transform:rotateX(360deg) rotateY(360deg);}
}

.face{
  position:absolute;
  width:250px;
  height:250px;
  border-radius:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  cursor:pointer;
}

/* POSITIONS */
.front{ transform:rotateY(0deg) translateZ(125px);}
.back{ transform:rotateY(180deg) translateZ(125px);}
.right{ transform:rotateY(90deg) translateZ(125px);}
.left{ transform:rotateY(-90deg) translateZ(125px);}
.top{ transform:rotateX(90deg) translateZ(125px);}
.bottom{ transform:rotateX(-90deg) translateZ(125px);}

input{
  padding:10px;
  width:75%;
  border-radius:10px;
  border:none;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#00c6ff;
  color:white;
  margin:5px;
  cursor:pointer;
}

#output{
  margin:20px;
  min-height:100px;
}

#status{
  font-size:12px;
  opacity:0.8;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="card">
  <h2>🔐 Login</h2>
  <input id="user" placeholder="Username"><br><br>
  <input id="pass" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Enter</button>
</div>

<!-- APP -->
<div id="app">

<h2>🌊 ReelMind AI</h2>
<p>Powered by Artical Neavy</p>

<div id="status">🟢 Ready</div>

<div class="scene">
  <div class="cube">

    <div class="face front" onclick="select('chat')">Chat</div>
    <div class="face back" onclick="select('story')">Story</div>
    <div class="face right" onclick="select('image')">Image</div>
    <div class="face left" onclick="select('video')">Video</div>
    <div class="face top" onclick="select('music')">Music</div>
    <div class="face bottom" onclick="select('money')">Money</div>

  </div>
</div>

<input id="prompt" placeholder="Enter idea"><br><br>

<button onclick="generate()">Generate</button>
<button onclick="logout()">Logout</button>

<div id="output"></div>

<!-- ADS SECTION -->
<div class="card">
  <p>📢 Advertisement</p>

  <!-- REPLACE WITH YOUR ADSENSE ID -->
  <script async 
  src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXX"
  crossorigin="anonymous"></script>

  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-XXXX"
       data-ad-slot="XXXX"
       data-ad-format="auto"></ins>

  <script>
       (adsbygoogle = window.adsbygoogle || []).push({});
  </script>
</div>

<!-- TERMS -->
<div class="card">
<button onclick="terms()">Terms</button>
<button onclick="privacy()">Privacy</button>
</div>

</div>

<script>
let mode="chat";

// LOGIN
function login(){
  let u=document.getElementById("user").value;
  let p=document.getElementById("pass").value;

  if(u && p){
    localStorage.setItem("loggedIn","true");
    localStorage.setItem("user",u);

    document.getElementById("loginBox").style.display="none";
    document.getElementById("app").style.display="block";
  } else {
    alert("Enter details");
  }
}

// AUTO LOGIN
window.onload=function(){
  if(localStorage.getItem("loggedIn")==="true"){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("app").style.display="block";
  }
};

// LOGOUT
function logout(){
  localStorage.clear();
  location.reload();
}

// SELECT MODE
function select(m){
  mode=m;
}

// GENERATE (OFFLINE SAFE)
function generate(){
  let prompt=document.getElementById("prompt").value;

  if(!prompt){
    alert("Enter something!");
    return;
  }

  document.getElementById("status").innerText="⏳ Generating...";

  if(mode==="image"){
    document.getElementById("output").innerHTML =
      `<img src="https://image.pollinations.ai/prompt/${prompt}" width="250">`;
  }
  else if(mode==="story"){
    document.getElementById("output").innerText =
      "📖 Story: " + prompt + " becomes an amazing story...";
  }
  else if(mode==="video"){
    document.getElementById("output").innerText =
      "🎬 Video feature coming soon (premium)";
  }
  else if(mode==="music"){
    document.getElementById("output").innerText =
      "🎵 Music idea generated from: " + prompt;
  }
  else if(mode==="money"){
    document.getElementById("output").innerText =
      "💰 Business idea: " + prompt + " can make money online.";
  }
  else{
    document.getElementById("output").innerText =
      "🤖 AI says: " + prompt + " is a powerful idea!";
  }

  document.getElementById("status").innerText="🟢 Done";
}

// TERMS
function terms(){
  alert("Use responsibly. No illegal content. AI results may vary.");
}

// PRIVACY
function privacy(){
  alert("No personal data stored. Ads may use cookies.");
}
</script>

</body>
</html>
