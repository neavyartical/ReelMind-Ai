<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #000;
      color: white;
    }

    #chat {
      height: 70vh;
      overflow-y: auto;
      padding: 10px;
    }

    .msg {
      padding: 10px;
      margin: 8px;
      border-radius: 10px;
    }

    .user { background: #1f1f1f; text-align: right; }
    .ai { background: #2b2b2b; }

    #inputArea {
      display: flex;
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #111;
      padding: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: none;
    }

    button {
      margin-left: 5px;
      padding: 10px;
      border-radius: 20px;
      border: none;
      background: #00ffc3;
    }

    img { width: 100%; border-radius: 10px; }
  </style>
</head>

<body>

<div id="chat"></div>

<div style="text-align:center; margin:10px;">
  <button onclick="mode='text'">AI</button>
  <button onclick="mode='image'">Image</button>
  <button onclick="buy()">💰 Buy Credits</button>
</div>

<div id="inputArea">
  <input id="input" placeholder="Ask anything..." />
  <button onclick="send()">Send</button>
</div>

<script>
const BASE = "https://reelmindbackend-1.onrender.com";
let TOKEN = localStorage.getItem("token");
let mode = "text";

// AUTO LOGIN
async function login() {
  if (TOKEN) return;

  const res = await fetch(BASE + "/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ email: "user" + Date.now() + "@app.com" })
  });

  const data = await res.json();
  TOKEN = data.token;
  localStorage.setItem("token", TOKEN);
}

login();

async function send() {
  const text = input.value;
  if (!text) return;

  chat.innerHTML += `<div class="msg user">${text}</div>`;

  let url = mode === "image" ? "/generate-image" : "/generate-text";

  const res = await fetch(BASE + url, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + TOKEN
    },
    body: JSON.stringify({ prompt: text })
  });

  const data = await res.json();

  if (mode === "image") {
    chat.innerHTML += `<div class="msg ai"><img src="${data.image}"></div>`;
  } else {
    chat.innerHTML += `<div class="msg ai">${data.result || "No response"}</div>`;
  }

  input.value = "";
  chat.scrollTop = chat.scrollHeight;
}

function buy() {
  window.open("https://ko-fi.com/articalneavy", "_blank");
}
</script>

</body>
</html>
