<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReelMind Global</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 20px;
}

/* HEADER */
h1 {
  color: #22c55e;
  margin-bottom: 20px;
}

/* INPUT */
input {
  width: 90%;
  max-width: 500px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-bottom: 20px;
  font-size: 16px;
}

/* BUTTON */
button {
  background: #22c55e;
  color: white;
  padding: 12px 25px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}

/* RESULT BOX */
.box {
  margin-top: 20px;
  padding: 15px;
  border-radius: 10px;
  background: #1e293b;
}

/* IMAGE */
img {
  width: 90%;
  max-width: 400px;
  border-radius: 10px;
  margin-top: 10px;
}

/* VIDEO */
video {
  width: 90%;
  max-width: 400px;
  margin-top: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>🧠 ReelMind Global</h1>

<input id="prompt" placeholder="Type something... e.g dog dancing">

<br>
<button onclick="generate()">Generate</button>

<!-- STORY -->
<div class="box">
  <h3>✍️ Story</h3>
  <p id="story">Waiting...</p>
</div>

<!-- IMAGE -->
<div class="box">
  <h3>🖼 Image</h3>
  <img id="image" src="" />
</div>

<!-- VIDEO -->
<div class="box">
  <h3>🎬 Video</h3>
  <video id="video" controls></video>
</div>

<script>
async function generate() {
  const prompt = document.getElementById("prompt").value;

  /* ===== STORY ===== */
  try {
    const res = await fetch("https://reelmindbackend-1.onrender.com/story", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt })
    });

    const data = await res.json();
    document.getElementById("story").innerText = data.story;

  } catch (err) {
    document.getElementById("story").innerText = "❌ Story failed";
  }

  /* ===== IMAGE (POLLINATION FREE API) ===== */
  document.getElementById("image").src =
    `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}`;

  /* ===== VIDEO (TEMP DEMO UNTIL RUNWAY CONNECTED) ===== */
  document.getElementById("video").src =
    "https://www.w3schools.com/html/mov_bbb.mp4";
}
</script>

</body>
</html>
