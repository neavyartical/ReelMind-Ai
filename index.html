<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReelMind Global</title>

<style>
body {
  font-family: Arial;
  background: #0d0d0d;
  color: white;
  text-align: center;
}

h1 {
  color: #00ffcc;
}

input {
  width: 80%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin: 10px;
}

button {
  padding: 12px 25px;
  border-radius: 10px;
  border: none;
  background: #00ff66;
  color: black;
  font-weight: bold;
  cursor: pointer;
  margin: 5px;
}

.section {
  background: #1a1a1a;
  margin: 15px;
  padding: 15px;
  border-radius: 10px;
}

img, video {
  width: 100%;
  border-radius: 10px;
  margin-top: 10px;
}

.footer {
  margin-top: 30px;
  font-size: 14px;
  color: #aaa;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<h1>🧠 ReelMind Global</h1>

<!-- LOGIN / REGISTER -->
<div class="section" id="authBox">
  <h3>🔐 Login / Register</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <br>
  <button onclick="login()">Login</button>
  <button onclick="register()">Register</button>
</div>

<!-- MAIN APP -->
<div id="app" class="hidden">

<input id="prompt" placeholder="Enter cinematic idea...">
<br>
<button onclick="generate()">Generate</button>

<div class="section">
  <h3>✍️ Story</h3>
  <p id="story">...</p>
</div>

<div class="section">
  <h3>🖼 Image</h3>
  <img id="image">
</div>

<div class="section">
  <h3>🎬 Video</h3>
  <video id="video" controls></video>
</div>

<!-- MONETIZATION -->
<div class="section">
  <h3>💰 Go Pro</h3>
  <button onclick="upgrade()">Unlock Premium</button>
</div>

<!-- TERMS -->
<div class="section">
  <button onclick="showTerms()">Terms & Conditions</button>
</div>

</div>

<!-- TERMS MODAL -->
<div id="termsBox" class="hidden section">
  <h3>📜 Terms & Conditions</h3>
  <p>
    By using ReelMind Global, you agree to use AI responsibly.
    Content generated is user responsibility.
    No illegal, harmful, or abusive use allowed.
  </p>
  <button onclick="closeTerms()">Close</button>
</div>

<!-- FOOTER -->
<div class="footer">
  Powered by ARTICAL NEAVY 🚀
</div>

<script>
const API = "https://reelmindbackend-1.onrender.com";

// 🔐 AUTH SYSTEM (LOCAL)
function register() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  localStorage.setItem("user", JSON.stringify({ email, password }));
  alert("Registered successfully!");
}

function login() {
  const saved = JSON.parse(localStorage.getItem("user"));
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (saved && saved.email === email && saved.password === password) {
    document.getElementById("authBox").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
  } else {
    alert("Invalid login");
  }
}

// 🎬 GENERATE
async function generate() {
  const prompt = document.getElementById("prompt").value;

  document.getElementById("story").innerText = "Generating...";
  document.getElementById("image").src = "";
  document.getElementById("video").src = "";

  try {
    // STORY
    const storyRes = await fetch(API + "/story", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ prompt })
    });

    const storyData = await storyRes.json();
    document.getElementById("story").innerText = storyData.story;

    // IMAGE
    const imgRes = await fetch(API + "/image", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ prompt })
    });

    const imgData = await imgRes.json();
    document.getElementById("image").src = imgData.image;

    // VIDEO
    const vidRes = await fetch(API + "/video", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ prompt })
    });

    const vidData = await vidRes.json();
    if (vidData.video) {
      document.getElementById("video").src = vidData.video;
    }

  } catch (err) {
    document.getElementById("story").innerText = "⚠️ AI not responding";
  }
}

// 💰 MONETIZATION
function upgrade() {
  alert("Payment system coming soon 💰");
}

// 📜 TERMS
function showTerms() {
  document.getElementById("termsBox").classList.remove("hidden");
}

function closeTerms() {
  document.getElementById("termsBox").classList.add("hidden");
}
</script>

</body>
</html>
