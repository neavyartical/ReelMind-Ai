<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:linear-gradient(135deg,#0f0018,#ff6a00);
  color:white;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* AUTH */
#auth{
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

input{
  padding:12px;
  margin:6px;
  border:none;
  border-radius:10px;
  width:80%;
}

button{
  padding:12px;
  margin:6px;
  border:none;
  border-radius:10px;
  background:#ff6a00;
  color:white;
}

/* GRID */
#grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  padding:10px;
}

.grid-btn{
  text-align:center;
  padding:10px;
  border-radius:12px;
  background:rgba(255,255,255,0.1);
}

.grid-btn span{font-size:12px;display:block;}

/* CHAT */
#chat{
  flex:1;
  overflow:auto;
  padding:10px;
}

.msg{
  margin:8px;
  padding:12px;
  border-radius:12px;
  max-width:85%;
}

.user{background:#ff6a00;margin-left:auto;}
.ai{background:#222;}

/* INPUT */
#bottom{
  display:flex;
  padding:10px;
}

#bottom input{
  flex:1;
}

</style>
</head>

<body>

<!-- AUTH SCREEN -->
<div id="auth">
  <h2>Welcome</h2>
  <input id="email" placeholder="Email">
  <input id="pass" placeholder="Password" type="password">

  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div id="grid">
  <div class="grid-btn" onclick="setMode('chat')">💬<span>Chat</span></div>
  <div class="grid-btn" onclick="setMode('story')">📖<span>Story</span></div>
  <div class="grid-btn" onclick="setMode('image')">🖼<span>Image</span></div>
  <div class="grid-btn" onclick="setMode('video')">🎬<span>Video</span></div>
  <div class="grid-btn" onclick="logout()">🚪<span>Logout</span></div>
</div>

<div id="chat"></div>

<div id="bottom">
  <input id="input" placeholder="Ask anything...">
  <button onclick="send()">➤</button>
</div>

</div>

<script>

// USER SYSTEM
let currentUser = null;

function register(){
  let email = document.getElementById("email").value;
  let pass = document.getElementById("pass").value;

  if(!email || !pass){
    alert("Fill all fields");
    return;
  }

  let users = JSON.parse(localStorage.getItem("users")||"{}");

  if(users[email]){
    alert("User already exists");
    return;
  }

  users[email] = {pass:pass, premium:false};
  localStorage.setItem("users",JSON.stringify(users));

  alert("Registered! Now login.");
}

function login(){
  let email = document.getElementById("email").value;
  let pass = document.getElementById("pass").value;

  let users = JSON.parse(localStorage.getItem("users")||"{}");

  if(!users[email] || users[email].pass !== pass){
    alert("Wrong details");
    return;
  }

  currentUser = email;
  localStorage.setItem("currentUser",email);

  document.getElementById("auth").style.display="none";
  document.getElementById("app").style.display="block";
}

function logout(){
  localStorage.removeItem("currentUser");
  location.reload();
}

// AUTO LOGIN
window.onload = function(){
  let saved = localStorage.getItem("currentUser");
  if(saved){
    currentUser = saved;
    document.getElementById("auth").style.display="none";
    document.getElementById("app").style.display="block";
  }
};

// APP LOGIC
let mode="chat";

function setMode(m){
  mode=m;
  add("Mode: "+m,"ai");
}

function add(t,type){
  let d=document.createElement("div");
  d.className="msg "+type;
  d.innerHTML=t;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

function typeText(text){
  return new Promise(resolve=>{
    let i=0;
    let div=document.createElement("div");
    div.className="msg ai";
    chat.appendChild(div);

    function typing(){
      if(i<text.length){
        div.innerHTML+=text[i++];
        setTimeout(typing,5);
      }else resolve();
    }
    typing();
  });
}

// SEND
async function send(){
  let txt=input.value.trim();
  if(!txt) return;

  add(txt,"user");

  // STORY
  if(mode==="story"){
    let story = `
📖 Story:

${txt}

A powerful journey of growth, struggle and victory.

✨ The beginning of greatness...
`;
    await typeText(story);
    return;
  }

  // IMAGE
  if(mode==="image"){
    let url="https://image.pollinations.ai/prompt/"+encodeURIComponent(txt);
    add(`<img src="${url}">`,"ai");
    return;
  }

  // VIDEO
  if(mode==="video"){
    add(`<video controls>
    <source src="https://samplelib.com/lib/preview/mp4/sample-5s.mp4">
    </video>`,"ai");
    return;
  }

  // CHAT
  await typeText("🤖 AI: I understand " + txt);
}

</script>

</body>
</html>
