<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth,
    signInAnonymously,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  // 🔥 Firebase Config (yours is OK)
  const firebaseConfig = {
    apiKey: "AIzaSyCz9rReG2zuaj0AGuafpTzpCUopuHMD_wQ",
    authDomain: "reelmind-ai-f07cb.firebaseapp.com",
    projectId: "reelmind-ai-f07cb",
    storageBucket: "reelmind-ai-f07cb.appspot.com",
    messagingSenderId: "731354245603",
    appId: "1:731354245603:web:67a20d31c7a4eff382d8d6"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  let token = null;

  // 🔐 AUTH STATE LISTENER (better than manual login)
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      token = await user.getIdToken();
      console.log("✅ User ready");
    } else {
      try {
        await signInAnonymously(auth);
      } catch (err) {
        alert("❌ Firebase Auth Error: " + err.message);
      }
    }
  });

  // 🚀 GENERATE FUNCTION
  window.generate = async () => {
    const prompt = document.getElementById("prompt").value;
    const resultDiv = document.getElementById("result");

    if (!prompt) {
      alert("Enter a prompt");
      return;
    }

    if (!token) {
      alert("Still connecting... try again");
      return;
    }

    resultDiv.innerHTML = "⏳ Generating...";

    try {
      const res = await fetch("https://YOUR-BACKEND-URL/generate-image", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ prompt })
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.error || "Server error");
      }

      resultDiv.innerHTML = `<img src="${data.data.url}" />`;

    } catch (err) {
      resultDiv.innerHTML = "❌ Error: " + err.message;
    }
  };
</script>
