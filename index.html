<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:sans-serif;
  text-align:center;
  color:white;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  overflow:hidden;
}

/* TITLE */
h2{
  margin-top:20px;
}

/* CUBE */
.scene{
  width:220px;
  height:220px;
  margin:30px auto;
  perspective:800px;
}

.cube{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  animation:spin 12s infinite linear;
}

@keyframes spin{
  from{transform:rotateX(0) rotateY(0)}
  to{transform:rotateX(360deg) rotateY(360deg)}
}

.face{
  position:absolute;
  width:220px;
  height:220px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  border-radius:20px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
}

.front{transform:translateZ(110px)}
.back{transform:rotateY(180deg) translateZ(110px)}
.right{transform:rotateY(90deg) translateZ(110px)}
.left{transform:rotateY(-90deg) translateZ(110px)}
.top{transform:rotateX(90deg) translateZ(110px)}
.bottom{transform:rotateX(-90deg) translateZ(110px)}

/* INPUT */
input{
  width:80%;
  padding:12px;
  border:none;
  border-radius:12px;
  margin-top:10px;
}

/* BUTTONS */
button{
  margin:10px;
  padding:12px 20px;
  border:none;
  border-radius:12px;
  background:#00c6ff;
  color:white;
  font-weight:bold;
}

/* OUTPUT */
#output{
  margin:15px;
}

/* LOGIN FIX */
#app{display:none;}
</style>
</head>

<body>

<h2>ReelMind AI</h2>

<div id="login">
<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>
<button onclick="login()">Enter</button>
</div>

<div id="app">

<div class="scene">
<div class="cube">
<div class="face front" onclick="setMode('chat')">Chat</div>
<div class="face back" onclick="setMode('story')">Story</div>
<div class="face right" onclick="setMode('image')">Image</div>
<div class="face left" onclick="setMode('video')">Video</div>
<div class="face top" onclick="setMode('music')">Music</div>
<div class="face bottom" onclick="setMode('money')">Money</div>
</div>
</div>

<input id="prompt" placeholder="Enter your idea...">

<br>

<button onclick="generate()">Generate</button>
<button onclick="logout()">Logout</button>

<div id="output"></div>

<button onclick="buy()">Unlock Premium ($9)</button>

</div>

<script>
let mode="chat";
let user="";

// FIX LOGIN STABILITY 🔥
window.onload=()=>{
  let saved=localStorage.getItem("user");
  if(saved){
    user=saved;
    showApp();
  }
};

function setMode(m){
  mode=m;
  alert("Mode: "+m);
}

// LOGIN
function login(){
  user=document.getElementById("user").value;
  let pass=document.getElementById("pass").value;

  fetch("https://reelmindbackend-1.onrender.com/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username:user,password:pass})
  })
  .then(r=>r.json())
  .then(d=>{
    if(d.success){
      localStorage.setItem("user",user);
      showApp();
    } else alert("Login failed");
  });
}

function showApp(){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
}

// LOGOUT
function logout(){
  localStorage.removeItem("user");
  location.reload();
}

// GENERATE FIX 🔥
async function generate(){
  let prompt=document.getElementById("prompt").value;

  if(!prompt){
    alert("Enter prompt");
    return;
  }

  document.getElementById("output").innerHTML="Loading...";

  let res = await fetch("https://reelmindbackend-1.onrender.com/generate",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({prompt:prompt,type:mode})
  });

  let data = await res.json();

  if(mode==="image"){
    document.getElementById("output").innerHTML=
      `<img src="${data.result}" width="200">`;
  } else {
    document.getElementById("output").innerText=data.result;
  }
}

// PAYPAL BUTTON
function buy(){
  window.open("https://www.paypal.com/paypalme/YOURNAME/9");
}
</script>

</body>
</html>
