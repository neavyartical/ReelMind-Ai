<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ReelMind AI - Powered by Artical Neavy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ADSENSE -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1714638410489429"
crossorigin="anonymous"></script>

<style>
body{margin:0;background:#0b0f14;color:white;font-family:Arial;overflow:hidden}

/* CHAT */
#chat{position:absolute;top:0;bottom:130px;width:100%;overflow:auto;padding:10px}

/* MESSAGES */
.msg{margin:10px;padding:12px;border-radius:12px;max-width:80%}
.user{background:#1f1f1f;margin-left:auto}
.ai{background:#16212b}

img,video{width:100%;border-radius:10px}

/* INPUT */
#inputArea{
position:fixed;bottom:0;width:100%;display:flex;padding:10px;background:#111
}
input{flex:1;padding:12px;border-radius:25px;border:none}

/* BUTTONS */
#uploadBtn,#micBtn{
position:fixed;bottom:140px;width:55px;height:55px;border-radius:50%;
display:flex;align-items:center;justify-content:center;font-size:22px
}
#uploadBtn{left:15px;background:#00ff88}
#micBtn{right:15px;background:#00ccff}

/* CORE AI HUB */
#core{
position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
width:150px;height:150px;border-radius:20px;
background:rgba(0,255,255,0.1);
box-shadow:0 0 60px cyan;
display:flex;flex-wrap:wrap;justify-content:center;align-items:center;
gap:5px;padding:10px;
animation:glow 2s infinite alternate;
}
@keyframes glow{from{box-shadow:0 0 20px cyan}to{box-shadow:0 0 80px cyan}}

.coreBtn{
font-size:11px;padding:6px;border:none;border-radius:10px;
background:#00ff88;flex:1 1 40%;
}

/* ADS */
#ad{
position:fixed;bottom:90px;width:100%;text-align:center;
}

/* FOOTER */
.footer{
position:fixed;top:5px;width:100%;text-align:center;font-size:12px;color:#aaa;
}
.links{
position:fixed;top:25px;width:100%;text-align:center;font-size:11px;
}
.links a{color:#00ff88;margin:5px;text-decoration:none}
</style>
</head>

<body>

<div class="footer">🚀 Powered by Artical Neavy</div>

<div class="links">
<a href="#">Privacy</a>
<a href="#">Terms</a>
<a href="#">Contact</a>
<a href="#">Blog</a>
</div>

<div id="chat"></div>

<!-- AI CORE -->
<div id="core">
<button class="coreBtn" onclick="sendText()">Text</button>
<button class="coreBtn" onclick="generateImage()">Image</button>
<button class="coreBtn" onclick="generateVideo()">Video</button>
<button class="coreBtn" onclick="generateReel()">Reel</button>
<button class="coreBtn" onclick="downloadLast()">Download</button>
<button class="coreBtn" onclick="upgrade()">💰 Upgrade</button>
</div>

<!-- ADS -->
<div id="ad">
<ins class="adsbygoogle"
style="display:block"
data-ad-client="ca-pub-1714638410489429"
data-ad-slot="1234567890"
data-ad-format="auto"></ins>
</div>
<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>

<!-- FLOAT BUTTONS -->
<div id="uploadBtn" onclick="fileInput.click()">+</div>
<input type="file" id="fileInput" hidden onchange="uploadFile(event)">

<div id="micBtn" onclick="startVoice()">🎤</div>

<!-- INPUT -->
<div id="inputArea">
<input id="prompt" placeholder="Ask anything..." />
<button onclick="sendText()">Send</button>
</div>

<script>
const API="https://reelmindbackend-1.onrender.com";
const chat=document.getElementById("chat");
let lastOutput="";

// LOGIN
async function ensureLogin(){
if(!localStorage.token){
let r=await fetch(API+"/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:"guest@user.com"})});
let d=await r.json();
localStorage.token=d.data.token;
}
}

// ADD MESSAGE
function addMsg(text,type){
let d=document.createElement("div");
d.className="msg "+type;
d.innerText=text;
chat.appendChild(d);
return d;
}

// TYPE EFFECT
function type(el,text){
let i=0;el.innerHTML="";
(function t(){if(i<text.length){el.innerHTML+=text[i++];setTimeout(t,3)}})();
}

// ERROR
function check(d){
if(d.status==="error"){alert(d.message);return true}
return false;
}

// TEXT
async function sendText(){
await ensureLogin();
let p=prompt.value;
addMsg(p,"user");
let box=addMsg("⚡ Thinking...","ai");

let r=await fetch(API+"/generate-text",{method:"POST",
headers:{"Content-Type":"application/json","Authorization":"Bearer "+localStorage.token},
body:JSON.stringify({prompt:p})});

let d=await r.json();
if(check(d)) return;

lastOutput=d.data.content;
type(box,lastOutput);
}

// IMAGE
async function generateImage(){
await ensureLogin();
let box=addMsg("🎨 Generating...","ai");

let r=await fetch(API+"/generate-image",{method:"POST",
headers:{"Content-Type":"application/json","Authorization":"Bearer "+localStorage.token},
body:JSON.stringify({prompt:prompt.value+" ultra realistic 4k"})});

let d=await r.json();
if(check(d)) return;

lastOutput=d.data.url;
box.innerHTML=`<img src="${lastOutput}">`;
}

// VIDEO
async function generateVideo(){
await ensureLogin();
let box=addMsg("🎥 Generating...","ai");

let r=await fetch(API+"/generate-video",{method:"POST",
headers:{"Content-Type":"application/json","Authorization":"Bearer "+localStorage.token},
body:JSON.stringify({prompt:prompt.value})});

let d=await r.json();
if(check(d)) return;

lastOutput=d.data.url;
box.innerHTML=`<video controls src="${lastOutput}"></video>`;
}

// REEL
async function generateReel(){
await ensureLogin();
let box=addMsg("🔥 Creating...","ai");

let r=await fetch(API+"/generate-reel",{method:"POST",
headers:{"Content-Type":"application/json","Authorization":"Bearer "+localStorage.token},
body:JSON.stringify({prompt:prompt.value})});

let d=await r.json();
if(check(d)) return;

lastOutput=d.data.content;
type(box,lastOutput);
}

// DOWNLOAD
function downloadLast(){
if(!lastOutput)return alert("Nothing");
let a=document.createElement("a");
a.href=lastOutput.startsWith("http")?lastOutput:"data:text/plain,"+encodeURIComponent(lastOutput);
a.download="reelmind";
a.click();
}

// KO-FI
function upgrade(){
window.open("https://ko-fi.com/articalneavy","_blank");
}

// UPLOAD
function uploadFile(e){
addMsg("📁 "+e.target.files[0].name,"user");
}

// VOICE
function startVoice(){
let r=new webkitSpeechRecognition();
r.onresult=e=>prompt.value=e.results[0][0].transcript;
r.start();
}
</script>

</body>
</html>
