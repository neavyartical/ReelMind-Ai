<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReelMind AI</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#0f2027,#2c5364,#1c92d2);
  background-size:400% 400%;
  animation:water 10s infinite ease-in-out;
  color:white;
  text-align:center;
}

@keyframes water{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* CUBE */
.scene{
  width:250px;
  height:250px;
  margin:50px auto;
  perspective:800px;
}

.cube{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:1s;
}

.face{
  position:absolute;
  width:250px;
  height:250px;
  background:rgba(255,255,255,0.1);
  border-radius:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

/* POSITIONS */
.front{ transform:rotateY(0deg) translateZ(125px);}
.back{ transform:rotateY(180deg) translateZ(125px);}
.right{ transform:rotateY(90deg) translateZ(125px);}
.left{ transform:rotateY(-90deg) translateZ(125px);}
.top{ transform:rotateX(90deg) translateZ(125px);}
.bottom{ transform:rotateX(-90deg) translateZ(125px);}

input{
  padding:10px;
  width:75%;
  border-radius:10px;
  border:none;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#00c6ff;
  color:white;
  margin:5px;
}

#output{
  margin:20px;
  min-height:100px;
}
</style>
</head>

<body>

<h2>🌊 ReelMind AI</h2>
<p>Powered by Artical Neavy</p>

<div class="scene">
  <div class="cube" id="cube">

    <div class="face front" onclick="select('chat')">Chat</div>
    <div class="face back" onclick="select('story')">Story</div>
    <div class="face right" onclick="select('image')">Image</div>
    <div class="face left" onclick="select('video')">Video</div>
    <div class="face top" onclick="select('music')">Music</div>
    <div class="face bottom" onclick="select('money')">Money</div>

  </div>
</div>

<input id="prompt" placeholder="Enter your idea"><br><br>

<button onclick="generate()">Generate</button>
<button onclick="download()">Download</button>

<div id="output">Select a mode 👆</div>

<script>
let mode="chat";

// SELECT MODE
function select(m){
  mode=m;

  let cube=document.getElementById("cube");

  if(m==="chat") cube.style.transform="rotateY(0deg)";
  if(m==="story") cube.style.transform="rotateY(180deg)";
  if(m==="image") cube.style.transform="rotateY(90deg)";
  if(m==="video") cube.style.transform="rotateY(-90deg)";
  if(m==="music") cube.style.transform="rotateX(90deg)";
  if(m==="money") cube.style.transform="rotateX(-90deg)";
}

// GENERATE
async function generate(){
  let prompt=document.getElementById("prompt").value;

  if(!prompt){
    alert("Enter something!");
    return;
  }

  document.getElementById("output").innerText="⏳ Loading...";

  try{
    let res=await fetch("https://reelmindbackend-1.onrender.com/generate",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({prompt,type:mode})
    });

    let data=await res.json();

    if(mode==="image"){
      document.getElementById("output").innerHTML =
        `<img src="${data.result}" width="250">`;
    } else {
      document.getElementById("output").innerText=data.result;
    }

  }catch(e){
    document.getElementById("output").innerText="❌ Server error";
  }
}

// DOWNLOAD
function download(){
  let text=document.getElementById("output").innerText;

  let blob=new Blob([text],{type:"text/plain"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="reelmind.txt";
  a.click();
}
</script>

</body>
</html>
