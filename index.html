<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ReelMind AI</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
}

.container {
  margin-top: 50px;
}

input {
  width: 80%;
  padding: 15px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  margin-top: 20px;
  padding: 15px 30px;
  border: none;
  border-radius: 10px;
  background: #00c2b2;
  color: white;
  font-size: 18px;
  cursor: pointer;
}

.result {
  margin-top: 30px;
}

img {
  max-width: 90%;
  border-radius: 10px;
}

video {
  max-width: 90%;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>🧠 ReelMind AI</h1>

<div class="container">
  <input id="prompt" placeholder="Enter prompt..." />
  <br>
  <button onclick="generate()">Generate</button>
</div>

<div class="result">

  <h3>✍️ Story</h3>
  <p id="story">...</p>

  <h3>🖼️ Image</h3>
  <img id="image" />

  <br><br>
  <a id="download" download="image.png">
    <button>Download Image</button>
  </a>

  <h3>🎬 Video</h3>
  <video id="video" controls></video>

</div>

<script>

async function generate() {
  const prompt = document.getElementById("prompt").value;

  document.getElementById("story").innerText = "Loading...";
  document.getElementById("image").src = "";
  document.getElementById("video").src = "";

  // 🔥 FIXED OpenRouter (WORKING MODEL)
  try {
    const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": "Bearer YOUR_OPENROUTER_KEY",
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "openai/gpt-3.5-turbo",
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await res.json();
    document.getElementById("story").innerText =
      data.choices?.[0]?.message?.content || "No story generated";

  } catch (e) {
    document.getElementById("story").innerText = "Error generating story";
  }

  // ✅ Pollinations Image (WORKING)
  const imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}`;
  document.getElementById("image").src = imageUrl;
  document.getElementById("download").href = imageUrl;

  // 🎬 Runway (PLACEHOLDER - your backend should handle this)
  try {
    const videoRes = await fetch("https://your-backend-url/video", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt })
    });

    const videoData = await videoRes.json();
    document.getElementById("video").src = videoData.video_url;

  } catch (e) {
    console.log("Video failed");
  }
}

</script>

</body>
</html>
