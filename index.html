<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ReelMind AI</title>

<style>
body {
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;
}

body::before {
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:url("logo.jpg") center/cover no-repeat;
  filter:brightness(0.4) blur(6px);
  z-index:-2;
}

input {
  width:80%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:20px;
}

.cube {
  width:160px;
  height:160px;
  margin:40px auto;
  background:rgba(255,255,255,0.1);
  border-radius:20px;
  display:flex;
  justify-content:center;
  align-items:center;
  box-shadow:0 0 40px cyan;
}

button {
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:cyan;
  cursor:pointer;
}

#output {
  margin-top:20px;
}
</style>
</head>

<body>

<h1>🧠 ReelMind AI</h1>

<input id="prompt" placeholder="Type anything...">

<div class="cube">
  <button onclick="handleGenerate()">Generate</button>
</div>

<div id="output"></div>

<script src="script.js"></script>

</body>
</html>
