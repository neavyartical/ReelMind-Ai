<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReelMind AI</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  color:white;
  text-align:center;
  background: linear-gradient(135deg,#0f2027,#2c5364,#1c92d2);
  background-size:400% 400%;
  animation: water 10s infinite ease-in-out;
}

@keyframes water {
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

h1 {margin-top:20px;}

/* CUBE */
.scene {
  width:260px;
  height:260px;
  margin:40px auto;
  perspective:900px;
}

.cube {
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:1s;
}

.face {
  position:absolute;
  width:260px;
  height:260px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:20px;
  cursor:pointer;
}

/* SIDES */
.front  { transform: rotateY(0deg) translateZ(130px); }
.back   { transform: rotateY(180deg) translateZ(130px); }
.right  { transform: rotateY(90deg) translateZ(130px); }
.left   { transform: rotateY(-90deg) translateZ(130px); }
.top    { transform: rotateX(90deg) translateZ(130px); }
.bottom { transform: rotateX(-90deg) translateZ(130px); }

input {
  padding:10px;
  width:75%;
  border-radius:10px;
  border:none;
}

button {
  padding:10px;
  border:none;
  border-radius:10px;
  background:#00c6ff;
  color:white;
  margin:5px;
}

#output {
  margin:20px;
}

/* PRICING */
.pricing {
  margin-top:20px;
  background:rgba(255,255,255,0.1);
  padding:15px;
  border-radius:15px;
}

/* FOOTER */
.footer {
  margin-top:30px;
  font-size:12px;
  opacity:0.7;
}
</style>
</head>

<body>

<h1>🌊 ReelMind AI</h1>
<p>Powered by Artical Neavy</p>

<div class="scene">
  <div class="cube" id="cube">

    <div class="face front" onclick="select('chat')">Chat</div>
    <div class="face back" onclick="select('story')">Story</div>
    <div class="face right" onclick="select('image')">Image</div>
    <div class="face left" onclick="select('video')">Video</div>
    <div class="face top" onclick="select('funny')">Funny</div>
    <div class="face bottom" onclick="select('money')">Money</div>

  </div>
</div>

<input id="prompt" placeholder="Enter your idea..."><br><br>
<button onclick="generate()">Generate</button>

<div id="output"></div>

<!-- ADS -->
<div style="margin:20px;">
  <p>🔸 Ads will appear here</p>
</div>

<!-- PRICING -->
<div class="pricing">
  <h3>💎 Premium</h3>
  <button onclick="buyMonthly()">$9/month</button>
  <button onclick="buyLifetime()">$99 lifetime</button>
</div>

<div class="footer">
  <a href="#" onclick="terms()">Terms & Conditions</a>
</div>

<script>
let mode="chat";
let cube=document.getElementById("cube");

// AUTO ROTATION
let angleY=0;
setInterval(()=>{
  angleY += 1;
  cube.style.transform = `rotateY(${angleY}deg)`;
},50);

// SELECT MODE (OVERRIDE ROTATION TEMP)
function select(m){
  mode=m;

  if(m==="chat") cube.style.transform="rotateY(0deg)";
  if(m==="story") cube.style.transform="rotateY(180deg)";
  if(m==="image") cube.style.transform="rotateY(90deg)";
  if(m==="video") cube.style.transform="rotateY(-90deg)";
  if(m==="funny") cube.style.transform="rotateX(90deg)";
  if(m==="money") cube.style.transform="rotateX(-90deg)";
}

// SWIPE CONTROL
let startX=0;
document.addEventListener("touchstart",e=>{
  startX=e.touches[0].clientX;
});
document.addEventListener("touchend",e=>{
  let endX=e.changedTouches[0].clientX;
  if(endX-startX>50) cube.style.transform="rotateY(90deg)";
  if(startX-endX>50) cube.style.transform="rotateY(-90deg)";
});

// GENERATE
async function generate(){
  let prompt=document.getElementById("prompt").value;

  if(!prompt){
    alert("Enter prompt");
    return;
  }

  document.getElementById("output").innerText="⏳ Loading...";

  try{
    let res = await fetch("https://reelmindbackend-1.onrender.com/generate",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({prompt, type:mode})
    });

    let data = await res.json();

    if(mode==="image"){
      document.getElementById("output").innerHTML =
        `<img src="${data.result}" width="280">`;
    } else {
      document.getElementById("output").innerText = data.result;
    }

  }catch(e){
    document.getElementById("output").innerText="❌ Server error";
  }
}

// PAYPAL
function buyMonthly(){
  window.location.href="https://www.paypal.com/paypalme/YOURNAME/9";
}

function buyLifetime(){
  window.location.href="https://www.paypal.com/paypalme/YOURNAME/99";
}

// TERMS
function terms(){
  alert(`Terms:
Use responsibly.
No illegal content.
AI results may vary.
Premium unlocks full features.

© Artical Neavy`);
}
</script>

</body>
</html>
