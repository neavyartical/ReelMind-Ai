<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:-apple-system, BlinkMacSystemFont;
color:white;
background:radial-gradient(circle at top,#001f3f,#000);
overflow:hidden;
}

/* 🌌 DYNAMIC BACKGROUND */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at 30% 30%, #00ffcc22, transparent),
radial-gradient(circle at 70% 70%, #00aaff22, transparent);
animation:moveBg 8s infinite alternate;
z-index:-1;
}

@keyframes moveBg{
0%{transform:scale(1);}
100%{transform:scale(1.2);}
}

/* 🍏 GLASS PANEL */
.glass{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
border-radius:20px;
padding:15px;
margin:10px;
box-shadow:0 8px 30px rgba(0,0,0,0.5);
}

/* 🌍 GLASS GLOBE */
.globe{
width:220px;
height:220px;
margin:30px auto;
border-radius:50%;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(25px);
box-shadow:
inset 0 0 40px rgba(255,255,255,0.1),
0 0 30px rgba(0,255,204,0.3);
position:relative;
animation:rotate 20s linear infinite;
}

/* BUTTONS INSIDE GLOBE */
.globe button{
position:absolute;
background:rgba(0,255,204,0.2);
border:none;
color:white;
padding:12px;
border-radius:50%;
backdrop-filter:blur(10px);
}

/* POSITIONING BUTTONS */
.globe button:nth-child(1){top:20%;left:40%;}
.globe button:nth-child(2){top:50%;left:10%;}
.globe button:nth-child(3){top:50%;right:10%;}
.globe button:nth-child(4){bottom:20%;left:40%;}
.globe button:nth-child(5){top:35%;right:20%;}
.globe button:nth-child(6){bottom:35%;left:20%;}

@keyframes rotate{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* 💰 PLANS */
.plan{
background:rgba(255,255,255,0.05);
padding:10px;
border-radius:15px;
margin:5px;
text-align:center;
}

.plan button{
margin-top:5px;
background:#00ffcc;
border:none;
padding:5px 10px;
border-radius:10px;
}

/* 🧠 AVATAR */
#avatar{
width:90px;
border-radius:50%;
display:block;
margin:auto;
box-shadow:0 0 20px #00ffcc;
}

/* INPUT */
input{
width:100%;
padding:12px;
border:none;
border-radius:12px;
margin-top:10px;
background:rgba(255,255,255,0.1);
color:white;
}
</style>
</head>

<body>

<div class="glass">

<h2>🧠 ReelMind AI</h2>

<div>💰 Credits: <span id="credits">0</span></div>

<input id="prompt" placeholder="Create something viral...">

<img id="avatar" src="https://i.imgur.com/6VBx3io.png">

<!-- 🌍 GLASS GLOBE -->
<div class="globe">
<button onclick="generate()">🧠</button>
<button onclick="renderVideo()">🎬</button>
<button onclick="talk()">🤖</button>
<button onclick="music()">🎵</button>
<button onclick="saveProject()">💾</button>
<button onclick="buyUI()">💰</button>
</div>

<canvas id="canvas" width="360" height="640"></canvas>
<video id="preview" controls style="width:100%;"></video>

<pre id="output"></pre>

</div>

<!-- 💰 MONETIZATION -->
<div class="glass" id="shop" style="display:none;">
<h3>Upgrade</h3>

<div class="plan">
Basic (100 credits)
<button onclick="buy('basic')">Buy</button>
</div>

<div class="plan">
Pro (300 credits)
<button onclick="buy('pro')">Buy</button>
</div>

<div class="plan">
Ultimate (1000 credits)
<button onclick="buy('ultimate')">Buy</button>
</div>
</div>

<audio id="bg"></audio>

<script>
const API="YOUR_BACKEND_URL";

/* LOAD USER */
window.onload=()=>{
credits.innerText=localStorage.getItem("credits")||0;
};

/* AI */
async function generate(){
const r=await fetch(API+"/generate",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":localStorage.getItem("token")
},
body:JSON.stringify({prompt:prompt.value})
});
const d=await r.json();
output.innerText=d.result;
}

/* VIDEO */
async function renderVideo(){
const canvas=canvasEl=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

const stream=canvas.captureStream();
const rec=new MediaRecorder(stream);

let chunks=[];
rec.ondataavailable=e=>chunks.push(e.data);

rec.onstop=()=>{
preview.src=URL.createObjectURL(new Blob(chunks));
};

rec.start();

let words=prompt.value.split(" ");
let i=0;

let interval=setInterval(()=>{
ctx.fillStyle="black";
ctx.fillRect(0,0,360,640);

ctx.fillStyle="#00ffcc";
ctx.font="bold 30px Arial";
ctx.fillText(words[i]||"",40,320);

i++;
if(i>=words.length){
clearInterval(interval);
setTimeout(()=>rec.stop(),1000);
}
},300);
}

/* AVATAR */
function talk(){
const speech=new SpeechSynthesisUtterance(prompt.value);
avatar.style.transform="scale(1.2)";
speech.onend=()=>avatar.style.transform="scale(1)";
speechSynthesis.speak(speech);
}

/* MUSIC */
function music(){
bg.src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3";
bg.play();
}

/* SHOP */
function buyUI(){
shop.style.display = shop.style.display==="none"?"block":"none";
}

async function buy(plan){
const r=await fetch(API+"/buy-plan",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":localStorage.getItem("token")
},
body:JSON.stringify({plan})
});

const d=await r.json();
credits.innerText=d.credits;
localStorage.setItem("credits",d.credits);
}

/* SAVE */
async function saveProject(){
await fetch(API+"/save-project",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":localStorage.getItem("token")
},
body:JSON.stringify({title:prompt.value})
});
}
</script>

</body>
</html>
