<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ADSENSE -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1714638410489429" crossorigin="anonymous"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: white;
      background: radial-gradient(circle at top, #0f2027, #000);
    }

    #nav {
      background: rgba(0,0,0,0.9);
      padding: 12px;
      text-align: center;
      font-weight: bold;
    }

    #nav a {
      color: #00ffc3;
      margin: 0 6px;
      cursor: pointer;
    }

    #chat {
      height: 55vh;
      overflow-y: auto;
      padding: 15px;
    }

    .msg {
      padding: 12px;
      margin: 10px;
      border-radius: 12px;
      max-width: 80%;
    }

    .user { background: #1f1f1f; margin-left: auto; }
    .ai { background: #2b2b2b; }

    img { width: 100%; border-radius: 10px; }

    #inputArea {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      padding: 10px;
      background: #111;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 20px;
      border: none;
    }

    button {
      margin-left: 5px;
      border-radius: 20px;
      padding: 10px;
      border: none;
      background: #00ffc3;
      font-weight: bold;
    }

    .loader {
      border: 4px solid #333;
      border-top: 4px solid #00ffc3;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      margin: 10px;
    }

    @keyframes spin { 100% { transform: rotate(360deg); } }

    footer {
      text-align: center;
      padding: 15px;
      color: gray;
    }
  </style>
</head>

<body>

<div id="nav">
  ReelMind AI 🚀 |
  <a onclick="showPage('about')">About</a>
  <a onclick="showPage('contact')">Contact</a>
  <a onclick="showPage('privacy')">Privacy</a>
  <a onclick="showPage('terms')">Terms</a>
  | Credits: <span id="credits">10</span> 💎
</div>

<div id="chat"></div>

<!-- ADS -->
<div style="text-align:center;">
  <ins class="adsbygoogle"
    style="display:block"
    data-ad-client="ca-pub-1714638410489429"
    data-ad-slot="1234567890"
    data-ad-format="auto"></ins>
</div>

<script>
(adsbygoogle = window.adsbygoogle || []).push({});
</script>

<div style="text-align:center; margin:10px;">
  <button onclick="setMode('text')">AI</button>
  <button onclick="setMode('image')">Image</button>
  <button onclick="setMode('reel')">Reel</button>
  <button onclick="showDashboard()">Dashboard</button>
  <button onclick="buyCredits()">💰 Buy</button>
</div>

<div id="inputArea">
  <input id="userInput" placeholder="Ask anything..." />
  <button onclick="send()">Send</button>
</div>

<footer>Powered by Artical Neavy ⚡</footer>

<script>
let mode = "text";
let credits = parseInt(localStorage.getItem("credits")) || 10;

document.getElementById("credits").innerText = credits;

function setMode(m){ mode = m; }

function updateCredits(){
  localStorage.setItem("credits", credits);
  document.getElementById("credits").innerText = credits;
}

async function send(){
  const input = userInput.value;
  if(!input) return;

  if(credits <= 0){
    chat.innerHTML += `<div class="msg ai">⚠️ No credits. Buy more.</div>`;
    return;
  }

  credits--;
  updateCredits();

  chat.innerHTML += `<div class="msg user">${input}</div>`;

  const loader = document.createElement("div");
  loader.className = "loader";
  chat.appendChild(loader);

  setTimeout(()=>{

    loader.remove();

    // 🧠 SIMPLE AI (WORKING ALWAYS)
    if(mode==="text"){
      chat.innerHTML += `<div class="msg ai">🤖 "${input}" is powerful idea. Build am into viral content 🚀</div>`;
    }

    // 🖼 IMAGE
    if(mode==="image"){
      const imgUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(input)}`;
      chat.innerHTML += `<div class="msg ai"><img src="${imgUrl}"><br><a href="${imgUrl}" download>⬇ Download</a></div>`;
    }

    // 🎬 REEL
    if(mode==="reel"){
      chat.innerHTML += `<div class="msg ai">
      🎬 Viral Reel:<br><br>
      Hook: ${input}<br>
      Scene: Emotional / Action<br>
      Ending: Surprise 🔥<br><br>
      Caption: "Wait for it..."<br>
      #viral #fyp
      </div>`;
    }

  },1000);

  userInput.value="";
}

// 📊 DASHBOARD
function showDashboard(){
  chat.innerHTML += `<div class="msg ai">
  📊 Dashboard<br><br>
  Credits: ${credits}<br>
  Earnings: $0<br><br>
  Upgrade coming soon 🚀
  </div>`;
}

// 💰 BUY SYSTEM (HOOK)
function buyCredits(){
  credits += 20;
  updateCredits();
  alert("Credits added! (connect PayPal later)");
}

// 📄 PAGES
function showPage(p){
  if(p==="about") chat.innerHTML += `<div class="msg ai">ReelMind AI na global AI tool for creators 🌍</div>`;
  if(p==="contact") chat.innerHTML += `<div class="msg ai">Email: support@reelmind.ai</div>`;
  if(p==="privacy") chat.innerHTML += `<div class="msg ai">Your data safe.</div>`;
  if(p==="terms") chat.innerHTML += `<div class="msg ai">Use responsibly.</div>`;
}
</script>

</body>
</html>
