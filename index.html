<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
      padding-top: 50px;
    }

    input {
      width: 80%;
      padding: 12px;
      margin: 10px;
      border-radius: 10px;
      border: none;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: #00c896;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    #app { display: none; }
  </style>
</head>

<body>

  <!-- LOGIN SCREEN -->
  <div id="login">
    <h2>Login to ReelMind AI</h2>
    <button onclick="loginWithGoogle()">Login with Google</button>
  </div>

  <!-- MAIN APP -->
  <div id="app">
    <h1>🚀 ReelMind AI</h1>
    <input type="text" placeholder="Type something like: image of dragon">
    <br>
    <button>Generate</button>
    <br><br>
    <button onclick="logout()">Logout</button>
  </div>

  <script>
    // 🔥 YOUR NEW FIREBASE CONFIG (EDIT ONLY apiKey if needed)
    const firebaseConfig = {
      apiKey: "PASTE_YOUR_NEW_API_KEY_HERE",
      authDomain: "reelmind-ai-a11eb.firebaseapp.com",
      projectId: "reelmind-ai-a11eb",
      storageBucket: "reelmind-ai-a11eb.appspot.com",
      messagingSenderId: "534455151705",
      appId: "1:534455151705:web:42eef09cd465fecb8ed548"
    };

    // INIT
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // LOGIN FUNCTION
    function loginWithGoogle() {
      const provider = new firebase.auth.GoogleAuthProvider();

      auth.signInWithPopup(provider)
        .then((result) => {
          console.log("Login success:", result.user.email);
        })
        .catch((error) => {
          alert("Login error: " + error.message);
        });
    }

    // LOGOUT
    function logout() {
      auth.signOut();
    }

    // 🔥 FIX LOGIN LOOP (IMPORTANT)
    auth.onAuthStateChanged(user => {
      if (user) {
        console.log("Logged in:", user.email);
        document.getElementById("app").style.display = "block";
        document.getElementById("login").style.display = "none";
      } else {
        document.getElementById("app").style.display = "none";
        document.getElementById("login").style.display = "block";
      }
    });
  </script>

</body>
                              </html>
