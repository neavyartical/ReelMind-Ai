<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ReelMind AI</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#0f0c29;
  color:white;
  text-align:center;
}

/* LOGIN SCREEN */
#login {
  margin-top:100px;
}

input {
  padding:10px;
  border-radius:10px;
  border:none;
  margin:5px;
}

button {
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:#ff4ecd;
  color:white;
}

/* APP */
#app { display:none; }

/* 3D CUBE */
.scene {
  width:200px;
  height:200px;
  margin:50px auto;
  perspective:600px;
}

.cube {
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:1s;
}

.face {
  position:absolute;
  width:200px;
  height:200px;
  background:rgba(255,255,255,0.1);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  border-radius:20px;
  cursor:pointer;
}

/* CUBE SIDES */
.front  { transform: rotateY(0deg) translateZ(100px); }
.back   { transform: rotateY(180deg) translateZ(100px); }
.right  { transform: rotateY(90deg) translateZ(100px); }
.left   { transform: rotateY(-90deg) translateZ(100px); }
.top    { transform: rotateX(90deg) translateZ(100px); }
.bottom { transform: rotateX(-90deg) translateZ(100px); }

/* RESULT */
#result {
  margin:20px;
}

/* FOOTER */
.footer {
  margin-top:40px;
  font-size:12px;
  opacity:0.7;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>🔐 Login</h2>
  <input id="user" placeholder="Username"><br>
  <input id="pass" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
  <p>Use: admin / 1234</p>
</div>

<!-- APP -->
<div id="app">

<h2>🚀 ReelMind AI</h2>

<div class="scene">
  <div class="cube" id="cube">

    <div class="face front" onclick="selectMode('chat')">💬 Chat</div>
    <div class="face back" onclick="selectMode('story')">📖 Story</div>
    <div class="face right" onclick="selectMode('image')">🖼 Image</div>
    <div class="face left" onclick="selectMode('video')">🎬 Video</div>
    <div class="face top" onclick="selectMode('money')">💰 Money</div>
    <div class="face bottom" onclick="selectMode('tiktok')">🚀 TikTok</div>

  </div>
</div>

<input id="input" placeholder="Type your idea...">
<button onclick="send()">Generate</button>

<div id="result">Select a feature 👆</div>

<div class="footer">
  Powered by Artical Neavy |
  <a href="#" onclick="terms()">Terms</a>
</div>

</div>

<script>
let mode="chat";
let premium=false;

// LOGIN
function login(){
  let u=document.getElementById("user").value;
  let p=document.getElementById("pass").value;

  if(u==="admin" && p==="1234"){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
  }else{
    alert("Wrong login");
  }
}

// ROTATE CUBE
function rotateCube(x,y){
  document.getElementById("cube").style.transform =
    "rotateX("+x+"deg) rotateY("+y+"deg)";
}

// SELECT MODE
function selectMode(m){
  mode=m;

  if(m==="chat") rotateCube(0,0);
  if(m==="story") rotateCube(0,180);
  if(m==="image") rotateCube(0,90);
  if(m==="video") rotateCube(0,-90);
  if(m==="money") rotateCube(90,0);
  if(m==="tiktok") rotateCube(-90,0);

  document.getElementById("result").innerText="Mode: "+m;
}

// IMAGE API (FREE)
function getImage(prompt){
  return `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}`;
}

// SEND
async function send(){
  let text=document.getElementById("input").value;
  if(!text) return;

  document.getElementById("result").innerText="⏳ Loading...";

  // IMAGE
  if(mode==="image"){
    let img=getImage(text);
    document.getElementById("result").innerHTML=
      `<img src="${img}" width="250">`;
    return;
  }

  // VIDEO (PREMIUM LOCK)
  if(mode==="video"){
    if(!premium){
      document.getElementById("result").innerText=
        "🔒 Premium feature. Upgrade needed.";
      return;
    }
  }

  // BACKEND TEXT
  try{
    let res=await fetch("https://reelmindbackend-1.onrender.com/generate",{
      method:"POST",
      headers:{ "Content-Type":"application/json"},
      body:JSON.stringify({prompt:text})
    });

    let data=await res.json();
    document.getElementById("result").innerText=data.result;

  }catch(e){
    document.getElementById("result").innerText="❌ Error";
  }
}

// TERMS
function terms(){
  alert("Terms & Conditions:\nUse responsibly. No abuse. AI results may vary.");
}
</script>

</body>
</html>
