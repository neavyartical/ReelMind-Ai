<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ReelMind AI</title>

<style>
body {
  font-family: Arial;
  background: #f5f7fa;
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 500px;
  margin: auto;
}

textarea {
  width: 100%;
  height: 80px;
  border-radius: 10px;
  padding: 10px;
}

button {
  margin-top: 15px;
  padding: 12px 25px;
  background: #00b894;
  color: white;
  border: none;
  border-radius: 10px;
}

img, video {
  width: 100%;
  margin-top: 10px;
  border-radius: 10px;
}
</style>

</head>
<body>

<div class="container">

<h1>🧠 ReelMind AI</h1>

<textarea id="prompt" placeholder="Enter idea..."></textarea>
<button onclick="generate()">Generate</button>

<h3>✍️ Story</h3>
<p id="story"></p>

<h3>🖼 Image</h3>
<img id="image">
<a id="download" download="image.png"><button>Download</button></a>

<h3>🎬 Video</h3>
<video id="video" controls></video>

</div>

<script>
async function generate() {
  const prompt = document.getElementById("prompt").value;

  // STORY (backend)
  const storyRes = await fetch("https://YOUR-RENDER-URL.onrender.com/story", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ prompt })
  });

  const storyData = await storyRes.json();
  document.getElementById("story").innerText =
    storyData.choices?.[0]?.message?.content || "Story failed";

  // IMAGE (Pollinations)
  const imageUrl = "https://image.pollinations.ai/prompt/" + encodeURIComponent(prompt);
  document.getElementById("image").src = imageUrl;
  document.getElementById("download").href = imageUrl;

  // VIDEO (temporary demo)
  document.getElementById("video").src =
    "https://www.w3schools.com/html/mov_bbb.mp4";
}
</script>

</body>
</html>
