<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: white;
      background: radial-gradient(circle at center, #00ffc355, #000),
                  linear-gradient(135deg, #0f2027, #000);
    }

    #nav {
      padding: 12px;
      text-align: center;
      background: rgba(0,0,0,0.9);
      box-shadow: 0 0 15px #00ffc3;
    }

    #chat {
      height: 60vh;
      overflow-y: auto;
      padding: 15px;
    }

    .msg {
      padding: 12px;
      margin: 10px;
      border-radius: 12px;
      max-width: 80%;
    }

    .user {
      background: #1f1f1f;
      margin-left: auto;
      text-align: right;
    }

    .ai {
      background: #2b2b2b;
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    #controls {
      text-align: center;
      margin: 10px;
    }

    button {
      margin: 5px;
      padding: 10px;
      border: none;
      border-radius: 20px;
      background: #00ffc3;
      font-weight: bold;
    }

    input {
      padding: 10px;
      border-radius: 20px;
      border: none;
    }

    #inputArea {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      background: #111;
    }

    #inputArea input {
      flex: 1;
    }
  </style>
</head>

<body>

<div id="nav">
  <b>ReelMind AI 🚀</b><br>
  <input id="email" placeholder="Enter email">
  <button onclick="login()">Login</button>
</div>

<div id="chat"></div>

<div id="controls">
  <button onclick="mode='text'">AI</button>
  <button onclick="mode='image'">Image</button>
  <button onclick="mode='reel'">Reel</button>
  <button onclick="dashboard()">Dashboard</button>
  <button onclick="pay()">💰 Upgrade</button>
</div>

<div id="inputArea">
  <input id="userInput" placeholder="Ask anything...">
  <button onclick="send()">Send</button>
</div>

<script>
const API = "https://YOUR-BACKEND-URL.onrender.com"; // 🔥 CHANGE THIS

let token = localStorage.getItem("token");
let mode = "text";

// 🔐 LOGIN
async function login() {
  const email = document.getElementById("email").value;

  const res = await fetch(API + "/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ email })
  });

  const data = await res.json();

  token = data.token;
  localStorage.setItem("token", token);

  alert("Logged in successfully ✅");
}

// 📩 SEND
async function send() {
  const input = document.getElementById("userInput").value;
  const chat = document.getElementById("chat");

  if (!token) {
    alert("Login first ❗");
    return;
  }

  chat.innerHTML += `<div class="msg user">${input}</div>`;

  let endpoint = "/generate-text";
  if (mode === "image") endpoint = "/generate-image";
  if (mode === "reel") endpoint = "/viral-reel";

  try {
    const res = await fetch(API + endpoint, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({ prompt: input })
    });

    const data = await res.json();

    if (data.error) {
      chat.innerHTML += `<div class="msg ai">⚠️ ${data.error}</div>`;
      return;
    }

    // TEXT
    if (mode === "text") {
      const reply = data?.choices?.[0]?.message?.content || "No response";
      chat.innerHTML += `<div class="msg ai">${reply}</div>`;
    }

    // IMAGE
    if (mode === "image") {
      chat.innerHTML += `<div class="msg ai"><img src="${data.image}"></div>`;
    }

    // REEL
    if (mode === "reel") {
      const reply = data?.choices?.[0]?.message?.content || "No response";
      chat.innerHTML += `<div class="msg ai">${reply}</div>`;
    }

  } catch (err) {
    chat.innerHTML += `<div class="msg ai">⚠️ Server error</div>`;
  }

  document.getElementById("userInput").value = "";
}

// 📊 DASHBOARD
async function dashboard() {
  const chat = document.getElementById("chat");

  const res = await fetch(API + "/dashboard", {
    headers: { "Authorization": "Bearer " + token }
  });

  const data = await res.json();

  chat.innerHTML += `
  <div class="msg ai">
  📊 Credits: ${data.credits} <br>
  Premium: ${data.premium} <br>
  Earnings: ${data.earnings}
  </div>`;
}

// 💳 PAYMENT
async function pay() {
  const res = await fetch(API + "/pay", {
    method: "POST",
    headers: { "Authorization": "Bearer " + token }
  });

  const data = await res.json();
  window.location = data.url;
}
</script>

</body>
</html>
