<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ADSENSE -->
  <script async 
  src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1714638410489429"
  crossorigin="anonymous"></script>

  <style>
    body {
      margin: 0;
      background: #0b0b0b;
      font-family: Arial;
      color: white;
    }

    #nav {
      background: #111;
      padding: 10px;
      text-align: center;
    }

    #chat {
      height: 70vh;
      overflow-y: auto;
      padding: 15px;
    }

    .user, .ai {
      padding: 12px;
      margin: 10px;
      border-radius: 12px;
      max-width: 80%;
    }

    .user {
      background: #1f1f1f;
      margin-left: auto;
      text-align: right;
    }

    .ai {
      background: #2b2b2b;
      margin-right: auto;
    }

    .ai img {
      width: 100%;
      border-radius: 10px;
    }

    #inputArea {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      padding: 10px;
      background: #111;
    }

    #userInput {
      flex: 1;
      padding: 12px;
      border-radius: 20px;
      border: none;
    }

    #generateBtn {
      background: #00ffc3;
      color: black;
      border: none;
      border-radius: 20px;
      padding: 10px;
      margin-left: 5px;
    }
  </style>
</head>

<body>

<div id="nav">
  ReelMind AI 🚀
</div>

<!-- ADS -->
<div style="text-align:center;">
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-1714638410489429"
       data-ad-slot="1234567890"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
</div>

<script>
(adsbygoogle = window.adsbygoogle || []).push({});
</script>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" placeholder="Ask or generate image..." />
  <button id="generateBtn" onclick="sendPrompt()">Generate</button>
</div>

<script>
const TEXT_API = "https://reelmindbackend-1.onrender.com/generate-text";

// MAIN FUNCTION
async function sendPrompt() {
  const input = document.getElementById("userInput").value;
  const chat = document.getElementById("chat");

  if (!input) return;

  chat.innerHTML += `<div class="user">${input}</div>`;

  try {

    // 🖼 IMAGE (POLLINATIONS)
    if (input.toLowerCase().includes("image")) {

      const cleanPrompt = encodeURIComponent(input);

      const imgURL = `https://image.pollinations.ai/prompt/${cleanPrompt}`;

      chat.innerHTML += `
        <div class="ai">
          <img src="${imgURL}" />
        </div>
      `;

    } else {

      // 🤖 TEXT (OPENROUTER BACKEND)
      const res = await fetch(TEXT_API, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ prompt: input })
      });

      const data = await res.json();

      const reply =
        data?.choices?.[0]?.message?.content ||
        data?.result ||
        "No response";

      chat.innerHTML += `<div class="ai">${reply}</div>`;
    }

  } catch (err) {
    chat.innerHTML += `<div class="ai">⚠️ Error: ${err.message}</div>`;
  }

  document.getElementById("userInput").value = "";
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
