<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ReelMind AI - Powered by Artical Neavy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ADSENSE -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1714638410489429" crossorigin="anonymous"></script>

<style>
body{
  margin:0;
  background:#0b0f14;
  color:white;
  font-family:Arial;
  overflow:hidden;
}

/* CHAT */
#chat{
  position:absolute;
  top:0;
  bottom:90px;
  width:100%;
  overflow:auto;
  padding:10px;
}

.msg{
  margin:10px;
  padding:12px;
  border-radius:12px;
  max-width:80%;
}

.user{background:#1f1f1f;margin-left:auto;}
.ai{background:#16212b;}

img,video{width:100%;border-radius:10px}

/* INPUT */
#inputArea{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  padding:10px;
  background:#111;
}

input{
  flex:1;
  padding:12px;
  border-radius:25px;
  border:none;
}

/* LEFT + BUTTON */
#uploadBtn{
  position:fixed;
  bottom:100px;
  left:15px;
  width:55px;
  height:55px;
  border-radius:50%;
  background:#00ff88;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
}

/* RIGHT MIC */
#micBtn{
  position:fixed;
  bottom:100px;
  right:15px;
  width:55px;
  height:55px;
  border-radius:50%;
  background:#00ccff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
}

/* CENTER AI CORE */
#core{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:130px;
  height:130px;
  border-radius:20px;
  background:rgba(0,255,255,0.1);
  box-shadow:0 0 40px cyan;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:5px;
  animation:glow 2s infinite alternate;
}

@keyframes glow{
  from{box-shadow:0 0 20px cyan;}
  to{box-shadow:0 0 60px cyan;}
}

.coreBtn{
  font-size:12px;
  padding:5px 8px;
  border:none;
  border-radius:10px;
  background:#00ff88;
}

.footer{
  position:absolute;
  top:5px;
  width:100%;
  text-align:center;
  font-size:12px;
}
</style>
</head>

<body>

<div class="footer">Powered by Artical Neavy</div>

<div id="chat"></div>

<!-- CORE -->
<div id="core">
<button class="coreBtn" onclick="sendText()">Text</button>
<button class="coreBtn" onclick="generateImage()">Image</button>
<button class="coreBtn" onclick="generateVideo()">Video</button>
<button class="coreBtn" onclick="generateReel()">Reel</button>
<button class="coreBtn" onclick="downloadLast()">⬇</button>
</div>

<!-- UPLOAD -->
<div id="uploadBtn" onclick="fileInput.click()">+</div>
<input type="file" id="fileInput" style="display:none" onchange="uploadFile(event)">

<!-- MIC -->
<div id="micBtn" onclick="startVoice()">🎤</div>

<!-- INPUT -->
<div id="inputArea">
<input id="prompt" placeholder="Ask anything..." />
<button onclick="sendText()">Send</button>
</div>

<script>
const API="https://reelmindbackend-1.onrender.com";
const chat=document.getElementById("chat");
let lastOutput="";

// ===== TOKEN =====
function setToken(t){localStorage.setItem("token",t);}
function getToken(){return localStorage.getItem("token");}

// AUTO LOGIN
async function ensureLogin(){
  if(!getToken()){
    let r=await fetch(API+"/login",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({email:"guest@user.com"})
    });
    let d=await r.json();
    setToken(d.token);
  }
}

// ===== MESSAGE =====
function addMsg(text,type){
let d=document.createElement("div");
d.className="msg "+type;
d.innerText=text;
chat.appendChild(d);
return d;
}

// ===== TYPE EFFECT =====
function type(el,text){
let i=0;
el.innerHTML="";
function t(){
if(i<text.length){
el.innerHTML+=text.charAt(i);
i++;
setTimeout(t,5);
}
}
t();
}

// ===== TEXT =====
async function sendText(){
await ensureLogin();

let p=prompt.value;
if(!p) return;

addMsg(p,"user");
let box=addMsg("Thinking...","ai");

let r=await fetch(API+"/generate-text",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+getToken()
},
body:JSON.stringify({
prompt:"Answer like Google + Wikipedia + ChatGPT:\n"+p
})
});

let d=await r.json();
lastOutput=d.result;

type(box,d.result);
}

// ===== IMAGE (FIXED) =====
async function generateImage(){
await ensureLogin();

let box=addMsg("Generating image...","ai");

let enhanced = prompt.value + ", ultra realistic, cinematic lighting, 4k";

let r=await fetch(API+"/generate-image",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+getToken()
},
body:JSON.stringify({prompt:enhanced})
});

let d=await r.json();
lastOutput=d.image;

box.innerHTML=`<img src="${d.image}" onerror="this.src='${d.fallback}'">`;
}

// ===== VIDEO =====
async function generateVideo(){
await ensureLogin();

let box=addMsg("Generating video...","ai");

let r=await fetch(API+"/generate-video",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+getToken()
},
body:JSON.stringify({prompt:prompt.value})
});

let d=await r.json();
lastOutput=d.video;

box.innerHTML=`<video controls src="${d.video}"></video>`;
}

// ===== REEL =====
async function generateReel(){
await ensureLogin();

let box=addMsg("Creating viral reel...","ai");

let r=await fetch(API+"/generate-reel",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+getToken()
},
body:JSON.stringify({prompt:prompt.value})
});

let d=await r.json();
lastOutput=d.result;

type(box,d.result);
}

// ===== DOWNLOAD =====
function downloadLast(){
if(!lastOutput) return alert("Nothing yet");

let a=document.createElement("a");
a.href=lastOutput;
a.download="reelmind_output";
a.click();
}

// ===== UPLOAD =====
function uploadFile(e){
let file=e.target.files[0];
addMsg("Uploaded: "+file.name,"user");
}

// ===== VOICE =====
function startVoice(){
if(!('webkitSpeechRecognition' in window)){
alert("Voice not supported");
return;
}

let rec=new webkitSpeechRecognition();
rec.lang="en-US";

rec.onresult=e=>{
prompt.value=e.results[0][0].transcript;
};

rec.start();
}
</script>

</body>
</html>
