<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
</head>

<body style="background:black;color:white;text-align:center;font-family:sans-serif;">

  <h1>🎬 ReelMind AI</h1>

  <input 
    id="prompt" 
    placeholder="Enter prompt..." 
    style="width:80%;padding:10px;border-radius:10px;"
  />

  <br><br>

  <button onclick="generate()" style="padding:10px 20px;background:green;color:white;border:none;">
    Generate
  </button>

  <p id="status"></p>

  <img 
    id="video" 
    style="display:none;width:80%;margin-top:20px;border-radius:10px;"
  />

  <!-- 🔥 FINAL SCRIPT -->
  <script>
    // ✅ IMPORTANT: full endpoint
    const BACKEND_URL = "https://backend-ppyz.onrender.com/generate";

    async function generate() {
      const prompt = document.getElementById("prompt").value;

      document.getElementById("status").innerText = "Generating...";

      alert("1️⃣ Button clicked");

      try {
        const res = await fetch(BACKEND_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ prompt })
        });

        alert("2️⃣ Request sent");

        const data = await res.json();

        alert("3️⃣ Response received");

        console.log("📦 DATA:", data);

        if (data.video) {
          document.getElementById("status").innerText = "Done ✅";

          const img = document.getElementById("video");
          img.src = data.video;
          img.style.display = "block";
        } else {
          document.getElementById("status").innerText = "Failed ❌";
        }

      } catch (err) {
        alert("❌ ERROR (check console)");
        console.error(err);
        document.getElementById("status").innerText = "Error ❌";
      }
    }
  </script>

</body>
</html>
