<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
</head>

<body style="background:#0f172a;color:white;text-align:center;font-family:Arial;">

<h1>🎬 ReelMind AI</h1>

<input id="prompt" placeholder="Type something..." style="padding:10px;width:70%;" />
<br><br>

<button onclick="generate()" style="padding:10px 20px;background:green;color:white;">
  Generate
</button>

<p id="status"></p>

<video id="video" controls style="width:80%;display:none;"></video>

<script>
async function generate() {
  const prompt = document.getElementById("prompt").value;
  const status = document.getElementById("status");
  const video = document.getElementById("video");

  status.innerText = "Generating...";

  try {
    const res = await fetch("https://backend-ppyz.onrender.com/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt })
    });

    const data = await res.json();

    console.log(data);

    if (data.video) {
      video.src = data.video;
      video.style.display = "block";
      status.innerText = "Done ✅";
    } else {
      status.innerText = "Failed ❌";
    }

  } catch (err) {
    console.error(err);
    status.innerText = "Error ❌";
  }
}
</script>

</body>
</html>
