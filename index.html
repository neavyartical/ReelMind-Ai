<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReelMind Global</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial;
  background:black;
  color:white;
  text-align:center;
}

h1{margin-top:20px;color:#00ff88;}

input{
  width:90%;
  padding:12px;
  border-radius:20px;
  margin-top:10px;
}

.generate-box{
  width:180px;height:180px;margin:20px auto;
  display:flex;align-items:center;justify-content:center;
  background:#111;border-radius:20px;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#00ff88;
}

.control-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  width:90%;
  margin:20px auto;
}

.control-grid button{background:#222;color:white;}
.control-grid .active{background:#00ff88;color:black;}

.box{margin:15px;padding:15px;background:#111;}

img,video{width:90%;}
</style>
</head>

<body>

<h1>ReelMind Global</h1>

<!-- LOGIN -->
<div class="box">
<input id="email" placeholder="Enter email">
<button onclick="register()">Login</button>
<p id="creditsDisplay">Credits: 0</p>
</div>

<input id="prompt" placeholder="Type prompt">

<div class="generate-box">
<button onclick="generate()">Generate</button>
</div>

<!-- GRID -->
<div class="control-grid">
<button onclick="setMode('story',this)">Story</button>
<button onclick="setMode('image',this)">Image</button>
<button onclick="setMode('video',this)">Video</button>
<button onclick="setMode('all',this)">All</button>
</div>

<div class="box">
<p id="story"></p>
<img id="image">
<video id="video" controls></video>
</div>

<script>
const API="https://reelmindbackend-1.onrender.com";

let mode="story";
let userEmail="";
let credits=0;

/* LOGIN */
async function register(){
  userEmail=email.value;

  const res=await fetch(API+"/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email:userEmail})
  });

  const data=await res.json();
  credits=data.credits;
  updateCredits();
}

/* UPDATE UI */
function updateCredits(){
  if(credits==="unlimited"){
    creditsDisplay.innerText="Credits: ∞ (Owner)";
  } else {
    creditsDisplay.innerText="Credits: "+credits;
  }
}

/* MODE */
function setMode(m,btn){
  mode=m;
  document.querySelectorAll(".control-grid button")
  .forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

/* GENERATE */
async function generate(){
  if(!userEmail){alert("Login first");return;}

  if(userEmail !== "artical@example.com"){
    const creditRes=await fetch(API+"/use-credit",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({email:userEmail})
    });

    const cData=await creditRes.json();
    if(cData.error){alert("No credits");return;}

    credits=cData.credits;
    updateCredits();
  }

  const res=await fetch(API+"/generate",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({prompt:prompt.value,mode})
  });

  const data=await res.json();

  story.innerText=data.story||"";
  image.src=data.image||"";
  video.src=data.video||"";
}
</script>

</body>
</html>
