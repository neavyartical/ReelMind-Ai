<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#0f0f0f;
      color:white;
    }

    #chat {
      max-height:70vh;
      overflow:auto;
      padding:10px;
    }

    .msg {
      margin:10px;
      padding:10px;
      border-radius:10px;
      max-width:80%;
    }

    .user { background:#ff6a00; margin-left:auto; }
    .ai { background:#1f1f1f; }

    input {
      width:70%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#1a1a1a;
      color:white;
    }

    button {
      padding:10px;
      border:none;
      border-radius:10px;
      background:#ff6a00;
      color:white;
      font-weight:bold;
      margin:5px;
    }

    img {
      width:100%;
      border-radius:10px;
      margin-top:10px;
    }
  </style>
</head>

<body>

<h2 style="text-align:center;">🎬 ReelMind AI</h2>

<div id="chat"></div>

<div style="text-align:center;">
  <input id="input" placeholder="Ask anything...">
  <button onclick="send()">Send</button>
</div>

<div style="text-align:center;">
  <button onclick="quick('Funny TikTok idea')">😂</button>
  <button onclick="quick('Sad love story')">💔</button>
  <button onclick="quick('Anime fight scene')">🔥</button>
  <button onclick="quick('Create a viral video idea')">🎬</button>
</div>

<button onclick="toggleTikTok()">🎵 TikTok Mode</button>
<p id="tt" style="text-align:center;">OFF</p>

<p style="text-align:center;">✨ Powered by Artical Neavy</p>

<script>

let tiktok = false;

// MESSAGE
function addMessage(text, type){
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerHTML = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// TYPING EFFECT
function typeMessage(text){
  let i = 0;
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg ai";
  chat.appendChild(div);

  let interval = setInterval(()=>{
    div.innerHTML = text.substring(0,i);
    i++;
    chat.scrollTop = chat.scrollHeight;

    if(i > text.length){
      clearInterval(interval);
    }
  },20);
}

// VOICE
function speak(text){
  let speech = new SpeechSynthesisUtterance(text);
  speech.lang = "en-US";
  speech.rate = 1;
  speech.pitch = 1;
  window.speechSynthesis.speak(speech);
}

// QUICK
function quick(text){
  document.getElementById("input").value = text;
}

// TIKTOK
function toggleTikTok(){
  tiktok = !tiktok;
  document.getElementById("tt").innerText = tiktok ? "ON 🔥" : "OFF";
}

// DOWNLOAD
function downloadImage(url){
  let a = document.createElement("a");
  a.href = url;
  a.download = "ReelMind.jpg";
  a.click();
}

// MAIN SEND
function send(){
  let input = document.getElementById("input").value.trim();
  if(!input) return;

  addMessage(input, "user");

  let lower = input.toLowerCase();

  // IMAGE (REAL API)
  if(lower.includes("image") || lower.includes("photo") || lower.includes("picture")){
    let url = "https://image.pollinations.ai/prompt/" + encodeURIComponent(input);

    addMessage(`
      🖼 Generating real image...
      <img src="${url}">
      <button onclick="downloadImage('${url}')">⬇ Download</button>
    `,"ai");

    return;
  }

  // STORY
  if(lower.includes("story")){
    let story = "Once upon a time... " + input + ". It became a powerful cinematic journey.";

    typeMessage("📖 " + story);
    speak(story);
    return;
  }

  // VIDEO
  if(lower.includes("video")){
    let video = "🎬 Create a cinematic viral video based on: " + input;

    typeMessage(video);
    speak(video);
    return;
  }

  // CHAT
  let reply = "I understand: '" + input + "'. Let me help you with something powerful 🔥";

  typeMessage(reply);
  speak(reply);
}

</script>

</body>
</html>
