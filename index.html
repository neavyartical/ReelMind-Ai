<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ReelMind AI</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0f172a;
      color: white;
      padding: 20px;
    }
    input, button {
      padding: 12px;
      margin: 10px;
      width: 80%;
      max-width: 400px;
      border-radius: 8px;
      border: none;
    }
    button {
      background: #22c55e;
      color: white;
      cursor: pointer;
    }
    img {
      margin-top: 20px;
      max-width: 90%;
      display: none;
      border-radius: 10px;
    }
  </style>
</head>
<body>

  <h1>🎬 ReelMind AI</h1>

  <input id="prompt" placeholder="Enter your prompt..." />
  <br>
  <button onclick="generateImage()">Generate</button>

  <p id="status"></p>
  <img id="output" />

  <script>
    async function generateImage() {
      const prompt = document.getElementById("prompt").value;
      const status = document.getElementById("status");
      const img = document.getElementById("output");

      if (!prompt) {
        alert("Enter a prompt");
        return;
      }

      status.innerText = "Generating... ⏳";
      img.style.display = "none";

      try {
        const response = await fetch("https://backend-ppyz.onrender.com/generate", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            prompt: prompt
          })
        });

        const data = await response.json();

        if (data.image) {
          img.src = data.image;
          img.style.display = "block";
          status.innerText = "✅ Done!";
        } else {
          status.innerText = "❌ Error generating image";
        }

      } catch (err) {
        status.innerText = "❌ Error connecting to server";
      }
    }
  </script>

</body>
</html>
