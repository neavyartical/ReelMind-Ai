<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      background: linear-gradient(135deg, #020617, #000);
      color: white;
      font-family: Arial;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
      font-size: 28px;
      letter-spacing: 1px;
    }

    input {
      padding: 14px;
      width: 85%;
      border-radius: 12px;
      border: none;
      margin-top: 15px;
      font-size: 16px;
    }

    .glass-box {
      width: 220px;
      height: 220px;
      margin: 40px auto;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(15px);
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px rgba(0,255,200,0.2);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    button {
      padding: 14px 22px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(45deg, #00ffcc, #00ffaa);
      color: black;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
    }

    #result {
      margin: 20px;
      padding: 20px;
      text-align: left;
      white-space: pre-wrap;
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
    }

    .loading {
      font-size: 18px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0% { opacity: 0.3; }
      50% { opacity: 1; }
      100% { opacity: 0.3; }
    }
  </style>
</head>

<body>

<h1>🧠 ReelMind AI • LEVEL 3</h1>

<input id="prompt" placeholder="Enter your viral idea..." />

<div class="glass-box">
  <button onclick="generate()">Generate ⚡</button>
</div>

<div id="result"></div>

<script>
async function generate() {
  const prompt = document.getElementById("prompt").value;
  const result = document.getElementById("result");

  if (!prompt) {
    result.innerText = "Enter a prompt ❌";
    return;
  }

  result.innerHTML = "<div class='loading'>⚡ Generating...</div>";

  try {
    const res = await fetch("https://reelmindbackend-1.onrender.com/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt })
    });

    const data = await res.json();

    result.innerText = data.result || "No response";

  } catch (err) {
    result.innerText = "Connection error ❌";
  }
}
</script>

</body>
</html>
