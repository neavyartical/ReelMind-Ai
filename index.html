<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: linear-gradient(135deg,#0a0a0a,#111);
      color: white;
      font-family: Arial;
      text-align: center;
    }

    .glass {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 20px;
      margin: 20px;
      box-shadow: 0 0 20px rgba(0,255,255,0.2);
    }

    input, textarea {
      width: 90%;
      padding: 12px;
      margin: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
    }

    textarea {
      height: 100px;
    }

    /* 🧊 ICE BUTTON */
    .generate-btn {
      width: 100px;
      height: 100px;
      border-radius: 20px;
      font-size: 40px;
      background: linear-gradient(145deg,#00f0ff,#00aaff);
      color: white;
      border: none;
      box-shadow: 0 0 30px cyan;
      cursor: pointer;
      transition: 0.3s;
    }

    .generate-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 60px cyan;
    }

    video, img {
      width: 90%;
      border-radius: 15px;
      margin-top: 10px;
    }

    #output {
      margin-top: 20px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

<h1>🧠 ReelMind AI</h1>

<div class="glass">

  <!-- AUTH -->
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <br>
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>

</div>

<div class="glass">

  <!-- PROMPT -->
  <textarea id="prompt" placeholder="Enter idea..."></textarea>

  <!-- 🧊 CENTER BUTTON -->
  <br>
  <button class="generate-btn" onclick="generate()">🧊</button>

  <br>
  <button onclick="save()">💾 Save</button>
  <button onclick="load()">📂 Load</button>

</div>

<div class="glass">

  <!-- UPLOAD -->
  <input type="file" id="fileInput" accept="image/*,video/*">
  <button onclick="upload()">📤 Upload & Auto AI Edit</button>

  <div id="preview"></div>

</div>

<div class="glass">

  <!-- CAMERA -->
  <video id="camera" autoplay></video>
  <br>
  <button onclick="startCamera()">📸 Camera</button>
  <button onclick="stopCamera()">⛔ Stop</button>

</div>

<div class="glass">

  <!-- VOICE -->
  <button onclick="startRecording()">🎤 Record</button>
  <button onclick="stopRecording()">⛔ Stop</button>

</div>

<div id="output"></div>

<script>
const API = "https://reelmindbackend-1.onrender.com";
let token = "";

// AUTH
async function register() {
  const res = await fetch(API + "/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ email: email.value, password: password.value })
  });
  alert((await res.json()).msg);
}

async function login() {
  const res = await fetch(API + "/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ email: email.value, password: password.value })
  });
  const data = await res.json();
  token = data.token;
  alert("Logged in!");
}

// 🧠 TEXT GENERATION
async function generate() {
  output.innerText = "❄️ Generating...";

  const res = await fetch(API + "/generate", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ prompt: prompt.value })
  });

  const data = await res.json();
  output.innerText = data.result;
}

// 💾 SAVE
async function save() {
  await fetch(API + "/save", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": token
    },
    body: JSON.stringify({
      content: output.innerText,
      type: "text"
    })
  });
  alert("Saved!");
}

// 📂 LOAD
async function load() {
  const res = await fetch(API + "/projects", {
    headers: { Authorization: token }
  });
  output.innerText = JSON.stringify(await res.json(), null, 2);
}

// 📤 UPLOAD + AI EDIT
function upload() {
  const file = fileInput.files[0];
  if (!file) return alert("Select file");

  const url = URL.createObjectURL(file);

  if (file.type.startsWith("image")) {
    preview.innerHTML = `<img src="${url}">`;

    // 🔥 REAL IMAGE AI (Pollinations)
    const aiImage = "https://image.pollinations.ai/prompt/" + encodeURIComponent(prompt.value || "cinematic edit");

    output.innerHTML = `<img src="${aiImage}">`;

  } else {
    preview.innerHTML = `<video src="${url}" controls></video>`;

    // 🎬 use backend video endpoint
    fetch(API + "/video", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ prompt: prompt.value })
    })
    .then(res => res.json())
    .then(data => {
      output.innerHTML = `<video src="${data.video}" controls></video>`;
    });
  }
}

// CAMERA
let stream;

async function startCamera() {
  stream = await navigator.mediaDevices.getUserMedia({ video: true });
  camera.srcObject = stream;
}

function stopCamera() {
  stream?.getTracks().forEach(t => t.stop());
}

// VOICE
let mediaRecorder;
let audioChunks = [];

async function startRecording() {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  mediaRecorder = new MediaRecorder(stream);

  mediaRecorder.ondataavailable = e => audioChunks.push(e.data);

  mediaRecorder.onstop = () => {
    output.innerText = "🎤 Voice recorded!";
    audioChunks = [];
  };

  mediaRecorder.start();
}

function stopRecording() {
  mediaRecorder.stop();
}
</script>

</body>
</html>
