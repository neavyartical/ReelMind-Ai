<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReelMind Global</title>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial;
  background:black;
  color:white;
  text-align:center;
}

/* BACKGROUND */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:url("https://neavyartical.github.io/ReelMind-Ai/logo.png") center/cover no-repeat;
  opacity:0.15;
  z-index:-1;
}

/* TITLE */
h1{
  margin-top:20px;
  color:#00ff88;
  text-shadow:0 0 20px #00ff88;
}

/* INPUT */
input{
  width:90%;
  padding:15px;
  border-radius:30px;
  border:none;
  margin-top:15px;
}

/* GENERATE BOX */
.generate-box{
  width:180px;
  height:180px;
  margin:20px auto;
  border-radius:25px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 40px cyan;
}

/* BUTTON */
button{
  padding:12px;
  border-radius:12px;
  border:none;
  background:linear-gradient(135deg,#00ff88,#00ccff);
  color:black;
  font-weight:bold;
}

/* GRID */
.control-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  width:90%;
  margin:20px auto;
}

.control-grid button{
  background:#1a1a1a;
  color:white;
}

.control-grid button.active{
  background:linear-gradient(135deg,#00ff88,#00ccff);
  color:black;
}

/* BOX */
.box{
  margin:15px;
  padding:15px;
  background:#111;
  border-radius:10px;
}

img,video{
  width:90%;
}

/* DOWNLOAD */
.download{
  display:inline-block;
  margin-top:10px;
  padding:10px;
  background:green;
}

</style>
</head>

<body>

<h1>🧠 ReelMind Global</h1>

<input id="prompt" placeholder="Type anything...">

<div class="generate-box">
<button onclick="generate()">Generate</button>
</div>

<!-- GRID CONTROLS -->
<div class="control-grid">

<button id="btnStory" onclick="setMode('story')">Story</button>
<button id="btnImage" onclick="setMode('image')">Image</button>

<button id="btnVideo" onclick="setMode('video')">Video</button>
<button id="btnAll" onclick="setMode('all')">All</button>

<button id="btnEng" onclick="setLang('english')">English</button>
<button id="btnKrio" onclick="setLang('krio')">Krio</button>

</div>

<!-- STORY -->
<div class="box">
<h3>Story</h3>
<p id="story"></p>
<button onclick="downloadStory()">Download</button>
</div>

<!-- IMAGE -->
<div class="box">
<h3>Image</h3>
<img id="image">
<a id="imgDownload" class="download">Download</a>
</div>

<!-- VIDEO -->
<div class="box">
<h3>Video</h3>
<video id="video" controls></video>
<a id="vidDownload" class="download">Download</a>
</div>

<!-- ASK -->
<div class="box">
<h3>Ask Anything</h3>
<input id="ask">
<button onclick="askAI()">Ask</button>
<p id="answer"></p>
</div>

<script>

const API="https://reelmindbackend-1.onrender.com";

let mode="story";
let language="english";

/* BUTTON STATE */
function setMode(m){mode=m;highlight();}
function setLang(l){language=l;highlight();}

function highlight(){
  document.querySelectorAll(".control-grid button").forEach(b=>b.classList.remove("active"));

  if(mode==="story") btnStory.classList.add("active");
  if(mode==="image") btnImage.classList.add("active");
  if(mode==="video") btnVideo.classList.add("active");
  if(mode==="all") btnAll.classList.add("active");

  if(language==="english") btnEng.classList.add("active");
  if(language==="krio") btnKrio.classList.add("active");
}

/* GENERATE */
async function generate(){
  const prompt=document.getElementById("prompt").value;

  document.getElementById("story").innerText="Loading...";

  const res=await fetch(API+"/generate",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({prompt,mode,language})
  });

  const data=await res.json();

  document.getElementById("story").innerText=data.story || "";

  if(data.image){
    image.src=data.image;
    imgDownload.href=data.image;
  }

  if(data.video){
    video.src=data.video;
    vidDownload.href=data.video;
  }

  speak(data.story);
}

/* ASK */
async function askAI(){
  const q=ask.value;

  const res=await fetch(API+"/ask",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({question:q,language})
  });

  const data=await res.json();
  answer.innerText=data.answer;

  speak(data.answer);
}

/* VOICE */
function speak(text){
  if(!text) return;
  const speech=new SpeechSynthesisUtterance(text);
  speechSynthesis.speak(speech);
}

/* DOWNLOAD */
function downloadStory(){
  const blob=new Blob([story.innerText]);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="story.txt";
  a.click();
}

highlight();

</script>

</body>
</html>
