<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ReelMind AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- BACKGROUND -->
  <div class="bg"></div>

  <!-- APP -->
  <div class="app">

    <!-- HEADER -->
    <div class="header">
      <h1>ReelMind <span>AI</span></h1>
      <p>Powered by Artical Neavy</p>
    </div>

    <!-- INPUT CARD -->
    <div class="card">
      <textarea id="prompt" placeholder="Describe your idea... (story, image, video)"></textarea>

      <button id="generateBtn" onclick="generate('all')">
        ✨ Generate
      </button>

      <!-- GRID -->
      <div class="grid">
        <button onclick="generate('story')">📖 Story</button>
        <button onclick="generate('image')">🖼 Image</button>
        <button onclick="generate('video')">🎬 Video</button>
        <button onclick="askAI()">🌍 Ask AI</button>
      </div>
    </div>

    <!-- RESULT CARD -->
    <div class="card result-card">
      <div id="result">Your result will appear here...</div>
      <button id="downloadBtn" onclick="downloadResult()">⬇ Download</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
    </html>
