<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ADSENSE -->
  <script async 
    src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1714638410489429"
    crossorigin="anonymous"></script>

  <style>
    body {
      margin:0;
      font-family:Arial, sans-serif;
      background:#0b0f14;
      color:white;
    }

    .topbar {
      display:flex;
      justify-content:space-around;
      background:#111;
      padding:10px;
    }

    button {
      padding:10px;
      border:none;
      border-radius:20px;
      background:#00ff88;
      cursor:pointer;
      font-size:12px;
    }

    #status {
      text-align:center;
      font-size:12px;
      padding:5px;
      color:#00ff88;
    }

    #chat {
      height:70vh;
      overflow-y:auto;
      padding:10px;
    }

    .msg {
      padding:12px;
      margin:10px;
      border-radius:12px;
      max-width:80%;
      word-wrap:break-word;
    }

    .user {
      background:#1f1f1f;
      margin-left:auto;
    }

    .ai {
      background:#16212b;
    }

    img {
      width:100%;
      border-radius:10px;
    }

    #inputArea {
      position:fixed;
      bottom:0;
      width:100%;
      display:flex;
      padding:10px;
      background:#111;
    }

    input {
      flex:1;
      padding:12px;
      border-radius:20px;
      border:none;
      outline:none;
    }
  </style>
</head>

<body>

<div class="topbar">
  <button onclick="login()">Login</button>
  <button onclick="sendText()">Text</button>
  <button onclick="generateImage()">Image</button>
  <button onclick="upgrade()">💰 Upgrade</button>
</div>

<div id="status">🔴 Not logged in</div>

<div id="chat"></div>

<!-- ADS -->
<div style="text-align:center;">
  <ins class="adsbygoogle"
    style="display:block"
    data-ad-client="ca-pub-1714638410489429"
    data-ad-slot="1234567890"
    data-ad-format="auto"></ins>
</div>
<script>
(adsbygoogle = window.adsbygoogle || []).push({});
</script>

<div id="inputArea">
  <input id="prompt" placeholder="Ask or describe..." />
  <button onclick="sendText()">Send</button>
</div>

<script>
const API = "https://reelmindbackend-1.onrender.com";
const chat = document.getElementById("chat");
const statusBox = document.getElementById("status");
const inputBox = document.getElementById("prompt");

// ===== AUTO LOGIN (GUEST) =====
async function autoLogin(){
  let token = localStorage.getItem("token");

  if(!token){
    try{
      const res = await fetch(API+"/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ email:"guest@user.com" })
      });

      const data = await res.json();
      localStorage.setItem("token", data.token);
      statusBox.innerText = "🟢 Guest Mode";

    } catch {
      statusBox.innerText = "❌ Server offline";
    }
  } else {
    statusBox.innerText = "🟢 Logged in";
  }
}

autoLogin();

// ===== MANUAL LOGIN =====
async function login(){
  let email = prompt("Enter email:");
  if(!email) return;

  try{
    const res = await fetch(API+"/login",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({email})
    });

    const data = await res.json();

    if(data.token){
      localStorage.setItem("token", data.token);

      if(email === "neavyartical@gmail.com"){
        statusBox.innerText = "👑 Admin Mode (Unlimited)";
      } else {
        statusBox.innerText = "🟢 Logged in: " + email;
      }

    } else {
      alert("Login failed");
    }

  } catch {
    alert("Server error");
  }
}

// ===== TEXT =====
async function sendText(){
  const token = localStorage.getItem("token");
  const text = inputBox.value.trim();

  if(!token){
    alert("Login first");
    return;
  }

  if(!text){
    alert("Type something");
    return;
  }

  chat.innerHTML += `<div class="msg user">${text}</div>`;

  let aiBox = document.createElement("div");
  aiBox.className = "msg ai";
  aiBox.innerText = "⚡ Thinking...";
  chat.appendChild(aiBox);

  inputBox.value = "";
  chat.scrollTop = chat.scrollHeight;

  try{
    const res = await fetch(API+"/generate-text",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer " + token
      },
      body: JSON.stringify({prompt:text})
    });

    const data = await res.json();

    if(data.error){
      aiBox.innerText = "❌ " + data.error;
      return;
    }

    // typing effect
    let i = 0;
    aiBox.innerHTML = "";

    function type(){
      if(i < data.result.length){
        aiBox.innerHTML += data.result.charAt(i);
        i++;
        setTimeout(type,5);
      }
    }

    type();

  } catch {
    aiBox.innerText = "❌ Network error";
  }
}

// ===== IMAGE =====
async function generateImage(){
  const token = localStorage.getItem("token");
  const text = inputBox.value.trim();

  if(!token){
    alert("Login first");
    return;
  }

  if(!text){
    alert("Enter image prompt");
    return;
  }

  chat.innerHTML += `<div class="msg user">${text}</div>`;

  let aiBox = document.createElement("div");
  aiBox.className = "msg ai";
  aiBox.innerText = "🖼️ Generating image...";
  chat.appendChild(aiBox);

  chat.scrollTop = chat.scrollHeight;

  try{
    const res = await fetch(API+"/generate-image",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer " + token
      },
      body: JSON.stringify({prompt:text})
    });

    const data = await res.json();

    if(data.error){
      aiBox.innerText = "❌ " + data.error;
      return;
    }

    aiBox.innerHTML = `
      <img src="${data.image}" />
      <p style="font-size:12px;color:gray;">${data.source || ""}</p>
    `;

  } catch {
    aiBox.innerText = "❌ Image failed";
  }
}

// ===== PAYMENT =====
function upgrade(){
  window.open("https://ko-fi.com/articalneavy","_blank");
}
</script>

</body>
</html>
