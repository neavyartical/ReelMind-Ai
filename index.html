<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ReelMind AI</title>

<style>
body {
  margin:0;
  background:#000;
  color:white;
  font-family:sans-serif;
  text-align:center;
}

/* CUBE CONTAINER */
.scene {
  width:250px;
  height:250px;
  margin:60px auto;
  perspective:800px;
}

.cube {
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:1s;
}

/* TRANSPARENT FACES */
.face {
  position:absolute;
  width:250px;
  height:250px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  border-radius:20px;
  cursor:pointer;
}

/* POSITIONS */
.front  { transform: rotateY(0deg) translateZ(125px); }
.back   { transform: rotateY(180deg) translateZ(125px); }
.right  { transform: rotateY(90deg) translateZ(125px); }
.left   { transform: rotateY(-90deg) translateZ(125px); }
.top    { transform: rotateX(90deg) translateZ(125px); }
.bottom { transform: rotateX(-90deg) translateZ(125px); }

/* INPUT */
input {
  padding:10px;
  width:70%;
  border-radius:10px;
  border:none;
}

button {
  padding:10px;
  border:none;
  border-radius:10px;
  background:#ff4ecd;
  color:white;
}

/* RESULT */
#result {
  margin:20px;
  min-height:100px;
}

/* FOOTER */
.footer {
  margin-top:40px;
  font-size:12px;
  opacity:0.6;
}
</style>
</head>

<body>

<h2>🚀 ReelMind AI</h2>

<div class="scene">
  <div class="cube" id="cube">

    <div class="face front" onclick="selectMode('chat')">💬 Chat</div>
    <div class="face back" onclick="selectMode('story')">📖 Story</div>
    <div class="face right" onclick="selectMode('image')">🖼 Image</div>
    <div class="face left" onclick="selectMode('video')">🎬 Video</div>
    <div class="face top" onclick="selectMode('money')">💰 Money</div>
    <div class="face bottom" onclick="selectMode('tiktok')">🚀 TikTok</div>

  </div>
</div>

<input id="input" placeholder="Type your idea...">
<button onclick="send()">Generate</button>

<div id="result">Tap a cube side 👆</div>

<button onclick="unlock()">Unlock Premium</button>

<div class="footer">
  Powered by Artical Neavy | 
  <a href="#" onclick="terms()">Terms</a>
</div>

<script>
let mode="chat";
let premium=false;

// ROTATION
function rotate(x,y){
  document.getElementById("cube").style.transform =
    "rotateX("+x+"deg) rotateY("+y+"deg)";
}

function selectMode(m){
  mode=m;

  if(m==="chat") rotate(0,0);
  if(m==="story") rotate(0,180);
  if(m==="image") rotate(0,90);
  if(m==="video") rotate(0,-90);
  if(m==="money") rotate(90,0);
  if(m==="tiktok") rotate(-90,0);

  document.getElementById("result").innerText="Mode: "+m;
}

// FREE IMAGE
function img(prompt){
  return `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}`;
}

// FREE VIDEO (WORKAROUND)
async function fakeVideo(prompt){
  return "🎬 Video generation coming (free APIs limited)";
}

// SEND
async function send(){
  let text=document.getElementById("input").value;
  if(!text) return;

  document.getElementById("result").innerText="⏳ Loading...";

  // IMAGE
  if(mode==="image"){
    document.getElementById("result").innerHTML =
      `<img src="${img(text)}" width="250">`;
    return;
  }

  // VIDEO
  if(mode==="video"){
    if(!premium){
      document.getElementById("result").innerText =
        "🔒 Premium only. Unlock first.";
      return;
    }

    let vid = await fakeVideo(text);
    document.getElementById("result").innerText = vid;
    return;
  }

  // TEXT BACKEND
  try{
    let res = await fetch("https://reelmindbackend-1.onrender.com/generate",{
      method:"POST",
      headers:{ "Content-Type":"application/json"},
      body:JSON.stringify({prompt:text})
    });

    let data = await res.json();
    document.getElementById("result").innerText = data.result;

  }catch(e){
    document.getElementById("result").innerText="❌ Server error";
  }
}

// PREMIUM UNLOCK (TEMP)
function unlock(){
  let code = prompt("Enter premium code:");

  if(code==="NEAVY2026"){
    premium=true;
    alert("✅ Premium unlocked!");
  }else{
    alert("❌ Wrong code");
  }
}

// TERMS
function terms(){
  alert("Terms:\nUse responsibly. No abuse. AI results may vary.");
}
</script>

</body>
</html>
