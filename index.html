<script>

const API = "https://YOUR_BACKEND_URL"; // 🔥 REPLACE THIS

// NAV
function switchTab(tab){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(tab).classList.add("active");
}

// LOAD USER
async function loadUser(){
  try{
    const res = await fetch(API+"/user");
    const data = await res.json();
    document.getElementById("credits").innerText = data.credits;
  }catch(e){
    console.error("❌ USER LOAD ERROR:", e);
    alert("Backend not reachable");
  }
}
loadUser();

// GENERATE
document.getElementById("generate").onclick = async ()=>{

  const prompt = document.getElementById("prompt").value;
  const mode = document.getElementById("mode").value;

  if(!prompt) return alert("Enter prompt");

  document.getElementById("result").innerHTML = "⚡ Sending request...";

  try{

    const res = await fetch(API+"/generate",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({ prompt, mode })
    });

    console.log("STATUS:", res.status);

    const data = await res.json();

    console.log("RESPONSE:", data);

    if(data.error){
      alert(data.error);
      return;
    }

    document.getElementById("credits").innerText = data.credits;

    if(mode==="text"){
      document.getElementById("result").innerHTML =
        `<div class="card">${data.output}</div>`;
    }

    if(mode==="image"){
      document.getElementById("result").innerHTML =
        `<div class="card"><img src="${data.output}" style="width:100%"></div>`;
    }

  }catch(e){
    console.error("❌ GENERATE ERROR:", e);
    document.getElementById("result").innerHTML =
      `<div class="card">❌ Backend error or CORS issue</div>`;
  }
};

// ADMIN
async function loadStats(){
  try{
    const res = await fetch(API+"/admin");
    const data = await res.json();
    document.getElementById("stats").innerHTML =
      `<div class="card">Users: ${data.users} | Requests: ${data.requests}</div>`;
  }catch(e){
    console.error("❌ ADMIN ERROR:", e);
  }
}

</script>
