<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ReelMind AI</title>
</head>

<body style="font-family: Arial; text-align:center; padding:20px;">

  <h1>🎬 ReelMind AI</h1>

  <!-- AUTH -->
  <div>
    <input id="email" placeholder="Email"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>

    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>
    <button onclick="logout()">Logout</button>
  </div>

  <hr>

  <!-- GENERATE -->
  <div>
    <textarea id="prompt" placeholder="Enter your idea..." rows="5" cols="30"></textarea><br><br>
    <button onclick="generate()">Generate</button>
  </div>

  <h3 id="status"></h3>
  <p id="output"></p>

<script>
const API = "https://reelmindbackend-1.onrender.com";

/* =========================
   REGISTER
========================= */
async function register() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  document.getElementById("status").innerText = "Registering...";

  const res = await fetch(API + "/register", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();
  document.getElementById("status").innerText = data.message || data.error;
}

/* =========================
   LOGIN
========================= */
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  document.getElementById("status").innerText = "Logging in...";

  const res = await fetch(API + "/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (data.token) {
    localStorage.setItem("token", data.token);
    document.getElementById("status").innerText = "Login success ✅";
  } else {
    document.getElementById("status").innerText = data.error;
  }
}

/* =========================
   LOGOUT
========================= */
function logout() {
  localStorage.removeItem("token");
  document.getElementById("status").innerText = "Logged out ✅";
}

/* =========================
   GENERATE
========================= */
async function generate() {
  const prompt = document.getElementById("prompt").value;
  const token = localStorage.getItem("token");

  if (!token) {
    document.getElementById("status").innerText = "Login first ❌";
    return;
  }

  document.getElementById("status").innerText = "⏳ Generating...";
  document.getElementById("output").innerText = "";

  try {
    const res = await fetch(API + "/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": token
      },
      body: JSON.stringify({ prompt })
    });

    const data = await res.json();

    if (data.result) {
      document.getElementById("status").innerText = "Done ✅";
      document.getElementById("output").innerText = data.result;
    } else {
      document.getElementById("status").innerText = data.error || "Error ❌";
    }

  } catch (err) {
    document.getElementById("status").innerText = "Server error ❌";
  }
}
</script>

</body>
</html>
