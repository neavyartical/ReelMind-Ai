<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <style>
    body {
      background: #0b1a2b;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 40px;
    }

    input, button {
      width: 80%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      background: #22c55e;
      color: white;
      font-weight: bold;
    }

    #downloadBtn {
      display: none;
      background: #3b82f6;
    }

    img {
      width: 90%;
      margin-top: 20px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <h1>🎬 ReelMind AI</h1>

  <input id="prompt" placeholder="Generate a cinematic lion, 8k..." />

  <button onclick="generate()">Generate</button>

  <button id="downloadBtn">Download Image</button>

  <p id="status"></p>

  <img id="result" />

<script>
async function generate() {
  const prompt = document.getElementById("prompt").value;
  const status = document.getElementById("status");
  const img = document.getElementById("result");
  const downloadBtn = document.getElementById("downloadBtn");

  if (!prompt) {
    status.innerText = "Enter prompt";
    return;
  }

  status.innerText = "Generating...";
  img.src = "";
  downloadBtn.style.display = "none";

  try {
    const response = await fetch("https://backend-ppyz.onrender.com/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt })
    });

    if (!response.ok) throw new Error("Server error");

    const blob = await response.blob();
    const url = URL.createObjectURL(blob);

    img.src = url;
    status.innerText = "Done!";
    downloadBtn.style.display = "block";

    downloadBtn.onclick = () => {
      const a = document.createElement("a");
      a.href = url;
      a.download = "image.png";
      a.click();
    };

  } catch (err) {
    status.innerText = "Error generating image";
  }
}
</script>

</body>
</html>
