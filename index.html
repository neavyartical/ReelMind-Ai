<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReelMind Global</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial;
  background:black;
  color:white;
  text-align:center;
}

body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:url("https://neavyartical.github.io/ReelMind-Ai/logo.png") center/cover no-repeat;
  opacity:0.15;
  z-index:-1;
}

h1{margin-top:20px;color:#00ff88;}

input{
  width:90%;
  padding:15px;
  border-radius:30px;
  border:none;
  margin-top:10px;
}

.generate-box{
  width:180px;height:180px;margin:20px auto;
  border-radius:25px;
  background:rgba(255,255,255,0.08);
  display:flex;align-items:center;justify-content:center;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#00ff88;
}

.control-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  width:90%;
  margin:20px auto;
}

.control-grid button{background:#222;color:white;}

.control-grid .active{background:#00ff88;color:black;}

.box{
  margin:15px;
  padding:15px;
  background:#111;
}

img,video{width:90%;}

</style>
</head>

<body>

<h1>ReelMind Global</h1>

<!-- LOGIN -->
<div class="box">
<input id="email" placeholder="Enter email">
<button onclick="register()">Login</button>
<p id="creditsDisplay">Credits: 0</p>
</div>

<input id="prompt" placeholder="Type prompt">

<div class="generate-box">
<button onclick="generate()">Generate</button>
</div>

<!-- GRID -->
<div class="control-grid">
<button id="btnStory" onclick="setMode('story')">Story</button>
<button id="btnImage" onclick="setMode('image')">Image</button>
<button id="btnVideo" onclick="setMode('video')">Video</button>
<button id="btnAll" onclick="setMode('all')">All</button>
</div>

<div class="box">
<p id="story"></p>
<img id="image">
<video id="video" controls></video>
</div>

<script>
const API="https://reelmindbackend-1.onrender.com";

let mode="story";
let userEmail="";
let credits=0;

/* LOGIN */
async function register(){
  userEmail=email.value;

  const res=await fetch(API+"/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email:userEmail})
  });

  const data=await res.json();
  credits=data.credits;
  updateCredits();
}

/* CREDIT UI */
function updateCredits(){
  creditsDisplay.innerText="Credits: "+credits;
}

/* MODE */
function setMode(m){
  mode=m;
  document.querySelectorAll(".control-grid button")
  .forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");
}

/* GENERATE */
async function generate(){
  if(!userEmail){alert("Login first");return;}

  const creditRes=await fetch(API+"/use-credit",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email:userEmail})
  });

  const cData=await creditRes.json();

  if(cData.error){alert("No credits");return;}

  credits=cData.credits;
  updateCredits();

  const res=await fetch(API+"/generate",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({prompt:prompt.value,mode})
  });

  const data=await res.json();

  story.innerText=data.story||"";
  image.src=data.image||"";
  video.src=data.video||"";
}
</script>

</body>
</html>
