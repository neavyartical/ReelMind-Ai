<!DOCTYPE html>
<html>
<head>
  <title>ReelMind Global</title>
  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 {
      color: #00ff88;
    }

    input {
      width: 80%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-bottom: 10px;
    }

    button {
      padding: 12px 25px;
      background: #00ff88;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    .box {
      margin-top: 20px;
      padding: 15px;
      background: #1a1a1a;
      border-radius: 10px;
    }

    img, video {
      width: 90%;
      border-radius: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>🧠 ReelMind Global</h1>

<input id="prompt" placeholder="Enter idea (e.g. dogs dancing in club)">
<br>
<button onclick="generate()">Generate</button>

<div class="box">
  <h3>✍️ Story</h3>
  <p id="story">Waiting...</p>
</div>

<div class="box">
  <h3>🖼 Image</h3>
  <img id="image" src="">
</div>

<div class="box">
  <h3>🎬 Video</h3>
  <video id="video" controls></video>
</div>

<script>
const BACKEND = "https://reelmindbackend-1.onrender.com";

async function generate() {
  const prompt = document.getElementById("prompt").value;

  // RESET UI (fix flickering & old results)
  document.getElementById("story").innerText = "Generating...";
  document.getElementById("image").src = "";
  document.getElementById("video").src = "";

  try {
    // 🧠 STORY
    const storyRes = await fetch(`${BACKEND}/generate-story`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt })
    });

    const storyData = await storyRes.json();
    document.getElementById("story").innerText = storyData.story || storyData.error;

    // 🖼 IMAGE (free working API)
    document.getElementById("image").src =
      `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}`;

    // 🎬 VIDEO
    const videoRes = await fetch(`${BACKEND}/generate-video`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt })
    });

    const videoData = await videoRes.json();
    document.getElementById("video").src = videoData.video;

  } catch (err) {
    document.getElementById("story").innerText = "Error: " + err.message;
  }
}
</script>

</body>
</html>
