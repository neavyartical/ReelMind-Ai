<script>
const BASE_URL = "https://reelmindbackend-1.onrender.com";

let TOKEN = localStorage.getItem("token");

// ✅ AUTO LOGIN
async function autoLogin() {
  if (TOKEN) return;

  try {
    const res = await fetch(BASE_URL + "/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email: "neavyartical@gmail.com"
      })
    });

    const data = await res.json();
    TOKEN = data.token;

    localStorage.setItem("token", TOKEN);

    console.log("✅ Logged in");
  } catch (err) {
    console.log("Login error", err);
    alert("Login failed");
  }
}

// Run login on load
autoLogin();

// 🚀 SEND PROMPT
async function sendPrompt() {
  const input = document.getElementById("userInput").value;
  const chat = document.getElementById("chat");

  if (!input) return;

  chat.innerHTML += `<div class="msg user">${input}</div>`;

  const loader = document.createElement("div");
  loader.className = "loader";
  chat.appendChild(loader);

  try {
    await autoLogin();

    let endpoint = "/generate-text";

    // 🖼 detect image request
    if (input.toLowerCase().includes("image")) {
      endpoint = "/generate-image";
    }

    const res = await fetch(BASE_URL + endpoint, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + TOKEN
      },
      body: JSON.stringify({ prompt: input })
    });

    const data = await res.json();
    loader.remove();

    // 🖼 IMAGE RESPONSE
    if (data.image) {
      chat.innerHTML += `
        <div class="msg ai">
          <img src="${data.image}">
        </div>`;
    } 
    
    // 💬 TEXT RESPONSE
    else {
      chat.innerHTML += `
        <div class="msg ai">
          ${data.result || data.error || "No response"}
        </div>`;
    }

  } catch (err) {
    loader.remove();
    chat.innerHTML += `<div class="msg ai">⚠️ Backend error</div>`;
  }

  document.getElementById("userInput").value = "";
  chat.scrollTop = chat.scrollHeight;
}
</script>
