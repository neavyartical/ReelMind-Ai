<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
      text-align: center;
      padding-top: 100px;
    }

    input {
      width: 70%;
      padding: 15px;
      border-radius: 10px;
      border: none;
    }

    button {
      padding: 12px 25px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: cyan;
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
      color: yellow;
    }
  </style>
</head>

<body>

<input id="prompt" placeholder="Enter prompt..." />
<br>
<button onclick="generate()">Generate</button>

<div id="result"></div>

<script>
async function generate() {
  const prompt = document.getElementById("prompt").value;
  const resultBox = document.getElementById("result");

  resultBox.innerHTML = "⏳ Generating...";

  try {
    const response = await fetch("https://your-render-url.onrender.com/generate-text", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt })
    });

    const data = await response.json();

    resultBox.innerHTML = data.choices?.[0]?.message?.content || "No response";

  } catch (error) {
    resultBox.innerHTML = "⚠️ Backend error: " + error.message;
  }
}
</script>

</body>
</html>
