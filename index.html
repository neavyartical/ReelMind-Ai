<head>

<style>
body{margin:0;background:#0b0f14;color:white;font-family:Arial}

/* TOP */
#topbar{position:fixed;top:0;width:100%;background:#111;padding:10px;display:flex;justify-content:space-around;z-index:999}

/* FEED */

/* CARD */
.card{margin-bottom:12px}
.card img,.card video{width:100%;max-height:70vh;border-radius:10px;object-fit:cover}
.overlay{padding:10px}

/* PROFILE */
#profile{display:none;padding:15px;margin-top:60px}
.avatar{width:80px;height:80px;border-radius:50%;background:#333}

/* LOGIN */
#loginBox{position:fixed;top:0;width:100%;height:100%;background:#000d;display:flex;justify-content:center;align-items:center;z-index:2000}
.loginCard{background:#111;padding:20px;border-radius:10px;text-align:center}
.loginBtn{margin:10px;padding:10px;background:#222;cursor:pointer}

/* INPUT */
#prompt{position:fixed;bottom:90px;width:90%;left:5%;padding:12px;border-radius:25px;border:none}

/* CONTROLS */
#controls{position:fixed;bottom:0;width:100%;height:70px;display:flex;justify-content:space-around;background:#111}
.btn{width:55px;height:55px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#222;font-size:22px}
#generate{background:cyan;color:black}

/* LANG */
#langSelect{position:fixed;bottom:140px;left:5%;padding:8px;border-radius:10px}

/* FOOTER */
#footer{position:fixed;bottom:70px;width:100%;text-align:center;font-size:12px;color:#888}

#fileInput{display:none}
</style>
</head>

<body>

<div id="loginBox">
<div class="loginCard">
<h3>Login</h3>
<div class="loginBtn" onclick="emailLogin()">📧 Email</div>
<div class="loginBtn" onclick="googleLogin()">🟢 Google</div>
<div class="loginBtn" onclick="facebookLogin()">🔵 Facebook</div>
</div>
</div>

<!-- TOPBAR -->
<div id="topbar">
<span onclick="showFeed()">Home</span>
<span onclick="showProfile()">Profile</span>
<span onclick="upgrade()">💰</span>
</div>

<!-- FEED -->
<div id="feed"></div>

<!-- PROFILE -->
<div id="profile">
<div class="avatar"></div>
<h3 id="userEmail"></h3>

</div>

<!-- LANGUAGE -->
<select id="langSelect">
<option value="en-US">English</option>
<option value="fr-FR">French</option>
<option value="ar-SA">Arabic</option>
<option value="en-US">Krio 🇸🇱</option>
<option value="en-US">Mende 🇸🇱</option>

<!-- FILE -->

<input id="prompt" placeholder="Create anything..." />

<!-- CONTROLS -->
<div id="controls">
<div class="btn" onclick="fileInput.click()">+</div>
<div id="generate" class="btn" onclick="generate()">⚡</div>
<div class="btn" onclick="startVoice()">🎤</div>
</div>

<div id="footer">Powered by Artical Neavy</div>

<!-- FIREBASE (ONLY ONE SCRIPT ✅) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  FacebookAuthProvider,
  signInWithPopup,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCraJ2lDNrPU7O_qDz4J6_aCNrR_l4ex-I",
  authDomain: "reelmind-ai-a11eb.firebaseapp.com",
  projectId: "reelmind-ai-a11eb",
  storageBucket: "reelmind-ai-a11eb.firebasestorage.app",
  messagingSenderId: "534455151705",
  appId: "1:534455151705:web:42eef09cd465fecb8ed548",
  measurementId: "G-NSD0WSPC5D"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.API = "https://reelmindbackend-1.onrender.com";

// LOGIN STATE
onAuthStateChanged(auth,(user)=>{
  if(user){
    localStorage.token=user.email;
    document.getElementById("loginBox").style.display="none";
  }
});

// EMAIL LOGIN
window.emailLogin = async ()=>{
  let email=prompt("Enter Email:");
  let pass=prompt("Enter Password:");
  try{
    await signInWithEmailAndPassword(auth,email,pass);
  }catch{
    await createUserWithEmailAndPassword(auth,email,pass);
  }
};

// GOOGLE
window.googleLogin = async ()=>{
  await signInWithPopup(auth,new GoogleAuthProvider());
};

// FACEBOOK
window.facebookLogin = async ()=>{
  await signInWithPopup(auth,new FacebookAuthProvider());
};
</script>

<script>
// CORE
const feed=document.getElementById("feed");

// SPEECH
function speak(text){
let lang=document.getElementById("langSelect").value;
let u=new SpeechSynthesisUtterance(text);
u.lang=lang;
speechSynthesis.cancel();
speechSynthesis.speak(u);
}

// NAV
function showFeed(){feed.style.display="block";profile.style.display="none";}
function showProfile(){feed.style.display="none";profile.style.display="block";loadProfile();}

// ADD CARD
function addCard(content,type){
let c=document.createElement("div");
c.className="card";
if(type==="image") c.innerHTML=`<img src="${content}">`;
else if(type==="video") c.innerHTML=`<video controls src="${content}"></video>`;
else c.innerHTML=`<div class="overlay">${content}</div>`;
feed.prepend(c);
}

// GENERATE
async function generate(){
if(!localStorage.token){alert("Login first");return}

let p=prompt.value;
if(!p) return;

addCard("⚡ Generating...","text");

let route="/generate-text";
if(/image/i.test(p)) route="/generate-image";
if(/video/i.test(p)) route="/generate-video";

let r=await fetch(API+route,{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+localStorage.token
},
body:JSON.stringify({prompt:p})
});

let d=await r.json();
let content=d.data.url||d.data.content;
let type=route.includes("image")?"image":route.includes("video")?"video":"text";

addCard(content,type);
speak(content);

fetch(API+"/post",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({content,type})});
}

// UPLOAD
async function uploadFile(e){
let file=e.target.files[0];
if(!file) return;

let form=new FormData();
form.append("file",file);

addCard("📤 Uploading...","text");

let r=await fetch(API+"/upload",{method:"POST",body:form});
let d=await r.json();

addCard(d.url,d.type);

fetch(API+"/post",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({content:d.url,type:d.type})});
}

// PROFILE
async function loadProfile(){
let r=await fetch(API+"/me",{headers:{Authorization:"Bearer "+localStorage.token}});
let d=await r.json();
userEmail.innerText=d.data.email||"User";
userStats.innerText="Credits: "+(d.data.credits||0);
}

// MIC
function startVoice(){alert("Voice input coming next 🔥");}

// PAYMENT
function upgrade(){window.open("https://ko-fi.com/articalneavy","_blank");}
</script>

</body>
</html>
