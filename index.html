<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ReelMind AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ADSENSE -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1714638410489429" crossorigin="anonymous"></script>

<style>
body { margin:0; font-family:Arial; background:#0b0f14; color:white; }
.topbar { display:flex; flex-wrap:wrap; justify-content:center; gap:5px; background:#111; padding:10px; }
button { padding:8px 12px; border:none; border-radius:20px; background:#00ff88; cursor:pointer; }
#chat { height:65vh; overflow-y:auto; padding:10px; }
.msg { padding:12px; margin:10px; border-radius:12px; max-width:80%; }
.user { background:#1f1f1f; margin-left:auto; }
.ai { background:#16212b; }
video, img { width:100%; border-radius:10px; }

#inputArea {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  padding:10px;
  background:#111;
}

input { flex:1; padding:12px; border-radius:20px; border:none; }

.footer {
  padding:20px;
  text-align:center;
  font-size:12px;
  background:#111;
}
</style>
</head>

<body>

<div class="topbar">
<button onclick="sendText()">Text</button>
<button onclick="generateImage()">Image</button>
<button onclick="generateVideo()">🎥 Video</button>
<button onclick="generateReel()">Reel</button>
<button onclick="dashboard()">Dashboard</button>
<button onclick="subscribe()">💰 Upgrade</button>
<button onclick="openPage('about')">About</button>
<button onclick="openPage('privacy')">Privacy</button>
<button onclick="openPage('contact')">Contact</button>
<button onclick="openPage('blog')">Blog</button>
</div>

<div id="chat"></div>

<!-- ADS -->
<ins class="adsbygoogle"
style="display:block"
data-ad-client="ca-pub-1714638410489429"
data-ad-slot="1234567890"
data-ad-format="auto"></ins>
<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>

<div id="inputArea">
<input id="prompt" placeholder="Create viral content..." />
<button onclick="sendText()">Send</button>
</div>

<div class="footer">
© ReelMind AI | Privacy | Contact
</div>

<script>
const API="https://reelmindbackend-1.onrender.com";
const chat=document.getElementById("chat");

// TOKEN
async function getToken(){
let t=localStorage.getItem("token");
if(!t){
let r=await fetch(API+"/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:"guest@user.com"})});
let d=await r.json();
localStorage.setItem("token",d.token);
t=d.token;
}
return t;
}

// TEXT
async function sendText(){
const p=prompt.value;
chat.innerHTML+=msg(p,"user");
let box=msg("Thinking...","ai");

const token=await getToken();
const res=await fetch(API+"/generate-text",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},body:JSON.stringify({prompt:p})});
const d=await res.json();

box.innerText=d.result||d.error;
}

// IMAGE
async function generateImage(){
let box=msg("Generating image...","ai");

const token=await getToken();
const res=await fetch(API+"/generate-image",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},body:JSON.stringify({prompt:prompt.value})});
const d=await res.json();

box.innerHTML=`<img src="${d.image}" onerror="this.src='${d.fallback}'">`;
}

// VIDEO
async function generateVideo(){
let box=msg("Rendering video...","ai");

const token=await getToken();
const res=await fetch(API+"/generate-video",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},body:JSON.stringify({prompt:prompt.value})});
const d=await res.json();

box.innerHTML=`<video controls src="${d.video}"></video>`;
}

// REEL
async function generateReel(){
let box=msg("Creating reel...","ai");

const token=await getToken();
const res=await fetch(API+"/generate-reel",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},body:JSON.stringify({prompt:prompt.value})});
const d=await res.json();

box.innerText=d.result||d.error;
}

// DASHBOARD
async function dashboard(){
const token=await getToken();
const res=await fetch(API+"/dashboard",{headers:{"Authorization":"Bearer "+token}});
const d=await res.json();

chat.innerHTML=`<div class="msg ai">Credits: ${d.credits}<br>Premium: ${d.premium}<br>Earnings: $${d.earnings}</div>`;
}

// HELPERS
function msg(t,type){
let d=document.createElement("div");
d.className="msg "+type;
d.innerText=t;
chat.appendChild(d);
return d;
}

// PAGES
function openPage(p){
const pages={
about:"ReelMind AI creates viral AI content.",
privacy:"Your privacy is protected.",
contact:"Email: neavyartical@gmail.com",
blog:"Coming soon..."
};
chat.innerHTML=`<div class="msg ai">${pages[p]}</div>`;
}

// PAYMENT
function subscribe(){
window.open("https://ko-fi.com/articalneavy");
}
</script>

</body>
</html>
