<script>
const API="https://reelmindbackend-1.onrender.com";
const feed=document.getElementById("feed");

// ===== STATE =====
let isLive = false;

// ===== MEMORY =====
let memory = JSON.parse(localStorage.getItem("reelmind_memory") || "[]");

function saveMemory(user, ai){
memory.push({user, ai});
if(memory.length > 10) memory.shift();
localStorage.setItem("reelmind_memory", JSON.stringify(memory));
}

function buildMemoryContext(){
return memory.map(m => `User: ${m.user}\nAI: ${m.ai}`).join("\n");
}

// ===== LOGIN =====
async function ensureLogin(){
try{
if(!localStorage.token){
let r=await fetch(API+"/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email:"neavyartical@gmail.com"})
});
let d=await r.json();
localStorage.token=d.data.token;
}
await loadUser();
}catch{
alert("Server offline");
}
}

// ===== USER =====
async function loadUser(){
let r=await fetch(API+"/me",{
headers:{Authorization:"Bearer "+localStorage.token}
});
let d=await r.json();

document.getElementById("status").innerText="🟢 Online";
document.getElementById("credits").innerText="Credits: "+(d.data?.credits || 0);
document.getElementById("ref").innerText="Ref: "+(d.data?.referrals || 0);
}

// ===== ADD CARD =====
function addCard(content,type){
let c=document.createElement("div");
c.className="card";

let media="";
if(type==="image"){
media=`<img src="${content}">`;
}
else if(type==="video"){
media=`<video autoplay loop muted playsinline src="${content}"></video>`;
}
else if(type==="live"){
media=`<video id="liveVideo" autoplay muted playsinline></video>`;
}
else{
media=`<div class="overlay">${content}</div>`;
}

c.innerHTML=`
${media}
<div class="actions">
<div class="action" onclick="like(this)">❤️ <span>0</span></div>
<div class="action">💬</div>
<div class="action">🔗</div>
</div>
`;

feed.prepend(c);

// autoplay fix
let vid=c.querySelector("video");
if(vid){
vid.play().catch(()=>{});
}
}

// ===== LIKE SYSTEM =====
function like(el){
let count=el.querySelector("span");
count.innerText=parseInt(count.innerText)+1;
}

// ===== SPEAK =====
function speak(text){
try{
let u=new SpeechSynthesisUtterance(text);
let voices = speechSynthesis.getVoices();
u.voice = voices.find(v => v.lang.includes("en")) || voices[0];
speechSynthesis.cancel();
speechSynthesis.speak(u);
}catch{}
}

// ===== LIVE STREAM (FRONTEND REAL) =====
async function startLive(){
try{
let stream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});

addCard("", "live");

let video=document.getElementById("liveVideo");
video.srcObject = stream;

isLive = true;

// 🔥 FUTURE: SEND STREAM TO SERVER HERE
// Example:
// connectWebRTC(stream);

}catch{
alert("Camera permission denied");
}
}

// ===== GENERATE =====
async function generate(){
await ensureLogin();

let input=document.getElementById("prompt");
let p=input.value.trim();
if(!p) return;

input.value="";

// 🔥 LIVE TRIGGER
if(/live|stream|go live/i.test(p)){
startLive();
return;
}

// ROUTING
let route="/generate-text";
if(/image|photo|picture|art/i.test(p)) route="/generate-image";
else if(/video|clip|movie/i.test(p)) route="/generate-video";

// MEMORY
let context = buildMemoryContext();
let finalPrompt = p;

// TEXT MODE
if(route==="/generate-text"){
finalPrompt = `
Use memory:
${context}

Create VIRAL TikTok content:
- Hook
- Story
- Caption
- Hashtags

Also generate 3 cinematic long versions.

${p}
`;
}

// IMAGE MODE
if(route==="/generate-image"){
finalPrompt = p + ", ultra realistic, cinematic lighting, 8k";
}

// LOADING
addCard("⚡ Generating...", "text");

try{
let r=await fetch(API+route,{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+localStorage.token
},
body:JSON.stringify({prompt:finalPrompt})
});

let d=await r.json();

// OUTPUT
if(route==="/generate-image"){
addCard(d.data?.url || "Image failed","image");
saveMemory(p,d.data?.url);
}
else if(route==="/generate-video"){
addCard(d.data?.url || "Video failed","video");
saveMemory(p,d.data?.url);
}
else{
let text=d.data?.content || "No response";
addCard(text,"text");
saveMemory(p,text);
speak(text);
}

}catch{
addCard("⚠️ Server error","text");
}

loadUser();
}

// ===== MIC =====
function startVoice(){
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if(!SpeechRecognition){
alert("Use Chrome");
return;
}

let rec=new SpeechRecognition();
rec.lang="en-US";

rec.onresult=e=>{
document.getElementById("prompt").value=e.results[0][0].transcript;
};

rec.start();
}

// ===== UPLOAD =====
function upload(){
alert("Upload coming soon 🚀");
}

// ===== PAYMENT =====
function upgrade(){
window.open("https://ko-fi.com/articalneavy","_blank");
}

// INIT
ensureLogin();
  </script>
