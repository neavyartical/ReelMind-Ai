<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ReelMind AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0b0f14;
  color:white;
}

.topbar {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:5px;
  background:#111;
  padding:10px;
}

button {
  padding:8px 12px;
  border:none;
  border-radius:20px;
  background:#00ff88;
  cursor:pointer;
  font-size:12px;
}

#status {
  text-align:center;
  font-size:12px;
  padding:5px;
  color:#00ff88;
}

#chat {
  height:70vh;
  overflow-y:auto;
  padding:10px;
}

.msg {
  padding:12px;
  margin:10px;
  border-radius:12px;
  max-width:80%;
}

.user { background:#1f1f1f; margin-left:auto; }
.ai { background:#16212b; }

img { width:100%; border-radius:10px; }

#inputArea {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  padding:10px;
  background:#111;
}

input {
  flex:1;
  padding:12px;
  border-radius:20px;
  border:none;
  outline:none;
}
</style>
</head>

<body>

<div class="topbar">
<button onclick="sendText()">Text</button>
<button onclick="generateImage()">Image</button>
<button onclick="generateReel()">🎬 Reel</button>
<button onclick="dashboard()">📊 Dashboard</button>
<button onclick="subscribe()">💎 Subscribe</button>
<button onclick="referral()">👥 Refer</button>
<button onclick="openPage('about')">About</button>
<button onclick="openPage('privacy')">Privacy</button>
<button onclick="openPage('contact')">Contact</button>
<button onclick="openPage('blog')">Blog</button>
</div>

<div id="status">🔄 Connecting...</div>

<div id="chat"></div>

<div id="inputArea">
<input id="prompt" placeholder="Ask anything..." />
<button onclick="sendText()">Send</button>
</div>

<script>
const API = "https://reelmindbackend-1.onrender.com";
const chat = document.getElementById("chat");
const statusBox = document.getElementById("status");

// ===== LOGIN SYSTEM =====
async function login(){
  try{
    const res = await fetch(API+"/login",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ email:"guest@user.com" })
    });

    const data = await res.json();

    if(data.token){
      localStorage.setItem("token", data.token);
      statusBox.innerText = "🟢 Connected";
    }else{
      statusBox.innerText = "❌ Login failed";
    }

  }catch{
    statusBox.innerText = "❌ Server offline";
  }
}

// ===== GET TOKEN =====
async function getToken(){
  let token = localStorage.getItem("token");

  if(!token){
    await login();
    token = localStorage.getItem("token");
  }

  return token;
}

// ===== TEXT =====
async function sendText(){
  const prompt = document.getElementById("prompt").value;

  if(!prompt) return;

  chat.innerHTML += `<div class="msg user">${prompt}</div>`;

  let box = document.createElement("div");
  box.className="msg ai";
  box.innerText="Thinking...";
  chat.appendChild(box);

  try{
    const token = await getToken();

    const res = await fetch(API+"/generate-text",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+token
      },
      body: JSON.stringify({prompt})
    });

    const data = await res.json();

    if(data.error === "Invalid token"){
      localStorage.removeItem("token");
      return sendText();
    }

    box.innerText = data.result || data.error;

  }catch{
    box.innerText="❌ Network error";
  }
}

// ===== IMAGE =====
async function generateImage(){
  const prompt = document.getElementById("prompt").value;

  if(!prompt) return;

  chat.innerHTML += `<div class="msg user">${prompt}</div>`;

  let box = document.createElement("div");
  box.className="msg ai";
  box.innerText="Generating image...";
  chat.appendChild(box);

  try{
    const token = await getToken();

    const res = await fetch(API+"/generate-image",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+token
      },
      body: JSON.stringify({prompt})
    });

    const data = await res.json();

    if(data.error === "Invalid token"){
      localStorage.removeItem("token");
      return generateImage();
    }

    if(data.image){
      box.innerHTML = `<img src="${data.image}" />`;
    } else {
      box.innerText="❌ Image failed";
    }

  }catch{
    box.innerText="❌ Image error";
  }
}

// ===== REEL =====
async function generateReel(){
  const prompt = document.getElementById("prompt").value;

  let box = document.createElement("div");
  box.className="msg ai";
  box.innerText="Creating reel...";
  chat.appendChild(box);

  try{
    const token = await getToken();

    const res = await fetch(API+"/generate-reel",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+token
      },
      body: JSON.stringify({prompt})
    });

    const data = await res.json();

    if(data.error === "Invalid token"){
      localStorage.removeItem("token");
      return generateReel();
    }

    box.innerText = data.result || data.error;

  }catch{
    box.innerText="❌ Reel error";
  }
}

// ===== DASHBOARD =====
async function dashboard(){
  const token = await getToken();

  const res = await fetch(API+"/dashboard",{
    headers:{ "Authorization":"Bearer "+token }
  });

  const data = await res.json();

  chat.innerHTML = `
  <div class="msg ai">
  <h3>📊 Dashboard</h3>
  Credits: ${data.credits}<br>
  Premium: ${data.premium}<br>
  Earnings: $${data.earnings}<br>
  Referrals: ${data.referrals}
  </div>`;
}

// ===== SUBSCRIBE =====
function subscribe(){
  window.open("https://ko-fi.com/articalneavy","_blank");
}

// ===== REFERRAL =====
function referral(){
  let email = prompt("Enter your email:");
  fetch(API+"/referral",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({refEmail:email})
  });

  alert("Referral sent");
}

// ===== PAGES =====
function openPage(page){
  let content = "";

  if(page==="about") content = "<h3>About</h3>ReelMind AI creates viral content using AI.";
  if(page==="privacy") content = "<h3>Privacy</h3>Your data is safe.";
  if(page==="contact") content = "<h3>Contact</h3>neavyartical@gmail.com";
  if(page==="blog") content = "<h3>Blog</h3>Coming soon...";

  chat.innerHTML = `<div class="msg ai">${content}</div>`;
}

// ===== INIT =====
login();
</script>

</body>
</html>
