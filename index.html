<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
</head>

<body style="background:black;color:white;text-align:center;font-family:sans-serif;">

  <h1>🎬 ReelMind AI</h1>

  <input id="prompt" placeholder="Enter prompt..." style="width:80%;padding:10px;" />

  <br><br>

  <button id="btn">Generate</button>

  <p id="status"></p>

  <img id="video" style="display:none;width:80%;" />

  <script>
    console.log("🔥 SCRIPT LOADED");

    const BACKEND_URL = "https://backend-ppyz.onrender.com/generate";

    document.getElementById("btn").addEventListener("click", async () => {
      alert("Button works ✅");

      const prompt = document.getElementById("prompt").value;
      document.getElementById("status").innerText = "Generating...";

      try {
        const res = await fetch(BACKEND_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ prompt })
        });

        alert("Request sent ✅");

        const data = await res.json();

        alert("Response received ✅");

        console.log(data);

        if (data.video) {
          document.getElementById("status").innerText = "Done ✅";

          const img = document.getElementById("video");
          img.src = data.video;
          img.style.display = "block";
        } else {
          document.getElementById("status").innerText = "Failed ❌";
        }

      } catch (err) {
        alert("Error ❌");
        console.error(err);
      }
    });
  </script>

</body>
</html>
