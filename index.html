<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReelMind AI</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: url('https://chat.openai.com/mnt/data/8EEDA5E5-39ED-4A7D-88A2-A89F2C8A5897.png') no-repeat center center/cover;
  color: white;
  text-align: center;
}

/* Dark overlay */
body::before {
  content: "";
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.75);
  z-index:-1;
}

h1 {
  margin-top: 20px;
  font-size: 32px;
  color: #00ffcc;
}

/* Input */
input {
  width: 80%;
  padding: 15px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
  margin-top: 20px;
}

/* Ice Cube Button */
.generate-box {
  margin: 30px auto;
  width: 150px;
  height: 150px;
  border-radius: 20px;
  background: rgba(0,255,255,0.1);
  box-shadow: 0 0 30px cyan;
  display: flex;
  align-items: center;
  justify-content: center;
}

button {
  padding: 15px 25px;
  border-radius: 10px;
  border: none;
  background: #00ff88;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

/* Sections */
.section {
  margin: 20px;
  padding: 15px;
  background: rgba(255,255,255,0.05);
  border-radius: 10px;
}

img, video {
  max-width: 90%;
  border-radius: 10px;
  margin-top: 10px;
}

.error {
  color: red;
}
</style>
</head>

<body>

<h1>🧠 ReelMind AI</h1>

<input id="prompt" placeholder="Enter your idea..." />

<div class="generate-box">
  <button onclick="generate()">GENERATE</button>
</div>

<div class="section">
  <h2>✍️ Story</h2>
  <p id="story">Waiting...</p>
</div>

<div class="section">
  <h2>🖼️ Image</h2>
  <img id="image" />
</div>

<div class="section">
  <h2>🎬 Video</h2>
  <video id="video" controls></video>
</div>

<script>
const BACKEND = "https://reelmindbackend-1.onrender.com";

async function generate() {
  const prompt = document.getElementById("prompt").value;

  document.getElementById("story").innerText = "Generating...";
  document.getElementById("image").src = "";
  document.getElementById("video").src = "";

  try {
    const res = await fetch(`${BACKEND}/generate`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt })
    });

    const data = await res.json();

    // STORY
    if (data.story) {
      document.getElementById("story").innerText = data.story;
    } else {
      document.getElementById("story").innerText = "Story failed";
    }

    // IMAGE
    if (data.image) {
      document.getElementById("image").src = data.image;
    }

    // VIDEO (NO AUTO PLAY)
    if (data.video) {
      document.getElementById("video").src = data.video;
    }

  } catch (err) {
    document.getElementById("story").innerHTML =
      "<span class='error'>Server not responding</span>";
  }
}
</script>

</body>
</html>
