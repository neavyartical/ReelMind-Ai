<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🚀 ReelMind AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
const API = "https://reelmindbackend-1.onrender.com";
</script>

<style>
body{
  margin:0;
  background:#0f172a;
  color:white;
  font-family:Arial;
  text-align:center;
  padding:40px;
}

input{
  width:80%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:20px;
}

button{
  margin-top:15px;
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#06b6d4;
  color:white;
  font-size:16px;
  cursor:pointer;
}

#result img, video{
  max-width:90%;
  margin-top:20px;
  border-radius:10px;
}
</style>
</head>

<body>

<h1>🚀 ReelMind AI</h1>

<input id="prompt" placeholder="Type: image of lion or video of city" />

<br>
<button onclick="generate()">⚡ Generate</button>

<div id="result"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey: "YOUR_API_KEY",
  authDomain: "reelmind-ai-f07cb.firebaseapp.com",
  projectId: "reelmind-ai-f07cb"
});

const auth = firebase.auth();
let TOKEN = null;

// 🔥 AUTO LOGIN (NO BUTTON NEEDED)
auth.signInAnonymously()
.then(async (user) => {
  TOKEN = await user.user.getIdToken();
  console.log("✅ Logged in");
})
.catch(err => {
  alert("Login error: " + err.message);
});

// 🚀 GENERATE
async function generate(){
  const prompt = document.getElementById("prompt").value;
  const result = document.getElementById("result");

  if(!prompt) return alert("Type something");

  if(!TOKEN){
    alert("Still logging in...");
    return;
  }

  result.innerHTML = "⏳ Generating...";

  try{
    let route = "/generate-text";

    if(prompt.toLowerCase().includes("image")){
      route = "/generate-image";
    }

    if(prompt.toLowerCase().includes("video")){
      route = "/generate-video";
    }

    const res = await fetch(API + route, {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer " + TOKEN
      },
      body: JSON.stringify({ prompt })
    });

    const data = await res.json();

    if(data.error){
      result.innerHTML = "❌ " + data.error;
      return;
    }

    if(data.data?.url){
      if(route === "/generate-video"){
        result.innerHTML = `<video controls src="${data.data.url}"></video>`;
      } else {
        result.innerHTML = `<img src="${data.data.url}" />`;
      }
    } else {
      result.innerHTML = `<p>${data.data?.content}</p>`;
    }

  }catch(e){
    result.innerHTML = "❌ Error: " + e.message;
  }
}
</script>

</body>
</html>
