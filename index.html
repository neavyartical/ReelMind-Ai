<!DOCTYPE html>
<html>
<body style="
margin:0;
background:linear-gradient(135deg,#0a0a0a,#001f3f,#000);
color:white;
font-family:Arial;
">

<div style="max-width:500px;margin:auto;padding:20px;background:#111;border-radius:20px;">

<h2>🎬 ReelMind AI Studio</h2>

<div id="creditsBox">Credits: 0</div>

<input id="prompt" placeholder="Enter idea..." style="width:100%;padding:10px;">

<button onclick="generate()">Script</button>
<button onclick="generateImage()">Image</button>
<button onclick="generateVideo()">Storyboard</button>
<button onclick="renderVideo()">🎬 Render Video</button>

<button onclick="speak()">🎤 Voice</button>
<button onclick="music()">🎵 Music</button>

<canvas id="canvas" width="360" height="640"></canvas>
<video id="preview" controls style="width:100%;"></video>

<pre id="output"></pre>

</div>

<audio id="bg"></audio>

<script>
const API="YOUR_BACKEND_URL";

window.onload=()=>{
  creditsBox.innerText="Credits: "+(localStorage.getItem("credits")||0);
};

/* ================= SCRIPT ================= */
async function generate(){
  const r=await fetch(API+"/generate",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":localStorage.getItem("token")
    },
    body:JSON.stringify({prompt:prompt.value})
  });

  const d=await r.json();
  output.innerText=d.result;
  creditsBox.innerText="Credits: "+d.credits;
  localStorage.setItem("credits",d.credits);
}

/* ================= IMAGE ================= */
async function generateImage(){
  const r=await fetch(API+"/generate-image",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":localStorage.getItem("token")
    },
    body:JSON.stringify({prompt:prompt.value})
  });

  const d=await r.json();
  output.innerHTML=`<img src="${d.image}" width="100%">`;
}

/* ================= STORY ================= */
async function generateVideo(){
  const r=await fetch(API+"/generate-video",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":localStorage.getItem("token")
    },
    body:JSON.stringify({prompt:prompt.value})
  });

  const d=await r.json();
  output.innerText=d.video;
}

/* ================= VIDEO ENGINE ================= */
async function renderVideo(){

  const canvas=document.getElementById("canvas");
  const ctx=canvas.getContext("2d");

  const stream=canvas.captureStream(30);
  const recorder=new MediaRecorder(stream);

  let chunks=[];
  recorder.ondataavailable=e=>chunks.push(e.data);

  recorder.onstop=()=>{
    preview.src=URL.createObjectURL(new Blob(chunks));
  };

  recorder.start();

  const words=prompt.value.split(" ");

  let i=0;

  const interval=setInterval(()=>{
    ctx.fillStyle="rgba(0,0,0,0.4)";
    ctx.fillRect(0,0,360,640);

    ctx.shadowColor="#00ffcc";
    ctx.shadowBlur=20;

    ctx.fillStyle="white";
    ctx.font="bold 30px Arial";
    ctx.fillText(words[i]||"",40,320);

    ctx.setTransform(1+i*0.01,0,0,1+i*0.01,0,0);

    i++;

    if(i>=words.length){
      clearInterval(interval);
      setTimeout(()=>recorder.stop(),1000);
    }

  },300);
}

/* ================= VOICE ================= */
function speak(){
  const speech=new SpeechSynthesisUtterance(output.innerText||prompt.value);
  speech.rate=1;
  speech.pitch=1.1;
  speechSynthesis.speak(speech);
}

/* ================= MUSIC ================= */
function music(){
  const m=document.getElementById("bg");
  m.src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3";
  m.play();
}
</script>

</body>
</html>
