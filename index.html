<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family: Arial;
      background: linear-gradient(135deg,#6a00ff,#ff6a00);
      color:white;
      text-align:center;
    }

    .hidden { display:none; }

    input {
      width:85%;
      padding:12px;
      margin:8px;
      border-radius:10px;
      border:none;
    }

    button {
      padding:12px;
      margin:5px;
      border:none;
      border-radius:10px;
      background:rgba(255,255,255,0.2);
      color:white;
    }

    .card {
      margin-top:20px;
      padding:10px;
      background:rgba(0,0,0,0.3);
      border-radius:15px;
    }

    img { width:100%; border-radius:10px; }

    .ads {
      margin-top:15px;
      padding:10px;
      background:#222;
      border-radius:10px;
      font-size:12px;
    }
  </style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="auth">
  <h2>🔐 ReelMind AI</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
  <button onclick="signup()">Sign Up</button>
</div>

<!-- 🚀 APP -->
<div id="app" class="hidden">

  <h2>🎬 ReelMind AI</h2>

  <button onclick="logout()">Logout</button>

  <input id="prompt" placeholder="Ask anything (safe & legal only)">

  <button onclick="generate()">✨ Generate</button>

  <div id="output"></div>

  <!-- 💰 SUBSCRIPTION -->
  <div class="card">
    <h3>💎 Go Premium</h3>
    <p>$9/month or $99/year</p>
    <button onclick="subscribe()">Upgrade</button>
  </div>

  <!-- 📢 ADS (FREE USERS ONLY) -->
  <div id="ads" class="ads">
    📢 Ad: Your ad will appear here (AdMob later)
  </div>

  <!-- 📜 POLICY -->
  <div class="card">
    <h4>Safety Policy</h4>
    <p>
      This app does NOT allow:
      ❌ Nudity  
      ❌ Illegal actions  
      ❌ Harmful or violent content  
      ✔ Safe, creative, and useful content only
    </p>
  </div>

</div>

<script>
let user = null;
let premium = false;

// 🔐 LOGIN SYSTEM (LOCAL FOR NOW)
function signup(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  localStorage.setItem("user", JSON.stringify({email, pass, premium:false}));
  alert("Account created!");
}

function login(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  const saved = JSON.parse(localStorage.getItem("user"));

  if(saved && saved.email===email && saved.pass===pass){
    user = saved;
    premium = saved.premium;
    startApp();
  } else {
    alert("Invalid login");
  }
}

function logout(){
  location.reload();
}

function startApp(){
  document.getElementById("auth").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");

  if(premium){
    document.getElementById("ads").style.display="none";
  }
}

// 💰 SUBSCRIBE (SIMULATION)
function subscribe(){
  alert("Payment system coming next version 💳");
  premium = true;

  let saved = JSON.parse(localStorage.getItem("user"));
  saved.premium = true;
  localStorage.setItem("user", JSON.stringify(saved));

  document.getElementById("ads").style.display="none";
}

// 🚀 GENERATE
async function generate(){
  const prompt = document.getElementById("prompt").value;
  const output = document.getElementById("output");

  // 🛑 SAFETY FILTER
  if(prompt.toLowerCase().includes("nude") || prompt.toLowerCase().includes("illegal")){
    output.innerHTML = "❌ Request not allowed";
    return;
  }

  output.innerHTML="Loading...";

  const res = await fetch("https://backend-ppyz.onrender.com/generate",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({prompt})
  });

  const data = await res.json();

  output.innerHTML = `
    <div class="card">
      <img src="${data.url}">
      <p>${prompt}</p>
    </div>
  `;
}
</script>

</body>
</html>
