<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI PRO</title>

  <style>
    body {
      background:#0b1d2a;
      color:white;
      text-align:center;
      font-family:sans-serif;
    }

    .card {
      background:#12283a;
      padding:10px;
      border-radius:10px;
    }

    button {
      padding:12px 20px;
      margin:5px;
      border:none;
      border-radius:8px;
      background:#3b82f6;
      color:white;
      cursor:pointer;
    }
  </style>
</head>

<body>

<h1>🎬 ReelMind AI PRO</h1>

<input id="prompt" placeholder="Describe your scene..."
  style="width:80%;padding:14px;border-radius:10px;border:none;" />

<br><br>

<button onclick="generateImages()">Generate Image</button>
<button onclick="generateVideo()">Generate Video 🎬</button>

<p id="status"></p>

<div id="gallery"
  style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;padding:20px;">
</div>

<script>
const status = document.getElementById("status");

/* 🖼 IMAGE (REPLICATE) */
async function generateImages() {
  status.innerText = "Generating image...";

  const prompt = document.getElementById("prompt").value;
  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  try {
    const res = await fetch("https://backend-ppyz.onrender.com/generate", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ prompt })
    });

    const data = await res.json();

    if (!data.image) {
      status.innerText = "Image failed";
      return;
    }

    const card = document.createElement("div");
    card.className = "card";

    const img = document.createElement("img");
    img.src = data.image;
    img.style.width = "100%";

    const btn = document.createElement("button");
    btn.innerText = "⬇ Download";
    btn.onclick = () => {
      const a = document.createElement("a");
      a.href = data.image;
      a.download = "image.png";
      a.click();
    };

    card.appendChild(img);
    card.appendChild(btn);
    gallery.appendChild(card);

    status.innerText = "Done!";
  } catch (err) {
    status.innerText = "Error generating image";
    console.log(err);
  }
}

/* 🎬 VIDEO */
async function generateVideo() {
  status.innerText = "Generating video... (wait 30–60s)";

  const prompt = document.getElementById("prompt").value;
  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  try {
    const res = await fetch("https://backend-ppyz.onrender.com/video", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ prompt })
    });

    const data = await res.json();

    if (!data.video) {
      status.innerText = "Video failed";
      return;
    }

    const video = document.createElement("video");
    video.src = data.video;
    video.controls = true;
    video.autoplay = true;
    video.loop = true;
    video.muted = true;
    video.style.width = "100%";

    const btn = document.createElement("button");
    btn.innerText = "⬇ Download Video";
    btn.onclick = () => {
      const a = document.createElement("a");
      a.href = data.video;
      a.download = "video.mp4";
      a.click();
    };

    gallery.appendChild(video);
    gallery.appendChild(btn);

    status.innerText = "Video ready 🎬";
  } catch (err) {
    status.innerText = "Video failed";
    console.log(err);
  }
}
</script>

</body>
</html>
