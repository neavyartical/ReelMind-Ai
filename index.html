<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🚀 ReelMind AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 20px;
}

button, select {
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #06b6d4;
  color: white;
  cursor: pointer;
}

input {
  width: 90%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 15px;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
  margin-top: 15px;
}
</style>
</head>

<body>

<h1>🚀 ReelMind AI</h1>

<p id="userText"></p>

<button id="loginBtn">Login with Google</button>
<button id="logoutBtn" style="display:none;">Logout</button>

<br>

<input id="promptInput" placeholder="Describe what you want..." />

<br>

<select id="mode">
  <option value="text">🧠 Text</option>
  <option value="image">🖼 Image</option>
  <option value="video">🎬 Video</option>
</select>

<br>

<button id="generateBtn" style="display:none;">⚡ Generate</button>

<div id="result"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// 🔑 YOUR CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCz9rReG2zuaj0AGuafpTzpCUopuHMD_wQ",
  authDomain: "reelmind-ai-f07cb.firebaseapp.com",
  projectId: "reelmind-ai-f07cb",
  storageBucket: "reelmind-ai-f07cb.appspot.com",
  messagingSenderId: "731354245603",
  appId: "1:731354245603:web:7810ca9154efda2f82d8d6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// UI
const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");
const generateBtn = document.getElementById("generateBtn");
const promptInput = document.getElementById("promptInput");
const resultBox = document.getElementById("result");
const userText = document.getElementById("userText");
const mode = document.getElementById("mode");

// LOGIN
loginBtn.onclick = () => signInWithPopup(auth, provider);
logoutBtn.onclick = () => signOut(auth);

// AUTH
onAuthStateChanged(auth, (user) => {
  if (user) {
    userText.innerText = "Logged in as: " + user.email;
    loginBtn.style.display = "none";
    logoutBtn.style.display = "inline-block";
    generateBtn.style.display = "inline-block";
  } else {
    userText.innerText = "";
    loginBtn.style.display = "inline-block";
    logoutBtn.style.display = "none";
    generateBtn.style.display = "none";
  }
});

// 🚀 GENERATE ENGINE
generateBtn.onclick = async () => {
  const prompt = promptInput.value;
  const selected = mode.value;

  if (!prompt) return alert("Enter prompt");

  resultBox.innerHTML = "⏳ Generating...";

  // 🧠 TEXT
  if (selected === "text") {
    try {
      const res = await fetch("https://reelmindbackend-1.onrender.com/generate-text", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt })
      });

      const data = await res.json();

      resultBox.innerHTML = `
        <div class="card">
          ${data.data?.content || "No response"}
        </div>
      `;
    } catch (err) {
      resultBox.innerHTML = "❌ Error";
    }
  }

  // 🖼 IMAGE (FAST ⚡)
  if (selected === "image") {
    const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}`;

    resultBox.innerHTML = `
      <div class="card">
        <img src="${url}" style="width:100%; border-radius:10px;" />
      </div>
    `;
  }

  // 🎬 VIDEO (via backend)
  if (selected === "video") {
    try {
      const res = await fetch("https://reelmindbackend-1.onrender.com/generate-video", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt })
      });

      const data = await res.json();

      resultBox.innerHTML = `
        <div class="card">
          🎬 Video request sent<br>
          ${data.status || "Processing..."}
        </div>
      `;
    } catch (err) {
      resultBox.innerHTML = "❌ Video error";
    }
  }
};

</script>

</body>
</html>
