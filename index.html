<!DOCTYPE html>
<html>
<head>
  <title>ReelMind Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #0a0a0a;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    h1 {
      color: #00ff88;
    }

    input {
      width: 90%;
      padding: 15px;
      border-radius: 10px;
      border: none;
      margin: 10px;
    }

    button {
      padding: 15px 30px;
      border-radius: 10px;
      border: none;
      background: #00ff88;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    .box {
      margin-top: 20px;
      padding: 15px;
      background: #1a1a1a;
      border-radius: 10px;
    }

    img, video {
      width: 100%;
      border-radius: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>🧠 ReelMind Global</h1>

<input id="prompt" placeholder="Enter your idea...">
<br>
<button onclick="generate()">Generate</button>

<div class="box">
  <h3>✍️ Story</h3>
  <div id="story">...</div>
</div>

<div class="box">
  <h3>🖼 Image</h3>
  <img id="image"/>
</div>

<div class="box">
  <h3>🎬 Video</h3>
  <video id="video" controls></video>
</div>

<script>
const API = "https://reelmindbackend-1.onrender.com";

let loading = false;

async function generate() {
  if (loading) return; // 🔥 prevent loop
  loading = true;

  const prompt = document.getElementById("prompt").value;

  document.getElementById("story").innerText = "Generating...";
  document.getElementById("image").src = "";
  document.getElementById("video").src = "";

  try {

    // 🔥 STORY
    const storyRes = await fetch(API + "/story", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt })
    });

    const storyData = await storyRes.json();
    document.getElementById("story").innerText = storyData.story || "Failed";

    // 🔥 IMAGE
    const imgRes = await fetch(API + "/image", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt })
    });

    const imgData = await imgRes.json();
    document.getElementById("image").src = imgData.image;

    // 🔥 VIDEO (REAL RUNWAY)
    const vidRes = await fetch(API + "/video", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt })
    });

    const vidData = await vidRes.json();

    if (vidData.video) {
      document.getElementById("video").src = vidData.video;
    } else {
      document.getElementById("video").outerHTML = "<p>⚠️ Video processing... check backend logs</p>";
    }

  } catch (err) {
    document.getElementById("story").innerText = "❌ AI Error";
  }

  loading = false;
}
</script>

</body>
</html>
