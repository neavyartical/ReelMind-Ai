<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #0d0d0d;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    input, button {
      width: 90%;
      padding: 12px;
      margin: 8px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #00ff88;
      font-weight: bold;
    }

    #output {
      margin-top: 20px;
      white-space: pre-wrap;
    }

    img {
      max-width: 100%;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h2>🚀 ReelMind AI (FAST)</h2>

<input id="email" placeholder="Enter email" />
<button onclick="login()">Login</button>

<input id="prompt" placeholder="Type prompt..." />

<button onclick="generateText()">⚡ Text</button>
<button onclick="generateImage()">🖼 Image</button>
<button onclick="loadHistory()">📜 History</button>

<div id="output"></div>
<div id="history"></div>

<script>
const API = "https://reelmindbackend-1.onrender.com";

async function login() {
  const email = document.getElementById("email").value;

  const res = await fetch(API + "/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ email })
  });

  const data = await res.json();
  localStorage.setItem("token", data.token);

  output.innerText = "✅ Logged in";
}

async function generateText() {
  const token = localStorage.getItem("token");
  const prompt = document.getElementById("prompt").value;

  output.innerHTML = "⚡ Thinking...";

  const res = await fetch(API + "/generate-text", {
    method: "POST",
    headers: {
      "Content-Type":"application/json",
      "Authorization":"Bearer " + token
    },
    body: JSON.stringify({ prompt })
  });

  const data = await res.json();

  if(data.error){
    output.innerText = data.error;
  } else {
    output.innerText = data.result + "\n\n💎 " + data.credits;
  }
}

async function generateImage() {
  const token = localStorage.getItem("token");
  const prompt = document.getElementById("prompt").value;

  output.innerHTML = "⚡ Creating image...";

  const res = await fetch(API + "/generate-image", {
    method: "POST",
    headers: {
      "Content-Type":"application/json",
      "Authorization":"Bearer " + token
    },
    body: JSON.stringify({ prompt })
  });

  const data = await res.json();

  output.innerHTML = `<img src="${data.image}"><br>💎 ${data.credits}`;
}

async function loadHistory() {
  const token = localStorage.getItem("token");

  const res = await fetch(API + "/history", {
    headers: {
      "Authorization":"Bearer " + token
    }
  });

  const data = await res.json();

  history.innerHTML = data.map(p => `
    <p><b>${p.prompt}</b><br>${p.result}</p>
  `).join("");
}
</script>

</body>
</html>
