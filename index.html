<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ADSENSE -->
  <script async 
  src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXX"
  crossorigin="anonymous"></script>

  <style>
    body {
      margin: 0;
      background: linear-gradient(135deg,#0a0a0a,#111);
      color: white;
      font-family: Arial;
      text-align: center;
    }

    .glass {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(25px);
      border-radius: 25px;
      padding: 20px;
      margin: 20px;
      box-shadow:
        0 0 25px cyan,
        inset 0 0 20px rgba(255,255,255,0.1);
    }

    input, textarea {
      width: 90%;
      padding: 12px;
      margin: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
    }

    textarea { height: 100px; }

    .generate-btn {
      width: 100px;
      height: 100px;
      border-radius: 20px;
      font-size: 40px;
      background: linear-gradient(145deg,#00f0ff,#00aaff);
      color: white;
      border: none;
      box-shadow: 0 0 30px cyan;
      cursor: pointer;
    }

    video, img {
      width: 90%;
      border-radius: 15px;
      margin-top: 10px;
    }

    #output {
      margin-top: 20px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

<h1>🧠 ReelMind AI</h1>

<div class="glass">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <br>
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<div class="glass">
  <textarea id="prompt" placeholder="Enter idea..."></textarea>

  <br>
  <button class="generate-btn" onclick="generate()">🧊</button>

  <br>
  <button onclick="generateVideo()">🎬 Generate Video</button>
  <button onclick="save()">💾 Save</button>
  <button onclick="load()">📂 Load</button>

  <!-- ADS -->
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-XXXXXXXX"
       data-ad-slot="1234567890"
       data-ad-format="auto"></ins>
</div>

<div class="glass">
  <input type="file" id="fileInput" accept="image/*,video/*">
  <button onclick="upload()">📤 Upload & AI Edit</button>
  <div id="preview"></div>
</div>

<div id="output"></div>

<script>
const API = "https://reelmindbackend-1.onrender.com";
let token = "";

// AUTH
async function register() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch(API + "/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ email, password })
  });

  alert((await res.json()).msg);
}

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch(API + "/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();
  token = data.token;
  alert("Logged in!");
}

// TEXT AI
async function generate() {
  const prompt = document.getElementById("prompt").value.trim();

  if (!prompt) {
    output.innerText = "⚠️ Enter something";
    return;
  }

  output.innerText = "❄️ Generating...";

  const res = await fetch(API + "/generate", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ prompt })
  });

  const data = await res.json();
  output.innerText = data.result;
}

// VIDEO AI (RUNWAY READY)
async function generateVideo() {
  const prompt = document.getElementById("prompt").value.trim();

  if (!prompt) {
    output.innerText = "⚠️ Enter prompt";
    return;
  }

  output.innerText = "🎬 Generating video...";

  const res = await fetch(API + "/video", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ prompt })
  });

  const data = await res.json();

  output.innerHTML = `
    <video src="${data.video}" controls autoplay loop></video>
    <br>
    <a href="${data.video}" download>⬇️ Download Video</a>
  `;
}

// SAVE
async function save() {
  await fetch(API + "/save", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": token
    },
    body: JSON.stringify({
      content: output.innerText,
      type: "text"
    })
  });

  alert("Saved!");
}

// LOAD
async function load() {
  const res = await fetch(API + "/projects", {
    headers: { Authorization: token }
  });

  output.innerText = JSON.stringify(await res.json(), null, 2);
}

// UPLOAD + AI IMAGE
function upload() {
  const file = document.getElementById("fileInput").files[0];
  if (!file) return alert("Select file");

  const url = URL.createObjectURL(file);

  if (file.type.startsWith("image")) {
    preview.innerHTML = `<img src="${url}">`;

    const aiImage = "https://image.pollinations.ai/prompt/" +
      encodeURIComponent(document.getElementById("prompt").value || "cinematic");

    output.innerHTML = `<img src="${aiImage}">`;

  } else {
    preview.innerHTML = `<video src="${url}" controls></video>`;
  }
}
</script>

</body>
</html>
