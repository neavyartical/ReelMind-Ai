<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #0a0a0a;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    input, textarea {
      width: 90%;
      padding: 12px;
      margin: 10px;
      border-radius: 10px;
      border: none;
    }

    button {
      padding: 12px 20px;
      margin: 10px;
      border-radius: 10px;
      border: none;
      background: cyan;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    #output {
      margin-top: 20px;
      white-space: pre-wrap;
    }

    video {
      width: 90%;
      margin-top: 10px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>🧠 ReelMind AI</h1>

<!-- LOGIN -->
<input id="email" placeholder="Email">
<input id="password" placeholder="Password" type="password">
<br>
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

<hr>

<!-- PROMPT -->
<textarea id="prompt" placeholder="Enter idea..."></textarea>

<br>

<!-- GENERATE -->
<button onclick="generate()">🔥 Generate</button>
<button onclick="save()">💾 Save</button>
<button onclick="load()">📂 Load</button>

<hr>

<!-- UPLOAD -->
<input type="file" id="fileInput" accept="image/*,video/*">
<button onclick="upload()">📤 Upload</button>

<hr>

<!-- CAMERA -->
<video id="camera" autoplay></video>
<br>
<button onclick="startCamera()">📸 Start Camera</button>
<button onclick="stopCamera()">⛔ Stop Camera</button>

<hr>

<!-- VOICE -->
<button onclick="startRecording()">🎤 Record Voice</button>
<button onclick="stopRecording()">⛔ Stop Recording</button>

<div id="output"></div>

<script>
const API = "https://reelmindbackend-1.onrender.com";
let token = "";

// AUTH
async function register() {
  const res = await fetch(API + "/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });
  alert((await res.json()).msg);
}

async function login() {
  const res = await fetch(API + "/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });
  const data = await res.json();
  token = data.token;
  alert("Logged in!");
}

// AI
async function generate() {
  output.innerText = "⏳ Generating...";

  const res = await fetch(API + "/generate", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      prompt: prompt.value
    })
  });

  const data = await res.json();
  output.innerText = data.result;
}

// SAVE
async function save() {
  await fetch(API + "/save", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": token
    },
    body: JSON.stringify({
      content: output.innerText,
      type: "text"
    })
  });

  alert("Saved!");
}

// LOAD
async function load() {
  const res = await fetch(API + "/projects", {
    headers: { "Authorization": token }
  });

  output.innerText = JSON.stringify(await res.json(), null, 2);
}

// UPLOAD
function upload() {
  const file = document.getElementById("fileInput").files[0];
  if (!file) return alert("Select a file first");

  output.innerText = "📤 File ready: " + file.name;

  // Next step: send to backend (we’ll upgrade this later)
}

// CAMERA
let stream;

async function startCamera() {
  stream = await navigator.mediaDevices.getUserMedia({ video: true });
  camera.srcObject = stream;
}

function stopCamera() {
  if (stream) {
    stream.getTracks().forEach(track => track.stop());
  }
}

// VOICE RECORD
let mediaRecorder;
let audioChunks = [];

async function startRecording() {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  mediaRecorder = new MediaRecorder(stream);

  mediaRecorder.ondataavailable = e => {
    audioChunks.push(e.data);
  };

  mediaRecorder.onstop = () => {
    const audioBlob = new Blob(audioChunks);
    output.innerText = "🎤 Voice recorded!";
    audioChunks = [];
  };

  mediaRecorder.start();
}

function stopRecording() {
  mediaRecorder.stop();
}
</script>

</body>
</html>
