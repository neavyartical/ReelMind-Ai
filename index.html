<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: white;
      text-align: center;
      overflow-x: hidden;
      background: linear-gradient(270deg, #7b2ff7, #ff7a18, #020617);
      background-size: 600% 600%;
      animation: bgMove 12s infinite alternate;
    }

    @keyframes bgMove {
      0% { background-position: left; }
      100% { background-position: right; }
    }

    h1 {
      margin-top: 20px;
      font-size: 32px;
    }

    input {
      padding: 14px;
      width: 85%;
      border-radius: 12px;
      border: none;
      margin-top: 15px;
      font-size: 16px;
    }

    /* 🧊 REAL 3D CUBE */
    .scene {
      width: 200px;
      height: 200px;
      margin: 60px auto;
      perspective: 800px;
    }

    .cube {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      animation: spin 8s infinite linear;
    }

    .face {
      position: absolute;
      width: 200px;
      height: 200px;
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      backdrop-filter: blur(10px);
    }

    .front  { transform: rotateY(0deg) translateZ(100px); }
    .back   { transform: rotateY(180deg) translateZ(100px); }
    .right  { transform: rotateY(90deg) translateZ(100px); }
    .left   { transform: rotateY(-90deg) translateZ(100px); }
    .top    { transform: rotateX(90deg) translateZ(100px); }
    .bottom { transform: rotateX(-90deg) translateZ(100px); }

    @keyframes spin {
      from { transform: rotateX(0deg) rotateY(0deg); }
      to { transform: rotateX(360deg) rotateY(360deg); }
    }

    /* 🔥 BUTTON INSIDE CUBE */
    .center-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) translateZ(120px);
      z-index: 10;
    }

    button {
      padding: 14px 22px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(45deg, #ff7a18, #7b2ff7);
      color: white;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(255,100,0,0.8);
    }

    #result {
      margin: 20px;
      padding: 20px;
      text-align: left;
      white-space: pre-wrap;
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
    }

    footer {
      margin-top: 30px;
      font-size: 14px;
      opacity: 0.8;
    }

    a {
      color: #00ffcc;
      text-decoration: none;
    }

    /* LOGIN */
    #loginBox {
      margin-top: 30px;
    }
  </style>
</head>

<body>

<h1>🧠 ReelMind AI</h1>

<!-- 🔐 LOGIN -->
<div id="loginBox">
  <input id="username" placeholder="Enter username..." />
  <button onclick="login()">Login</button>
</div>

<input id="prompt" placeholder="Enter viral idea..." />

<!-- 🧊 CUBE -->
<div class="scene">
  <div class="cube">
    <div class="face front"></div>
    <div class="face back"></div>
    <div class="face right"></div>
    <div class="face left"></div>
    <div class="face top"></div>
    <div class="face bottom"></div>

    <!-- BUTTON INSIDE -->
    <div class="center-btn">
      <button onclick="generate()">Generate ⚡</button>
    </div>
  </div>
</div>

<div id="result"></div>

<footer>
  🚀 Powered by <b>Artical Neavy</b><br>
  <a href="terms.html">Terms & Conditions</a>
</footer>

<script>
let user = localStorage.getItem("user");

if (user) {
  document.getElementById("loginBox").innerHTML = "👋 Welcome " + user;
}

// 🔐 LOGIN
function login() {
  const username = document.getElementById("username").value;
  if (!username) return;

  localStorage.setItem("user", username);
  location.reload();
}

// 🚀 GENERATE
async function generate() {
  const prompt = document.getElementById("prompt").value;
  const result = document.getElementById("result");

  if (!prompt) {
    result.innerText = "Enter a prompt ❌";
    return;
  }

  result.innerText = "Generating ⚡ Please wait...";

  try {
    const res = await fetch("https://reelmindbackend-1.onrender.com/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt })
    });

    const data = await res.json();

    result.innerText = data.result;

  } catch (err) {
    result.innerText = "Connection error ❌";
  }
}
</script>

</body>
</html>
