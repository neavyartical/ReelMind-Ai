<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: linear-gradient(135deg, #6a00ff, #ff6a00);
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 15px;
    }

    h2 {
      font-size: 26px;
      margin-bottom: 15px;
    }

    input, select {
      width: 90%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      margin-bottom: 10px;
      font-size: 16px;
    }

    button {
      padding: 12px 20px;
      margin: 5px;
      background: rgba(255,255,255,0.2);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 16px;
      backdrop-filter: blur(10px);
    }

    #feed {
      margin-top: 20px;
    }

    .card {
      margin-bottom: 20px;
      border-radius: 15px;
      overflow: hidden;
      background: rgba(0,0,0,0.3);
      padding: 10px;
      backdrop-filter: blur(10px);
    }

    .card img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      animation: zoom 6s infinite alternate;
      border-radius: 10px;
    }

    @keyframes zoom {
      100% { transform: scale(1.2); }
    }

    .story {
      margin-top: 10px;
      font-size: 14px;
      text-align: left;
    }

    .loader {
      margin: 20px auto;
      border: 5px solid rgba(255,255,255,0.3);
      border-top: 5px solid white;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

  <h2>🎬 ReelMind AI</h2>

  <input id="prompt" placeholder="Tell me your story idea..." />

  <select id="musicSelect">
    <option value="">No Music</option>
    <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">Chill</option>
    <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3">Hype</option>
  </select>

  <input type="file" id="uploadMusic" accept="audio/*" />

  <button onclick="generate()">✨ Create Story</button>

  <p id="status"></p>

  <div id="feed"></div>

  <audio id="bgMusic" loop></audio>

  <script>
    let recorder, chunks = [];

    function generateStory(prompt) {
      const styles = [
        "In a world where",
        "One day, suddenly",
        "Nobody expected that",
        "Everything changed when",
        "Deep in the future"
      ];

      const endings = [
        "and nothing was ever the same again.",
        "but the ending shocked everyone.",
        "and it became legendary.",
        "but something went terribly wrong.",
        "and the truth was revealed."
      ];

      const start = styles[Math.floor(Math.random()*styles.length)];
      const end = endings[Math.floor(Math.random()*endings.length)];

      return `${start} ${prompt}, ${end}`;
    }

    async function generate() {
      const prompt = document.getElementById("prompt").value;
      const status = document.getElementById("status");
      const feed = document.getElementById("feed");
      const music = document.getElementById("bgMusic");

      if (!prompt) {
        status.innerText = "Enter something ⚠️";
        return;
      }

      const enhancedPrompt = prompt + ", cinematic, ultra realistic";

      status.innerText = "Creating story... ✨";

      const loader = document.createElement("div");
      loader.className = "loader";
      feed.prepend(loader);

      try {
        const res = await fetch("https://backend-ppyz.onrender.com/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt: enhancedPrompt })
        });

        const data = await res.json();
        loader.remove();

        if (data.url) {

          // 🎧 MUSIC
          const uploaded = document.getElementById("uploadMusic").files[0];
          const selected = document.getElementById("musicSelect").value;

          if (uploaded) {
            music.src = URL.createObjectURL(uploaded);
          } else if (selected) {
            music.src = selected;
          }

          if (music.src) {
            music.play();
          }

          // 🧠 STORY
          const story = generateStory(prompt);

          const card = document.createElement("div");
          card.className = "card";

          card.innerHTML = `
            <img src="${data.url}" />
            <div class="story">${story}</div>
            <button onclick="window.open('${data.url}')">📥 Image</button>
          `;

          feed.prepend(card);

          status.innerText = "Done ✅";
        }

      } catch (err) {
        status.innerText = "Error ❌";
      }
    }
  </script>

</body>
</html>
