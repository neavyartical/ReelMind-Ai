<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ADSENSE -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1714638410489429" crossorigin="anonymous"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: white;
      background: radial-gradient(circle, #0f2027, #0b0b0b);
    }

    #nav {
      background: rgba(0,0,0,0.9);
      padding: 12px;
      text-align: center;
      font-weight: bold;
    }

    #nav a {
      color: #00ffc3;
      margin: 0 6px;
      cursor: pointer;
    }

    #chat {
      height: 55vh;
      overflow-y: auto;
      padding: 15px;
    }

    .msg {
      padding: 12px;
      margin: 10px;
      border-radius: 12px;
      max-width: 80%;
    }

    .user { background: #1f1f1f; margin-left: auto; }
    .ai { background: #2b2b2b; }

    img { width: 100%; border-radius: 10px; }

    #inputArea {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      padding: 10px;
      background: #111;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 20px;
      border: none;
    }

    button {
      margin-left: 5px;
      border-radius: 20px;
      padding: 10px;
      border: none;
      background: #00ffc3;
      font-weight: bold;
    }

    .loader {
      border: 4px solid #333;
      border-top: 4px solid #00ffc3;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      margin: 10px;
    }

    @keyframes spin { 100% { transform: rotate(360deg); } }

    footer {
      text-align: center;
      padding: 15px;
      color: gray;
    }

    #pageContent {
      padding: 15px;
      display: none;
    }
  </style>
</head>

<body>

<div id="nav">
  ReelMind AI 🚀 |
  <a onclick="showPage('about')">About</a>
  <a onclick="showPage('blog')">Blog</a>
  <a onclick="showPage('contact')">Contact</a>
  <a onclick="showPage('privacy')">Privacy</a>
  <a onclick="showPage('terms')">Terms</a>
</div>

<div id="pageContent"></div>

<div id="chat"></div>

<div style="text-align:center;">
  <ins class="adsbygoogle"
    style="display:block"
    data-ad-client="ca-pub-1714638410489429"
    data-ad-slot="1234567890"
    data-ad-format="auto"></ins>
</div>

<script>
(adsbygoogle = window.adsbygoogle || []).push({});
</script>

<div style="text-align:center; margin:10px;">
  <button onclick="setMode('text')">AI</button>
  <button onclick="setMode('image')">Image</button>
  <button onclick="setMode('reel')">Reel</button>
</div>

<div id="inputArea">
  <input id="userInput" placeholder="Ask anything..." />
  <button onclick="send()">Send</button>
</div>

<footer>Powered by Artical Neavy ⚡</footer>

<script>
let mode = "text";

// 🔥 USE YOUR OPENROUTER KEY HERE
const OPENROUTER_API_KEY = "YOUR_OPENROUTER_KEY";

function setMode(m){ mode = m; }

async function send(){
  const input = userInput.value;
  if(!input) return;

  chat.innerHTML += `<div class="msg user">${input}</div>`;

  const loader = document.createElement("div");
  loader.className = "loader";
  chat.appendChild(loader);

  try {

    // 🧠 TEXT AI (REAL)
    if(mode === "text"){
      const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method: "POST",
        headers: {
          "Authorization": "Bearer " + OPENROUTER_API_KEY,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          model: "openai/gpt-3.5-turbo",
          messages: [{role:"user", content: input}]
        })
      });

      const data = await res.json();
      loader.remove();

      const reply = data?.choices?.[0]?.message?.content || "Error generating";
      chat.innerHTML += `<div class="msg ai">${reply}</div>`;
    }

    // 🖼 IMAGE (WORKING)
    if(mode === "image"){
      loader.remove();

      const imgUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(input)}`;

      chat.innerHTML += `
      <div class="msg ai">
        <img src="${imgUrl}">
        <br><a href="${imgUrl}" download>⬇ Download</a>
      </div>`;
    }

    // 🎬 REEL (AI GENERATED)
    if(mode === "reel"){
      const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method:"POST",
        headers:{
          "Authorization":"Bearer "+OPENROUTER_API_KEY,
          "Content-Type":"application/json"
        },
        body:JSON.stringify({
          model:"openai/gpt-3.5-turbo",
          messages:[{
            role:"user",
            content:`Create viral TikTok reel script: ${input}`
          }]
        })
      });

      const data = await res.json();
      loader.remove();

      const reel = data?.choices?.[0]?.message?.content || "Error";
      chat.innerHTML += `<div class="msg ai">🎬 ${reel}</div>`;
    }

  } catch(e){
    loader.remove();
    chat.innerHTML += `<div class="msg ai">⚠️ API Error (check key)</div>`;
  }

  userInput.value="";
  chat.scrollTop = chat.scrollHeight;
}

// 📄 PAGES
function showPage(p){
  const c = document.getElementById("pageContent");
  c.style.display = "block";

  if(p==="about") c.innerHTML=`<h2>About</h2><p>ReelMind AI na global AI platform for viral content creation.</p>`;
  if(p==="contact") c.innerHTML=`<h2>Contact</h2><p>Email: support@reelmindai.com</p>`;
  if(p==="privacy") c.innerHTML=`<h2>Privacy</h2><p>Your data safe wit we.</p>`;
  if(p==="terms") c.innerHTML=`<h2>Terms</h2><p>Use responsibly.</p>`;
  if(p==="blog") c.innerHTML=`<h2>Blog</h2><p>Updates coming soon...</p>`;
}
</script>

</body>
</html>
