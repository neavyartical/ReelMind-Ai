<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ReelMind AI</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      width: 90%;
      max-width: 400px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-bottom: 10px;
      font-size: 16px;
    }

    button {
      padding: 12px 20px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 16px;
      margin: 5px;
    }

    .generate {
      background: #22c55e;
      color: white;
    }

    .login {
      background: #3b82f6;
      color: white;
    }

    .logout {
      background: red;
      color: white;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>🚀 ReelMind AI</h2>

  <div id="auth-section">
    <button class="login" onclick="login()">Login with Google</button>
  </div>

  <div id="app-section" style="display:none;">
    <input type="text" id="prompt" placeholder="Type something like: image of dragon"/>
    <button class="generate" onclick="generate()">Generate</button>
    <br/>
    <button class="logout" onclick="logout()">Logout</button>
  </div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "PASTE-YOUR-NEW-API-KEY-HERE",
  authDomain: "reelmind-ai-f07cb.firebaseapp.com",
  projectId: "reelmind-ai-f07cb",
  storageBucket: "reelmind-ai-f07cb.appspot.com",
  messagingSenderId: "PASTE",
  appId: "PASTE"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

window.login = async function () {
  try {
    await signInWithPopup(auth, provider);
  } catch (error) {
    alert("Login error: " + error.message);
  }
};

window.logout = async function () {
  await signOut(auth);
};

window.generate = function () {
  const prompt = document.getElementById("prompt").value;
  alert("Generating: " + prompt);
};

// AUTH STATE
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("auth-section").style.display = "none";
    document.getElementById("app-section").style.display = "block";
  } else {
    document.getElementById("auth-section").style.display = "block";
    document.getElementById("app-section").style.display = "none";
  }
});
</script>

</body>
</html>
