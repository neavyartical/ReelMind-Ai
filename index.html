<!-- FIREBASE FIRST -->
<script src="https://www.gstatic.com/firebasejs/12.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.12.0/firebase-auth-compat.js"></script>

<!-- THEN YOUR SCRIPT -->
<script>
document.addEventListener("DOMContentLoaded", function(){

/* EVERYTHING GOES INSIDE HERE */

firebase.initializeApp({
apiKey: "AIzaSyCraJ2lDNrPU7O_qDz4J6_aCNrR_l4ex-I",
authDomain: "reelmind-ai-a11eb.firebaseapp.com",
projectId: "reelmind-ai-a11eb"
});

const auth = firebase.auth();

let USER_CREDITS = 0;

/* SAFE ELEMENTS */
const promptInput = document.getElementById("prompt");
const feedBox = document.getElementById("feed");
const loginBox = document.getElementById("loginBox");
const welcome = document.getElementById("welcome");
const userEmail = document.getElementById("userEmail");
const userStats = document.getElementById("userStats");

/* TOKEN */
async function getToken(){
const user = auth.currentUser;
if(!user) return null;
return await user.getIdToken(true);
}

/* LOGIN */
window.emailLogin = async function(){
let email = prompt("Email");
let pass = prompt("Password");

try{
await auth.signInWithEmailAndPassword(email,pass);
}catch{
await auth.createUserWithEmailAndPassword(email,pass);
}
}

window.googleLogin = function(){
auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
}

/* AUTH */
auth.onAuthStateChanged(async user=>{
if(user){
loginBox.style.display="none";

welcome.classList.add("active");
setTimeout(()=>welcome.classList.remove("active"),2000);

loadProfile();
}
});

/* PROFILE */
async function loadProfile(){
const token = await getToken();
if(!token) return;

let r = await fetch(API+"/me",{
headers:{Authorization:"Bearer "+token}
});

let d = await r.json();

USER_CREDITS = d.data?.credits || 0;

userEmail.innerText = d.data?.email || "User";
userStats.innerText = "Credits: " + USER_CREDITS;
}

/* GENERATE */
window.generate = async function(){
const token = await getToken();
if(!token) return alert("Login first");

let p = promptInput.value;
if(!p) return;

let r = await fetch(API+"/generate-text",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},
body:JSON.stringify({prompt:p})
});

let d = await r.json();

if(d.error){
alert(d.error);
return;
}

addCard(d.data?.content || "No response");
}

/* CARD */
function addCard(content){
let c = document.createElement("div");
c.innerHTML = `<div style="padding:10px">${content}</div>`;
feedBox.prepend(c);
}

/* FIX BUTTONS */
window.startVoice = function(){
alert("Mic ready (enable HTTPS for real use)");
}

window.openFile = function(){
document.getElementById("fileInput").click();
}

window.upgrade = function(){
window.open("https://ko-fi.com/articalneavy","_blank");
}

});
</script>
