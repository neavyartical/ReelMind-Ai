<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ReelMind AI - Powered by Artical Neavy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ADSENSE -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1714638410489429" crossorigin="anonymous"></script>

<style>
body{
  margin:0;
  background:#0b0f14;
  color:white;
  font-family:Arial;
}

.topbar{
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  padding:10px;
  background:#111;
}

button{
  padding:8px 12px;
  border:none;
  border-radius:20px;
  background:#00ff88;
  cursor:pointer;
}

#chat{
  height:65vh;
  overflow:auto;
  padding:10px;
}

.msg{
  margin:10px;
  padding:12px;
  border-radius:12px;
  max-width:80%;
}

.user{
  background:#1f1f1f;
  margin-left:auto;
}

.ai{
  background:#16212b;
}

img,video{
  width:100%;
  border-radius:10px;
}

#inputArea{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  gap:5px;
  padding:10px;
  background:#111;
}

input{
  flex:1;
  padding:12px;
  border-radius:20px;
  border:none;
}

.footer{
  text-align:center;
  font-size:12px;
  padding:15px;
  background:#111;
}
</style>
</head>

<body>

<div class="topbar">
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
<button onclick="sendText()">Text</button>
<button onclick="generateImage()">Image</button>
<button onclick="generateVideo()">🎥 Video</button>
<button onclick="generateReel()">Reel</button>
<button onclick="dashboard()">Dashboard</button>
<button onclick="downloadLast()">⬇ Download</button>
<button onclick="subscribe()">💰 Upgrade</button>
<button onclick="openPage('about')">About</button>
<button onclick="openPage('privacy')">Privacy</button>
<button onclick="openPage('terms')">Terms</button>
<button onclick="openPage('contact')">Contact</button>
<input type="file" onchange="uploadFile(event)">
</div>

<div id="chat"></div>

<!-- ADS -->
<ins class="adsbygoogle"
style="display:block"
data-ad-client="ca-pub-1714638410489429"
data-ad-slot="1234567890"
data-ad-format="auto"></ins>
<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>

<div id="inputArea">
<input id="prompt" placeholder="Ask anything..." />
<button onclick="sendText()">Send</button>
</div>

<div class="footer">
Powered by Artical Neavy © 2026
</div>

<script>
const API="https://reelmindbackend-1.onrender.com";
const chat=document.getElementById("chat");
let lastOutput="";

// ===== TOKEN =====
function setToken(t){localStorage.setItem("token",t);}
function getToken(){return localStorage.getItem("token");}

// ===== AUTO LOGIN (GUEST) =====
async function ensureLogin(){
  if(!getToken()){
    let r=await fetch(API+"/login",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({email:"guest@user.com"})
    });
    let d=await r.json();
    setToken(d.token);
  }
}

// ===== REGISTER =====
async function register(){
let email=prompt("Email");
let password=prompt("Password");

let r=await fetch(API+"/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email,password})
});
let d=await r.json();

setToken(d.token);
alert("Registered");
}

// ===== LOGIN =====
async function login(){
let email=prompt("Email");
let password=prompt("Password");

let r=await fetch(API+"/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email,password})
});
let d=await r.json();

setToken(d.token);
alert("Logged in");
}

// ===== CHAT TEXT =====
async function sendText(){
await ensureLogin();

let p=prompt.value;
if(!p) return;

addMsg(p,"user");

let box=addMsg("Thinking...","ai");

let r=await fetch(API+"/generate-text",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+getToken()
},
body:JSON.stringify({prompt:p})
});

let d=await r.json();

lastOutput=d.result;
typeEffect(box,d.result);
}

// ===== IMAGE =====
async function generateImage(){
await ensureLogin();

let box=addMsg("Generating image...","ai");

let r=await fetch(API+"/generate-image",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+getToken()
},
body:JSON.stringify({prompt:prompt.value})
});

let d=await r.json();

lastOutput=d.image;

box.innerHTML=`<img src="${d.image}" onerror="this.src='${d.fallback}'">`;
}

// ===== VIDEO =====
async function generateVideo(){
await ensureLogin();

let box=addMsg("Generating video...","ai");

let r=await fetch(API+"/generate-video",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+getToken()
},
body:JSON.stringify({prompt:prompt.value})
});

let d=await r.json();

lastOutput=d.video;

box.innerHTML=`<video controls src="${d.video}"></video>`;
}

// ===== REEL =====
async function generateReel(){
await ensureLogin();

let box=addMsg("Creating reel...","ai");

let r=await fetch(API+"/generate-reel",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+getToken()
},
body:JSON.stringify({prompt:prompt.value})
});

let d=await r.json();

lastOutput=d.result;

typeEffect(box,d.result);
}

// ===== DASHBOARD =====
async function dashboard(){
await ensureLogin();

let r=await fetch(API+"/dashboard",{
headers:{"Authorization":"Bearer "+getToken()}
});
let d=await r.json();

chat.innerHTML=`<div class="msg ai">
Credits: ${d.credits}<br>
Premium: ${d.premium}<br>
Earnings: $${d.earnings}
</div>`;
}

// ===== DOWNLOAD =====
function downloadLast(){
if(!lastOutput) return alert("Nothing to download");

let a=document.createElement("a");
a.href=lastOutput;
a.download="reelmind_output";
a.click();
}

// ===== FILE UPLOAD =====
function uploadFile(e){
let file=e.target.files[0];
addMsg("Uploaded: "+file.name,"user");
}

// ===== HELPERS =====
function addMsg(text,type){
let d=document.createElement("div");
d.className="msg "+type;
d.innerText=text;
chat.appendChild(d);
return d;
}

// ===== TYPE EFFECT =====
function typeEffect(el,text){
let i=0;
el.innerHTML="";
function t(){
if(i<text.length){
el.innerHTML+=text.charAt(i);
i++;
setTimeout(t,5);
}
}
t();
}

// ===== PAGES =====
function openPage(p){
const pages={
about:"ReelMind AI combines ChatGPT, Google & AI tools.",
privacy:"We respect your privacy.",
terms:"Use responsibly.",
contact:"Email: neavyartical@gmail.com"
};
chat.innerHTML=`<div class="msg ai">${pages[p]}</div>`;
}

// ===== PAYMENT =====
function subscribe(){
window.open("https://ko-fi.com/articalneavy");
}
</script>

</body>
</html>
