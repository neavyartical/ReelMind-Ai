<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ReelMind AI</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

header {
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#020617;
}

h1 {
  color:#38bdf8;
}

#auth {
  display:flex;
  gap:10px;
}

input, button {
  padding:10px;
  border-radius:8px;
  border:none;
}

button {
  background:#38bdf8;
  cursor:pointer;
}

#chat {
  height:60vh;
  overflow-y:auto;
  padding:15px;
}

.message {
  margin:10px 0;
  padding:12px;
  border-radius:10px;
  max-width:75%;
}

.user {
  background:#38bdf8;
  color:black;
  margin-left:auto;
}

.bot {
  background:#1e293b;
}

#inputArea {
  display:flex;
  gap:10px;
  padding:10px;
  background:#020617;
}

video {
  width:100%;
  border-radius:10px;
  margin-top:10px;
}

footer {
  text-align:center;
  padding:10px;
  font-size:12px;
  opacity:0.6;
}
</style>
</head>

<body>

<header>
  <h1>ReelMind AI 🧠⚡</h1>

  <div id="auth">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>
  </div>
</header>

<div id="chat"></div>

<div id="inputArea">
  <input id="prompt" placeholder="Ask or generate video...">
  <button onclick="generate()">Generate</button>
</div>

<footer>
  Powered by Artical Neavy 🚀
</footer>

<script>
const BACKEND = "https://reelmindbackend-1.onrender.com";

let user = null;

// 💾 SIMPLE AUTH (local)
function register() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  localStorage.setItem(email, password);
  alert("Registered!");
}

function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (localStorage.getItem(email) === password) {
    user = email;
    alert("Logged in!");
  } else {
    alert("Wrong login");
  }
}

// 💬 CHAT UI
function addMessage(text, type) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "message " + type;
  div.innerHTML = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

// 🎬 VIDEO GENERATION (mock for now)
function generateVideo(prompt) {
  const videoURL = "https://samplelib.com/lib/preview/mp4/sample-5s.mp4";

  return `
    <video controls autoplay>
      <source src="${videoURL}" type="video/mp4">
    </video>
    <p>🎬 Video idea: ${prompt}</p>
  `;
}

// ⚡ GENERATE
function generate() {
  const input = document.getElementById("prompt");
  const prompt = input.value.trim();

  if (!prompt) return;

  if (!user) {
    alert("Please login first 🔐");
    return;
  }

  addMessage(prompt, "user");
  input.value = "";

  const botMsg = addMessage("⚡ Generating...", "bot");

  // 🎬 VIDEO MODE
  if (prompt.toLowerCase().includes("video")) {
    setTimeout(() => {
      botMsg.innerHTML = generateVideo(prompt);
    }, 1000);
    return;
  }

  // 🧠 AI TEXT
  fetch(BACKEND + "/generate", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ prompt })
  })
  .then(res => res.json())
  .then(data => {
    botMsg.innerHTML = data.result;
  })
  .catch(() => {
    botMsg.innerHTML = "Error";
  });
}

// ENTER KEY
document.getElementById("prompt").addEventListener("keypress", e => {
  if (e.key === "Enter") generate();
});
</script>

</body>
</html>
