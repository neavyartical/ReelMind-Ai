<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReelMind AI</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  color:white;
  text-align:center;
  background:linear-gradient(135deg,#0f2027,#2c5364,#1c92d2);
  background-size:400% 400%;
  animation:water 12s infinite ease-in-out;
}

@keyframes water{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* LOGIN */
#loginBox{
  margin-top:100px;
}

/* APP */
#app{display:none}

/* CUBE */
.scene{
  width:260px;
  height:260px;
  margin:40px auto;
  perspective:900px;
}

.cube{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  animation:spin 12s infinite linear;
}

@keyframes spin{
  from{transform:rotateX(0deg) rotateY(0deg);}
  to{transform:rotateX(360deg) rotateY(360deg);}
}

.face{
  position:absolute;
  width:260px;
  height:260px;
  background:rgba(255,255,255,0.1);
  border-radius:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  backdrop-filter:blur(10px);
}

.front{ transform:rotateY(0deg) translateZ(130px);}
.back{ transform:rotateY(180deg) translateZ(130px);}
.right{ transform:rotateY(90deg) translateZ(130px);}
.left{ transform:rotateY(-90deg) translateZ(130px);}
.top{ transform:rotateX(90deg) translateZ(130px);}
.bottom{ transform:rotateX(-90deg) translateZ(130px);}

input{
  padding:10px;
  width:75%;
  border-radius:10px;
  border:none;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#00c6ff;
  color:white;
  margin:5px;
}

#output{
  margin:20px;
  min-height:100px;
}

/* PREMIUM BOX */
.premium{
  background:rgba(255,255,255,0.1);
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <h2>🔐 Login</h2>
  <input id="user" placeholder="Username"><br>
  <input id="pass" type="password" placeholder="Password"><br>
  <button onclick="login()">Enter</button>
</div>

<!-- APP -->
<div id="app">
<h2>🌊 ReelMind AI</h2>
<p>Powered by Artical Neavy</p>

<div class="scene">
  <div class="cube">

    <div class="face front" onclick="select('chat')">Chat</div>
    <div class="face back" onclick="select('story')">Story</div>
    <div class="face right" onclick="select('image')">Image</div>
    <div class="face left" onclick="select('video')">Video</div>
    <div class="face top" onclick="select('music')">Music</div>
    <div class="face bottom" onclick="select('money')">Money</div>

  </div>
</div>

<input id="prompt" placeholder="Enter idea"><br>
<button onclick="generate()">Generate</button>
<button onclick="download()">Download</button>

<div id="output"></div>

<div class="premium">
  <p>💎 Premium</p>
  <button onclick="unlock()">Unlock</button>
</div>

</div>

<script>
let mode="chat";
let premium=false;

// LOGIN (LOCAL)
function login(){
  let u=document.getElementById("user").value;
  let p=document.getElementById("pass").value;

  if(u && p){
    localStorage.setItem("user",u);
    document.getElementById("loginBox").style.display="none";
    document.getElementById("app").style.display="block";
  } else {
    alert("Enter details");
  }
}

// SELECT MODE
function select(m){
  mode=m;
}

// GENERATE (WORKS OFFLINE)
function generate(){
  let prompt=document.getElementById("prompt").value;

  if(!prompt){
    alert("Enter something");
    return;
  }

  // IMAGE
  if(mode==="image"){
    document.getElementById("output").innerHTML =
      `<img src="https://image.pollinations.ai/prompt/${prompt}" width="250">`;
    return;
  }

  // VIDEO LOCK
  if(mode==="video" && !premium){
    document.getElementById("output").innerText =
      "🔒 Premium only video feature";
    return;
  }

  // FAKE AI (OFFLINE)
  document.getElementById("output").innerText =
    "🤖 AI says: " + prompt + " is a powerful idea!";
}

// DOWNLOAD
function download(){
  let text=document.getElementById("output").innerText;

  let blob=new Blob([text],{type:"text/plain"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="reelmind.txt";
  a.click();
}

// PREMIUM
function unlock(){
  let code=prompt("Enter code:");

  if(code==="NEAVY"){
    premium=true;
    alert("Premium unlocked");
  } else {
    alert("Wrong code");
  }
}
</script>

</body>
</html>
