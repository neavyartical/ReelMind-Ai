<!DOCTYPE html>
<html lang="en">
<head>
  <title>ReelMind AI | Global</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1714638410489429" crossorigin="anonymous"></script>

  <style>
    :root {
      --primary: #00ffc3;
      --bg-dark: #0a0a0a;
      --user-msg: #1f1f1f;
      --ai-msg: #2b2b2b;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: white;
      background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('logo.png') center/cover no-repeat fixed;
      background-color: var(--bg-dark);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    #nav {
      background: rgba(0,0,0,0.95);
      padding: 15px;
      text-align: center;
      font-weight: bold;
      border-bottom: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #nav a { color: var(--primary); margin: 0 10px; text-decoration: none; font-size: 14px; }
    #nav .logo { color: white; font-size: 1.2rem; letter-spacing: 1px; }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      scroll-behavior: smooth;
    }

    .msg {
      padding: 14px;
      margin: 8px 0;
      border-radius: 15px;
      max-width: 80%;
      line-height: 1.5;
      word-wrap: break-word;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .user { background: var(--user-msg); align-self: flex-end; border-bottom-right-radius: 2px; }
    .ai { background: var(--ai-msg); align-self: flex-start; border-bottom-left-radius: 2px; }

    .gen-image {
      width: 100%;
      max-width: 500px;
      border-radius: 12px;
      margin-top: 10px;
      border: 1px solid var(--primary);
    }

    #inputArea {
      background: #111;
      padding: 15px;
      display: flex;
      gap: 10px;
      border-top: 1px solid #222;
    }

    input {
      flex: 1;
      padding: 12px 20px;
      border-radius: 25px;
      border: 1px solid #333;
      background: #000;
      color: white;
      outline: none;
    }

    input:focus { border-color: var(--primary); }

    button {
      background: var(--primary);
      color: black;
      border: none;
      padding: 10px 20px;
      border-radius: 25px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .loader {
      border: 3px solid #333;
      border-top: 3px solid var(--primary);
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      margin: 10px;
    }

    @keyframes spin { 100% { transform: rotate(360deg); } }

    footer { text-align: center; padding: 10px; font-size: 11px; color: gray; background: #000; }
  </style>
</head>
<body>

<div id="nav">
  <div class="logo">REELMIND <span style="color:var(--primary)">AI</span></div>
  <div>
    <a href="#">Blog</a>
    <a href="#">Privacy</a>
    <span id="creditDisplay" style="color: #888; font-size: 12px; margin-left: 10px;">Credits: --</span>
  </div>
</div>

<div id="chat">
  <div class="msg ai">Welcome to ReelMind AI Global. How can I help you create today?</div>
</div>

<div style="text-align:center; background: #0a0a0a;">
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-1714638410489429"
       data-ad-slot="1234567890"
       data-ad-format="auto"></ins>
</div>

<div id="inputArea">
  <button onclick="document.getElementById('fileInput').click()" title="Upload File">📎</button>
  <input id="userInput" placeholder="Ask anything or 'Draw a futuristic city'..." autocomplete="off" />
  <button id="sendBtn" onclick="sendPrompt()">Send</button>
</div>

<input type="file" id="fileInput" hidden />

<footer>Powered by Artical Neavy ⚡</footer>

<script>
const BASE_URL = "https://reelmindbackend-1.onrender.com";

// --- AUTHENTICATION CHECK ---
let token = localStorage.getItem("token");

async function autoLogin() {
  if (!token) {
    const email = prompt("Enter email to start:");
    if (!email) return;
    
    try {
      const res = await fetch(`${BASE_URL}/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email })
      });
      const data = await res.json();
      token = data.token;
      localStorage.setItem("token", token);
      updateCreditUI(data.user.credits);
    } catch (e) {
      console.error("Login failed");
    }
  }
}

autoLogin();

function updateCreditUI(count) {
  document.getElementById("creditDisplay").innerText = `Credits: ${count}`;
}

// --- CORE CHAT LOGIC ---
async function sendPrompt() {
  const inputField = document.getElementById("userInput");
  const chat = document.getElementById("chat");
  const btn = document.getElementById("sendBtn");
  const promptText = inputField.value.trim();

  if (!promptText || !token) return;

  // UI Setup
  btn.disabled = true;
  chat.innerHTML += `<div class="msg user">${promptText}</div>`;
  const loader = document.createElement("div");
  loader.className = "loader";
  chat.appendChild(loader);
  scrollDown();
  inputField.value = "";

  try {
    const isImage = promptText.toLowerCase().match(/(draw|generate image|create image|picture of)/);
    const endpoint = isImage ? "/generate-image" : "/generate-text";

    const res = await fetch(BASE_URL + endpoint, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${token}`
      },
      body: JSON.stringify({ prompt: promptText })
    });

    const data = await res.json();
    loader.remove();

    if (data.error) {
      chat.innerHTML += `<div class="msg ai" style="color:#ff4d4d">⚠️ ${data.error}</div>`;
      return;
    }

    if (isImage) {
      chat.innerHTML += `
        <div class="msg ai">
          <img src="${data.image}" class="gen-image" onload="scrollDown()">
          <br><a href="${data.image}" target="_blank" style="color:var(--primary); font-size:12px; text-decoration:none;">⬇ Open High Res</a>
        </div>`;
    } else {
      const reply = data.result || "No response received.";
      chat.innerHTML += `<div class="msg ai">${reply.replace(/\n/g, '<br>')}</div>`;
    }

    if (data.credits !== undefined) updateCreditUI(data.credits);

  } catch (err) {
    if (loader) loader.remove();
    chat.innerHTML += `<div class="msg ai" style="color:#ff4d4d">⚠️ Connection Error. Ensure backend is running.</div>`;
  }

  btn.disabled = false;
  scrollDown();
}

// --- UTILITIES ---
function scrollDown() {
  const chat = document.getElementById("chat");
  chat.scrollTop = chat.scrollHeight;
}

document.getElementById("userInput").addEventListener("keypress", (e) => {
  if (e.key === "Enter") sendPrompt();
});

// File input visual feedback
document.getElementById("fileInput").addEventListener("change", function() {
  if (this.files[0]) {
    chat.innerHTML += `<div class="msg user">📁 Attached: ${this.files[0].name}</div>`;
    scrollDown();
  }
});
</script>

</body>
</html>
