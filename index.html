<!DOCTYPE html>
<html>
<head>
<title>ReelMind AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:Arial;
  color:white;
  background: radial-gradient(circle, #0f2027, #000);
}

#nav {
  background:#000;
  padding:10px;
  text-align:center;
}

#chat {
  height:60vh;
  overflow:auto;
  padding:10px;
}

.msg { padding:10px; margin:10px; border-radius:10px; }
.user { background:#222; text-align:right; }
.ai { background:#333; }

#inputArea {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
}

input { flex:1; padding:10px; }
button { padding:10px; }
</style>
</head>

<body>

<div id="nav">
ReelMind AI 🚀 | Status: <span id="status">Connecting...</span>
</div>

<div id="chat"></div>

<div style="text-align:center;">
<button onclick="mode='text'">AI</button>
<button onclick="mode='image'">Image</button>
<button onclick="mode='reel'">Reel</button>
</div>

<div id="inputArea">
<input id="input" placeholder="Type..." />
<button onclick="send()">Send</button>
</div>

<script>
const BASE="https://reelmindbackend-1.onrender.com";

let TOKEN = localStorage.getItem("token");
let mode="text";

// ===== AUTO LOGIN =====
async function login(){
  if(TOKEN) return;

  const res = await fetch(BASE+"/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email:"user"+Date.now()+"@ai.com"})
  });

  const data = await res.json();
  TOKEN = data.token;
  localStorage.setItem("token", TOKEN);
}

login();

// ===== CHECK SERVER =====
fetch(BASE)
.then(()=>status.innerText="Online ✅")
.catch(()=>status.innerText="Offline ❌");

// ===== SEND =====
async function send(){
  const text = input.value;
  if(!text) return;

  chat.innerHTML += `<div class="msg user">${text}</div>`;

  let url="";
  if(mode==="text") url="/generate-text";
  if(mode==="image") url="/generate-image";
  if(mode==="reel") url="/viral-reel";

  try{
    const res = await fetch(BASE+url,{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+TOKEN
      },
      body:JSON.stringify({prompt:text})
    });

    const data = await res.json();

    if(mode==="image"){
      chat.innerHTML += `<div class="msg ai"><img src="${data.image}" width="100%"></div>`;
    } else {
      const reply = data?.choices?.[0]?.message?.content || "Error";
      chat.innerHTML += `<div class="msg ai">${reply}</div>`;
    }

  } catch {
    chat.innerHTML += `<div class="msg ai">⚠️ Error</div>`;
  }

  input.value="";
}
</script>

</body>
</html>
