<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ReelMind AI</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(180deg, #0f0c29, #302b63, #24243e);
  color: white;
}

/* HEADER */
.header {
  text-align: center;
  padding: 20px;
  font-size: 24px;
  font-weight: bold;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 15px;
  padding: 20px;
}

/* CARDS */
.card {
  background: rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 20px;
  text-align: center;
  backdrop-filter: blur(10px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  cursor: pointer;
  transition: 0.3s;
  animation: float 3s ease-in-out infinite;
}

.card:hover {
  transform: scale(1.08);
}

/* FLOAT ANIMATION */
@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-6px); }
  100% { transform: translateY(0px); }
}

/* RESULT BOX */
#result {
  margin: 20px;
  padding: 20px;
  border-radius: 20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  min-height: 120px;
  white-space: pre-wrap;
}

/* INPUT AREA */
.input-box {
  display: flex;
  padding: 15px;
  gap: 10px;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 20px;
  border: none;
  outline: none;
}

button {
  padding: 12px 16px;
  border-radius: 20px;
  border: none;
  background: linear-gradient(135deg,#ff4ecd,#7a5cff);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

</style>
</head>

<body>

<div class="header">🚀 ReelMind AI</div>

<div class="grid">
  <div class="card" onclick="setMode('chat')">💬 Chat</div>
  <div class="card" onclick="setMode('story')">📖 Story</div>
  <div class="card" onclick="setMode('image')">🖼 Image</div>
  <div class="card" onclick="setMode('video')">🎬 Video</div>
  <div class="card" onclick="setMode('funny')">😂 Funny</div>
  <div class="card" onclick="setMode('sad')">💔 Sad</div>
  <div class="card" onclick="setMode('anime')">🔥 Anime</div>
  <div class="card" onclick="setMode('money')">💰 Money</div>
  <div class="card" onclick="setMode('tiktok')">🚀 TikTok</div>
</div>

<div id="result">✨ Tap a feature, then type below 👇</div>

<div class="input-box">
  <input id="input" placeholder="Type your idea..." />
  <button onclick="send()">➤</button>
</div>

<script>
const API_URL = "https://reelmindbackend-1.onrender.com/generate";

let currentMode = "chat";

// select mode
function setMode(mode){
  currentMode = mode;
  document.getElementById("result").innerText = "✏️ " + mode.toUpperCase() + " mode selected. Type below 👇";
}

// send request
async function send(){
  const text = document.getElementById("input").value;
  if(!text) return;

  document.getElementById("result").innerText = "⏳ Thinking...";

  try{
    let res = await fetch(API_URL,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ prompt: text })
    });

    let data = await res.json();

    let output = "";

    if(currentMode === "story") output = "📖 STORY:\n\n" + data.result;
    else if(currentMode === "funny") output = "😂 FUNNY:\n\n" + data.result;
    else if(currentMode === "sad") output = "💔 SAD:\n\n" + data.result;
    else if(currentMode === "anime") output = "🔥 ANIME:\n\n" + data.result;
    else if(currentMode === "money") output = "💰 MONEY:\n\n" + data.result;
    else if(currentMode === "tiktok") output = "🚀 TIKTOK:\n\n" + data.result;
    else if(currentMode === "video") output = "🎬 VIDEO:\n\n" + data.result;
    else if(currentMode === "image") output = "🖼 IMAGE:\n\n" + data.result;
    else output = "💬 CHAT:\n\n" + data.result;

    document.getElementById("result").innerText = output;

  }catch(e){
    document.getElementById("result").innerText = "❌ Error connecting to server";
  }
}
</script>

</body>
</html>
