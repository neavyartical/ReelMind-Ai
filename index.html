<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ReelMind Global</title>

<style>
body {
  font-family: Arial;
  background: #0f0f0f;
  color: white;
  text-align: center;
}

h1 {
  color: #00ff88;
}

input {
  width: 80%;
  padding: 12px;
  border-radius: 10px;
  border: none;
}

button {
  padding: 12px 25px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: #00ff88;
  font-weight: bold;
  cursor: pointer;
}

.section {
  margin-top: 30px;
  padding: 15px;
  background: #1a1a1a;
  border-radius: 10px;
}

img {
  width: 100%;
  border-radius: 10px;
}

video {
  width: 100%;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>🧠 ReelMind Global</h1>

<input id="prompt" placeholder="Enter your idea...">
<br>
<button onclick="generate()">Generate</button>

<div class="section">
  <h2>✍️ Story</h2>
  <p id="story">...</p>
</div>

<div class="section">
  <h2>🖼 Image</h2>
  <img id="image" />
</div>

<div class="section">
  <h2>🎬 Video</h2>
  <video id="video" controls></video>
</div>

<script>
const BASE_URL = "https://reelmindbackend-1.onrender.com";

async function generate() {
  const prompt = document.getElementById("prompt").value;

  // Reset UI
  document.getElementById("story").innerText = "Loading...";
  document.getElementById("image").src = "";
  
  const videoEl = document.getElementById("video");
  videoEl.pause();
  videoEl.src = "";
  videoEl.load();

  try {
    // STORY
    const storyRes = await fetch(BASE_URL + "/api/story", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ prompt })
    });

    const storyData = await storyRes.json();
    document.getElementById("story").innerText = storyData.story;

    // IMAGE
    const imgRes = await fetch(BASE_URL + "/api/image", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ prompt })
    });

    const imgData = await imgRes.json();
    document.getElementById("image").src = imgData.image;

    // VIDEO
    const vidRes = await fetch(BASE_URL + "/api/video", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ prompt })
    });

    const vidData = await vidRes.json();

    videoEl.src = vidData.video;
    videoEl.controls = true;

  } catch (err) {
    document.getElementById("story").innerText = "❌ Error connecting to AI";
  }
}
</script>

</body>
</html>
