<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ReelMind AI - Powered by Artical Neavy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;background:#0b0f14;color:white;font-family:Arial;overflow:hidden}
#chat{position:absolute;top:0;bottom:90px;width:100%;overflow:auto;padding:10px}
.msg{margin:10px;padding:12px;border-radius:12px;max-width:80%}
.user{background:#1f1f1f;margin-left:auto}
.ai{background:#16212b}
img,video{width:100%;border-radius:10px}
#inputArea{position:fixed;bottom:0;width:100%;display:flex;padding:10px;background:#111}
input{flex:1;padding:12px;border-radius:25px;border:none}

/* Buttons */
#uploadBtn,#micBtn{
position:fixed;bottom:100px;width:55px;height:55px;border-radius:50%;
display:flex;align-items:center;justify-content:center;font-size:22px
}
#uploadBtn{left:15px;background:#00ff88}
#micBtn{right:15px;background:#00ccff}

/* Core */
#core{
position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
width:130px;height:130px;border-radius:20px;
background:rgba(0,255,255,0.1);
box-shadow:0 0 40px cyan;
display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
animation:glow 2s infinite alternate;
}
@keyframes glow{from{box-shadow:0 0 20px cyan}to{box-shadow:0 0 60px cyan}}
.coreBtn{font-size:12px;padding:5px 8px;border:none;border-radius:10px;background:#00ff88}
</style>
</head>

<body>

<div id="chat"></div>

<div id="core">
<button class="coreBtn" onclick="sendText()">Text</button>
<button class="coreBtn" onclick="generateImage()">Image</button>
<button class="coreBtn" onclick="generateVideo()">Video</button>
<button class="coreBtn" onclick="generateReel()">Reel</button>
<button class="coreBtn" onclick="downloadLast()">⬇</button>
</div>

<div id="uploadBtn" onclick="fileInput.click()">+</div>
<input type="file" id="fileInput" hidden onchange="uploadFile(event)">

<div id="micBtn" onclick="startVoice()">🎤</div>

<div id="inputArea">
<input id="prompt" placeholder="Ask anything..." />
<button onclick="sendText()">Send</button>
</div>

<script>
const API="https://reelmindbackend-1.onrender.com";
const chat=document.getElementById("chat");
let lastOutput="";

// ===== TOKEN =====
function setToken(t){localStorage.setItem("token",t);}
function getToken(){return localStorage.getItem("token");}

// AUTO LOGIN
async function ensureLogin(){
if(!getToken()){
let r=await fetch(API+"/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email:"guest@user.com"})
});
let d=await r.json();
setToken(d.data.token);
}
}

// ===== HELPERS =====
function addMsg(text,type){
let d=document.createElement("div");
d.className="msg "+type;
d.innerText=text;
chat.appendChild(d);
return d;
}

function type(el,text){
let i=0;el.innerHTML="";
(function t(){if(i<text.length){el.innerHTML+=text[i++];setTimeout(t,4)}})();
}

function handleError(d){
if(d.status==="error"){
alert(d.message);
return true;
}
return false;
}

// ===== TEXT =====
async function sendText(){
await ensureLogin();

let p=prompt.value.trim();
if(!p) return;

addMsg(p,"user");
let box=addMsg("⚡ Thinking...","ai");

let r=await fetch(API+"/generate-text",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+getToken()
},
body:JSON.stringify({
prompt:`Answer clearly and accurately:\n${p}`
})
});

let d=await r.json();
if(handleError(d)) return;

let result=d.data.content;
lastOutput=result;

type(box,result);
}

// ===== IMAGE =====
async function generateImage(){
await ensureLogin();

let box=addMsg("🎨 Generating image...","ai");

let r=await fetch(API+"/generate-image",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+getToken()
},
body:JSON.stringify({
prompt: prompt.value + ", ultra realistic, cinematic, 4k"
})
});

let d=await r.json();
if(handleError(d)) return;

let url=d.data.url;
lastOutput=url;

box.innerHTML=`<img src="${url}" onerror="this.src='https://picsum.photos/800?random=${Math.random()}'">`;
}

// ===== VIDEO =====
async function generateVideo(){
await ensureLogin();

let box=addMsg("🎥 Generating video...","ai");

let r=await fetch(API+"/generate-video",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+getToken()
},
body:JSON.stringify({prompt:prompt.value})
});

let d=await r.json();
if(handleError(d)) return;

let url=d.data.url;
lastOutput=url;

box.innerHTML=`<video controls src="${url}"></video>`;
}

// ===== REEL =====
async function generateReel(){
await ensureLogin();

let box=addMsg("🔥 Creating reel...","ai");

let r=await fetch(API+"/generate-reel",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+getToken()
},
body:JSON.stringify({prompt:prompt.value})
});

let d=await r.json();
if(handleError(d)) return;

let result=d.data.content;
lastOutput=result;

type(box,result);
}

// ===== DOWNLOAD =====
function downloadLast(){
if(!lastOutput) return alert("Nothing to download");

let a=document.createElement("a");
a.href=lastOutput.startsWith("http") ? lastOutput : 
"data:text/plain;charset=utf-8,"+encodeURIComponent(lastOutput);
a.download="reelmind_output";
a.click();
}

// ===== UPLOAD =====
function uploadFile(e){
let file=e.target.files[0];
addMsg("📁 "+file.name,"user");
}

// ===== VOICE =====
function startVoice(){
if(!('webkitSpeechRecognition' in window)){
alert("Voice not supported");return;
}
let rec=new webkitSpeechRecognition();
rec.lang="en-US";
rec.onresult=e=>{prompt.value=e.results[0][0].transcript};
rec.start();
}
</script>

</body>
</html>
