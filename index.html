<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ReelMind AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- BACKGROUND -->
  <div class="overlay"></div>

  <!-- APP -->
  <div class="app">

    <!-- LOGO -->
    <div class="logo">
      <h1>ReelMind <span>AI</span></h1>
    </div>

    <!-- POWERED -->
    <p class="powered">Powered by Artical Neavy</p>

    <!-- AUTH (LOGIN / REGISTER) -->
    <div class="auth">
      <input id="email" placeholder="Email">
      <input id="password" type="password" placeholder="Password">
      <div class="auth-buttons">
        <button onclick="register()">Register</button>
        <button onclick="login()">Login</button>
      </div>
    </div>

    <!-- INPUT -->
    <textarea id="prompt" placeholder="Enter your idea..."></textarea>

    <!-- MAIN GENERATE -->
    <button id="generateBtn" onclick="generate('all')">✨ Generate</button>

    <!-- GRID ACTIONS -->
    <div class="grid">
      <button onclick="generate('story')">📖 Story</button>
      <button onclick="generate('image')">🖼 Image</button>
      <button onclick="generate('video')">🎬 Video</button>
      <button onclick="askAI()">🌍 Ask AI</button>
    </div>

    <!-- LOADING -->
    <p id="loading" style="display:none;">⏳ Generating...</p>

    <!-- RESULT -->
    <div id="result"></div>

    <!-- DOWNLOAD -->
    <button id="downloadBtn" onclick="downloadResult()">⬇ Download</button>

  </div>

  <script src="script.js"></script>
</body>
</html>
