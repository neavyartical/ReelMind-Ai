<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 💰 ADSENSE -->
  <script async 
    src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-xxxxxxxxxxxx"
    crossorigin="anonymous"></script>

  <!-- 💳 STRIPE -->
  <script src="https://js.stripe.com/v3/"></script>

  <style>
    body {
      margin:0;
      background: linear-gradient(135deg,#0a0a0a,#111);
      color:white;
      font-family:Arial;
      text-align:center;
    }

    h1 {
      text-shadow:0 0 20px cyan;
    }

    .glass {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 15px;
      margin: 10px;
    }

    input, textarea {
      width:90%;
      padding:12px;
      margin:10px;
      border-radius:10px;
      border:none;
    }

    #chat {
      height:350px;
      overflow-y:auto;
      text-align:left;
    }

    .msg {
      padding:10px;
      margin:8px;
      border-radius:12px;
      max-width:80%;
    }

    .user { background:#222; margin-left:auto; }
    .ai { background:rgba(0,255,255,0.1); }

    #generateBtn {
      width:80px;
      height:80px;
      border-radius:50%;
      font-size:30px;
      background:cyan;
      border:none;
      box-shadow:0 0 20px cyan;
      margin:20px auto;
      display:block;
    }

    button {
      padding:10px;
      margin:5px;
      border-radius:10px;
      border:none;
      background:cyan;
      color:black;
      cursor:pointer;
    }

    video,img {
      width:100%;
      border-radius:10px;
      margin-top:10px;
    }

    footer {
      font-size:12px;
      opacity:0.7;
    }
  </style>
</head>

<body>

<h1>💎 ReelMind AI</h1>

<!-- 💰 TOP AD -->
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-xxxxxxxxxxxx"
     data-ad-slot="1111111111"
     data-ad-format="auto"></ins>
<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>

<div class="glass">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<div class="glass" id="chat"></div>

<textarea id="prompt" placeholder="Ask anything..."></textarea>

<!-- 🧊 MAIN BUTTON -->
<button id="generateBtn" onclick="generate()">🧊</button>

<button onclick="generateImage()">🖼️ Image</button>
<button onclick="generateVideo()">🎬 Video</button>

<input type="file" id="fileInput">
<button onclick="upload()">📤 Upload</button>

<!-- 💳 SUBSCRIPTION -->
<div class="glass">
  <h3>🔥 Upgrade to PRO</h3>
  <button onclick="subscribe()">💳 Subscribe</button>
</div>

<!-- 💰 MID AD -->
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-xxxxxxxxxxxx"
     data-ad-slot="2222222222"
     data-ad-format="auto"></ins>
<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>

<footer>
Powered by <b>Artical Neavy</b> 🧠  
<br>
<a href="/terms" style="color:cyan;">Terms</a>
</footer>

<script>
const API = "https://reelmindbackend-1.onrender.com";
let token = localStorage.getItem("token") || "";

// ================= AUTH =================

async function register(){
  const res = await fetch(API+"/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:email.value,
      password:password.value
    })
  });
  alert((await res.json()).msg);
}

async function login(){
  const res = await fetch(API+"/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:email.value,
      password:password.value
    })
  });

  const data = await res.json();
  token = data.token;
  localStorage.setItem("token", token);
  alert("Logged in");
}

// ================= CHAT =================

function addMessage(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  chat.appendChild(div);
  chat.scrollTop=999999;
}

// ================= AI =================

async function generate(){
  const text = prompt.value.trim();
  if(!text){ alert("Enter something"); return; }

  addMessage(text,"user");

  const res = await fetch(API+"/generate",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({prompt:text})
  });

  const data = await res.json();
  addMessage(data.result,"ai");
}

// ================= IMAGE =================

async function generateImage(){
  const res = await fetch(API+"/image",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({prompt:prompt.value})
  });

  const data = await res.json();

  const img=document.createElement("img");
  img.src=data.image;
  chat.appendChild(img);
}

// ================= VIDEO =================

async function generateVideo(){
  const res = await fetch(API+"/video",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({prompt:prompt.value})
  });

  const data = await res.json();

  const vid=document.createElement("video");
  vid.src=data.video;
  vid.controls=true;
  chat.appendChild(vid);
}

// ================= UPLOAD =================

function upload(){
  const file=fileInput.files[0];
  if(!file){alert("Select file");return;}
  addMessage("📤 "+file.name,"user");
}

// ================= 💳 STRIPE =================

function subscribe(){
  alert("Connect Stripe backend to activate payments");
}
</script>

</body>
</html>
