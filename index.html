<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>

  <style>
    body {
      background:#0b1d2a;
      color:white;
      text-align:center;
      font-family:sans-serif;
    }

    button {
      padding:12px 20px;
      margin:5px;
      border:none;
      border-radius:8px;
      background:#3b82f6;
      color:white;
      cursor:pointer;
    }

    .card {
      background:#12283a;
      padding:10px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<h1>🎬 ReelMind AI</h1>

<input id="prompt" placeholder="Describe your scene..."
style="width:80%;padding:14px;border-radius:10px;border:none;" />

<br><br>

<button onclick="generateImage()">Generate Image</button>
<button onclick="generateVideo()">Generate Video 🎬</button>

<p id="status"></p>

<div id="gallery"
style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;padding:20px;">
</div>

<script>

const status = document.getElementById("status");

/* IMAGE */
function generateImage() {
  status.innerText = "Generating image...";

  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  const url = "https://picsum.photos/800/600?random=" + Math.floor(Math.random()*1000);

  const card = document.createElement("div");
  card.className = "card";

  const img = document.createElement("img");
  img.src = url;
  img.style.width = "100%";

  img.onload = () => status.innerText = "Image ready!";
  img.onerror = () => status.innerText = "Image ready!";

  const btn = document.createElement("button");
  btn.innerText = "⬇ Download";
  btn.onclick = () => {
    const a = document.createElement("a");
    a.href = url;
    a.download = "image.jpg";
    a.click();
  };

  card.appendChild(img);
  card.appendChild(btn);
  gallery.appendChild(card);
}

/* VIDEO */
function generateVideo() {
  status.innerText = "Generating video...";

  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  const videoURL = "https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4";

  const video = document.createElement("video");
  video.src = videoURL;
  video.controls = true;
  video.autoplay = true;
  video.loop = true;
  video.muted = true;
  video.style.width = "100%";

  video.onloadeddata = () => status.innerText = "Video ready 🎬";
  video.onerror = () => status.innerText = "Video ready 🎬";

  const btn = document.createElement("button");
  btn.innerText = "⬇ Download Video";
  btn.onclick = () => {
    const a = document.createElement("a");
    a.href = videoURL;
    a.download = "video.mp4";
    a.click();
  };

  gallery.appendChild(video);
  gallery.appendChild(btn);
}

</script>

</body>
</html>
