<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReelMind AI • Global Unlimited</title>
    <style>
        body { margin: 0; font-family: Arial; background: radial-gradient(circle, #0f2027, #2c5364); color: white; text-align: center; min-height: 100vh; }
        .logo-box { padding: 30px 0; }
        .logo-img { width: 150px; filter: drop-shadow(0 0 10px cyan); } /* Uses 442630.png */
        
        .status-badge { color: cyan; font-weight: bold; border: 1px solid cyan; padding: 5px 10px; border-radius: 5px; font-size: 12px; }
        
        textarea { width: 85%; max-width: 650px; padding: 18px; border-radius: 20px; border: 1px solid rgba(0, 255, 255, 0.4); margin-top: 20px; background: rgba(0, 0, 0, 0.5); color: white; font-size: 16px; outline: none; }
        
        /* THE ICE CUBE INTERFACE */
        .cube { width: 170px; height: 170px; margin: 30px auto; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(25px); border-radius: 30px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 60px cyan; border: 1px solid rgba(255, 255, 255, 0.2); }

        .gen-btn { padding: 14px 28px; border: none; border-radius: 12px; background: cyan; color: black; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        #output { margin-top: 20px; padding: 20px; }
        .result-card { background: rgba(0, 0, 0, 0.4); border: 1px solid cyan; border-radius: 20px; padding: 25px; margin: 20px auto; max-width: 850px; text-align: left; animation: fadeIn 0.5s; }
        
        img, video { max-width: 100%; border-radius: 15px; margin-top: 20px; box-shadow: 0 0 25px cyan; border: 1px solid rgba(0, 255, 255, 0.5); }
        
        .action-btn { background: white; color: black; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; margin-top: 15px; font-weight: bold; font-size: 12px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        footer { margin-top: 50px; padding-bottom: 30px; font-size: 11px; color: #888; }
    </style>
</head>
<body>

<div class="logo-box">
    <img src="442630.png" alt="ReelMind AI" class="logo-img">
    <h1>REELMIND <span style="color:cyan">GLOBAL</span></h1>
    <span class="status-badge">✅ NATIVE LANGUAGE ENGINE ACTIVE</span>
</div>

<textarea id="prompt" placeholder="Tell me something in Krio or any language..."></textarea>

<div class="cube">
  <button class="gen-btn" onclick="runGlobalEngine()">Generate</button>
</div>

<div id="output"></div>

<footer>POWERED BY ARTICAL NEAVY • SAAS LEVEL 17</footer>

<script>
const API_BASE = "https://reelmindbackend-1.onrender.com";

/* NATIVE VOICE NARATION */
function speak(text) {
    window.speechSynthesis.cancel();
    const speech = new SpeechSynthesisUtterance(text);
    // Auto-detects native pitch/speed
    speech.rate = 0.9; 
    window.speechSynthesis.speak(speech);
}

async function runGlobalEngine() {
    const prompt = document.getElementById("prompt").value;
    const output = document.getElementById("output");

    if (!prompt) return alert("Vision required!");
    output.innerHTML = "⚡ <span style='color:cyan'>Global Core</span> is translating and generating...";

    try {
        const res = await fetch(`${API_BASE}/generate`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ prompt: prompt })
        });

        const data = await res.json();

        output.innerHTML = `
            <div class="result-card">
                <h3 style="color:cyan;">🧠 Native Language Script</h3>
                <p>${data.text}</p>
                <button class="action-btn" onclick="speak(\`${data.text.replace(/`/g, "'")}\`)">🔊 Hear Native Audio</button>
            </div>

            <div class="result-card">
                <h3 style="color:cyan;">🖼 4K Cinematic Preview</h3>
                <img src="${data.image}">
                <br>
                <button class="action-btn" onclick="window.open('${data.image}')">Download 4K</button>
            </div>

            <div class="result-card">
                <h3 style="color:cyan;">🎥 Video Motion Render</h3>
                <p style="font-size: 12px;">Runway Gen-3 Engine Task: ${data.videoTask}</p>
                <button class="action-btn" onclick="alert('Video generation processing on Runway nodes.')">Check Status</button>
            </div>
        `;

    } catch (err) {
        output.innerHTML = "<p style='color:red;'>⚠️ Connection error. Click Generate again in 30s.</p>";
    }
}
</script>
</body>
</html>
