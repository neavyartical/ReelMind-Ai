<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReelMind AI</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
    text-align: center;
}

/* Background image with glow */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: url("your-image.jpg") center/cover no-repeat;
    opacity: 0.2;
    z-index: -1;
}

/* Input */
input {
    width: 80%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-top: 20px;
}

/* Ice cube */
.cube {
    width: 150px;
    height: 150px;
    margin: 40px auto;
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 0 30px cyan;
}

/* Button */
button {
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    background: cyan;
    cursor: pointer;
}

/* Output */
#output {
    margin-top: 30px;
    padding: 20px;
}
</style>
</head>

<body>

<h1>🧠 ReelMind AI</h1>

<input id="prompt" placeholder="Type anything (image, story, video idea...)">

<div class="cube">
    <button onclick="handleGenerate()">Generate</button>
</div>

<div id="output"></div>

<script>
// 🔑 PUT YOUR OPENROUTER KEY HERE
const OPENROUTER_API_KEY = "YOUR_OPENROUTER_KEY_HERE";

// MAIN FUNCTION
function handleGenerate() {
    const prompt = document.getElementById("prompt").value;
    const output = document.getElementById("output");

    if (!prompt) {
        alert("Enter something!");
        return;
    }

    output.innerHTML = "Generating...";

    // Decide type
    if (prompt.toLowerCase().includes("image")) {
        generateImage(prompt);
    } 
    else if (prompt.toLowerCase().includes("video")) {
        generateVideo(prompt);
    } 
    else {
        generateText(prompt);
    }
}

// ✅ IMAGE (Pollinations)
function generateImage(prompt) {
    const output = document.getElementById("output");

    const imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}`;

    output.innerHTML = `
        <img src="${imageUrl}" style="max-width:90%; border-radius:15px;">
        <br><br>
        <button onclick="downloadImage('${imageUrl}')">Download Image</button>
    `;
}

// ✅ DOWNLOAD
function downloadImage(url) {
    const a = document.createElement("a");
    a.href = url;
    a.download = "reelmind.png";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

// ✅ TEXT (OpenRouter)
async function generateText(prompt) {
    const output = document.getElementById("output");

    try {
        const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
            method: "POST",
            headers: {
                "Authorization": "Bearer " + OPENROUTER_API_KEY,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                model: "openai/gpt-3.5-turbo",
                messages: [
                    { role: "user", content: prompt }
                ]
            })
        });

        const data = await res.json();

        output.innerHTML = `<p>${data.choices[0].message.content}</p>`;
    } catch (err) {
        output.innerHTML = "Error generating text";
    }
}

// ✅ VIDEO (SMART FALLBACK)
function generateVideo(prompt) {
    const output = document.getElementById("output");

    output.innerHTML = `
        <p>⚠️ Real video generation requires paid API.</p>
        <p>Here is a video idea based on your prompt:</p>
    `;

    generateText("Create a short video concept for: " + prompt);
}

</script>

</body>
</html>
