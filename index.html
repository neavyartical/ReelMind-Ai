<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #000;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    h2 {
      margin-bottom: 15px;
    }

    input {
      width: 90%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      margin-bottom: 15px;
    }

    button {
      padding: 14px 25px;
      background: #00c853;
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 16px;
    }

    #videoContainer {
      margin-top: 20px;
      width: 100%;
      height: 400px;
      overflow: hidden;
      border-radius: 15px;
      position: relative;
    }

    #videoContainer img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      animation: zoom 8s infinite alternate;
    }

    @keyframes zoom {
      0% { transform: scale(1); }
      100% { transform: scale(1.2); }
    }

    .loader {
      margin: 20px auto;
      border: 5px solid #333;
      border-top: 5px solid #00e676;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

  <h2>🎬 ReelMind AI (Video Mode)</h2>

  <input id="prompt" placeholder="Describe your scene..." />
  <br>

  <button onclick="generate()">🎥 Generate Video</button>

  <p id="status"></p>
  <div id="videoContainer"></div>

  <script>
    let videoImage = "";

    async function generate() {
      const prompt = document.getElementById("prompt").value;
      const status = document.getElementById("status");
      const container = document.getElementById("videoContainer");

      if (!prompt) {
        status.innerText = "Enter something ⚠️";
        return;
      }

      const enhancedPrompt = prompt + ", ultra realistic, cinematic lighting, 4k, dramatic scene";

      status.innerText = "Generating video... 🎥";
      container.innerHTML = '<div class="loader"></div>';

      try {
        const res = await fetch("https://backend-ppyz.onrender.com/generate", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ prompt: enhancedPrompt })
        });

        const data = await res.json();

        if (data.url) {
          videoImage = data.url;

          status.innerText = "Playing ▶️";

          container.innerHTML = `
            <img src="${data.url}" />
          `;
        } else {
          status.innerText = "Error ❌";
          container.innerText = JSON.stringify(data);
        }

      } catch (err) {
        status.innerText = "Server error ❌";
        container.innerText = err.message;
      }
    }
  </script>

</body>
</html>
