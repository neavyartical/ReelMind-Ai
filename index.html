<!DOCTYPE html>
<!-- v14 FINAL MONETIZED -->
<html>
<head>
  <title>ReelMind AI PRO</title>

  <style>
    body { background:#0b1d2a; color:white; text-align:center; font-family:sans-serif; }

    @keyframes zoom {
      from { transform: scale(1); }
      to { transform: scale(1.1); }
    }

    .card {
      background:#12283a;
      padding:10px;
      border-radius:10px;
      position:relative;
    }

    .watermark {
      position:absolute;
      bottom:8px;
      right:10px;
      font-size:12px;
      opacity:0.7;
    }

    .ad-box {
      background:#1f2937;
      padding:10px;
      margin:10px;
      border-radius:10px;
      font-size:14px;
    }
  </style>
</head>

<body>

  <h1>🎬 ReelMind AI PRO</h1>

  <!-- AD -->
  <div class="ad-box">🚀 Your Ad Here (Replace with AdSense later)</div>

  <input id="prompt" placeholder="Describe your scene..." 
    style="width:80%;padding:14px;border-radius:10px;border:none;" />

  <br><br>

  <div style="display:flex;justify-content:center;gap:10px;flex-wrap:wrap;">
    <button onclick="setStyle('cinematic lighting, ultra realistic, 8k')">🎬 Cinematic</button>
    <button onclick="setStyle('anime style, vibrant colors')">🎌 Anime</button>
    <button onclick="setStyle('pixar style, 3d render')">🧸 Pixar</button>
    <button onclick="setStyle('photorealistic, ultra detailed')">📸 Realistic</button>
  </div>

  <br>

  <button id="imgBtn">Generate Images</button>
  <button id="vidBtn">Generate Video 🎬</button>

  <p id="status"></p>

  <div id="gallery" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;padding:20px;"></div>

  <!-- AD -->
  <div class="ad-box">🔥 More Ads = More Money 💰</div>

  <script defer>
    let selectedStyle = "cinematic lighting, ultra realistic, 8k";

    function setStyle(style) {
      selectedStyle = style;
    }

    function checkLimit() {
      let count = localStorage.getItem("usage") || 0;

      if (count >= 5) {
        alert("Free limit reached. Upgrade to PRO 💰");
        return false;
      }

      localStorage.setItem("usage", parseInt(count) + 1);
      return true;
    }

    document.getElementById("imgBtn").onclick = generateImages;
    document.getElementById("vidBtn").onclick = generateVideo;

    async function generateImages() {
      if (!checkLimit()) return;

      const prompt = document.getElementById("prompt").value;
      const gallery = document.getElementById("gallery");
      const status = document.getElementById("status");

      gallery.innerHTML = "";
      status.innerText = "Generating...";

      const finalPrompt = prompt + ", " + selectedStyle;

      const requests = Array.from({ length: 3 }, () =>
        fetch("https://backend-ppyz.onrender.com/generate?v=14", {
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body: JSON.stringify({ prompt: finalPrompt })
        })
      );

      const responses = await Promise.all(requests);

      for (let res of responses) {
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);

        const card = document.createElement("div");
        card.className = "card";

        const img = document.createElement("img");
        img.src = url;
        img.style.width = "100%";

        const mark = document.createElement("div");
        mark.className = "watermark";
        mark.innerText = "NeavyArtical";

        const btn = document.createElement("button");
        btn.innerText = "Download";
        btn.onclick = () => {
          const a = document.createElement("a");
          a.href = url;
          a.download = "image.png";
          a.click();
        };

        card.appendChild(img);
        card.appendChild(mark);
        card.appendChild(btn);
        gallery.appendChild(card);
      }

      status.innerText = "Done!";
    }

    async function generateVideo() {
      if (!checkLimit()) return;

      const prompt = document.getElementById("prompt").value;
      const gallery = document.getElementById("gallery");
      const status = document.getElementById("status");

      gallery.innerHTML = "";
      status.innerText = "Generating video...";

      const finalPrompt = prompt + ", cinematic scene";

      try {
        const res = await fetch("https://backend-ppyz.onrender.com/video?v=14", {
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body: JSON.stringify({ prompt: finalPrompt })
        });

        const blob = await res.blob();

        if (blob.size > 5000) {
          const url = URL.createObjectURL(blob);

          const video = document.createElement("video");
          video.src = url;
          video.controls = true;
          video.autoplay = true;
          video.muted = true;
          video.style.width = "100%";

          gallery.appendChild(video);
          status.innerText = "Video ready!";
          return;
        }

        throw new Error();

      } catch {
        status.innerText = "Fallback animation...";

        const res = await fetch("https://backend-ppyz.onrender.com/generate?v=14", {
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body: JSON.stringify({ prompt: finalPrompt })
        });

        const blob = await res.blob();
        const url = URL.createObjectURL(blob);

        const card = document.createElement("div");
        card.className = "card";

        const img = document.createElement("img");
        img.src = url;
        img.style.width = "100%";
        img.style.animation = "zoom 6s infinite alternate";

        const mark = document.createElement("div");
        mark.className = "watermark";
        mark.innerText = "NeavyArtical";

        card.appendChild(img);
        card.appendChild(mark);
        gallery.appendChild(card);

        status.innerText = "Fallback animation ready!";
      }
    }
  </script>

</body>
</html>
