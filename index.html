<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ReelMind AI</title>

  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 {
      color: #ff0050;
    }

    input, button {
      padding: 12px;
      margin: 8px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
    }

    input {
      width: 260px;
    }

    button {
      background: #ff0050;
      color: white;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.85;
    }

    #output {
      margin-top: 25px;
      padding: 20px;
      background: #1c1c1c;
      border-radius: 10px;
      text-align: left;
      white-space: pre-wrap;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }

    .section {
      margin-top: 30px;
    }
  </style>
</head>

<body>

  <h1>🎬 ReelMind AI</h1>

  <!-- AUTH -->
  <div class="section">
    <h3>🔐 Login / Register</h3>
    <input id="email" placeholder="Email"><br>
    <input id="password" type="password" placeholder="Password"><br>

    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>
  </div>

  <!-- GENERATOR -->
  <div class="section">
    <h3>🤖 Create Viral Content</h3>
    <input id="prompt" placeholder="Describe your idea..."><br>

    <button onclick="generate()">✨ Generate</button>
    <button onclick="copyText()">📋 Copy</button>
  </div>

  <!-- OUTPUT -->
  <div id="output">Your AI result will appear here...</div>

  <script>
    const API = "https://reelmindbackend-1.onrender.com";

    const emailEl = document.getElementById("email");
    const passwordEl = document.getElementById("password");
    const promptEl = document.getElementById("prompt");
    const output = document.getElementById("output");

    // REGISTER
    async function register() {
      const email = emailEl.value;
      const password = passwordEl.value;

      const res = await fetch(API + "/register", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();
      alert(data.message || data.error);
    }

    // LOGIN
    async function login() {
      const email = emailEl.value;
      const password = passwordEl.value;

      const res = await fetch(API + "/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (data.token) {
        localStorage.setItem("token", data.token);
        alert("Login success ✅");
      } else {
        alert(data.error);
      }
    }

    // GENERATE AI CONTENT
    async function generate() {
      const prompt = promptEl.value;
      const token = localStorage.getItem("token");

      if (!token) {
        alert("Login first ❌");
        return;
      }

      output.innerHTML = "⏳ Generating cinematic content...";

      try {
        const res = await fetch(API + "/generate", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": token
          },
          body: JSON.stringify({ prompt })
        });

        const data = await res.json();

        const text = data.result || data.error || "No response";

        output.innerHTML = `
          <h2>🎬 Your Viral Script</h2>
          <p>${text}</p>
        `;
      } catch (err) {
        output.innerHTML = "❌ Server error. Try again.";
      }
    }

    // COPY RESULT
    function copyText() {
      navigator.clipboard.writeText(output.innerText);
      alert("Copied ✅");
    }
  </script>

</body>
</html>
