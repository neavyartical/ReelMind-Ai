<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: white;
      text-align: center;

      /* 🔥 YOUR LOGO BACKGROUND */
      background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)),
      url("logo.jpg"); /* 🔁 PUT YOUR IMAGE NAME HERE */

      background-size: cover;
      background-position: center;
      transition: 0.5s;
    }

    h1 {
      margin-top: 20px;
      font-size: 30px;
      text-shadow: 0 0 20px cyan;
    }

    input {
      padding: 12px;
      width: 85%;
      border-radius: 12px;
      border: none;
      margin-top: 10px;
      font-size: 16px;
    }

    /* 🧊 GLASS CUBE */
    .cube {
      margin: 40px auto;
      width: 230px;
      height: 230px;
      background: rgba(0,255,255,0.08);
      border-radius: 25px;
      backdrop-filter: blur(25px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 12px;
      box-shadow: 0 0 40px cyan, inset 0 0 20px rgba(255,255,255,0.2);
    }

    button {
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(45deg, cyan, purple);
      color: white;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
      box-shadow: 0 0 10px cyan;
    }

    #result {
      margin: 20px;
      padding: 15px;
      background: rgba(0,0,0,0.6);
      border-radius: 12px;
      white-space: pre-wrap;
    }

    #imageBox img {
      width: 90%;
      border-radius: 15px;
      margin-top: 10px;
      box-shadow: 0 0 20px purple;
    }

    .download-btn {
      display: inline-block;
      margin-top: 10px;
      color: yellow;
      font-weight: bold;
    }

    footer {
      margin-top: 30px;
      font-size: 14px;
    }

    a {
      color: cyan;
    }
  </style>
</head>

<body>

<h1>🚀 ReelMind AI</h1>

<input id="prompt" placeholder="Try: dog, anime, car, story idea..." />

<div class="cube">
  <button onclick="generate('text')">🧠 Text</button>
  <button onclick="generate('image')">🖼 Image</button>
  <button onclick="generate('video')">🎬 Video</button>
</div>

<div id="result"></div>
<div id="imageBox"></div>

<footer>
  🚀 Powered by <b>Artical Neavy</b><br><br>
  <a href="terms.html">Terms & Conditions</a>
</footer>

<script>
const API = "https://reelmindbackend-1.onrender.com";

async function generate(type) {
  const input = document.getElementById("prompt").value;
  const resultBox = document.getElementById("result");
  const imageBox = document.getElementById("imageBox");

  if (!input) {
    resultBox.innerHTML = "Enter something first ❌";
    return;
  }

  resultBox.innerHTML = "⚡ Generating...";
  imageBox.innerHTML = "";

  let endpoint = "";

  if (type === "text") endpoint = "/generate-text";
  if (type === "image") endpoint = "/generate-image";
  if (type === "video") endpoint = "/generate-video";

  try {
    const res = await fetch(API + endpoint, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt: input })
    });

    const data = await res.json();

    console.log("API RESPONSE:", data);

    // 🖼 IMAGE FIX
    if (type === "image") {
      if (!data.image) {
        resultBox.innerHTML = "❌ Image failed. Your API may not support image generation.";
        return;
      }

      imageBox.innerHTML = `
        <img src="${data.image}" />
        <br>
        <a href="${data.image}" download class="download-btn">⬇ Download</a>
      `;

      resultBox.innerHTML = "✅ Image Generated!";
      return;
    }

    // 🎬 VIDEO FIX
    if (type === "video") {
      if (!data.result) {
        resultBox.innerHTML = "❌ Video generation failed.";
        return;
      }

      resultBox.innerHTML = "🎬 Viral Video Idea:\n\n" + data.result;
      return;
    }

    // 🧠 TEXT
    resultBox.innerHTML = data.result || "No response";

  } catch (err) {
    console.error(err);
    resultBox.innerHTML = "Server error ❌";
  }
}
</script>

</body>
</html>
