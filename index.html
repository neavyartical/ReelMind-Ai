<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ReelMind AI</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

h1 {
  text-align:center;
  color:#38bdf8;
}

#chat {
  height:70vh;
  overflow-y:auto;
  padding:15px;
}

.message {
  margin:10px 0;
  padding:12px;
  border-radius:10px;
  max-width:80%;
}

.user {
  background:#38bdf8;
  color:black;
  margin-left:auto;
}

.bot {
  background:#1e293b;
}

#inputArea {
  display:flex;
  gap:10px;
  padding:10px;
  background:#020617;
  position:sticky;
  bottom:0;
}

input {
  flex:1;
  padding:12px;
  border-radius:10px;
  border:none;
}

button {
  padding:12px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  cursor:pointer;
}

#topBar {
  display:flex;
  justify-content:space-between;
  padding:10px;
}
</style>
</head>

<body>

<h1>ReelMind AI 🧊</h1>

<div id="topBar">
  <button onclick="resetChat()">🧹 Reset</button>
</div>

<div id="chat"></div>

<div id="inputArea">
  <input id="prompt" placeholder="Ask anything...">
  <button onclick="generate()">🧊</button>
</div>

<script>
const BACKEND = "https://reelmindbackend-1.onrender.com";

function addMessage(text, type) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "message " + type;
  div.innerHTML = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

// ✨ TYPING EFFECT
function typeEffect(element, text) {
  let i = 0;
  const speed = 15;

  function type() {
    if (i < text.length) {
      element.innerHTML += text.charAt(i);
      i++;
      setTimeout(type, speed);
    }
  }

  element.innerHTML = "";
  type();
}

function generate() {
  const input = document.getElementById("prompt");
  const prompt = input.value.trim();

  if (!prompt) return;

  addMessage(prompt, "user");
  input.value = "";

  const botMsg = addMessage("⏳", "bot");

  fetch(BACKEND + "/generate", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ prompt })
  })
  .then(res => res.json())
  .then(data => {
    botMsg.innerHTML = "";
    typeEffect(botMsg, data.result);
  })
  .catch(() => {
    botMsg.innerHTML = "Error connecting to server";
  });
}

// 🧹 RESET CHAT
function resetChat() {
  fetch(BACKEND + "/reset", { method:"POST" });

  document.getElementById("chat").innerHTML = "";
}

// ENTER KEY
document.getElementById("prompt").addEventListener("keypress", function(e){
  if(e.key === "Enter") generate();
});
</script>

</body>
</html>
