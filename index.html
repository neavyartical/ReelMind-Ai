<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:linear-gradient(135deg,#0f0018,#ff6a00);
  color:white;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* GLOBE GRID */
#grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  padding:12px;
}

.grid-btn{
  height:70px;
  border-radius:50%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:radial-gradient(circle at 30% 30%, #ff6a00, #1a001f);
  box-shadow:0 0 15px rgba(255,106,0,0.6),
             inset 0 0 10px rgba(255,255,255,0.2);
  font-size:18px;
}

.grid-btn span{
  font-size:10px;
  margin-top:2px;
}

/* CHAT */
#chat{flex:1;overflow:auto;padding:10px;}
.msg{margin:8px;padding:12px;border-radius:12px;max-width:85%;}
.user{background:#ff6a00;margin-left:auto;}
.ai{background:#222;}

img,video{width:100%;border-radius:10px;margin-top:5px;}

/* INPUT */
#bottom{display:flex;padding:10px;}
#bottom input{flex:1;padding:12px;border:none;border-radius:10px;}
#bottom button{
  margin-left:5px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#ff6a00;
  color:white;
}
</style>
</head>

<body>

<div id="grid">
  <div class="grid-btn" onclick="setMode('chat')">💬<span>Chat</span></div>
  <div class="grid-btn" onclick="setMode('story')">📖<span>Story</span></div>
  <div class="grid-btn" onclick="setMode('image')">🖼<span>Image</span></div>
  <div class="grid-btn" onclick="setMode('video')">🎬<span>Video</span></div>

  <div class="grid-btn" onclick="template('funny')">😂<span>Funny</span></div>
  <div class="grid-btn" onclick="template('sad')">💔<span>Sad</span></div>
  <div class="grid-btn" onclick="template('anime')">🔥<span>Anime</span></div>
  <div class="grid-btn" onclick="template('money')">💰<span>Money</span></div>

  <div class="grid-btn" onclick="toggleTikTok()">🚀<span>TikTok</span></div>
</div>

<div id="chat"></div>

<div id="bottom">
  <input id="input" placeholder="Ask anything...">
  <button onclick="send()">➤</button>
  <button onclick="startVoice()">🎤</button>
</div>

<script>

// STATE
let mode="chat";
let tiktok=false;

// UI
function add(text,type){
  let chat=document.getElementById("chat");
  let div=document.createElement("div");
  div.className="msg "+type;
  div.innerHTML=text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

// MODE
function setMode(m){
  mode=m;
  add("Mode: "+m,"ai");
}

// TEMPLATE AUTO RUN
function template(type){
  if(type==="funny"){
    input.value="Funny story about a guy whose cat says she's pregnant";
    mode="story";
  }
  if(type==="sad"){
    input.value="Sad emotional story about betrayal and heartbreak";
    mode="story";
  }
  if(type==="anime"){
    input.value="Epic anime battle with transformation and powers";
    mode="story";
  }
  if(type==="money"){
    input.value="How to make money online step by step";
    mode="chat";
  }

  add("🔥 Generating "+type+"...","ai");
  setTimeout(send,300);
}

// TIKTOK
function toggleTikTok(){
  tiktok=!tiktok;
  add("TikTok Mode: "+(tiktok?"ON 🔥":"OFF"),"ai");
}

// VOICE INPUT
function startVoice(){
  let rec=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
  rec.lang="en-US";

  rec.onstart=()=>add("🎤 Listening...","ai");

  rec.onresult=e=>{
    let text=e.results[0][0].transcript;
    input.value=text;
    add("🎤 "+text,"user");
    setTimeout(send,300);
  };

  rec.start();
}

// VOICE OUTPUT
function speak(text){
  let s=new SpeechSynthesisUtterance(text);
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(s);
}

// DOWNLOAD
function download(url,name){
  let a=document.createElement("a");
  a.href=url;
  a.download=name;
  a.click();
}

// LONG STORY ENGINE
function longStory(topic){
  return `
🎬 CINEMATIC STORY

━━━━━━━━━━━━━━━

In a world where ${topic}, everything began to change.

At first, life felt normal. But slowly, something unusual started happening.

People noticed patterns. Strange events. Unexplainable moments.

Fear spread. Confusion grew.

But one person refused to break.

Through pain, struggle, and setbacks, they kept going.

🔥 Then came the turning point.

A decision that changed everything.

They chose courage over fear.

And in that moment, transformation began.

Power awakened. Limits shattered.

Destiny was rewritten.

━━━━━━━━━━━━━━━

✨ This was not the end… it was the beginning.
`;
}

// SEND
function send(){
  let inputEl=document.getElementById("input");
  let txt=inputEl.value.trim();
  if(!txt) return;

  add(txt,"user");

  // IMAGE
  if(mode==="image"){
    let url="https://image.pollinations.ai/prompt/"+encodeURIComponent(txt);

    add(`
      <img src="${url}">
      <button onclick="download('${url}','image.jpg')">⬇ Download</button>
    `,"ai");

    speak("Image ready");
    return;
  }

  // VIDEO (SMART)
  if(mode==="video"){
    let vid="https://samplelib.com/lib/preview/mp4/sample-5s.mp4";

    add(`
      <video controls src="${vid}"></video>

      🎬 AI Video Concept:
      "${txt}"

      A cinematic viral-style scene showing ${txt} with engaging visuals.

      🔥 Caption:
      "${txt} — this is insane 😳"

      #viral #fyp #trend

      🎵 Suggested Sound:
      Trending TikTok beat

      <button onclick="download('${vid}','video.mp4')">⬇ Download</button>
    `,"ai");

    speak("Video concept ready");
    return;
  }

  // STORY
  if(mode==="story"){
    let story=longStory(txt);

    if(tiktok){
      story += "\n🔥 Caption: This will go viral 😳 #fyp #story";
    }

    add(story,"ai");
    speak("Story generated");
    return;
  }

  // CHAT
  let reply="🤖 "+txt+" — Think bigger, move smarter, build powerfully.";
  add(reply,"ai");
  speak(reply);
}

</script>

</body>
</html>
