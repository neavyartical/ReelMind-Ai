<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ReelMind AI</title>

<!-- Google AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXX"
crossorigin="anonymous"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0d0d0d;
  color: white;
  text-align: center;
}

.container {
  margin-top: 120px;
}

input {
  width: 80%;
  max-width: 500px;
  padding: 15px;
  border-radius: 30px;
  border: none;
  outline: none;
  font-size: 16px;
}

button {
  margin-top: 20px;
  padding: 12px 30px;
  border: none;
  border-radius: 20px;
  background: #00e0ff;
  color: black;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #00bcd4;
}

#result {
  margin-top: 30px;
  font-size: 16px;
}

.error {
  color: yellow;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">

  <!-- INPUT -->
  <input id="prompt" placeholder="Generate something..." />

  <br>
  <button onclick="generate()">Generate</button>

  <!-- RESULT -->
  <div id="result"></div>
  <div id="error" class="error"></div>

</div>

<!-- AdSense Banner -->
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-XXXXXXXXXXXX"
     data-ad-slot="1234567890"
     data-ad-format="auto"
     data-full-width-responsive="true"></ins>

<script>
(adsbygoogle = window.adsbygoogle || []).push({});
</script>

<script>

// 🔥 IMPORTANT: PUT YOUR RENDER BACKEND URL HERE
const API_URL = "https://your-backend.onrender.com";

async function generate() {
  const prompt = document.getElementById("prompt").value;
  const result = document.getElementById("result");
  const error = document.getElementById("error");

  result.innerHTML = "⏳ Generating...";
  error.innerHTML = "";

  try {
    const res = await fetch(API_URL + "/generate-text", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt })
    });

    if (!res.ok) {
      throw new Error("Server error");
    }

    const data = await res.json();

    // ✅ SAFE RESPONSE PARSE
    const text =
      data?.choices?.[0]?.message?.content ||
      JSON.stringify(data);

    result.innerHTML = text;

  } catch (err) {
    console.error(err);
    error.innerHTML = "⚠️ Backend error: " + err.message;
    result.innerHTML = "";
  }
}

</script>

</body>
</html>
