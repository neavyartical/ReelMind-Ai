<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ReelMind AI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    input, button {
      padding: 12px;
      margin: 10px;
      width: 80%;
      max-width: 400px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      background: #22c55e;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #16a34a;
    }

    #status {
      margin-top: 15px;
      color: #ccc;
    }

    img {
      margin-top: 20px;
      max-width: 90%;
      border-radius: 10px;
      display: none;
    }
  </style>
</head>
<body>

  <h1>🎬 ReelMind AI</h1>

  <input type="text" id="prompt" placeholder="Enter your prompt..." />
  <br>

  <button onclick="generateImage()">Generate</button>

  <p id="status"></p>

  <img id="outputImage" />

  <script>
    async function generateImage() {
      const prompt = document.getElementById("prompt").value;
      const status = document.getElementById("status");
      const image = document.getElementById("outputImage");

      if (!prompt) {
        alert("Please enter a prompt");
        return;
      }

      status.innerText = "Generating image... ⏳";
      image.style.display = "none";

      try {
        const response = await fetch("https://backend-ppyz.onrender.com/generate", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            inputs: prompt
          })
        });

        if (!response.ok) {
          throw new Error("Server error");
        }

        const blob = await response.blob();
        const imageUrl = URL.createObjectURL(blob);

        image.src = imageUrl;
        image.style.display = "block";
        status.innerText = "✅ Image generated!";

      } catch (error) {
        console.error(error);
        status.innerText = "❌ Error generating image";
      }
    }
  </script>

</body>
</html>
