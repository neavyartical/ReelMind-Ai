<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReelMind Global</title>

<style>
body {
  font-family: Arial;
  background: #0f0f0f;
  color: white;
  text-align: center;
  padding: 20px;
}

h1 {
  color: #00ff99;
}

input {
  width: 90%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-bottom: 10px;
}

button {
  padding: 12px 20px;
  background: #00ff99;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.section {
  margin-top: 20px;
  background: #1a1a1a;
  padding: 15px;
  border-radius: 10px;
}

img, video {
  width: 100%;
  border-radius: 10px;
  margin-top: 10px;
}

.loader {
  display: none;
}
</style>
</head>

<body>

<h1>🧠 ReelMind Global</h1>

<input id="prompt" placeholder="Enter your idea...">
<br>
<button onclick="generate()">Generate</button>

<div class="section">
  <h3>✍️ Story</h3>
  <div id="story">Waiting...</div>
</div>

<div class="section">
  <h3>🖼 Image</h3>
  <div id="imageLoader" class="loader">Generating image...</div>
  <img id="image" />
</div>

<div class="section">
  <h3>🎬 Video</h3>
  <div id="videoLoader" class="loader">Generating video...</div>
  <video id="video" controls></video>
</div>

<script>
const BACKEND = "https://reelmindbackend-1.onrender.com";

let generating = false;

async function generate() {
  if (generating) return; // prevent spam clicking
  generating = true;

  const prompt = document.getElementById("prompt").value;

  document.getElementById("story").innerText = "Generating...";
  document.getElementById("imageLoader").style.display = "block";
  document.getElementById("videoLoader").style.display = "block";

  try {
    const res = await fetch(BACKEND + "/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt })
    });

    const data = await res.json();

    // STORY
    document.getElementById("story").innerText =
      data.story || "Story failed";

    // IMAGE
    document.getElementById("imageLoader").style.display = "none";
    if (data.image) {
      document.getElementById("image").src = data.image;
    }

    // VIDEO
    document.getElementById("videoLoader").style.display = "none";
    if (data.video) {
      const vid = document.getElementById("video");
      vid.src = data.video;
      vid.pause(); // stop auto loop issue
    }

  } catch (err) {
    document.getElementById("story").innerText = "❌ Error connecting to AI";
    console.log(err);
  }

  generating = false;
}
</script>

</body>
</html>
