<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReelMind AI</title>

<!-- AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1714638410489429"
crossorigin="anonymous"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  color:white;
  text-align:center;
  background:radial-gradient(circle at center, #0f2027, #020024);
}

/* futuristic brain glow */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:url('https://i.imgur.com/8Qf6F9F.png') center/cover;
  opacity:0.08;
  z-index:-1;
}

h1{
  margin-top:20px;
  font-size:28px;
}

/* cube */
.cube-container{
  perspective:1000px;
  width:200px;
  height:200px;
  margin:30px auto;
}

.cube{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  animation:spin 8s infinite linear;
}

.face{
  position:absolute;
  width:200px;
  height:200px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  background:rgba(0,255,255,0.15);
  border:1px solid rgba(255,255,255,0.3);
  backdrop-filter:blur(10px);
  cursor:pointer;
}

.front{ transform:translateZ(100px); }
.back{ transform:rotateY(180deg) translateZ(100px); }
.right{ transform:rotateY(90deg) translateZ(100px); }
.left{ transform:rotateY(-90deg) translateZ(100px); }
.top{ transform:rotateX(90deg) translateZ(100px); }
.bottom{ transform:rotateX(-90deg) translateZ(100px); }

@keyframes spin{
  from{ transform:rotateX(0) rotateY(0); }
  to{ transform:rotateX(360deg) rotateY(360deg); }
}

/* inputs */
input,select{
  width:90%;
  padding:12px;
  margin:10px;
  border:none;
  border-radius:10px;
}

/* buttons */
button{
  padding:12px 18px;
  border:none;
  border-radius:10px;
  background:#00c6ff;
  color:white;
  font-weight:bold;
  margin:5px;
}

#output{
  margin-top:20px;
  padding:15px;
  background:rgba(255,255,255,0.1);
  border-radius:10px;
}

.hidden{ display:none; }
</style>
</head>

<body>

<h1>🚀 ReelMind AI</h1>
<p>Powered by Artical Neavy</p>

<!-- LOGIN -->
<div id="auth">
<input id="username" placeholder="Username">
<input id="password" placeholder="Password" type="password">
<br>
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<!-- CUBE -->
<div class="cube-container" id="cubeBox">
  <div class="cube" id="cube">
    <div class="face front" onclick="selectType('chat')">Chat</div>
    <div class="face back" onclick="selectType('story')">Story</div>
    <div class="face right" onclick="selectType('image')">Image</div>
    <div class="face left" onclick="selectType('video')">Video</div>
    <div class="face top">Viral</div>
    <div class="face bottom">Money</div>
  </div>
</div>

<select id="type">
<option value="chat">Chat</option>
<option value="story">Story</option>
<option value="image">Image</option>
<option value="video">Video</option>
</select>

<input id="prompt" placeholder="Enter your idea...">

<br>

<button onclick="generate()">Generate</button>
<button onclick="share()">Share 🔥</button>
<button onclick="logout()">Logout</button>

<div id="output"></div>

</div>

<script>

const API = "https://reelmindbackend-1.onrender.com";

let user = localStorage.getItem("user");

if(user){
  document.getElementById("auth").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
}

// AUTH
async function register(){
  let username = usernameEl.value;
  let password = passwordEl.value;

  let res = await fetch(API+"/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username,password})
  });

  alert("Registered!");
}

async function login(){
  let username = usernameEl.value;
  let password = passwordEl.value;

  let res = await fetch(API+"/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username,password})
  });

  let data = await res.json();

  if(data.success){
    localStorage.setItem("user",username);
    location.reload();
  }else{
    alert("Login failed");
  }
}

function logout(){
  localStorage.removeItem("user");
  location.reload();
}

// GENERATE (REAL)
async function generate(){
  let prompt = document.getElementById("prompt").value;
  let type = document.getElementById("type").value;

  if(!prompt){
    alert("Enter prompt");
    return;
  }

  document.getElementById("output").innerHTML = "⏳ Generating...";

  let res = await fetch(API+"/generate",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({prompt,type})
  });

  let data = await res.json();

  if(type==="image"){
    document.getElementById("output").innerHTML =
      `<img src="${data.result}" width="100%">`;
  }else if(type==="video"){
    document.getElementById("output").innerHTML =
      `<video src="${data.result}" controls width="100%"></video>`;
  }else{
    document.getElementById("output").innerText = data.result;
  }
}

// SHARE (TIKTOK READY)
function share(){
  let text = document.getElementById("prompt").value;

  if(navigator.share){
    navigator.share({
      title:"ReelMind AI",
      text:text,
      url:window.location.href
    });
  }else{
    alert("Copy & share manually 🔥");
  }
}

// CUBE CONTROL
let cube = document.getElementById("cube");
let startX = 0;
let currentY = 0;

cubeBox.addEventListener("touchstart",(e)=>{
  startX = e.touches[0].clientX;
  cube.style.animation="none";
});

cubeBox.addEventListener("touchmove",(e)=>{
  let moveX = e.touches[0].clientX;
  let diff = moveX - startX;
  currentY += diff * 0.3;
  cube.style.transform = `rotateY(${currentY}deg)`;
  startX = moveX;
});

cubeBox.addEventListener("touchend",()=>{
  cube.style.animation="spin 8s infinite linear";
});

function selectType(t){
  document.getElementById("type").value = t;
}

</script>

</body>
</html>
