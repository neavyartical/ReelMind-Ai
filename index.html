<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ReelMind AI</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
    }

    h1 {
      text-align: center;
      color: #38bdf8;
    }

    #chat {
      height: 70vh;
      overflow-y: auto;
      padding: 15px;
    }

    .message {
      margin: 10px 0;
      padding: 12px;
      border-radius: 10px;
      max-width: 80%;
    }

    .user {
      background: #38bdf8;
      color: black;
      margin-left: auto;
    }

    .bot {
      background: #1e293b;
    }

    #inputArea {
      display: flex;
      gap: 10px;
      padding: 10px;
      background: #020617;
      position: sticky;
      bottom: 0;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
    }

    button {
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #38bdf8;
      cursor: pointer;
    }

    img {
      width: 48%;
      margin: 1%;
      border-radius: 10px;
    }

    .download {
      display: block;
      margin-top: 5px;
      font-size: 12px;
      color: #38bdf8;
    }
  </style>
</head>

<body>

<h1>ReelMind AI 🧊</h1>

<div id="chat"></div>

<div id="inputArea">
  <input id="prompt" placeholder="Type or speak 🎤">
  <button onclick="startVoice()">🎤</button>
  <button onclick="generate()">🧊</button>
</div>

<script>
const API_KEY = "YOUR_OPENROUTER_API_KEY";

let chatHistory = JSON.parse(localStorage.getItem("chat")) || [];

window.onload = () => {
  chatHistory.forEach(msg => addMessage(msg.text, msg.type));
};

function saveChat(text, type) {
  chatHistory.push({ text, type });
  localStorage.setItem("chat", JSON.stringify(chatHistory));
}

function addMessage(text, type) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "message " + type;
  div.innerHTML = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  saveChat(text, type);
}

function generate() {
  const input = document.getElementById("prompt");
  let prompt = input.value.trim();

  if (!prompt) return;

  addMessage(prompt, "user");
  input.value = "";

  addMessage("⏳ Thinking...", "bot");

  // 🖼 IMAGE
  if (prompt.toLowerCase().includes("image") || prompt.toLowerCase().includes("photo")) {
    prompt += ", cinematic lighting, glassy glowing background, ultra detailed, 4k";

    let imagesHTML = "";

    for (let i = 0; i < 4; i++) {
      const url = "https://image.pollinations.ai/prompt/" + encodeURIComponent(prompt + " " + i);

      imagesHTML += `
        <div>
          <img src="${url}">
          <a class="download" href="${url}" target="_blank">⬇ Download</a>
        </div>
      `;
    }

    setTimeout(() => {
      document.querySelector(".bot:last-child").remove();
      addMessage(imagesHTML, "bot");
    }, 1000);

    return;
  }

  // 🧠 REAL AI (OPENROUTER)
  fetch("https://openrouter.ai/api/v1/chat/completions", {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + API_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      model: "openai/gpt-4o-mini",
      messages: [
        { role: "system", content: "You are a powerful AI that creates viral ideas, stories, and content." },
        { role: "user", content: prompt }
      ]
    })
  })
  .then(res => res.json())
  .then(data => {
    document.querySelector(".bot:last-child").remove();

    const reply = data.choices?.[0]?.message?.content || "No response";
    addMessage(reply, "bot");
  })
  .catch(() => {
    addMessage("Error connecting to AI", "bot");
  });
}

// 🎤 VOICE
function startVoice() {
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.start();

  recognition.onresult = function(event) {
    document.getElementById("prompt").value = event.results[0][0].transcript;
  };
}

// ENTER KEY
document.getElementById("prompt").addEventListener("keypress", function(e) {
  if (e.key === "Enter") generate();
});
</script>

</body>
</html>
