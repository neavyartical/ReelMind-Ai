<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🚀 ReelMind AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- SEO -->
<meta name="description" content="ReelMind AI generates text, images & videos instantly.">

<!-- ADSENSE -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1714638410489429" crossorigin="anonymous"></script>

<style>
body {
  margin:0;
  font-family:'Segoe UI';
  background:linear-gradient(135deg,#020617,#0f172a);
  color:white;
}
#topbar {
  position:fixed;
  top:0;
  width:100%;
  background:#111;
  padding:10px;
  display:flex;
  justify-content:space-around;
  z-index:1000;
}
.section {
  display:none;
  margin-top:90px;
  padding:20px;
  padding-bottom:160px;
}
.active {display:block;}
#prompt {
  position:fixed;
  bottom:90px;
  width:90%;
  left:5%;
  padding:12px;
  border-radius:25px;
  border:none;
}
#controls {
  position:fixed;
  bottom:0;
  width:100%;
  height:70px;
  display:flex;
  justify-content:space-around;
  align-items:center;
  background:#111;
}
.btn {
  width:55px;
  height:55px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#222;
  font-size:22px;
  cursor:pointer;
}
#generate {
  background:linear-gradient(135deg,#06b6d4,#3b82f6);
}
.card {
  background:rgba(30,41,59,0.85);
  padding:15px;
  border-radius:15px;
  margin-top:20px;
}
#loginBox {
  position:fixed;
  width:100%;
  height:100%;
  background:#000d;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:2000;
}
#creditsBox {
  position:fixed;
  top:60px;
  right:10px;
  background:#111;
  padding:8px;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <div class="card">
    <h2>ReelMind AI</h2>
    <button onclick="login()">Login with Google</button>
  </div>
</div>

<!-- NAV -->
<div id="topbar">
  <div onclick="switchTab('home')">🏠</div>
  <div onclick="switchTab('create')">➕</div>
  <div onclick="switchTab('profile')">👤</div>
  <div onclick="switchTab('admin')">👑</div>
</div>

<!-- CREDITS -->
<div id="creditsBox">💰 Credits: <span id="credits">5</span></div>

<!-- HOME -->
<div id="home" class="section active">
  <div class="card">
    <h3>Welcome to ReelMind AI ⚡</h3>
    <p>Fast. Smart. Creative AI engine.</p>
  </div>

  <!-- ADS -->
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-1714638410489429"
       data-ad-slot="1234567890"
       data-ad-format="auto"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>

  <!-- KO-FI -->
  <div class="card">
    <h3>💰 Buy Credits</h3>
    <a href="https://ko-fi.com/articalneavy" target="_blank">
      <button>Buy on Ko-fi ☕</button>
    </a>
  </div>
</div>

<!-- CREATE -->
<div id="create" class="section">
  <select id="mode">
    <option value="text">Text</option>
    <option value="image">Image</option>
    <option value="video">Video</option>
  </select>

  <div id="result"></div>
</div>

<!-- PROFILE -->
<div id="profile" class="section">
  <h2>Profile</h2>
  <p id="userEmail"></p>
  <button onclick="logout()">Logout</button>
</div>

<!-- ADMIN -->
<div id="admin" class="section">
  <h2>👑 Admin Panel</h2>
  <button onclick="addCredits(10)">+10 Credits</button>
  <button onclick="resetCredits()">Reset Credits</button>
</div>

<input id="prompt" placeholder="Type anything..." />

<div id="controls">
  <div id="generate" class="btn">⚡</div>
</div>

<!-- SCRIPT -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "YOUR_FIREBASE_KEY",
  authDomain: "reelmind-ai-f07cb.firebaseapp.com",
  projectId: "reelmind-ai-f07cb"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

let userToken = null;

// LOGIN
window.login = async () => await signInWithPopup(auth, provider);
window.logout = () => signOut(auth);

// AUTH STATE
onAuthStateChanged(auth, async (user) => {
  if (user) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("userEmail").innerText = user.email;
    userToken = await user.getIdToken();
  }
});

// NAV
window.switchTab = (tab) => {
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  document.getElementById(tab).classList.add("active");
};

// ================= CREDITS =================
let credits = localStorage.getItem("credits") || 5;

function updateCredits(){
  document.getElementById("credits").innerText = credits;
  localStorage.setItem("credits", credits);
}
updateCredits();

window.addCredits = (n)=>{
  credits = Number(credits) + n;
  updateCredits();
};

window.resetCredits = ()=>{
  credits = 5;
  updateCredits();
};

// ================= ANTI ABUSE =================
let lastTime = 0;
let count = 0;

function canUse(){
  const now = Date.now();

  if(now - lastTime < 15000){
    count++;
    if(count > 5){
      alert("⚠️ Slow down");
      return false;
    }
  } else {
    count = 0;
  }

  lastTime = now;
  return true;
}

// ================= GENERATE =================
document.getElementById("generate").onclick = async () => {

  const prompt = document.getElementById("prompt").value.trim();
  const mode = document.getElementById("mode").value;
  const result = document.getElementById("result");

  if (!prompt) return alert("Enter prompt");
  if (!canUse()) return;

  if (credits <= 0){
    alert("No credits 💰");
    return;
  }

  credits--;
  updateCredits();

  result.innerHTML = "⚡ Ultra-fast generating...";

  try {

    // 🧠 TEXT (OpenRouter Brain)
    if (mode === "text") {
      const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method: "POST",
        headers: {
          "Authorization": "Bearer YOUR_OPENROUTER_API_KEY",
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          model: "openai/gpt-4o-mini",
          messages: [
            {
              role: "system",
              content: "You are ReelMind AI: extremely fast, smart, creative, and direct."
            },
            {
              role: "user",
              content: prompt
            }
          ]
        })
      });

      const data = await res.json();
      const output = data?.choices?.[0]?.message?.content || "Done";

      result.innerHTML = `<div class="card">${output}</div>`;
    }

    // 🖼 IMAGE (FAST CDN)
    if (mode === "image") {
      const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?seed=${Date.now()}`;
      result.innerHTML = `<div class="card"><img src="${url}" style="width:100%;border-radius:10px"></div>`;
    }

    // 🎬 VIDEO (placeholder ready)
    if (mode === "video") {
      result.innerHTML = `<div class="card">🎬 Video AI (Runway / Pika coming soon)</div>`;
    }

  } catch (e) {
    result.innerHTML = `<div class="card">❌ Error</div>`;
  }
};

</script>

</body>
</html>
