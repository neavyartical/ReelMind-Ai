<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ReelMind Global</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background: #000;
  color: white;
  text-align:center;
}

/* BACKGROUND LOGO */
body::before {
  content: "";
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: url("YOUR-IMAGE-LINK-HERE") center/cover no-repeat;
  opacity:0.15;
  z-index:-1;
}

/* HEADER */
h1 {
  color:#00ff88;
  margin-top:20px;
}

/* INPUT */
input {
  width:90%;
  padding:15px;
  border-radius:30px;
  border:none;
  margin-top:15px;
}

/* ICE BUTTON */
button {
  margin-top:20px;
  padding:15px 30px;
  border:none;
  border-radius:20px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  color:white;
  font-size:18px;
}

/* BOX */
.box {
  margin:20px;
  padding:15px;
  background:#111;
  border-radius:10px;
}

/* IMAGE */
img {
  width:90%;
  border-radius:10px;
}

/* VIDEO */
video {
  width:90%;
  border-radius:10px;
}

/* DOWNLOAD */
.download-btn {
  background:green;
  padding:10px;
  margin-top:10px;
  display:inline-block;
}

/* FOOTER */
footer {
  margin-top:30px;
  font-size:12px;
  color:#aaa;
}
</style>
</head>

<body>

<h1>🧠 ReelMind Global</h1>

<input id="prompt" placeholder="Type anything...">

<br>
<button onclick="generateAll()">🧊 Generate</button>

<!-- STORY -->
<div class="box">
<h3>✍️ Story</h3>
<div id="story">...</div>
<button class="download-btn" onclick="downloadText()">Download Story</button>
</div>

<!-- IMAGE -->
<div class="box">
<h3>🖼️ Image</h3>
<img id="image" />
<br>
<a id="downloadImage" class="download-btn">Download Image</a>
</div>

<!-- VIDEO -->
<div class="box">
<h3>🎬 Video</h3>
<video id="video" controls></video>
<br>
<a id="downloadVideo" class="download-btn">Download Video</a>
</div>

<!-- GOOGLE-LIKE AI -->
<div class="box">
<h3>🌍 Ask Anything</h3>
<input id="ask" placeholder="Ask world questions...">
<button onclick="askAI()">Ask</button>
<div id="answer"></div>
</div>

<footer>
Powered by ARTICAL NEAVY | Terms & Conditions Apply
</footer>

<script>

const backend = "https://reelmindbackend-1.onrender.com";

/* GENERATE ALL */
async function generateAll() {
  const prompt = document.getElementById("prompt").value;

  document.getElementById("story").innerText = "Loading...";
  
  try {
    const res = await fetch(backend + "/generate", {
      method:"POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({prompt})
    });

    const data = await res.json();

    document.getElementById("story").innerText = data.story;

    /* IMAGE */
    document.getElementById("image").src = data.image;
    document.getElementById("downloadImage").href = data.image;

    /* VIDEO */
    document.getElementById("video").src = data.video;
    document.getElementById("downloadVideo").href = data.video;

  } catch(e) {
    document.getElementById("story").innerText = "❌ AI not responding";
  }
}

/* ASK ANYTHING */
async function askAI() {
  const q = document.getElementById("ask").value;

  document.getElementById("answer").innerText = "Thinking...";

  const res = await fetch(backend + "/ask", {
    method:"POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({question:q})
  });

  const data = await res.json();
  document.getElementById("answer").innerText = data.answer;
}

/* DOWNLOAD STORY */
function downloadText() {
  const text = document.getElementById("story").innerText;
  const blob = new Blob([text], {type:"text/plain"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "story.txt";
  a.click();
}

</script>

</body>
</html>
