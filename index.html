<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
  display:flex;
  flex-direction:column;
  height:100vh;
}

#topBar {
  display:flex;
  overflow-x:auto;
  padding:10px;
  background:#1a1a1a;
}

#topBar button {
  margin-right:8px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#ff6a00;
  color:white;
  font-weight:bold;
}

#chat {
  flex:1;
  overflow:auto;
  padding:10px;
}

.msg {
  margin:8px;
  padding:10px;
  border-radius:10px;
  max-width:80%;
  white-space:pre-wrap;
}

.user { background:#ff6a00; margin-left:auto; }
.ai { background:#1f1f1f; }

img, video {
  width:100%;
  border-radius:10px;
  margin-top:10px;
}

#bottomBar {
  display:flex;
  padding:10px;
  background:#1a1a1a;
}

#bottomBar input {
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#111;
  color:white;
}

#bottomBar button {
  margin-left:5px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#ff6a00;
  color:white;
}
</style>
</head>

<body>

<!-- TOP FEATURES -->
<div id="topBar">
  <button onclick="quick('Funny TikTok story')">😂</button>
  <button onclick="quick('Sad emotional story')">💔</button>
  <button onclick="quick('Anime battle scene')">🔥</button>
  <button onclick="quick('Make money online idea')">💰</button>
  <button onclick="quick('Create viral video')">🎬</button>
  <button onclick="toggleTikTok()">🎵</button>
</div>

<!-- CHAT -->
<div id="chat"></div>

<!-- IMAGE UPLOAD -->
<input type="file" id="upload" accept="image/*" style="margin:5px;" onchange="handleUpload()">

<!-- INPUT -->
<div id="bottomBar">
  <input id="input" placeholder="Ask anything...">
  <button onclick="send()">Send</button>
</div>

<p style="text-align:center;">✨ Powered by Artical Neavy</p>

<script>

let tiktok = false;

// ADD MESSAGE
function addMessage(text,type){
  let chat = document.getElementById("chat");
  let div = document.createElement("div");
  div.className = "msg " + type;
  div.innerHTML = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// TYPING
function typeMessage(text){
  let i = 0;
  let chat = document.getElementById("chat");

  let div = document.createElement("div");
  div.className = "msg ai";
  chat.appendChild(div);

  function typing(){
    if(i < text.length){
      div.innerHTML += text.charAt(i);
      i++;
      chat.scrollTop = chat.scrollHeight;
      setTimeout(typing, 15);
    }
  }

  typing();
}

// VOICE
function speak(text){
  let speech = new SpeechSynthesisUtterance(text);
  speech.rate = 1;
  window.speechSynthesis.speak(speech);
}

// QUICK
function quick(text){
  document.getElementById("input").value = text;
}

// TIKTOK
function toggleTikTok(){
  tiktok = !tiktok;
  alert("TikTok Mode: " + (tiktok ? "ON 🔥" : "OFF"));
}

// DOWNLOADS
function downloadImage(url){
  let a = document.createElement("a");
  a.href = url;
  a.download = "image.jpg";
  a.click();
}

function downloadVideo(url){
  let a = document.createElement("a");
  a.href = url;
  a.download = "video.mp4";
  a.click();
}

// IMAGE → VIDEO (UPLOAD)
function handleUpload(){
  let file = document.getElementById("upload").files[0];
  if(!file) return;

  let url = URL.createObjectURL(file);

  addMessage(`
    🖼 Uploaded Image:
    <img src="${url}">
    🎬 Converted to Video:
    <video controls>
      <source src="https://samplelib.com/lib/preview/mp4/sample-5s.mp4">
    </video>
  `,"ai");
}

// SEND
function send(){
  let input = document.getElementById("input").value.trim();
  if(!input) return;

  addMessage(input,"user");

  let lower = input.toLowerCase();

  // IMAGE
  if(lower.includes("image")){
    let url = "https://image.pollinations.ai/prompt/" + encodeURIComponent(input);

    addMessage(`
      🖼 Image:
      <img src="${url}">
      <button onclick="downloadImage('${url}')">⬇ Download</button>
    `,"ai");
    return;
  }

  // VIDEO
  if(lower.includes("video")){
    let videoUrl = "https://samplelib.com/lib/preview/mp4/sample-5s.mp4";

    addMessage(`
      🎬 Video:
      <video controls>
        <source src="${videoUrl}">
      </video>
      <button onclick="downloadVideo('${videoUrl}')">⬇ Download</button>
    `,"ai");

    // AI VOICE
    speak("Here is your generated video");

    return;
  }

  // STORY
  if(lower.includes("story")){
    let story = `
📖 Story:

Once upon a time, ${input}, in a world full of mystery and power.

Challenges came, but strength grew stronger. A turning point changed everything, leading to a powerful transformation.

✨ The journey had just begun...
`;

    typeMessage(story);
    speak(story);

    // AUTO TIKTOK CAPTIONS
    if(tiktok){
      addMessage("🔥 Caption: This story will blow your mind! #viral #fyp","ai");
    }

    return;
  }

  // DEFAULT CHAT
  let reply = "I understand: " + input + ". Let’s create something powerful 🔥";

  typeMessage(reply);
  speak(reply);
}

</script>

</body>
</html>
