<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ReelMind AI PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ADSENSE -->
<script async 
src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1714638410489429"
crossorigin="anonymous"></script>

<!-- SOCKET.IO -->
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<style>
body{
margin:0;
background:#0b0f14;
color:white;
font-family:Arial;
overflow:hidden;
background-image:url("logo.png");
background-repeat:no-repeat;
background-position:center;
background-size:60%;
}

/* TOP BAR */
#topbar{
position:fixed;
top:0;width:100%;
background:#111;
padding:10px;
display:flex;
justify-content:space-around;
font-size:12px;
z-index:999;
}
#topbar span{color:#00ff88}

/* FEED */
#feed{
position:absolute;
top:50px;
bottom:140px;
width:100%;
overflow-y:scroll;
scroll-snap-type:y mandatory;
}

/* CARD */
.card{
height:100vh;
scroll-snap-align:start;
position:relative;
display:flex;
align-items:center;
justify-content:center;
}

/* MEDIA */
.card img,.card video{
width:100%;
height:100%;
object-fit:cover;
}

/* TEXT */
.overlay{
position:absolute;
bottom:100px;
left:10px;
right:80px;
font-size:14px;
}

/* ACTIONS */
.actions{
position:absolute;
right:10px;
bottom:120px;
display:flex;
flex-direction:column;
gap:20px;
}

.action{
font-size:22px;
cursor:pointer;
}

/* INPUT */
#prompt{
position:fixed;
bottom:90px;
width:90%;
left:5%;
padding:12px;
border-radius:25px;
border:none;
z-index:999;
}

/* CONTROLS */
#controls{
position:fixed;
bottom:0;
width:100%;
height:70px;
display:flex;
justify-content:space-around;
align-items:center;
background:#111;
}

.btn{
width:55px;height:55px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
background:#222;
}

#generate{
background:cyan;
color:black;
font-weight:bold;
width:70px;height:70px;
}

/* ADS */
#ad{
position:fixed;
bottom:70px;
width:100%;
text-align:center;
}
</style>
</head>

<body>

<div id="topbar">
<span id="status">🔴 Offline</span>
<span>User: neavyartical@gmail.com</span>
<span id="credits">Credits: --</span>
<span id="ref">Ref: 0</span>
<span onclick="upgrade()">💰 Upgrade</span>
</div>

<div id="feed"></div>

<input id="prompt" placeholder="Create anything..." />

<div id="controls">
<div class="btn" onclick="upload()">+</div>
<div id="generate" class="btn" onclick="generate()">⚡</div>
<div class="btn" onclick="startVoice()">🎤</div>
</div>

<div id="ad">
<ins class="adsbygoogle"
style="display:block"
data-ad-client="ca-pub-1714638410489429"
data-ad-slot="1714638410"
data-ad-format="auto"
data-full-width-responsive="true"></ins>
</div>

<script>
(adsbygoogle = window.adsbygoogle || []).push({});
</script>

<script>
// ===== CONFIG =====
const API="http://YOUR_SERVER_IP:3000";
const feed=document.getElementById("feed");
const socket = io(API);

// ===== MEMORY =====
let memory = JSON.parse(localStorage.getItem("reelmind_memory") || "[]");

function saveMemory(user, ai){
memory.push({user, ai});
if(memory.length > 10) memory.shift();
localStorage.setItem("reelmind_memory", JSON.stringify(memory));
}

// ===== LOGIN =====
async function ensureLogin(){
if(!localStorage.token){
let r=await fetch(API+"/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email:"neavyartical@gmail.com"})
});
let d=await r.json();
localStorage.token=d.data.token;
}
loadUser();
}

// ===== USER =====
async function loadUser(){
let r=await fetch(API+"/me",{
headers:{Authorization:"Bearer "+localStorage.token}
});
let d=await r.json();

document.getElementById("status").innerText="🟢 Online";
document.getElementById("credits").innerText="Credits: "+(d.data?.credits || 0);
document.getElementById("ref").innerText="Ref: "+(d.data?.referrals || 0);
}

// ===== ADD CARD =====
function addCard(content,type,id){
let c=document.createElement("div");
c.className="card";

let media="";
if(type==="image") media=`<img src="${content}">`;
else if(type==="video") media=`<video autoplay loop muted playsinline src="${content}"></video>`;
else media=`<div class="overlay">${content}</div>`;

c.innerHTML=`
${media}
<div class="actions">
<div class="action" onclick="like(${id})">❤️</div>
<div class="action">💬</div>
<div class="action">🔗</div>
</div>
`;

feed.prepend(c);
}

// ===== LOAD FEED =====
async function loadFeed(){
let r = await fetch(API+"/feed");
let d = await r.json();

d.data.forEach(p=>{
addCard(p.content,p.type,p.id);
});
}

// ===== REAL-TIME =====
socket.on("new_post", (post)=>{
addCard(post.content, post.type, post.id);
});

// ===== LIKE =====
async function like(id){
await fetch(API+"/like/"+id,{method:"POST"});
}

// ===== GENERATE =====
async function generate(){
await ensureLogin();

let input=document.getElementById("prompt");
let p=input.value.trim();
if(!p) return;

input.value="";

// ROUTING
let route="/generate-text";
if(/image|photo|picture|art/i.test(p)) route="/generate-image";
else if(/video|clip|movie/i.test(p)) route="/generate-video";

// PROMPT
let finalPrompt = p;

if(route==="/generate-text"){
finalPrompt = `Create viral TikTok content:\n${p}`;
}

if(route==="/generate-image"){
finalPrompt = p + ", ultra realistic, 8k";
}

// LOADING
addCard("⚡ Generating...","text");

let r=await fetch("https://reelmindbackend-1.onrender.com"+route,{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+localStorage.token
},
body:JSON.stringify({prompt:finalPrompt})
});

let d=await r.json();

let content = d.data?.content || d.data?.url;

// SAVE TO REAL BACKEND
await fetch(API+"/post",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
content:content,
type: route.includes("image")?"image":route.includes("video")?"video":"text"
})
});

saveMemory(p,content);
loadUser();
}

// ===== MIC =====
function startVoice(){
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if(!SpeechRecognition){
alert("Use Chrome browser");
return;
}

let rec=new SpeechRecognition();
rec.onresult=e=>{
document.getElementById("prompt").value=e.results[0][0].transcript;
};
rec.start();
}

// ===== UPLOAD =====
function upload(){
alert("Upload coming soon 🚀");
}

// ===== PAYMENT =====
function upgrade(){
window.open("https://ko-fi.com/articalneavy","_blank");
}

// INIT
ensureLogin();
loadFeed();
</script>

</body>
</html>
