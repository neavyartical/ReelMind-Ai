<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🚀 ReelMind AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#020617;
  color:white;
}
#topbar{
  position:fixed;
  top:0;
  width:100%;
  background:#111;
  padding:10px;
  display:flex;
  justify-content:space-around;
  z-index:1000;
}
.section{
  display:none;
  margin-top:70px;
  padding:20px;
}
.active{
  display:block;
}
#prompt{
  position:fixed;
  bottom:90px;
  width:90%;
  left:5%;
  padding:14px;
  border:none;
  border-radius:30px;
}
#controls{
  position:fixed;
  bottom:0;
  width:100%;
  height:70px;
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
}
.btn{
  width:60px;
  height:60px;
  border-radius:50%;
  background:#06b6d4;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:24px;
  cursor:pointer;
}
.card{
  background:#111;
  padding:15px;
  border-radius:12px;
  margin-top:15px;
}
#creditsBox{
  position:fixed;
  top:50px;
  right:10px;
  background:#111;
  padding:8px;
  border-radius:10px;
}
input{
  padding:10px;
  margin:5px;
  width:90%;
  border:none;
  border-radius:8px;
}
button{
  padding:10px;
  border:none;
  border-radius:8px;
  background:#06b6d4;
  color:white;
  margin-top:5px;
  cursor:pointer;
}
img,video{
  width:100%;
  border-radius:12px;
}
</style>
</head>
<body>

<div id="topbar">
  <div onclick="switchTab('home')">🏠</div>
  <div onclick="switchTab('create')">➕</div>
  <div onclick="switchTab('profile')">👤</div>
  <div onclick="switchTab('admin')">👑</div>
</div>

<div id="creditsBox">💰 Credits: <span id="credits">∞</span></div>

<!-- HOME -->
<div id="home" class="section active">
  <div class="card">
    <h3>💰 Buy Credits</h3>
    <a href="https://ko-fi.com/articalneavy" target="_blank">
      <button>Ko-fi ☕</button>
    </a>
  </div>
</div>

<!-- CREATE -->
<div id="create" class="section">
  <select id="mode">
    <option value="text">Story</option>
    <option value="image">Image</option>
    <option value="video">Video</option>
  </select>

  <div id="result"></div>
</div>

<!-- PROFILE -->
<div id="profile" class="section">
  <h3>User</h3>
  <p id="userEmail">Guest Mode</p>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="emailLogin()">Login</button>
  <button onclick="emailRegister()">Register</button>
  <button onclick="googleLogin()">Google</button>
  <button onclick="logout()">Logout</button>
</div>

<!-- ADMIN -->
<div id="admin" class="section">
  <h3>👑 Admin Panel</h3>
  <button onclick="loadStats()">Load Stats</button>
  <div id="stats"></div>
</div>

<input id="prompt" placeholder="Enter prompt here..." />

<div id="controls">
  <div id="generate" class="btn">⚡</div>
</div>

<script type="module">

const API = "https://YOUR_BACKEND_URL";

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const app = initializeApp({
  apiKey: "YOUR_FIREBASE_KEY",
  authDomain: "reelmind-ai-f07cb.firebaseapp.com"
});

const auth = getAuth(app);
const provider = new GoogleAuthProvider();

let token = null;

function val(id){
  return document.getElementById(id).value;
}

window.switchTab = (tab)=>{
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(tab).classList.add("active");
};

window.googleLogin = ()=>signInWithPopup(auth,provider);
window.emailLogin = ()=>signInWithEmailAndPassword(auth,val("email"),val("password"));
window.emailRegister = ()=>createUserWithEmailAndPassword(auth,val("email"),val("password"));
window.logout = ()=>signOut(auth);

onAuthStateChanged(auth, async user=>{
  if(user){
    token = await user.getIdToken();
    document.getElementById("userEmail").innerText = user.email;
    loadUser();
  }else{
    token = null;
    document.getElementById("userEmail").innerText = "Guest Mode";
    document.getElementById("credits").innerText = "∞";
  }
});

async function loadUser(){
  if(!token) return;

  const res = await fetch(API+"/me",{
    headers:{Authorization:"Bearer "+token}
  });

  const data = await res.json();
  document.getElementById("credits").innerText = data.credits || 0;
}

document.getElementById("generate").onclick = async ()=>{

  const prompt = val("prompt").trim();
  const mode = document.getElementById("mode").value;
  const result = document.getElementById("result");

  if(!prompt) return alert("Enter prompt");

  result.innerHTML = `<div class="card">⚡ Generating...</div>`;

  try{

    // GUEST MODE
    if(!token){

      // STORY / TEXT
      if(mode==="text"){
        const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(prompt)}`);
        const text = await res.text();

        result.innerHTML = `<div class="card">${text}</div>`;
        return;
      }

      // IMAGE
      if(mode==="image"){
        const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?seed=${Date.now()}`;
        result.innerHTML = `<div class="card"><img src="${url}"></div>`;
        return;
      }

      // VIDEO
      result.innerHTML = `<div class="card">⚠️ Login required for video generation</div>`;
      return;
    }

    // LOGGED IN MODE
    let endpoint="/generate-text";
    if(mode==="image") endpoint="/generate-image";
    if(mode==="video") endpoint="/generate-video";

    const res = await fetch(API+endpoint,{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+token
      },
      body:JSON.stringify({prompt})
    });

    const data = await res.json();

    if(mode==="text"){
      result.innerHTML = `<div class="card">${data?.data?.content || data?.output || "No response"}</div>`;
    }

    if(mode==="image"){
      const url = data?.data?.url || data?.output;
      result.innerHTML = `<div class="card"><img src="${url}"></div>`;
    }

    if(mode==="video"){
      const vid = data?.preview;
      result.innerHTML = `<div class="card"><video src="${vid}" controls></video></div>`;
    }

    loadUser();

  }catch(e){
    console.error(e);
    result.innerHTML = `<div class="card">❌ Failed</div>`;
  }
};

window.loadStats = async ()=>{
  const res = await fetch(API+"/admin");
  const data = await res.json();

  document.getElementById("stats").innerHTML =
    `<div class="card">Users: ${data.users}<br>Requests: ${data.requests}</div>`;
};

</script>

</body>
</html>
