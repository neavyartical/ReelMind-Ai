<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <style>
    body {
      background: #0b1a33;
      color: white;
      text-align: center;
      font-family: Arial;
      padding-top: 50px;
    }
    input {
      width: 80%;
      padding: 12px;
      border-radius: 6px;
      border: none;
      margin-bottom: 10px;
    }
    button {
      width: 80%;
      padding: 12px;
      background: #22c55e;
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 16px;
    }
    img {
      margin-top: 20px;
      max-width: 90%;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h2>🎬 ReelMind AI</h2>

<input id="prompt" placeholder="Enter prompt..." />
<br>
<button onclick="generate()">Generate</button>

<p id="status"></p>
<img id="result" />

<script>
async function generate() {
  const prompt = document.getElementById("prompt").value;
  const status = document.getElementById("status");
  const img = document.getElementById("result");

  status.innerText = "⏳ Generating...";
  img.src = "";

  try {
    const response = await fetch("https://backend-ppyz.onrender.com/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({ prompt }),
    });

    const data = await response.json();

    if (data.image) {
      img.src = data.image;
      status.innerText = "✅ Done!";
    } else {
      status.innerText = "❌ " + JSON.stringify(data);
    }

  } catch (err) {
    status.innerText = "❌ " + err.message;
  }
}
</script>

</body>
</html>
