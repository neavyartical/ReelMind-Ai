<!DOCTYPE html>
<!-- v6 HD upgrade -->
<html>
<head>
  <title>ReelMind AI PRO</title>
</head>

<body style="background:#0b1d2a;color:white;text-align:center;font-family:sans-serif;">

  <h1>🎬 ReelMind AI PRO</h1>

  <input id="prompt" placeholder="Describe your scene..." style="width:80%;padding:10px;" />
  <br><br>

  <select id="style" style="padding:10px;">
    <option value="cinematic lighting, ultra realistic, 8k">Cinematic</option>
    <option value="anime style, vibrant colors, sharp">Anime</option>
    <option value="pixar style, 3d render, high detail">Pixar</option>
    <option value="photorealistic, ultra detailed, sharp focus">Realistic</option>
  </select>

  <br><br>

  <button onclick="generate()">Generate</button>
  <br><br>

  <button id="downloadBtn" style="display:none;padding:10px 20px;background:#3b82f6;color:white;border:none;">
    Download Image
  </button>

  <p id="status"></p>

  <div id="gallery"></div>

  <script>
    let imageURL = "";

    async function generate() {
      const prompt = document.getElementById("prompt").value;
      const style = document.getElementById("style").value;
      const status = document.getElementById("status");
      const gallery = document.getElementById("gallery");
      const downloadBtn = document.getElementById("downloadBtn");

      const finalPrompt = prompt + ", " + style + ", ultra detailed, sharp focus, 8k resolution, masterpiece";

      status.innerText = "Generating...";
      gallery.innerHTML = "";
      downloadBtn.style.display = "none";

      try {
        const response = await fetch("https://backend-ppyz.onrender.com/generate?v=6", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ prompt: finalPrompt })
        });

        if (!response.ok) {
          status.innerText = "Error generating image";
          return;
        }

        const blob = await response.blob();
        imageURL = URL.createObjectURL(blob);

        const img = document.createElement("img");
        img.src = imageURL;
        img.style.width = "90%";
        img.style.marginTop = "20px";
        img.style.borderRadius = "10px";

        gallery.appendChild(img);

        status.innerText = "Done!";
        downloadBtn.style.display = "inline-block";

      } catch {
        status.innerText = "Error generating image";
      }
    }

    document.getElementById("downloadBtn").onclick = function () {
      if (!imageURL) return;

      const a = document.createElement("a");
      a.href = imageURL;
      a.download = "reelmind-hd.png";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    };
  </script>

</body>
</html>
