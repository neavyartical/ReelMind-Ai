<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReelMind AI</title>

<!-- ADSENSE -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXX"
crossorigin="anonymous"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  color:white;
  text-align:center;
  overflow:hidden;

  background:
    radial-gradient(circle at 30% 30%, rgba(0,255,255,0.2), transparent),
    radial-gradient(circle at 70% 70%, rgba(0,150,255,0.2), transparent),
    linear-gradient(135deg,#0f2027,#1c92d2,#000428);
}

.scene{
  width:220px;
  height:220px;
  margin:30px auto;
  perspective:800px;
}

.cube{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
}

.face{
  position:absolute;
  width:220px;
  height:220px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:20px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
}

.face button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#00c6ff;
  color:white;
}

.front{transform:translateZ(110px)}
.back{transform:rotateY(180deg) translateZ(110px)}
.right{transform:rotateY(90deg) translateZ(110px)}
.left{transform:rotateY(-90deg) translateZ(110px)}
.top{transform:rotateX(90deg) translateZ(110px)}
.bottom{transform:rotateX(-90deg) translateZ(110px)}

input{
  width:80%;
  padding:12px;
  border:none;
  border-radius:12px;
  margin-top:10px;
}

button{
  margin:10px;
  padding:12px 20px;
  border:none;
  border-radius:12px;
  background:#00c6ff;
  color:white;
}

#app{display:none;}
</style>
</head>

<body>

<h2>ReelMind AI</h2>

<!-- LOGIN -->
<div id="login">
<h3>Login / Register</h3>

<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>
<button onclick="register()">Register</button>
</div>

<!-- APP -->
<div id="app">

<div class="scene">
<div class="cube" id="cube">
<div class="face front"><button onclick="setMode('chat')">Chat</button></div>
<div class="face back"><button onclick="setMode('story')">Story</button></div>
<div class="face right"><button onclick="setMode('image')">Image</button></div>
<div class="face left"><button onclick="setMode('video')">Video</button></div>
<div class="face top"><button onclick="setMode('music')">Music</button></div>
<div class="face bottom"><button onclick="setMode('money')">Money</button></div>
</div>
</div>

<input id="prompt" placeholder="Enter your idea...">

<br>

<button onclick="generate()">Generate</button>
<button onclick="logout()">Logout</button>

<div id="output"></div>

<!-- ADS -->
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-XXXX"
     data-ad-slot="1234567890"
     data-ad-format="auto"
     data-full-width-responsive="true"></ins>

<script>
(adsbygoogle = window.adsbygoogle || []).push({});
</script>

<button onclick="buy()">Unlock Premium ($9)</button>

<h3>Powered by Artical Neavy</h3>
<p>$9/month | $99/year</p>

</div>

<script>
let mode="chat";
let user="";
let rotateY=0;

/* AUTO LOGIN */
window.onload=()=>{
  let saved=localStorage.getItem("user");
  if(saved){
    user=saved;
    showApp();
  }
};

/* ROTATE CUBE AUTO */
setInterval(()=>{
  rotateY += 1;
  document.getElementById("cube").style.transform =
    `rotateX(20deg) rotateY(${rotateY}deg)`;
},50);

/* MODE */
function setMode(m){
  mode=m;
  alert("Mode: "+m);
}

/* REGISTER */
function register(){
  let u=document.getElementById("user").value;
  let p=document.getElementById("pass").value;

  fetch("https://reelmindbackend-1.onrender.com/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username:u,password:p})
  })
  .then(r=>r.json())
  .then(d=>{
    if(d.success){
      alert("Registered! Login now");
    }else{
      alert("User exists");
    }
  });
}

/* LOGIN */
function login(){
  let u=document.getElementById("user").value;
  let p=document.getElementById("pass").value;

  fetch("https://reelmindbackend-1.onrender.com/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username:u,password:p})
  })
  .then(r=>r.json())
  .then(d=>{
    if(d.success){
      user=u;
      localStorage.setItem("user",u);
      showApp();
    }else{
      alert("Login failed");
    }
  });
}

function showApp(){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("user");
  location.reload();
}

/* GENERATE */
async function generate(){
  let prompt=document.getElementById("prompt").value;

  if(!prompt){
    alert("Enter prompt");
    return;
  }

  let output=document.getElementById("output");
  output.innerHTML="⏳ Generating...";

  try{
    let res=await fetch("https://reelmindbackend-1.onrender.com/generate",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({prompt:prompt,type:mode})
    });

    let data=await res.json();

    if(mode==="image"){
      output.innerHTML=`<img src="${data.result}" width="250">`;
    }else{
      output.innerText=data.result;
    }

  }catch(e){
    output.innerHTML="❌ Server error";
  }
}

/* PREMIUM */
function buy(){
  fetch("https://reelmindbackend-1.onrender.com/verify",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username:user})
  })
  .then(r=>r.json())
  .then(d=>{
    if(d.success){
      alert("Premium unlocked!");
    }
  });
}
</script>

</body>
</html>
