<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Icons -->
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
body {
  margin:0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg,#1a002b,#ff5e00);
  color:white;
}

/* HEADER */
.header {
  padding:15px;
  font-size:20px;
  font-weight:600;
  text-align:center;
  letter-spacing:1px;
}

/* ICON BAR */
.icon-bar {
  display:flex;
  justify-content:space-around;
  padding:12px;
  backdrop-filter: blur(10px);
}

.icon-btn {
  background: rgba(255,255,255,0.08);
  padding:12px;
  border-radius:16px;
  transition:0.3s;
}

.icon-btn:hover {
  background: rgba(255,255,255,0.2);
  transform: scale(1.1);
}

.material-icons {
  font-size:28px;
  color:white;
}

/* TABS */
.tab {
  padding:20px;
}

.hidden {
  display:none;
}

/* CARD STYLE */
.card {
  background: rgba(255,255,255,0.08);
  padding:20px;
  border-radius:20px;
  margin-top:15px;
  backdrop-filter: blur(12px);
}

/* BUTTON */
button {
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background: linear-gradient(90deg,#ff5e00,#ff9a00);
  color:white;
  font-size:16px;
  margin-top:10px;
}

button:hover {
  opacity:0.9;
}

/* FILE INPUT */
input[type="file"] {
  margin-top:10px;
}

</style>
</head>

<body>

<div class="header">🔥 ReelMind AI</div>

<!-- ICON NAV -->
<div class="icon-bar">
  <div class="icon-btn" onclick="switchTab('home')">
    <span class="material-icons">home</span>
  </div>

  <div class="icon-btn" onclick="switchTab('create')">
    <span class="material-icons">auto_awesome</span>
  </div>

  <div class="icon-btn" onclick="switchTab('upload')">
    <span class="material-icons">cloud_upload</span>
  </div>

  <div class="icon-btn" onclick="switchTab('settings')">
    <span class="material-icons">settings</span>
  </div>
</div>

<!-- HOME -->
<div id="home" class="tab">
  <div class="card">
    <h2>Welcome</h2>
    <p>Create viral reels, AI videos, and cinematic content.</p>
  </div>
</div>

<!-- CREATE -->
<div id="create" class="tab hidden">
  <div class="card">
    <h2>Generate Content</h2>
    <input type="text" placeholder="Enter your idea..." id="prompt">
    <button onclick="generate()">Generate</button>
    <p id="result"></p>
  </div>
</div>

<!-- UPLOAD -->
<div id="upload" class="tab hidden">
  <div class="card">
    <h2>Upload Media</h2>
    <input type="file">
    <button>Upload</button>
  </div>
</div>

<!-- SETTINGS -->
<div id="settings" class="tab hidden">
  <div class="card">
    <h2>Settings</h2>
    <p>API & preferences coming soon.</p>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

  window.switchTab = function(tab) {
    document.querySelectorAll(".tab").forEach(t => t.classList.add("hidden"));
    document.getElementById(tab).classList.remove("hidden");
  }

  // SAFE GENERATE FUNCTION (NO API YET)
  window.generate = function() {
    let input = document.getElementById("prompt").value;

    if(!input){
      alert("Enter something first!");
      return;
    }

    // Simulate AI response (NO CRASH)
    document.getElementById("result").innerText =
      "✨ Generating viral idea for: " + input + "...\n\n🔥 Result: Cinematic reel idea ready!";
  }

});
</script>

</body>
</html>
