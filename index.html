<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ReelMind AI</title>

<style>

/* 🌌 BACKGROUND */
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* 🔝 HEADER */
.header {
  padding: 15px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

/* 📦 MAIN */
.container {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
}

/* 💬 OUTPUT */
#output {
  margin-bottom: 15px;
  white-space: pre-wrap;
}

/* ⌨ INPUT */
.input-box {
  display: flex;
  padding: 10px;
  background: rgba(255,255,255,0.05);
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 20px;
  border: none;
  outline: none;
}

/* 🔘 BUTTON */
button {
  margin-left: 10px;
  background: linear-gradient(135deg, #ff4ecd, #7a5cff);
  border: none;
  padding: 12px 16px;
  border-radius: 20px;
  color: white;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 5px 20px rgba(0,0,0,0.3);
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

/* 🎯 ICON MENU */
.menu {
  display: flex;
  overflow-x: auto;
  padding: 10px;
  gap: 10px;
}

.menu div {
  padding: 10px;
  background: rgba(255,255,255,0.1);
  border-radius: 15px;
  white-space: nowrap;
  animation: float 3s ease-in-out infinite;
}

/* ✨ FLOAT ANIMATION */
@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-5px); }
  100% { transform: translateY(0px); }
}

</style>
</head>

<body>

<div class="header">🚀 ReelMind AI</div>

<!-- MENU -->
<div class="menu">
  <div>💬 Chat</div>
  <div>📖 Story</div>
  <div>🖼 Image</div>
  <div onclick="generateVideo()">🎬 Video</div>
  <div>😂 Funny</div>
  <div>💔 Sad</div>
  <div>🔥 Anime</div>
  <div>💰 Money</div>
  <div>🚀 TikTok</div>
</div>

<!-- CONTENT -->
<div class="container">
  <div id="output">⚡ Welcome to ReelMind AI</div>
</div>

<!-- INPUT -->
<div class="input-box">
  <input id="input" placeholder="Type something..." />
  <button onclick="sendMessage()">➤</button>
</div>

<!-- PREMIUM -->
<div style="text-align:center; padding:10px;">
  <button onclick="buyPremium()">💎 Upgrade</button>
</div>

<script>

/* 🔗 CHANGE THIS TO YOUR RENDER URL */
const API_URL = "https://YOUR-RENDER-URL.onrender.com/chat";

/* 💬 CHAT FUNCTION */
async function sendMessage() {
  const input = document.getElementById("input").value;

  if (!input) return;

  document.getElementById("output").innerText = "💭 Thinking...";

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: input
      })
    });

    const data = await res.json();

    document.getElementById("output").innerText = data.reply;

  } catch (err) {
    document.getElementById("output").innerText =
      "❌ Error connecting to AI";
  }
}

/* 🎬 VIDEO GENERATOR (SMART) */
async function generateVideo() {
  const input = document.getElementById("input").value;

  document.getElementById("output").innerText =
    "🎬 Generating cinematic scene...";

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: "Create a cinematic video scene: " + input
      })
    });

    const data = await res.json();

    document.getElementById("output").innerText =
      "🎥 Scene Idea:\n\n" + data.reply +
      "\n\n⚡ Upgrade to Premium for real video";

  } catch (err) {
    document.getElementById("output").innerText =
      "❌ Video generation failed";
  }
}

/* 💰 PREMIUM BUTTON */
function buyPremium() {
  alert("🚀 Premium coming soon (Real video + no limits)");
}

</script>

</body>
</html>
