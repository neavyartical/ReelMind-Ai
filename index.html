<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ReelMind AI PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
window.API = "https://reelmindbackend-1.onrender.com";
</script>

<style>
body{margin:0;background:#0b0f14;color:white;font-family:Arial}

/* NAV */
#topbar{
position:fixed;top:0;width:100%;
background:#111;padding:12px;
display:flex;justify-content:space-around;
z-index:1000
}

/* SECTIONS */
.section{
display:none;
margin-top:70px;
padding:20px;
padding-bottom:160px;
}
.active{display:block}

/* FEED */
#feed{padding-bottom:160px}

/* LOGIN */
#loginBox{
position:fixed;width:100%;height:100%;
background:#000d;
display:flex;justify-content:center;align-items:center;
z-index:2000
}

.loginCard{
background:#111;padding:20px;border-radius:10px;text-align:center
}

/* CONTROLS */
#controls{
position:fixed;bottom:0;width:100%;height:70px;
display:flex;justify-content:space-around;
background:#111;z-index:999
}

.btn{
width:55px;height:55px;border-radius:50%;
display:flex;align-items:center;justify-content:center;
background:#222;font-size:22px;cursor:pointer
}

#generate{background:cyan;color:black}

/* INPUT */
#prompt{
position:fixed;bottom:90px;width:90%;
left:5%;padding:12px;border-radius:25px;border:none;
z-index:999
}

/* WELCOME */
#welcome{
position:fixed;width:100%;height:100%;
display:flex;justify-content:center;align-items:center;
background:#000;z-index:3000;
opacity:0;transition:.5s
}
#welcome.active{opacity:1}

/* FOOTER */
#footer{
text-align:center;
font-size:12px;
color:#888;
padding:20px;
margin-bottom:100px;
}
</style>
</head>

<body>

<div id="welcome"><h1>🚀 ReelMind AI</h1></div>

<!-- LOGIN -->
<div id="loginBox">
<div class="loginCard">
<h3>Login</h3>
<div class="btn" onclick="emailLogin()">📧</div>
<div class="btn" onclick="googleLogin()">🟢</div>
</div>
</div>

<!-- NAV -->
<div id="topbar">
<span onclick="show('feedSection')">Home</span>
<span onclick="showProfile()">Profile</span>
<span onclick="upgrade()">💳</span>
</div>

<!-- FEED -->
<div id="feedSection" class="section active">
<div id="feed"></div>
</div>

<!-- PROFILE -->
<div id="profileSection" class="section">
<h3 id="userEmail">User</h3>
<p id="userStats">Credits: --</p>

<button onclick="upgrade()" style="padding:10px;background:cyan;border:none;border-radius:10px;">
💳 Buy Credits
</button>
</div>

<input id="prompt" placeholder="Create anything..." />

<div id="controls">
<div id="generate" class="btn" onclick="generate()">⚡</div>
</div>

<div id="footer">Powered by Artical Neavy</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/12.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.12.0/firebase-auth-compat.js"></script>

<script>
firebase.initializeApp({
apiKey: "AIzaSyCraJ2lDNrPU7O_qDz4J6_aCNrR_l4ex-I",
authDomain: "reelmind-ai-a11eb.firebaseapp.com",
projectId: "reelmind-ai-a11eb"
});

const auth = firebase.auth();
let USER_CREDITS = 0;

/* TOKEN FIX */
async function getToken(){
const user = auth.currentUser;
if(!user) return null;
return await user.getIdToken(true);
}

/* LOGIN */
async function emailLogin(){
let email=prompt("Email");
let pass=prompt("Password");
try{
await auth.signInWithEmailAndPassword(email,pass);
}catch{
await auth.createUserWithEmailAndPassword(email,pass);
}
}

function googleLogin(){
auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
}

/* AUTH */
auth.onAuthStateChanged(user=>{
if(user){
loginBox.style.display="none";

welcome.classList.add("active");
setTimeout(()=>welcome.classList.remove("active"),2000);

loadProfile();
}
});

/* NAV */
function show(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* PROFILE */
async function loadProfile(){
const token = await getToken();
if(!token) return;

let r = await fetch(API+"/me",{
headers:{Authorization:"Bearer "+token}
});

let d = await r.json();

USER_CREDITS = d.data?.credits || 0;

userEmail.innerText = d.data?.email || "User";
userStats.innerText = "Credits: " + USER_CREDITS;
}

function showProfile(){
show('profileSection');
}

/* USE CREDIT */
async function useCredit(amount){
if(USER_CREDITS < amount){
alert("💳 Not enough credits");
upgrade();
return false;
}

const token = await getToken();

await fetch(API+"/use-credit",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},
body:JSON.stringify({amount})
});

USER_CREDITS -= amount;
userStats.innerText = "Credits: " + USER_CREDITS;

return true;
}

/* GENERATE */
async function generate(){
const token = await getToken();
if(!token) return alert("Login first");

let p = prompt.value;
if(!p) return;

/* COST LOGIC */
let cost = 1;
if(/image/i.test(p)) cost = 2;
if(/video/i.test(p)) cost = 5;

/* PAYWALL */
let ok = await useCredit(cost);
if(!ok) return;

/* ROUTE */
let route = "/generate-text";
if(cost === 2) route = "/generate-image";
if(cost === 5) route = "/generate-video";

let r = await fetch(API + route,{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},
body:JSON.stringify({prompt:p})
});

let d = await r.json();

if(d.error){
alert(d.error);
return;
}

addCard(d.data?.content || d.data?.url);
}

/* CARD */
function addCard(content){
let c=document.createElement("div");
c.innerHTML=`<div style="padding:10px">${content}</div>`;
feed.prepend(c);
}

/* UPGRADE */
function upgrade(){
window.open("https://ko-fi.com/articalneavy","_blank");
}
</script>

</body>
</html>
