<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- GOOGLE ADSENSE -->
  <script async 
    src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1714638410489429"
    crossorigin="anonymous"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0f14;
      color: white;
    }

    #header {
      padding: 15px;
      text-align: center;
      background: #111;
      border-bottom: 1px solid #222;
    }

    #chat {
      height: 65vh;
      overflow-y: auto;
      padding: 10px;
    }

    .msg {
      padding: 12px;
      margin: 10px;
      border-radius: 12px;
      max-width: 80%;
    }

    .user { background: #1f1f1f; margin-left: auto; }
    .ai { background: #16212b; }

    #inputArea {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      padding: 10px;
      background: #111;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 20px;
      border: none;
    }

    button {
      margin-left: 5px;
      border-radius: 20px;
      padding: 10px;
      border: none;
      background: #00ff88;
      font-weight: bold;
    }

    .topbar {
      display: flex;
      justify-content: space-around;
      background: #0d1117;
      padding: 10px;
    }

    .topbtn {
      background: #222;
      color: white;
      padding: 8px;
      border-radius: 10px;
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    .premium {
      color: red;
    }
  </style>
</head>

<body>

<div id="header">🚀 ReelMind AI (Pro)</div>

<div class="topbar">
  <button class="topbtn" onclick="login()">Login</button>
  <button class="topbtn" onclick="generateImage()">Image</button>
  <button class="topbtn" onclick="loadHistory()">History</button>
  <button class="topbtn" onclick="upgrade()">💰 Upgrade</button>
</div>

<div id="chat"></div>

<!-- ADS BLOCK -->
<div style="text-align:center;">
  <ins class="adsbygoogle"
    style="display:block"
    data-ad-client="ca-pub-1714638410489429"
    data-ad-slot="1234567890"
    data-ad-format="auto"
    data-full-width-responsive="true"></ins>
</div>

<script>
(adsbygoogle = window.adsbygoogle || []).push({});
</script>

<div id="inputArea">
  <input id="prompt" placeholder="Ask anything..." />
  <button onclick="send()">Send</button>
</div>

<script>
const API = "https://reelmindbackend-1.onrender.com";

// ===== LOGIN =====
async function login(){
  let email = prompt("Enter email:");
  const res = await fetch(API+"/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({email})
  });
  const data = await res.json();
  localStorage.setItem("token", data.token);
  alert("✅ Logged in!");
}

// ===== PREMIUM CHECK =====
function isPremium(){
  return localStorage.getItem("premium") === "true";
}

// ===== SEND MESSAGE =====
async function send(){
  const input = document.getElementById("prompt").value;
  const chat = document.getElementById("chat");
  const token = localStorage.getItem("token");

  if(!token) return alert("Login first");

  chat.innerHTML += `<div class="msg user">${input}</div>`;

  let aiDiv = document.createElement("div");
  aiDiv.className = "msg ai";
  aiDiv.innerHTML = "⚡ Thinking...";
  chat.appendChild(aiDiv);

  const res = await fetch(API+"/generate-text",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+token
    },
    body: JSON.stringify({prompt: input})
  });

  const data = await res.json();

  if(data.error){
    aiDiv.innerHTML = data.error;
    return;
  }

  // STREAM EFFECT
  let text = data.result;
  aiDiv.innerHTML = "";
  let i = 0;

  function type(){
    if(i < text.length){
      aiDiv.innerHTML += text.charAt(i);
      i++;
      setTimeout(type, 8);
    }
  }

  type();
}

// ===== IMAGE (PREMIUM LOCK) =====
async function generateImage(){
  if(!isPremium()){
    alert("🔒 Upgrade to use image generation");
    return;
  }

  const input = document.getElementById("prompt").value;
  const token = localStorage.getItem("token");
  const chat = document.getElementById("chat");

  const res = await fetch(API+"/generate-image",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+token
    },
    body: JSON.stringify({prompt: input})
  });

  const data = await res.json();

  chat.innerHTML += `
    <div class="msg ai">
      <img src="${data.image}">
    </div>`;
}

// ===== HISTORY =====
async function loadHistory(){
  const token = localStorage.getItem("token");
  const chat = document.getElementById("chat");

  const res = await fetch(API+"/history",{
    headers:{"Authorization":"Bearer "+token}
  });

  const data = await res.json();

  data.forEach(p=>{
    chat.innerHTML += `
      <div class="msg user">${p.prompt}</div>
      <div class="msg ai">${p.result}</div>
    `;
  });
}

// ===== UPGRADE =====
function upgrade(){
  window.open("https://ko-fi.com/articalneavy", "_blank");

  // simulate unlock after payment
  setTimeout(()=>{
    localStorage.setItem("premium", "true");
    alert("🎉 Premium Activated!");
  }, 3000);
}
</script>

</body>
</html>
