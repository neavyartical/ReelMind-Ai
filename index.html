<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ADSENSE -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1714638410489429" crossorigin="anonymous"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: white;
      background: linear-gradient(135deg, #0b0b0b, #111);
    }

    #nav {
      padding: 12px;
      text-align: center;
      background: #000;
    }

    #nav a {
      color: #00ffc3;
      margin: 0 6px;
      text-decoration: none;
    }

    #dashboard {
      padding: 10px;
      text-align: center;
      font-size: 14px;
      background: #111;
    }

    #chat {
      height: 55vh;
      overflow-y: auto;
      padding: 15px;
    }

    .msg {
      padding: 12px;
      margin: 10px;
      border-radius: 12px;
      max-width: 80%;
    }

    .user {
      background: #1f1f1f;
      margin-left: auto;
    }

    .ai {
      background: #2b2b2b;
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    #controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 5px;
      background: #111;
    }

    .btn {
      margin: 5px;
      padding: 8px 12px;
      border-radius: 20px;
      border: none;
      background: #00ffc3;
      font-weight: bold;
    }

    #inputArea {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      background: #000;
      padding: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: none;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: gray;
    }

    .loader {
      border: 4px solid #333;
      border-top: 4px solid #00ffc3;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      margin: 10px;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

<!-- NAV -->
<div id="nav">
  ReelMind AI 🚀 |
  <a href="#">About</a>
  <a href="#">Blog</a>
  <a href="#">Contact</a>
  <a href="#">Privacy</a>
  <a href="#">Terms</a>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  👤 User | Credits: <span id="credits">--</span> | Premium: <span id="premium">No</span>
</div>

<!-- CHAT -->
<div id="chat"></div>

<!-- CONTROLS -->
<div id="controls">
  <button class="btn" onclick="mode='text'">💬 AI</button>
  <button class="btn" onclick="mode='image'">🖼 Image</button>
  <button class="btn" onclick="mode='reel'">🎬 Reel</button>
  <button class="btn" onclick="goPremium()">💎 Premium</button>
  <button class="btn" onclick="loadDashboard()">📊 Dashboard</button>
</div>

<!-- ADS -->
<div style="text-align:center;">
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-1714638410489429"
       data-ad-slot="1234567890"
       data-ad-format="auto"></ins>
</div>

<script>
(adsbygoogle = window.adsbygoogle || []).push({});
</script>

<!-- INPUT -->
<div id="inputArea">
  <input id="userInput" placeholder="Create something viral..." />
  <button onclick="send()">Send</button>
</div>

<!-- FOOTER -->
<footer>
  Powered by Artical Neavy ⚡ <br>
  Terms • Privacy • Contact
</footer>

<script>
const BASE_URL = "https://reelmindbackend-1.onrender.com";
let TOKEN = localStorage.getItem("token") || "demo";
localStorage.setItem("token", TOKEN);

let mode = "text";

// SEND FUNCTION
async function send() {
  const input = userInput.value;
  if (!input) return;

  chat.innerHTML += `<div class="msg user">${input}</div>`;

  const loader = document.createElement("div");
  loader.className = "loader";
  chat.appendChild(loader);

  try {

    // TEXT
    if (mode === "text") {
      const res = await fetch(BASE_URL + "/generate-text", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + TOKEN
        },
        body: JSON.stringify({ prompt: input })
      });

      const data = await res.json();
      loader.remove();

      chat.innerHTML += `<div class="msg ai">${data?.choices?.[0]?.message?.content || data.result}</div>`;
    }

    // IMAGE
    if (mode === "image") {
      const res = await fetch(BASE_URL + "/generate-image", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + TOKEN
        },
        body: JSON.stringify({ prompt: input })
      });

      const data = await res.json();
      loader.remove();

      chat.innerHTML += `<div class="msg ai"><img src="${data.image}"><br><a href="${data.image}" download>Download</a></div>`;
    }

    // REELS
    if (mode === "reel") {
      const res = await fetch(BASE_URL + "/viral-reel", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + TOKEN
        },
        body: JSON.stringify({ prompt: input })
      });

      const data = await res.json();
      loader.remove();

      chat.innerHTML += `
        <div class="msg ai">
          🎬 ${data.script}<br><br>
          ${data.scenes.join("<br>")}<br><br>
          ${data.captions.join("<br>")}<br><br>
          ${data.hashtags.join(" ")}
        </div>`;
    }

  } catch {
    loader.remove();
    chat.innerHTML += `<div class="msg ai">⚠️ Error</div>`;
  }

  userInput.value = "";
  chat.scrollTop = chat.scrollHeight;
}

// DASHBOARD
async function loadDashboard() {
  const res = await fetch(BASE_URL + "/dashboard", {
    headers: { "Authorization": "Bearer " + TOKEN }
  });

  const data = await res.json();

  document.getElementById("credits").innerText = data.credits || 0;
  document.getElementById("premium").innerText = data.premium ? "Yes" : "No";
}

// PREMIUM
function goPremium() {
  fetch(BASE_URL + "/pay", {
    method: "POST",
    headers: { "Authorization": "Bearer " + TOKEN }
  })
  .then(res => res.json())
  .then(data => {
    window.location = data.url;
  });
}

// AUTO LOAD DASHBOARD
loadDashboard();
</script>

</body>
</html>
