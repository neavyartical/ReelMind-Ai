<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ReelMind AI</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      text-align: center;
      font-family: Arial;
      padding: 40px;
    }

    input {
      width: 80%;
      padding: 15px;
      border-radius: 10px;
      border: none;
      margin-bottom: 20px;
    }

    button {
      padding: 15px 30px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: white;
      font-size: 18px;
      cursor: pointer;
    }

    video {
      margin-top: 30px;
      width: 80%;
      border-radius: 10px;
    }
  </style>
</head>
<body>

  <h1>🎬 ReelMind AI</h1>

  <input id="prompt" placeholder="Type your idea..." />
  <br>
  <button onclick="generate()">Generate</button>

  <p id="status"></p>

  <video id="video" controls></video>

  <script>
    async function generate() {
      const prompt = document.getElementById("prompt").value;
      const status = document.getElementById("status");
      const video = document.getElementById("video");

      status.innerText = "Generating...";
      video.src = "";

      try {
        const response = await fetch("https://YOUR-RENDER-URL.onrender.com/generate", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            prompt: prompt
          })
        });

        const blob = await response.blob();
        const url = URL.createObjectURL(blob);

        video.src = url;
        status.innerText = "Done ✅";

      } catch (error) {
        console.error(error);
        status.innerText = "Failed ❌";
      }
    }
  </script>

</body>
</html>
