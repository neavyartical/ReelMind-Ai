<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ADSENSE -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1714638410489429" crossorigin="anonymous"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: white;
      background: url('logo.png') center/cover no-repeat fixed;
      backdrop-filter: blur(8px);
    }

    #nav {
      background: rgba(0,0,0,0.85);
      padding: 12px;
      text-align: center;
      font-weight: bold;
    }

    #nav a {
      color: #00ffc3;
      margin: 0 8px;
      text-decoration: none;
    }

    #chat {
      height: 65vh;
      overflow-y: auto;
      padding: 15px;
      scroll-behavior: smooth;
    }

    .msg {
      padding: 12px;
      margin: 10px;
      border-radius: 12px;
      max-width: 80%;
      word-wrap: break-word;
    }

    .user {
      background: #1f1f1f;
      margin-left: auto;
      text-align: right;
    }

    .ai {
      background: #2b2b2b;
      margin-right: auto;
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    #inputArea {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      padding: 10px;
      background: #111;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 20px;
      border: none;
      outline: none;
    }

    button {
      margin-left: 5px;
      border-radius: 20px;
      padding: 10px;
      border: none;
      background: #00ffc3;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.5;
    }

    .loader {
      border: 4px solid #333;
      border-top: 4px solid #00ffc3;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      margin: 10px;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: gray;
    }

    .premium-lock {
      color: red;
    }
  </style>
</head>

<body>

<div id="nav">
  ReelMind AI 🚀 |
  <a href="#">About</a>
  <a href="#">Blog</a>
  <a href="#">Contact</a>
  <a href="#">Privacy</a>
  | <span id="userStatus">Loading...</span>
</div>

<div id="chat"></div>

<div style="text-align:center;">
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-1714638410489429"
       data-ad-slot="1234567890"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
</div>

<div id="inputArea">
  <button onclick="uploadFile()">📎</button>
  <button onclick="startMic()">🎤</button>
  <input id="userInput" placeholder="Ask anything..." />
  <button id="sendBtn" onclick="sendPrompt()">Send</button>
</div>

<input type="file" id="fileInput" hidden />

<footer>Powered by Artical Neavy ⚡</footer>

<script>
const BASE_URL = "https://reelmindbackend-1.onrender.com";

// 🔐 PERMANENT LOGIN (IMPROVED)
let TOKEN = localStorage.getItem("token");
if (!TOKEN) {
  TOKEN = "user-" + Date.now();
  localStorage.setItem("token", TOKEN);
}

document.getElementById("userStatus").innerText = "Online";

// 💎 PREMIUM
let IS_PREMIUM = localStorage.getItem("premium") === "true";

// ENTER KEY SUPPORT
document.getElementById("userInput").addEventListener("keypress", function(e) {
  if (e.key === "Enter") sendPrompt();
});

async function sendPrompt() {
  const inputField = document.getElementById("userInput");
  const input = inputField.value.trim();
  const chat = document.getElementById("chat");
  const btn = document.getElementById("sendBtn");

  if (!input) return;

  btn.disabled = true;

  chat.innerHTML += `<div class="msg user">${input}</div>`;

  const loader = document.createElement("div");
  loader.className = "loader";
  chat.appendChild(loader);

  scrollDown();

  try {
    let endpoint = "/generate-text";

    if (input.toLowerCase().includes("image")) {
      if (!IS_PREMIUM) {
        loader.remove();
        chat.innerHTML += `<div class="msg ai premium-lock">🔒 Premium required</div>`;
        btn.disabled = false;
        return;
      }
      endpoint = "/generate-image";
    }

    const res = await fetch(BASE_URL + endpoint, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + TOKEN
      },
      body: JSON.stringify({ prompt: input })
    });

    if (!res.ok) throw new Error("Server error");

    const data = await res.json();
    loader.remove();

    // IMAGE RESPONSE
    if (endpoint === "/generate-image") {
      if (!data.image) throw new Error("Invalid image");

      chat.innerHTML += `
        <div class="msg ai">
          <img src="${data.image}">
          <br><a href="${data.image}" download>⬇ Download</a>
        </div>`;
    }

    // TEXT RESPONSE
    else {
      const reply =
        data?.result ||
        data?.choices?.[0]?.message?.content ||
        JSON.stringify(data);

      chat.innerHTML += `<div class="msg ai">${reply}</div>`;
    }

  } catch (err) {
    loader.remove();
    chat.innerHTML += `<div class="msg ai">⚠️ ${err.message}</div>`;
  }

  inputField.value = "";
  btn.disabled = false;
  scrollDown();
}

// SCROLL FIX
function scrollDown() {
  const chat = document.getElementById("chat");
  setTimeout(() => {
    chat.scrollTop = chat.scrollHeight;
  }, 100);
}

// FILE UPLOAD
function uploadFile() {
  document.getElementById("fileInput").click();
}

document.getElementById("fileInput").addEventListener("change", function () {
  const file = this.files[0];
  if (file) {
    document.getElementById("chat").innerHTML += `<div class="msg user">📁 ${file.name}</div>`;
  }
});

// MIC FIX
function startMic() {
  if (!('webkitSpeechRecognition' in window)) {
    alert("Mic not supported");
    return;
  }

  const recognition = new webkitSpeechRecognition();
  recognition.lang = "en-US";

  recognition.onresult = e => {
    document.getElementById("userInput").value = e.results[0][0].transcript;
  };

  recognition.onerror = () => {
    alert("Mic error");
  };

  recognition.start();
}

// PREMIUM ACTIVATE (TEST)
function subscribe() {
  localStorage.setItem("premium", "true");
  location.reload();
}
</script>

</body>
</html>
