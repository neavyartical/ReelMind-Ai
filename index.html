<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReelMind Global</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 20px;
}

h1 {
  color: #22c55e;
}

input {
  width: 90%;
  max-width: 500px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-bottom: 20px;
}

button {
  background: #22c55e;
  padding: 12px 25px;
  border: none;
  border-radius: 10px;
  color: white;
  cursor: pointer;
}

.box {
  background: #1e293b;
  margin-top: 20px;
  padding: 15px;
  border-radius: 10px;
}

img, video {
  width: 90%;
  max-width: 400px;
  border-radius: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>🧠 ReelMind Global</h1>

<input id="prompt" placeholder="Type something..." />

<br>
<button onclick="generate()">Generate</button>

<div class="box">
  <h3>✍️ Story</h3>
  <p id="story">Waiting...</p>
</div>

<div class="box">
  <h3>🖼 Image</h3>
  <img id="image" />
</div>

<div class="box">
  <h3>🎬 Video</h3>
  <video id="video" controls preload="none"></video>
</div>

<script>
let videoLoaded = false;

async function generate() {
  const prompt = document.getElementById("prompt").value;

  /* LOADING STATE */
  document.getElementById("story").innerText = "⏳ Generating...";

  /* ===== STORY ===== */
  try {
    const res = await fetch("https://reelmindbackend-1.onrender.com/story", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt })
    });

    const data = await res.json();
    document.getElementById("story").innerText = data.story;

  } catch {
    document.getElementById("story").innerText = "❌ Failed";
  }

  /* ===== IMAGE ===== */
  document.getElementById("image").src =
    `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}`;

  /* ===== VIDEO (NO POPPING) ===== */
  const video = document.getElementById("video");

  if (!videoLoaded) {
    video.src = "https://www.w3schools.com/html/mov_bbb.mp4";
    videoLoaded = true;
  }
}
</script>

</body>
</html>
