<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:linear-gradient(135deg,#0f0018,#ff6a00);
  color:white;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* GRID */
#grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  padding:10px;
}

.grid-btn{
  text-align:center;
  padding:10px;
  border-radius:12px;
  background:rgba(255,255,255,0.1);
}

.grid-btn span{
  display:block;
  font-size:12px;
}

/* CHAT */
#chat{
  flex:1;
  overflow:auto;
  padding:10px;
}

.msg{
  margin:8px;
  padding:12px;
  border-radius:12px;
  max-width:85%;
}

.user{background:#ff6a00;margin-left:auto;}
.ai{background:#222;}

/* INPUT */
#bottom{
  display:flex;
  padding:10px;
}

#bottom input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
}

#bottom button{
  margin-left:5px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#ff6a00;
  color:white;
}

/* PAYMENT */
#pay{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.85);
  display:none;
  align-items:center;
  justify-content:center;
}

#payBox{
  background:#111;
  padding:20px;
  border-radius:12px;
  text-align:center;
}

.plan{
  margin:10px;
  padding:10px;
  border-radius:10px;
  background:#222;
}
</style>
</head>

<body>

<!-- GRID MENU -->
<div id="grid">
  <div class="grid-btn" onclick="setMode('chat')">💬<span>Chat</span></div>
  <div class="grid-btn" onclick="setMode('story')">📖<span>Story</span></div>
  <div class="grid-btn" onclick="setMode('image')">🖼<span>Image</span></div>
  <div class="grid-btn" onclick="setMode('video')">🎬<span>Video</span></div>
  <div class="grid-btn" onclick="openPay()">💎<span>Premium</span></div>
  <div class="grid-btn" onclick="viewProjects()">📂<span>Projects</span></div>
</div>

<div id="chat"></div>

<div id="bottom">
  <input id="input" placeholder="Ask anything...">
  <button onclick="send()">➤</button>
</div>

<!-- PAYMENT POPUP -->
<div id="pay">
  <div id="payBox">
    <h3>Upgrade to Premium 💎</h3>

    <div class="plan">
      $9 / month  
      <br><button onclick="buyMonthly()">Subscribe</button>
    </div>

    <div class="plan">
      $99 / year  
      <br><button onclick="buyYearly()">Subscribe</button>
    </div>

    <br>
    <button onclick="unlockAfterPay()">I have paid</button>
    <br><br>
    <button onclick="closePay()">Cancel</button>
  </div>
</div>

<script>

// STATE
let mode="chat";
let premium=false;

// MODE SWITCH
function setMode(m){
  mode=m;
  add("Mode: "+m,"ai");
}

// ADD MESSAGE
function add(text,type){
  let d=document.createElement("div");
  d.className="msg "+type;
  d.innerHTML=text;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

// TYPE EFFECT
function typeText(text){
  return new Promise(resolve=>{
    let i=0;
    let div=document.createElement("div");
    div.className="msg ai";
    chat.appendChild(div);

    function typing(){
      if(i<text.length){
        div.innerHTML+=text[i++];
        setTimeout(typing,5);
      }else resolve();
    }
    typing();
  });
}

// SAVE PROJECTS
function save(type,data){
  let p=JSON.parse(localStorage.getItem(type)||"[]");
  p.unshift(data);
  localStorage.setItem(type,JSON.stringify(p));
}

// VIEW SAVED
function viewProjects(){
  let s=JSON.parse(localStorage.getItem("stories")||"[]");
  if(s.length===0){
    add("No saved stories yet","ai");
    return;
  }
  add("Saved Stories:<br><br>"+s.join("<br><br>"),"ai");
}

// PAYMENT POPUP
function openPay(){
  document.getElementById("pay").style.display="flex";
}
function closePay(){
  document.getElementById("pay").style.display="none";
}

// REAL STRIPE LINKS (PASTE YOURS)
function buyMonthly(){
  window.location.href = "https://buy.stripe.com/YOUR_MONTHLY_LINK";
}

function buyYearly(){
  window.location.href = "https://buy.stripe.com/YOUR_YEARLY_LINK";
}

// TEMP UNLOCK
function unlockAfterPay(){
  premium = true;
  alert("Premium unlocked 💎");
  closePay();
}

// CHECK PREMIUM
function checkPremium(){
  if(!premium){
    openPay();
    return false;
  }
  return true;
}

// MAIN SEND
async function send(){
  let txt=input.value.trim();
  if(!txt) return;

  add(txt,"user");

  // IMAGE
  if(mode==="image"){
    let url="https://image.pollinations.ai/prompt/"+encodeURIComponent(txt);
    add(`<img src="${url}">`,"ai");
    save("images",url);
    return;
  }

  // VIDEO (PREMIUM)
  if(mode==="video"){
    if(!checkPremium()) return;

    add(`
      <video controls>
        <source src="https://samplelib.com/lib/preview/mp4/sample-5s.mp4">
      </video>
      🔥 Viral caption ready
    `,"ai");

    return;
  }

  // STORY (FULL LENGTH)
  if(mode==="story"){
    let story = `
🎬 Cinematic Story

${txt}

━━━━━━━━━━━━━━━

🌍 Beginning:
In a world where ${txt}, everything felt ordinary. But something beneath the surface was changing.

⚡ Rising Action:
Challenges began to appear. Emotions grew stronger. Every decision carried weight.

🔥 Climax:
Then came the moment that changed everything. A decision that could either destroy everything… or create something legendary.

🌅 Resolution:
From that moment, nothing remained the same. Growth, power, and transformation took over.

✨ Final Line:
And this was only the beginning...

━━━━━━━━━━━━━━━
🔥 Caption: This will go viral #fyp #viral
`;

    await typeText(story);
    save("stories",story);
    return;
  }

  // CHAT
  let reply = `
🤖 AI Response

"${txt}"

Think bigger.
Act smarter.
Stay consistent.

🔥 You’re building something powerful.
`;

  await typeText(reply);
}

</script>

</body>
</html>
