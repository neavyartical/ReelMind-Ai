<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont;
  background: linear-gradient(135deg,#0f0018,#ff6a00);
  color:white;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* HEADER */
#topBar {
  display:flex;
  gap:8px;
  padding:10px;
  overflow-x:auto;
}

#topBar button {
  padding:10px;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,0.1);
  color:white;
}

/* CHAT */
#chat {
  flex:1;
  overflow:auto;
  padding:12px;
}

.msg {
  margin:10px;
  padding:14px;
  border-radius:16px;
  max-width:85%;
}

.user {
  background:linear-gradient(135deg,#ff6a00,#ff00cc);
  margin-left:auto;
}

.ai {
  background:rgba(0,0,0,0.65);
}

/* INPUT */
#bottomBar {
  display:flex;
  padding:10px;
  background:rgba(0,0,0,0.5);
}

#bottomBar input {
  flex:1;
  padding:14px;
  border:none;
  border-radius:14px;
  background:rgba(255,255,255,0.1);
  color:white;
}

#bottomBar button {
  margin-left:6px;
  padding:14px;
  border:none;
  border-radius:14px;
  background:linear-gradient(90deg,#ff6a00,#ff00cc);
  color:white;
}

img, video {
  width:100%;
  border-radius:12px;
  margin-top:8px;
}

.small-btn{
  margin-top:6px;
  padding:6px;
  border:none;
  border-radius:8px;
  background:#ff6a00;
  color:white;
  font-size:12px;
}

#branding{
  text-align:center;
  font-size:12px;
  opacity:0.6;
  padding:5px;
}
</style>
</head>

<body>

<div id="topBar">
  <button onclick="quick('Funny viral story')">😂</button>
  <button onclick="quick('Sad emotional story')">💔</button>
  <button onclick="quick('Anime cinematic story')">🔥</button>
  <button onclick="quick('Make money online')">💰</button>
  <button onclick="clearChat()">🧹</button>
</div>

<div id="chat"></div>

<div id="branding">Powered by Artical Neavy</div>

<div id="bottomBar">
  <input id="input" placeholder="Ask, create, generate anything...">
  <button onclick="send()">➤</button>
  <button onclick="startVoice()">🎤</button>
</div>

<script>

// CORE SYSTEM
let queue = [];
let processing = false;

// MESSAGE
function addMessage(text,type){
  let chat = document.getElementById("chat");
  let div = document.createElement("div");
  div.className = "msg " + type;
  div.innerHTML = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// TYPE
function typeMessage(text){
  return new Promise(resolve=>{
    let i=0;
    let div=document.createElement("div");
    div.className="msg ai";
    chat.appendChild(div);

    function typing(){
      if(i<text.length){
        div.innerHTML+=text.charAt(i);
        i++;
        setTimeout(typing,7);
      } else resolve();
    }

    typing();
  });
}

// QUEUE
async function processQueue(){
  if(processing) return;
  processing=true;

  while(queue.length){
    await queue.shift()();
  }

  processing=false;
}

// THINKING
function thinking(){
  let div=document.createElement("div");
  div.className="msg ai";
  div.id="t";
  div.innerHTML="🤖 Generating...";
  chat.appendChild(div);
}

function stopThinking(){
  let t=document.getElementById("t");
  if(t) t.remove();
}

// VOICE
function startVoice(){
  let rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  rec.onresult = e=>{
    document.getElementById("input").value = e.results[0][0].transcript;
  };
  rec.start();
}

// COPY
function copyText(text){
  navigator.clipboard.writeText(text);
  alert("Copied!");
}

// DOWNLOAD IMAGE
function downloadImage(url){
  let a=document.createElement("a");
  a.href=url;
  a.download="image.jpg";
  a.click();
}

// CLEAR
function clearChat(){
  document.getElementById("chat").innerHTML="";
}

// QUICK
function quick(text){
  document.getElementById("input").value=text;
}

// SEND
function send(){
  let input=document.getElementById("input").value.trim();
  if(!input) return;

  addMessage(input,"user");

  let lower=input.toLowerCase();

  // IMAGE GENERATOR
  if(lower.includes("image")){
    let url="https://image.pollinations.ai/prompt/"+encodeURIComponent(input);

    addMessage(`
      🖼 <b>AI Image</b>
      <img src="${url}">
      <button class="small-btn" onclick="downloadImage('${url}')">Download</button>
    `,"ai");
    return;
  }

  // VIDEO
  if(lower.includes("video")){
    addMessage(`
      🎬 <b>AI Video Preview</b>
      <video controls>
        <source src="https://samplelib.com/lib/preview/mp4/sample-5s.mp4">
      </video>
      <div>🔥 Caption: This will go viral #fyp</div>
    `,"ai");
    return;
  }

  // STORY (PREMIUM)
  if(lower.includes("story")){
    queue.push(async ()=>{
      thinking();
      await new Promise(r=>setTimeout(r,800));
      stopThinking();

      let story=`
🎬 <b>Cinematic Story</b>

${input} begins in a world full of mystery and tension.

Every moment builds suspense… every action carries weight.

Then comes the turning point — everything changes.

🔥 This is not just a story… it’s a viral moment.
`;

      await typeMessage(story);

      addMessage(`<button class="small-btn" onclick="copyText(\`${story}\`)">Copy</button>`,"ai");

    });

    processQueue();
    return;
  }

  // SMART CHAT
  queue.push(async ()=>{
    thinking();
    await new Promise(r=>setTimeout(r,500));
    stopThinking();

    let reply=`
🤖 <b>AI Response</b>

"${input}"

Here’s the smart breakdown:
• Idea → Execution  
• Strategy → Growth  
• Consistency → Success  

🔥 You’re building something powerful.
`;

    await typeMessage(reply);
  });

  processQueue();
}

</script>

</body>
</html>
