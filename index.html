<!DOCTYPE html>
<html>
<head>
<title>ReelMind AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ✅ ADSENSE (YOUR REAL ID ADDED) -->
<script async 
src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1714638410489429"
crossorigin="anonymous"></script>

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: Arial;
}

/* HEADER */
.header {
  text-align: center;
  padding: 12px;
  font-size: 20px;
  font-weight: bold;
  background: #111;
}

/* CHAT AREA */
#chat {
  height: 65vh;
  overflow-y: auto;
  padding: 10px;
}

.msg {
  margin: 10px;
  padding: 12px;
  border-radius: 12px;
  max-width: 85%;
}

.user {
  background: #222;
  margin-left: auto;
}

.bot {
  background: #111;
}

/* INPUT BAR */
.input-bar {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  align-items: center;
  background: #111;
  padding: 10px;
}

/* INPUT */
#prompt {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: none;
}

/* BUTTONS */
.circle-btn {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  border: none;
  margin: 5px;
  font-size: 18px;
  background: #222;
  color: white;
}

/* GENERATE BUTTON */
.generate {
  width: 70px;
  height: 70px;
  border-radius: 20px;
  background: cyan;
  color: black;
  font-weight: bold;
  box-shadow: 0 0 20px cyan;
}

/* FOOTER */
.footer {
  text-align: center;
  margin: 20px;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="header">
🧠 ReelMind AI — Powered by Artical Neavy
</div>

<!-- ✅ TOP AD -->
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-1714638410489429"
     data-ad-slot="1234567890"
     data-ad-format="auto"></ins>

<script>
(adsbygoogle = window.adsbygoogle || []).push({});
</script>

<!-- CHAT -->
<div id="chat"></div>

<!-- INPUT BAR -->
<div class="input-bar">

<!-- UPLOAD BUTTON -->
<input type="file" id="fileInput" hidden onchange="uploadFile()">
<button class="circle-btn" onclick="fileInput.click()">＋</button>

<!-- MIC BUTTON -->
<button class="circle-btn" onclick="startVoice()">🎤</button>

<!-- TEXT INPUT -->
<input id="prompt" placeholder="Ask anything or create content...">

<!-- GENERATE -->
<button class="generate" onclick="generate()">🧊</button>

</div>

<!-- FOOTER LINKS -->
<div class="footer">
<a href="/privacy">Privacy</a> |
<a href="/about">About</a> |
<a href="/contact">Contact</a> |
<a href="/blog">Blog</a>
</div>

<script>
const API = "https://reelmindbackend-1.onrender.com";

// ADD MESSAGE TO CHAT
function addMessage(text, type){
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  document.getElementById("chat").appendChild(div);
}

// GENERATE TEXT
async function generate(){
  const text = document.getElementById("prompt").value;
  if(!text) return alert("Enter something");

  addMessage(text, "user");

  try {
    const res = await fetch(API + "/generate", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({prompt:text})
    });

    const data = await res.json();
    addMessage(data.result || "No response", "bot");

  } catch (err) {
    addMessage("❌ Error connecting to AI", "bot");
  }
}

// UPLOAD HANDLER
async function uploadFile(){
  const file = document.getElementById("fileInput").files[0];
  if(!file) return;

  addMessage("📤 Uploaded: " + file.name, "user");

  // IMAGE
  if(file.type.includes("image")){
    const res = await fetch(API + "/image", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({prompt: prompt.value || "enhance image"})
    });

    const data = await res.json();

    if(data.image){
      const img = document.createElement("img");
      img.src = data.image;
      img.style.width = "90%";
      document.getElementById("chat").appendChild(img);
    }
  }

  // VIDEO
  if(file.type.includes("video")){
    const res = await fetch(API + "/video-edit", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({prompt: prompt.value || "edit video"})
    });

    const data = await res.json();
    addMessage(data.edit || "Video processed", "bot");
  }
}

// VOICE INPUT
function startVoice(){
  const rec = new(window.SpeechRecognition || window.webkitSpeechRecognition)();

  rec.lang = "en-US";

  rec.onresult = e => {
    document.getElementById("prompt").value =
      e.results[0][0].transcript;
  };

  rec.onerror = () => {
    alert("Mic not supported on this device");
  };

  rec.start();
}
</script>

</body>
</html>
