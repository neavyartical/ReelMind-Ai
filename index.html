<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReelMind Global</title>

<style>
body {
    font-family: Arial;
    background: #0f0f0f;
    color: white;
    text-align: center;
}

h1 {
    color: #00ff88;
}

input {
    width: 80%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin: 10px;
}

button {
    padding: 12px 25px;
    background: #00ff88;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
}

.card {
    background: #1c1c1c;
    margin: 15px;
    padding: 15px;
    border-radius: 15px;
}

img {
    width: 90%;
    border-radius: 15px;
}

video {
    width: 90%;
    border-radius: 15px;
}
</style>
</head>

<body>

<h1>🧠 ReelMind Global</h1>

<input id="prompt" placeholder="Enter your idea..."/>
<br>
<button onclick="generate()">Generate</button>

<div class="card">
<h3>✍️ Story</h3>
<p id="story">Waiting...</p>
</div>

<div class="card">
<h3>🖼 Image</h3>
<img id="image" />
</div>

<div class="card">
<h3>🎬 Video</h3>
<video id="video" controls></video>
</div>

<script>

const BACKEND = "https://reelmindbackend-1.onrender.com";

async function generate() {

    const prompt = document.getElementById("prompt").value;

    document.getElementById("story").innerText = "Generating...";
    document.getElementById("image").src = "";
    document.getElementById("video").src = "";

    try {

        const res = await fetch(BACKEND + "/generate", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ prompt })
        });

        const data = await res.json();

        // ✅ STORY
        document.getElementById("story").innerText =
            data.story || "Story failed";

        // ✅ IMAGE
        document.getElementById("image").src =
            data.image || "https://picsum.photos/500";

        // ✅ VIDEO (NO LOOP BUG)
        const video = document.getElementById("video");
        video.pause();
        video.src = data.video || "";
        video.load();

    } catch (err) {
        document.getElementById("story").innerText = "Server error";
    }
}

</script>

</body>
</html>
