<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReelMind AI • Level 17</title>
    <style>
        body { margin:0; font-family:'Segoe UI', Arial; color:white; text-align:center; background: radial-gradient(circle, #0f2027, #2c5364); min-height:100vh; }
        .header { margin-top: 30px; }
        .logo { width: 220px; filter: drop-shadow(0 0 15px cyan); } /* Matches logo 442630.png */
        
        .auth { margin: 20px auto; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; width: fit-content; border: 1px solid rgba(0, 255, 255, 0.2); }
        input { padding: 8px; border-radius: 8px; border: 1px solid cyan; background: rgba(0,0,0,0.3); color: white; margin: 5px; }

        #credits { font-weight: bold; color: cyan; margin: 10px 0; }

        textarea { width:85%; max-width: 600px; padding:15px; border-radius:15px; border:1px solid cyan; margin-top:20px; background:rgba(0,0,0,0.4); color:white; font-size:16px; outline:none; }
        
        /* The Ice Cube Interface */
        .cube { width:180px; height:180px; margin:40px auto; background:rgba(255,255,255,0.1); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border-radius:30px; display:flex; align-items:center; justify-content:center; box-shadow:0 0 70px cyan; border: 1px solid rgba(255,255,255,0.2); transition: 0.3s; }
        .cube:hover { transform: scale(1.05); box-shadow: 0 0 100px cyan; }

        button { padding:12px 25px; border:none; border-radius:10px; background:cyan; color:black; font-weight:bold; cursor:pointer; text-transform:uppercase; transition: 0.2s; }
        button:hover { background: white; transform: translateY(-2px); }

        #output { margin-top:20px; padding: 20px; }
        .result-card { background: rgba(0,0,0,0.4); padding: 25px; border-radius: 20px; border: 1px solid cyan; margin: 20px auto; max-width: 800px; text-align: left; }
        
        img, video { max-width:100%; border-radius:15px; margin-top:15px; box-shadow:0 0 25px cyan; border: 1px solid rgba(0, 255, 255, 0.5); display: block; margin-left: auto; margin-right: auto; }
        
        footer { margin-top:50px; padding-bottom: 30px; font-size: 11px; color: #888; }
    </style>
</head>
<body>

<div class="header">
    <img src="442630.png" alt="ReelMind AI" class="logo"> <h1>REELMIND <span style="color:cyan">LEVEL 17</span></h1>
</div>

<div class="auth">
    <input id="username" placeholder="Username">
    <button onclick="login()">Login</button>
    <p id="credits">Credits: 5</p>
</div>

<textarea id="prompt" placeholder="Ex: 'Generate an image of a cyber warrior' or 'Write a script about...'"></textarea>

<div class="cube">
  <button onclick="generate()">Generate</button>
</div>

<div id="output"></div>

<footer>Powered by Artical Neavy • SaaS Level 17 • 2026</footer>

<script>
const BASE = "https://reelmindbackend-1.onrender.com";
let credits = parseInt(localStorage.getItem("credits")) || 5;
updateCredits();

function updateCredits() {
    document.getElementById("credits").innerText = "Credits: " + credits;
}

function login() {
    const user = document.getElementById("username").value;
    if (!user) return alert("Enter username");
    localStorage.setItem("user", user);
    alert("Welcome " + user + " to Level 17");
}

/* 🔊 NARRATION */
function speak(text) {
    window.speechSynthesis.cancel();
    const speech = new SpeechSynthesisUtterance(text);
    speech.rate = 1;
    window.speechSynthesis.speak(speech);
}

/* 🎬 SMART GENERATION ENGINE */
async function generate() {
    const prompt = document.getElementById("prompt").value;
    const output = document.getElementById("output");
    
    if(!prompt) return alert("Please enter a vision!");
    if(credits <= 0) return alert("Out of credits! 💰");

    output.innerHTML = "⚡ <span style='color:cyan'>ReelMind Engine</span> is decoding your request...";

    // --- INTENT ROUTER ---
    let action = "chat"; // Default to text/script
    const lowPrompt = prompt.toLowerCase();
    
    if (lowPrompt.includes("image") || lowPrompt.includes("picture") || lowPrompt.includes("photo")) {
        action = "image";
    } else if (lowPrompt.includes("video") || lowPrompt.includes("movie") || lowPrompt.includes("reel")) {
        action = "video";
    }

    try {
        const res = await fetch(BASE + "/generate", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({ action, input: prompt })
        });

        const result = await res.json();
        
        // Deduct Credit
        credits--;
        localStorage.setItem("credits", credits);
        updateCredits();

        // --- DISPLAY LOGIC ---
        if(result.type === 'text') {
            output.innerHTML = `<div class="result-card"><h3>🎬 Cinematic Script</h3><p>${result.data}</p><button onclick="speak(\`${result.data.replace(/`/g, "'")}\`)">🔊 Narrate</button></div>`;
        } else if(result.type === 'image') {
            output.innerHTML = `<div class="result-card"><h3>🖼 4K Image Render</h3><img src="${result.data}"><br><button onclick="window.open('${result.data}')">⬇ Download 4K</button></div>`;
        } else if(result.type === 'video') {
            output.innerHTML = `<div class="result-card"><h3>🎥 Video Preview</h3><video controls src="${result.data}"></video></div>`;
        }

    } catch (err) {
        output.innerHTML = "<p style='color:red;'>⚠️ Connection Error. The engine is warming up, please retry in 30s.</p>";
    }
}
</script>
</body>
</html>
