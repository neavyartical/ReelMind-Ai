<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ReelMind AI</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 40px;
    }

    h1 {
      margin-bottom: 10px;
    }

    input {
      width: 80%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-top: 20px;
      font-size: 16px;
    }

    button {
      margin-top: 20px;
      padding: 12px 25px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    img {
      margin-top: 30px;
      max-width: 90%;
      border-radius: 10px;
    }

    #status {
      margin-top: 10px;
      font-size: 14px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <h1>🚀 ReelMind AI</h1>
  <p id="status">Connecting...</p>

  <input id="prompt" placeholder="Describe your image..." />
  <br>
  <button onclick="generate()">✨ Generate</button>

  <br>
  <img id="result" />

  <!-- 🔥 FIREBASE + LOGIC -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // ✅ YOUR FIREBASE CONFIG (OK)
    const firebaseConfig = {
      apiKey: "AIzaSyCz9rReG2zuaj0AGuafpTzpCUopuHMD_wQ",
      authDomain: "reelmind-ai-f07cb.firebaseapp.com",
      projectId: "reelmind-ai-f07cb",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    let userToken = "";

    // 🔥 LOGIN USER AUTOMATICALLY
    signInAnonymously(auth)
      .then(async (userCred) => {
        userToken = await userCred.user.getIdToken();
        document.getElementById("status").innerText = "✅ Connected";
        console.log("User logged in");
      })
      .catch(err => {
        console.error(err);
        document.getElementById("status").innerText = "❌ Auth failed";
      });

    // 🔥 GENERATE FUNCTION
    window.generate = async () => {
      const prompt = document.getElementById("prompt").value;

      if (!prompt) {
        alert("Enter a prompt");
        return;
      }

      if (!userToken) {
        alert("Still connecting...");
        return;
      }

      document.getElementById("status").innerText = "⏳ Generating...";
      document.getElementById("result").src = "";

      try {
        const res = await fetch("https://YOUR-RENDER-URL/generate-image", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + userToken
          },
          body: JSON.stringify({ prompt })
        });

        const data = await res.json();
        console.log(data);

        if (data.data?.url) {
          document.getElementById("result").src = data.data.url;
          document.getElementById("status").innerText = "✅ Done";
        } else {
          document.getElementById("status").innerText = "❌ Failed";
          alert(data.error || "Generation failed");
        }

      } catch (err) {
        console.error(err);
        document.getElementById("status").innerText = "❌ Error";
        alert("Server error");
      }
    };
  </script>

</body>
</html>
