<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <style>
    body {
      background: #0b1a2f;
      color: white;
      text-align: center;
      font-family: Arial;
    }
    input {
      width: 80%;
      padding: 15px;
      border-radius: 10px;
      border: none;
      margin-top: 40px;
    }
    button {
      margin-top: 20px;
      padding: 15px 30px;
      border: none;
      background: green;
      color: white;
      border-radius: 10px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<h1>🎬 ReelMind AI</h1>

<input id="prompt" placeholder="Enter video idea..." />

<br>

<button onclick="generate()">Generate</button>

<p id="status"></p>

<script>
async function generate() {
  const prompt = document.getElementById("prompt").value;
  const status = document.getElementById("status");

  status.innerText = "Generating... ⏳";

  try {
    const res = await fetch("https://backend-ppyz.onrender.com/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt })
    });

    const data = await res.json();

    console.log(data);

    status.innerText = "Success ✅ (Check console)";
    
  } catch (err) {
    console.error(err);
    status.innerText = "Failed ❌";
  }
}
</script>

</body>
</html>
