<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family: Arial;
      background: radial-gradient(circle at center, #0a0a0a, #1a0033);
      color:white;
      text-align:center;
    }

    h2 {
      background: linear-gradient(90deg,#ff6a00,#6a00ff);
      -webkit-background-clip:text;
      color:transparent;
    }

    input {
      width:85%;
      padding:12px;
      margin:8px;
      border-radius:10px;
      border:none;
      background:#111;
      color:white;
    }

    button {
      padding:12px;
      margin:5px;
      border:none;
      border-radius:10px;
      background: linear-gradient(90deg,#ff6a00,#6a00ff);
      color:white;
    }

    .card {
      margin-top:20px;
      padding:10px;
      background:#111;
      border-radius:15px;
      box-shadow:0 0 20px rgba(255,106,0,0.3);
    }

    img { width:100%; border-radius:10px; }

    pre {
      text-align:left;
      white-space:pre-wrap;
    }

    #ads {
      margin-top:15px;
      height:60px;
      background:#222;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:12px;
    }

    .hidden { display:none; }
  </style>
</head>

<body>

<h2>🎬 ReelMind AI</h2>

<!-- 🔐 LOGIN -->
<div id="auth">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<!-- 🚀 APP -->
<div id="app" class="hidden">

  <button onclick="logout()">Logout</button>

  <input id="prompt" placeholder="Ask anything (safe & legal only)">
  <button onclick="generate()">✨ Generate</button>

  <div id="output"></div>

  <!-- 💎 PREMIUM -->
  <div class="card">
    <h3>💎 Premium</h3>
    <p>$9/month • $99/year</p>
    <button onclick="subscribe()">Upgrade</button>
  </div>

  <!-- 📢 ADS -->
  <div id="ads">
    🤖 Ad Space (AdMob later)
  </div>

  <!-- 📜 POLICY -->
  <div class="card">
    <h4>🛡 AI Policy</h4>
    <p>
      ❌ No nudity<br>
      ❌ No illegal content<br>
      ❌ No harmful actions<br><br>
      ✔ Safe & creative use only
    </p>
  </div>

</div>

<script>
// ==========================
// 🔐 LOGIN SYSTEM (LOCAL)
// ==========================
let premium = false;

function signup(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  localStorage.setItem("user", JSON.stringify({email, pass, premium:false}));
  alert("Account created!");
}

function login(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  const saved = JSON.parse(localStorage.getItem("user"));

  if(saved && saved.email===email && saved.pass===pass){
    premium = saved.premium;
    startApp();
  } else {
    alert("Invalid login");
  }
}

function logout(){
  location.reload();
}

function startApp(){
  document.getElementById("auth").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");

  if(premium){
    document.getElementById("ads").style.display="none";
  }
}

// ==========================
// 💰 PREMIUM (SIMULATED)
// ==========================
function subscribe(){
  alert("Payments will be added later 💳");

  premium = true;

  let saved = JSON.parse(localStorage.getItem("user"));
  saved.premium = true;
  localStorage.setItem("user", JSON.stringify(saved));

  document.getElementById("ads").style.display="none";
}

// ==========================
// 🤖 SMART AI GENERATOR
// ==========================
async function generate() {
  const prompt = document.getElementById("prompt").value;
  const output = document.getElementById("output");

  if (!prompt) return;

  // 🛑 SAFETY FILTER
  const badWords = ["nude", "porn", "illegal", "kill"];
  if (badWords.some(w => prompt.toLowerCase().includes(w))) {
    output.innerHTML = "❌ Neavy AI blocked unsafe request";
    return;
  }

  output.innerHTML = "🤖 Neavy AI is thinking...";

  // 🧠 TEXT DETECTION
  const isTextRequest =
    prompt.toLowerCase().includes("story") ||
    prompt.toLowerCase().includes("ideas") ||
    prompt.toLowerCase().includes("write") ||
    prompt.toLowerCase().includes("script") ||
    prompt.toLowerCase().includes("caption");

  // ==========================
  // 🧠 TEXT RESPONSE
  // ==========================
  if (isTextRequest) {
    let response = "";

    if (prompt.toLowerCase().includes("500 story ideas")) {
      for (let i = 1; i <= 20; i++) {
        response += `${i}. A viral story idea about ${prompt.replace("500 story ideas","something creative")}\n`;
      }
      response += "\n...and many more 🔥";
    } else {
      response = "Neavy AI Response:\n\n" + prompt;
    }

    output.innerHTML = `
      <div class="card">
        <pre>${response}</pre>
      </div>
    `;
    return;
  }

  // ==========================
  // 🎬 IMAGE GENERATION
  // ==========================
  try {
    const res = await fetch("https://backend-ppyz.onrender.com/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt })
    });

    const data = await res.json();

    output.innerHTML = `
      <div class="card">
        <img src="${data.url}">
        <p>${prompt}</p>
      </div>
    `;
  } catch (err) {
    output.innerHTML = "❌ Error generating";
  }
}
</script>

</body>
</html>
