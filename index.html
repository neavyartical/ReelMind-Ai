<script>
async function generate() {
  const prompt = document.getElementById("prompt").value;

  const status = document.getElementById("status");
  const result = document.getElementById("result");

  if (!prompt) {
    status.innerText = "Enter something ⚠️";
    return;
  }

  // 🔥 ADD REALISM AUTOMATICALLY
  const enhancedPrompt = prompt + ", ultra realistic, 4k, cinematic lighting, highly detailed, sharp focus, real life, professional photography, photorealistic";

  // 🔄 LOADING
  status.innerText = "Creating magic... ✨";
  result.innerHTML = '<div class="loader"></div>';

  try {
    const res = await fetch("https://backend-ppyz.onrender.com/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt: enhancedPrompt })
    });

    const data = await res.json();
    console.log("DATA:", data);

    if (data.url) {
      status.innerText = "Done ✅";

      result.innerHTML = `
        <img src="${data.url}" />
        <br><br>
        <button onclick="downloadImage('${data.url}')">⬇ Download</button>
      `;
    } else {
      status.innerText = "Error ❌";
      result.innerText = JSON.stringify(data);
    }

  } catch (err) {
    status.innerText = "Server error ❌";
    result.innerText = err.message;
    console.error(err);
  }
}

// 📥 DOWNLOAD FUNCTION
function downloadImage(url) {
  const a = document.createElement("a");
  a.href = url;
  a.download = "reelmind-image.jpg";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}
</script>
