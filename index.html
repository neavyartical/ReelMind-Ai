<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #000;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    input {
      width: 90%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      margin-bottom: 15px;
    }

    button {
      padding: 12px 20px;
      margin: 5px;
      background: #00c853;
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 16px;
    }

    #videoContainer {
      margin-top: 20px;
      height: 350px;
      overflow: hidden;
      border-radius: 15px;
    }

    #videoContainer img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      animation: zoom 6s infinite alternate;
    }

    @keyframes zoom {
      0% { transform: scale(1); }
      100% { transform: scale(1.2); }
    }

    .loader {
      margin: 20px auto;
      border: 5px solid #333;
      border-top: 5px solid #00e676;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

  <h2>🎬 ReelMind AI</h2>

  <input id="prompt" placeholder="Describe your scene..." />

  <br>

  <!-- ✅ BUTTON BACK -->
  <button onclick="generate()">✨ Generate</button>

  <p id="status"></p>
  <div id="videoContainer"></div>

  <script>
    let currentImage = "";
    let recorder, chunks = [];

    async function generate() {
      const prompt = document.getElementById("prompt").value;
      const status = document.getElementById("status");
      const container = document.getElementById("videoContainer");

      if (!prompt) {
        status.innerText = "Enter something ⚠️";
        return;
      }

      const enhancedPrompt = prompt + ", ultra realistic, cinematic lighting, 4k";

      status.innerText = "Generating... ⏳";
      container.innerHTML = '<div class="loader"></div>';

      try {
        const res = await fetch("https://backend-ppyz.onrender.com/generate", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ prompt: enhancedPrompt })
        });

        const data = await res.json();

        if (data.url) {
          currentImage = data.url;

          status.innerText = "Done ✅";

          container.innerHTML = `
            <img id="animImage" src="${data.url}" />
            <br>
            <button onclick="downloadImage()">📥 Download Image</button>
            <button onclick="recordVideo()">🎥 Download Video</button>
          `;
        } else {
          status.innerText = "Error ❌";
          container.innerText = JSON.stringify(data);
        }

      } catch (err) {
        status.innerText = "Server error ❌";
        container.innerText = err.message;
      }
    }

    function downloadImage() {
      window.open(currentImage, "_blank");
    }

    function recordVideo() {
      const img = document.getElementById("animImage");

      const stream = img.captureStream(30);
      recorder = new MediaRecorder(stream);

      chunks = [];

      recorder.ondataavailable = e => chunks.push(e.data);

      recorder.onstop = () => {
        const blob = new Blob(chunks, { type: "video/mp4" });
        const url = URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = "reelmind-video.mp4";
        a.click();
      };

      recorder.start();

      setTimeout(() => {
        recorder.stop();
      }, 5000);
    }
  </script>

</body>
</html>
