<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <style>
    body {
      background: #0b1a2b;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 40px;
    }

    h1 {
      margin-bottom: 20px;
    }

    input {
      width: 80%;
      padding: 12px;
      border-radius: 6px;
      border: none;
      margin-bottom: 10px;
      font-size: 16px;
    }

    button {
      width: 80%;
      padding: 12px;
      background: #22c55e;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
      font-weight: bold;
    }

    #downloadBtn {
      display: none;
      background: #3b82f6;
    }

    img {
      margin-top: 20px;
      width: 90%;
      border-radius: 10px;
    }

    #status {
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <h1>🎬 ReelMind AI</h1>

  <input id="prompt" placeholder="Generate a cinematic lion, 8k..." />

  <button onclick="generate()">Generate</button>

  <button id="downloadBtn">Download Image</button>

  <p id="status"></p>

  <img id="result" />

<script>
async function generate() {
  const promptInput = document.getElementById("prompt");
  const status = document.getElementById("status");
  const img = document.getElementById("result");
  const downloadBtn = document.getElementById("downloadBtn");

  const prompt = promptInput.value;

  if (!prompt) {
    status.innerText = "Please enter a prompt";
    return;
  }

  status.innerText = "⏳ Generating...";
  img.src = "";
  downloadBtn.style.display = "none";

  try {
    const response = await fetch("https://backend-ppyz.onrender.com/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt: prompt })
    });

    if (!response.ok) {
      const text = await response.text();
      throw new Error(text);
    }

    const blob = await response.blob();
    const url = URL.createObjectURL(blob);

    img.src = url;
    status.innerText = "✅ Image generated!";

    downloadBtn.style.display = "block";

    downloadBtn.onclick = function () {
      const a = document.createElement("a");
      a.href = url;
      a.download = "reelmind-image.png";
      a.click();
    };

  } catch (error) {
    console.error(error);
    status.innerText = "❌ Error generating image";
  }
}
</script>

</body>
</html>
