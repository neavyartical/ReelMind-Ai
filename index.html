<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 40px;
    }

    h1 {
      color: #38bdf8;
      margin-bottom: 20px;
    }

    input {
      padding: 12px;
      width: 80%;
      max-width: 400px;
      border-radius: 8px;
      border: none;
      margin-bottom: 20px;
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      margin: 5px;
      border: none;
      border-radius: 8px;
      background: #38bdf8;
      color: black;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #0ea5e9;
    }

    #result {
      margin-top: 20px;
      padding: 15px;
      background: #1e293b;
      border-radius: 10px;
      min-height: 50px;
    }
  </style>
</head>

<body>

<h1>ReelMind AI 🚀</h1>

<input id="prompt" type="text" placeholder="Enter your idea...">
<br>

<button onclick="generate('story')">📖 Story</button>
<button onclick="generate('image')">🖼 Image</button>
<button onclick="generate('video')">🎬 Video</button>

<div id="result">✨ Your result will appear here...</div>

<script>
async function generate(type) {
  const prompt = document.getElementById("prompt").value;
  const result = document.getElementById("result");

  if (!prompt) {
    result.textContent = "❌ Please enter something";
    return;
  }

  result.textContent = "⏳ Generating...";

  try {
    const response = await fetch("https://reelmindbackend-1.onrender.com/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt: prompt, type: type })
    });

    const data = await response.json();
    result.textContent = data.result;

  } catch (error) {
    result.textContent = "❌ Error connecting to server";
  }
}
</script>

</body>
</html>
