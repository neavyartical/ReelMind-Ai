<script>

// STATE
let mode="chat";
let tiktok=false;

// MODE
function setMode(m){
  mode=m;
  add("Mode: "+m,"ai");
}

// TEMPLATE (AUTO RUN FIXED)
function template(type){
  if(type==="funny"){
    input.value="A funny story about a guy whose cat says she's pregnant";
    mode="story";
  }
  if(type==="sad"){
    input.value="A heartbreaking emotional story about betrayal and loss";
    mode="story";
  }
  if(type==="anime"){
    input.value="An intense anime battle with transformation and powers";
    mode="story";
  }
  if(type==="money"){
    input.value="How to make money online step by step as a beginner";
    mode="chat";
  }

  add("🔥 Generating " + type + "...","ai");

  setTimeout(send,300); // AUTO RUN
}

// TIKTOK
function toggleTikTok(){
  tiktok=!tiktok;
  add("TikTok Mode: "+(tiktok?"ON 🔥":"OFF"),"ai");
}

// UI
function add(t,type){
  let d=document.createElement("div");
  d.className="msg "+type;
  d.innerHTML=t;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

// VOICE INPUT (AUTO SEND)
function startVoice(){
  let rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  rec.lang="en-US";

  rec.onstart = ()=> add("🎤 Listening...","ai");

  rec.onresult = e=>{
    let text = e.results[0][0].transcript;
    input.value = text;
    add("🎤 You said: " + text,"user");

    setTimeout(send,300); // AUTO SEND
  };

  rec.start();
}

// VOICE OUTPUT
function speak(text){
  let speech = new SpeechSynthesisUtterance(text);
  speech.rate=1;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(speech);
}

// DOWNLOAD
function download(url,type){
  let a=document.createElement("a");
  a.href=url;
  a.download= type==="video"?"video.mp4":"image.jpg";
  a.click();
}

// LONG STORY ENGINE 🔥
function generateStory(topic){
  return `
🎬 CINEMATIC STORY

━━━━━━━━━━━━━━━

In a world where ${topic}, everything changed overnight.

At first, it seemed like nothing unusual was happening. People went about their daily lives, unaware of the storm that was quietly building beneath the surface.

Then came the first sign.

A moment so small, yet so powerful, that it triggered a chain reaction no one could stop.

Fear spread.

Confusion grew.

But in the middle of it all, one person stood different… stronger… ready.

They faced betrayal, loss, and overwhelming odds. Every step forward came with pain, but also growth.

🔥 Then came the turning point.

A decision that would either destroy everything… or create something legendary.

And they chose courage.

What followed was nothing short of transformation.

Power awakened.

Limits shattered.

Destiny rewritten.

━━━━━━━━━━━━━━━

✨ In the end, it wasn’t just a story…

…it was the beginning of something unforgettable.

`;
}

// SEND
function send(){
  let txt=input.value.trim();
  if(!txt) return;

  add(txt,"user");

  // IMAGE
  if(mode==="image"){
    let url="https://image.pollinations.ai/prompt/"+encodeURIComponent(txt);

    add(`
      🖼 AI Image:
      <img src="${url}">
      <button onclick="download('${url}','image')">⬇ Download</button>
    `,"ai");

    speak("Image generated");
    return;
  }

  // VIDEO (UPGRADED FEEL)
  if(mode==="video"){
    let vid="https://samplelib.com/lib/preview/mp4/sample-5s.mp4";

    add(`
      🎬 AI Video Generated:
      <video controls>
        <source src="${vid}">
      </video>

      🔥 Viral Pack:
      Caption: This will break the internet 😳  
      #fyp #viral #trend  

      🎵 Suggested Sound: Trending TikTok Beat  

      <button onclick="download('${vid}','video')">⬇ Download</button>
    `,"ai");

    speak("Video ready");
    return;
  }

  // STORY (LONG FIX)
  if(mode==="story"){
    let story = generateStory(txt);

    if(tiktok){
      story += `
🔥 Caption: This story hits different 😳  
#viral #fyp #storytime  
`;
    }

    add(story,"ai");
    speak("Story generated");
    return;
  }

  // CHAT
  let reply = `
🤖 AI RESPONSE:

${txt}

Think bigger. Move smarter. Build something powerful.
`;

  add(reply,"ai");
  speak(reply);
}

</script>
