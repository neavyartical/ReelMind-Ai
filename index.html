<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ReelMind AI • Global</title>
    <style>
        body { background: #0f2027; color: white; text-align: center; font-family: sans-serif; }
        .logo-img { width: 150px; filter: drop-shadow(0 0 10px cyan); }
        textarea { width: 80%; padding: 15px; border-radius: 15px; background: rgba(0,0,0,0.5); color: white; border: 1px solid cyan; }
        .cube { width: 150px; height: 150px; margin: 20px auto; border: 1px solid cyan; border-radius: 20px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 30px cyan; }
        .gen-btn { background: cyan; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 10px; }
        .result-card { background: rgba(255,255,255,0.05); border: 1px solid cyan; padding: 20px; margin: 20px auto; max-width: 600px; border-radius: 15px; text-align: left; }
        img { width: 100%; border-radius: 10px; border: 1px solid rgba(0,255,255,0.5); }
        .action-btn { background: white; color: black; border: none; padding: 8px 12px; border-radius: 5px; margin-top: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<img src="442630.png" class="logo-img"> <h2>REELMIND <span style="color:cyan">GLOBAL</span></h2>

<textarea id="prompt" placeholder="Ask anything, even in Krio..."></textarea>

<div class="cube">
    <button class="gen-btn" onclick="runEngine()">GENERATE</button>
</div>

<div id="output"></div>

<script>
const API_BASE = "https://reelmindbackend-1.onrender.com";

function speak(text) {
    window.speechSynthesis.cancel();
    const speech = new SpeechSynthesisUtterance(text);
    speech.rate = 0.9;
    window.speechSynthesis.speak(speech);
}

async function runEngine() {
    const prompt = document.getElementById("prompt").value;
    const output = document.getElementById("output");
    if (!prompt) return alert("Enter a prompt!");

    output.innerHTML = "<p style='color:cyan'>⚡ REELMIND CORE is generating...</p>";

    try {
        const res = await fetch(`${API_BASE}/generate`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ prompt: prompt })
        });
        const data = await res.json();

        // FIXED: Display image directly to avoid redirecting to info page
        output.innerHTML = `
            <div class="result-card">
                <h3>🧠 Native Script</h3>
                <p>${data.text}</p>
                <button class="action-btn" onclick="speak(\`${data.text.replace(/`/g, "'")}\`)">🔊 Hear Native</button>
            </div>
            <div class="result-card">
                <h3>🖼 4K Render</h3>
                <img src="${data.image}">
            </div>
            <div class="result-card">
                <h3>🎥 Video Status</h3>
                <p>Task: ${data.videoTask}</p>
                <p style="font-size:12px; color:#888;">Video usually takes 60s to process on Runway nodes.</p>
            </div>
        `;
    } catch (err) {
        output.innerHTML = "<p style='color:red'>⚠️ Engine offline. Check Render logs.</p>";
    }
}
</script>
</body>
</html>
