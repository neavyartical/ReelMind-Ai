<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:-apple-system;
color:white;
background:radial-gradient(circle,#001f3f,#000);
overflow:hidden;
}

/* BACKGROUND */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at 30% 30%, #00ffcc22, transparent),
radial-gradient(circle at 70% 70%, #00aaff22, transparent);
animation:move 8s infinite alternate;
z-index:-1;
}
@keyframes move{
0%{transform:scale(1);}
100%{transform:scale(1.2);}
}

/* GLASS */
.glass{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
border-radius:20px;
padding:15px;
margin:10px;
}

/* GLOBE */
.globe{
width:220px;
height:220px;
margin:30px auto;
border-radius:50%;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(25px);
box-shadow:0 0 30px rgba(0,255,204,0.3);
position:relative;
animation:spin 20s linear infinite;
}
@keyframes spin{
0%{transform:rotate(0);}
100%{transform:rotate(360deg);}
}

.globe button{
position:absolute;
background:rgba(0,255,204,0.3);
border:none;
color:white;
padding:10px;
border-radius:50%;
cursor:pointer;
}

/* BUTTON POSITIONS */
.btn1{top:20%;left:40%;}
.btn2{top:50%;left:5%;}
.btn3{top:50%;right:5%;}
.btn4{bottom:20%;left:40%;}
.btn5{top:35%;right:20%;}
.btn6{bottom:35%;left:20%;}
.btn7{top:10%;left:10%;}

/* AVATAR */
#avatar{
width:90px;
border-radius:50%;
display:block;
margin:auto;
box-shadow:0 0 20px #00ffcc;
}

/* INPUT */
input{
width:100%;
padding:12px;
border:none;
border-radius:12px;
margin-top:10px;
background:rgba(255,255,255,0.1);
color:white;
}

/* SHOP */
.plan{
background:#111;
padding:10px;
margin:5px;
border-radius:10px;
text-align:center;
}
</style>
</head>

<body>

<div class="glass">

<h2>🧠 ReelMind AI</h2>

<div>💰 Credits: <span id="credits">0</span></div>

<input id="prompt" placeholder="Create something viral...">

<img id="avatar" src="https://i.imgur.com/6VBx3io.png">

<!-- 🌍 GLOBE -->
<div class="globe">

<button class="btn1" onclick="generate()">🧠</button>
<button class="btn2" onclick="renderVideo()">🎬</button>
<button class="btn3" onclick="talk()">🤖</button>
<button class="btn4" onclick="music()">🎵</button>
<button class="btn5" onclick="saveProject()">💾</button>
<button class="btn6" onclick="toggleShop()">💰</button>
<button class="btn7" onclick="downloadVideo()">⬇️</button>

</div>

<canvas id="canvas" width="360" height="640"></canvas>
<video id="preview" controls style="width:100%;"></video>

<pre id="output"></pre>

</div>

<!-- SHOP -->
<div id="shop" class="glass" style="display:none;">
<h3>Upgrade</h3>

<div class="plan">
Basic (100 credits)
<button onclick="buy('basic')">Buy</button>
</div>

<div class="plan">
Pro (300 credits)
<button onclick="buy('pro')">Buy</button>
</div>

<div class="plan">
Ultimate (1000 credits)
<button onclick="buy('ultimate')">Buy</button>
</div>
</div>

<audio id="bg"></audio>

<script>
const API="YOUR_BACKEND_URL";

/* LOAD */
window.onload=()=>{
credits.innerText=localStorage.getItem("credits")||0;
};

/* AI */
async function generate(){
const r=await fetch(API+"/generate",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":localStorage.getItem("token")
},
body:JSON.stringify({prompt:prompt.value})
});
const d=await r.json();
output.innerText=d.result || "AI failed";
}

/* VIDEO */
async function renderVideo(){
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

const stream=canvas.captureStream();
const rec=new MediaRecorder(stream);

let chunks=[];
rec.ondataavailable=e=>chunks.push(e.data);

rec.onstop=()=>{
const blob=new Blob(chunks);
preview.src=URL.createObjectURL(blob);
window.videoBlob=blob;
};

rec.start();

let words=prompt.value.split(" ");
let i=0;

let interval=setInterval(()=>{
ctx.fillStyle="black";
ctx.fillRect(0,0,360,640);

ctx.fillStyle="#00ffcc";
ctx.font="bold 28px Arial";
ctx.fillText(words[i]||"",40,320);

i++;

if(i>=words.length){
clearInterval(interval);
setTimeout(()=>rec.stop(),1000);
}
},300);
}

/* DOWNLOAD */
function downloadVideo(){
if(!window.videoBlob){
alert("Generate video first");
return;
}
const a=document.createElement("a");
a.href=URL.createObjectURL(window.videoBlob);
a.download="reelmind.mp4";
a.click();
}

/* AVATAR */
function talk(){
const speech=new SpeechSynthesisUtterance(prompt.value);
avatar.style.transform="scale(1.2)";
speech.onend=()=>avatar.style.transform="scale(1)";
speechSynthesis.speak(speech);
}

/* MUSIC */
function music(){
bg.src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3";
bg.play();
}

/* SAVE */
async function saveProject(){
await fetch(API+"/save-project",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":localStorage.getItem("token")
},
body:JSON.stringify({title:prompt.value})
});
}

/* SHOP */
function toggleShop(){
shop.style.display = shop.style.display==="none"?"block":"none";
}

async function buy(plan){
let creditsVal=0;

if(plan==="basic") creditsVal=100;
if(plan==="pro") creditsVal=300;
if(plan==="ultimate") creditsVal=1000;

localStorage.setItem("credits",creditsVal);
credits.innerText=creditsVal;

alert("Plan activated (demo)");
}
</script>

</body>
</html>
