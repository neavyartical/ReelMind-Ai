<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background:#111;
      color:white;
      text-align:center;
      font-family:Arial;
    }

    input, button {
      width:90%;
      padding:12px;
      margin:6px;
      border-radius:8px;
      border:none;
    }

    button {
      background:#ff6a00;
      color:white;
      font-weight:bold;
    }

    .card {
      background:#222;
      margin:10px;
      padding:10px;
      border-radius:10px;
    }

    .hidden { display:none; }
  </style>
</head>

<body>

<h2>ReelMind AI</h2>

<!-- LOGIN -->
<div id="auth">
  <input id="email" placeholder="Email">
  <input id="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <!-- MODE BUTTONS -->
  <div class="card">
    <button onclick="setMode('chat')">Chat</button>
    <button onclick="setMode('story')">Story</button>
    <button onclick="setMode('image')">Image</button>
    <button onclick="setMode('video')">Video</button>
  </div>

  <p id="modeText">Mode: image</p>

  <!-- TEMPLATES -->
  <div class="card">
    <button onclick="setPrompt('Funny TikTok idea')">Funny</button>
    <button onclick="setPrompt('Sad love story')">Sad</button>
    <button onclick="setPrompt('Anime fight scene')">Anime</button>
    <button onclick="setPrompt('Make money online')">Money</button>
  </div>

  <input id="prompt" placeholder="Type something...">

  <button onclick="generate()">Generate</button>

  <!-- CHAT -->
  <div id="chatBox" class="card hidden"></div>

  <!-- OUTPUT -->
  <div id="output"></div>

  <!-- TIKTOK -->
  <button onclick="toggleTikTok()">TikTok Mode</button>
  <p id="tt">OFF</p>

  <p style="color:white;">Powered by Artical Neavy</p>

</div>

<script>

let mode = "image";
let tiktok = false;

// LOGIN
function login(){
  document.getElementById("auth").style.display = "none";
  document.getElementById("app").style.display = "block";
}

// MODE
function setMode(m){
  mode = m;
  document.getElementById("modeText").innerText = "Mode: " + m;

  if(m === "chat"){
    document.getElementById("chatBox").classList.remove("hidden");
  } else {
    document.getElementById("chatBox").classList.add("hidden");
  }
}

// TEMPLATE
function setPrompt(text){
  document.getElementById("prompt").value = text;
}

// TIKTOK
function toggleTikTok(){
  tiktok = !tiktok;
  document.getElementById("tt").innerText = tiktok ? "ON" : "OFF";
}

// GENERATE
function generate(){
  let p = document.getElementById("prompt").value;
  let out = document.getElementById("output");

  if(!p){
    alert("Type something");
    return;
  }

  if(mode === "chat"){
    let box = document.getElementById("chatBox");
    box.innerHTML += "<p>You: " + p + "</p>";
    box.innerHTML += "<p>AI: I understand '" + p + "'</p>";
    return;
  }

  if(mode === "story"){
    out.innerHTML = "<div class='card'>Story: Once upon a time... " + p + "</div>";
    return;
  }

  if(mode === "image"){
    out.innerHTML = "<div class='card'>Image for: " + p + "</div>";
    return;
  }

  if(mode === "video"){
    out.innerHTML = "<div class='card'>Video idea: " + p + "</div>";
    return;
  }
}

</script>

</body>
</html>
