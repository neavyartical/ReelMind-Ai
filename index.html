<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: white;
      text-align: center;

      background:
        linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)),
        url("logo.jpg");

      background-size: cover;
      background-position: center;
    }

    h1 {
      margin-top: 20px;
      text-shadow: 0 0 20px cyan;
    }

    input {
      padding: 14px;
      width: 85%;
      border-radius: 12px;
      border: none;
    }

    /* 🧊 ICE CUBE */
    .cube {
      margin: 50px auto;
      width: 240px;
      height: 240px;
      border-radius: 30px;

      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(30px);

      box-shadow:
        0 0 40px cyan,
        inset 0 0 20px rgba(255,255,255,0.2);

      display: flex;
      align-items: center;
      justify-content: center;
    }

    button {
      padding: 16px 25px;
      border-radius: 15px;
      border: none;

      background: linear-gradient(45deg, cyan, purple);
      color: white;
      font-weight: bold;

      box-shadow: 0 0 15px cyan;
      cursor: pointer;
    }

    #result {
      margin: 20px;
      background: rgba(0,0,0,0.6);
      padding: 15px;
      border-radius: 12px;
      white-space: pre-wrap;
    }

    img {
      width: 90%;
      border-radius: 15px;
      margin-top: 10px;
    }

    .download {
      display: inline-block;
      margin-top: 10px;
      color: yellow;
      font-weight: bold;
    }

    footer {
      margin-top: 20px;
    }

    a { color: cyan; }
  </style>
</head>

<body>

<h1>🚀 ReelMind AI</h1>

<input id="prompt" placeholder="dog, anime, viral video idea..." />

<div class="cube">
  <button onclick="generate()">⚡ Generate</button>
</div>

<div id="result"></div>
<div id="imageBox"></div>

<footer>
  🚀 Powered by <b>Artical Neavy</b><br>
  <a href="terms.html">Terms & Conditions</a>
</footer>

<script>
const API = "https://reelmindbackend-1.onrender.com";

async function generate() {
  const prompt = document.getElementById("prompt").value;
  const result = document.getElementById("result");
  const imageBox = document.getElementById("imageBox");

  if (!prompt) {
    result.innerHTML = "Enter prompt ❌";
    return;
  }

  result.innerHTML = "⚡ Generating...";
  imageBox.innerHTML = "";

  try {
    const res = await fetch(API + "/generate-smart", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt })
    });

    const data = await res.json();

    console.log(data);

    // 🖼 IMAGE
    if (data.type === "image") {
      imageBox.innerHTML = `
        <img src="${data.output}" />
        <br>
        <a href="${data.output}" download class="download">⬇ Download Image</a>
      `;
      result.innerHTML = "✅ Image Generated";
      return;
    }

    // 🎬 VIDEO
    if (data.type === "video") {
      result.innerHTML = "🎬 Viral Video Script:\n\n" + data.output;
      return;
    }

    // 🧠 TEXT
    result.innerHTML = data.output;

  } catch (err) {
    result.innerHTML = "Server error ❌";
  }
}
</script>

</body>
</html>
