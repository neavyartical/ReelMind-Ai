<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReelMind AI</title>

<style>
body {
  background: #0b1c2c;
  color: white;
  font-family: Arial;
  text-align: center;
  padding: 20px;
}

h1 {
  margin-bottom: 20px;
}

input {
  width: 90%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  margin-bottom: 10px;
}

button {
  width: 90%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  margin-top: 10px;
  font-size: 16px;
}

.generate {
  background: #22c55e;
  color: white;
}

.download {
  background: #3b82f6;
  color: white;
  display: none;
}

#status {
  margin-top: 10px;
}

img {
  margin-top: 20px;
  width: 95%;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>🎬 ReelMind AI</h1>

<input id="prompt" placeholder="Generate cinematic image..." />

<button class="generate" onclick="generateImage()">Generate</button>

<button id="downloadBtn" class="download">Download Image</button>

<p id="status"></p>

<img id="result" />

<script>
async function generateImage() {
  const prompt = document.getElementById("prompt").value;
  const status = document.getElementById("status");
  const img = document.getElementById("result");
  const downloadBtn = document.getElementById("downloadBtn");

  status.innerText = "⏳ Generating...";
  img.src = "";
  downloadBtn.style.display = "none";

  try {
    const response = await fetch(
      "https://router.huggingface.co/hf-inference/models/stabilityai/stable-diffusion-xl-base-1.0",
      {
        method: "POST",
        headers: {
          "Authorization": "Bearer hf_YOUR_NEW_TOKEN_HERE",
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          inputs: prompt
        })
      }
    );

    if (!response.ok) {
      throw new Error("API Error");
    }

    const blob = await response.blob();
    const url = URL.createObjectURL(blob);

    img.src = url;
    status.innerText = "✅ Done!";

    downloadBtn.style.display = "block";

    downloadBtn.onclick = () => {
      const a = document.createElement("a");
      a.href = url;
      a.download = "reelmind-image.png";
      a.click();
    };

  } catch (err) {
    status.innerText = "❌ Error generating image";
    console.error(err);
  }
}
</script>

</body>
</html>
