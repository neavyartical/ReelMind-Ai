<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    input, textarea, button {
      margin: 10px;
      padding: 10px;
      width: 80%;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #22c55e;
      color: white;
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
      white-space: pre-wrap;
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>🎬 ReelMind AI</h1>

<h3>Register / Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

<h3>Generate Reel Script</h3>
<textarea id="prompt" placeholder="Enter your idea..."></textarea>

<button onclick="generate()">Generate</button>

<div id="result"></div>

<script>
const BASE_URL = "https://reelmindbackend-1.onrender.com";

/* REGISTER */
async function register() {
  const res = await fetch(BASE_URL + "/register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      email: document.getElementById("email").value,
      password: document.getElementById("password").value
    })
  });

  const data = await res.json();
  alert(data.message || data.error);
}

/* LOGIN */
async function login() {
  const res = await fetch(BASE_URL + "/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      email: document.getElementById("email").value,
      password: document.getElementById("password").value
    })
  });

  const data = await res.json();

  if (data.token) {
    localStorage.setItem("token", data.token);
    alert("Login success ✅");
  } else {
    alert(data.error);
  }
}

/* GENERATE */
async function generate() {
  const prompt = document.getElementById("prompt").value;
  const token = localStorage.getItem("token");

  if (!token) {
    alert("Please login first ❌");
    return;
  }

  document.getElementById("result").innerText = "Generating... ⏳";

  const res = await fetch(BASE_URL + "/generate", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": token
    },
    body: JSON.stringify({ prompt })
  });

  const data = await res.json();

  if (data.result) {
    document.getElementById("result").innerText = data.result;
  } else {
    document.getElementById("result").innerText = data.error;
  }
}
</script>

</body>
</html>
