<script>

let currentMode = "image";
let tikTokMode = false;
let chatHistory = [];
let history = JSON.parse(localStorage.getItem("history") || "[]");

const ADMIN_EMAILS = ["neavyartical@gmail.com","arsesay89@gmail.com"];

let usage = parseInt(localStorage.getItem("usage") || "0");
let isPremium = false;

// AUTH
function signup(){
  const emailVal = email.value;

  isPremium = ADMIN_EMAILS.includes(emailVal);

  localStorage.setItem("user", JSON.stringify({
    email: emailVal,
    pass: password.value,
    premium: isPremium
  }));

  startApp();
}

function login(){
  const user = JSON.parse(localStorage.getItem("user"));

  if(user && user.email === email.value && user.pass === password.value){
    isPremium = user.premium || ADMIN_EMAILS.includes(user.email);
    startApp();
  } else alert("Invalid login");
}

function logout(){
  localStorage.removeItem("user");
  location.reload();
}

function startApp(){
  auth.classList.add("hidden");
  app.classList.remove("hidden");
  loadHistory();
}

// SPLASH
setTimeout(()=> splash.style.display="none",2000);

// MODE
function setMode(mode){
  currentMode = mode;
  chatBox.classList.toggle("hidden", mode !== "chat");
}

// TEMPLATE
function useTemplate(text){
  document.getElementById("prompt").value = text;
}

// TIKTOK
function toggleTikTok(){
  tikTokMode = !tikTokMode;
  alert("TikTok Mode: "+(tikTokMode?"ON":"OFF"));
}

// SAVE HISTORY
function saveHistory(item){
  history.unshift(item);
  localStorage.setItem("history", JSON.stringify(history));
  loadHistory();
}

function loadHistory(){
  const box = document.getElementById("historyBox");
  box.innerHTML = history.slice(0,10).map(h=>`<p>• ${h}</p>`).join("");
}

// DOWNLOAD
function downloadFile(url){
  const a = document.createElement("a");
  a.href = url;
  a.download = "ReelMind";
  a.click();
}

// SHARE
function share(text){
  if(navigator.share){
    navigator.share({text});
  } else alert(text);
}

// 🔥 PREMIUM CHECK
function checkLimit(){
  if(isPremium) return true;

  if(usage >= 5){
    alert("🔥 Free limit reached! Upgrade to Premium for unlimited access.");
    return false;
  }

  usage++;
  localStorage.setItem("usage", usage);
  return true;
}

// FAKE UPGRADE (FOR NOW)
function upgrade(){
  isPremium = true;
  alert("🎉 Premium Activated!");
}

// MAIN
async function generate(){
  let prompt = document.getElementById("prompt").value.trim();
  const output = document.getElementById("output");
  const loader = document.getElementById("loader");

  if(!prompt) return alert("Enter something");

  if(!checkLimit()) return;

  loader.style.display = "block";

  // CHAT
  if(currentMode === "chat"){
    chatBox.innerHTML += `<p><b>You:</b> ${prompt}</p>`;
    chatBox.innerHTML += `<p>🤖 Thinking...</p>`;

    try{
      const res = await fetch("https://backend-ppyz.onrender.com/story",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({prompt})
      });

      const data = await res.json();
      const reply = data.text || "No response";

      chatBox.innerHTML += `<p><b>AI:</b> ${reply}</p>`;
      saveHistory(prompt);

    } catch {
      chatBox.innerHTML += `<p><b>AI:</b> Smart fallback response</p>`;
    }

    loader.style.display = "none";
    return;
  }

  // STORY
  if(currentMode === "story"){
    output.innerHTML = `<div class="card"><pre>Story about ${prompt}</pre></div>`;
    saveHistory(prompt);
    loader.style.display = "none";
    return;
  }

  // IMAGE / VIDEO
  try{
    const res = await fetch("https://backend-ppyz.onrender.com/generate",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({prompt})
    });

    const data = await res.json();

    output.innerHTML = `
      <div class="card">
        <img src="${data.url}">
        <button onclick="downloadFile('${data.url}')">Download</button>
        <button onclick="share('${prompt}')">Share</button>
        <button onclick="upgrade()">⭐ Upgrade to Premium</button>
      </div>
    `;

    saveHistory(prompt);

  } catch {
    output.innerHTML = "Error";
  }

  loader.style.display = "none";
}

</script>
