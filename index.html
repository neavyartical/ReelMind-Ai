<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:linear-gradient(135deg,#0f0018,#ff6a00);
  color:white;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* AUTH */
#auth{
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* INPUT */
input{
  padding:12px;
  margin:6px;
  border:none;
  border-radius:10px;
  width:80%;
}

button{
  padding:12px;
  margin:6px;
  border:none;
  border-radius:10px;
  background:#ff6a00;
  color:white;
}

/* GRID (3D CUBES) */
#grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  padding:10px;
}

.grid-btn{
  text-align:center;
  padding:14px;
  border-radius:14px;
  background:linear-gradient(145deg,#1a1a1a,#2a2a2a);
  box-shadow:5px 5px 15px #000,-5px -5px 15px #333;
  transform:perspective(200px) translateZ(5px);
}

.grid-btn span{
  display:block;
  font-size:12px;
  margin-top:5px;
}

/* CHAT */
#chat{
  flex:1;
  overflow:auto;
  padding:10px;
}

.msg{
  margin:8px;
  padding:12px;
  border-radius:12px;
  max-width:85%;
}

.user{background:#ff6a00;margin-left:auto;}
.ai{background:#222;}

img,video{
  width:100%;
  border-radius:10px;
  margin-top:5px;
}

/* INPUT BAR */
#bottom{
  display:flex;
  padding:10px;
}
</style>
</head>

<body>

<!-- AUTH -->
<div id="auth">
  <h2>Welcome</h2>
  <input id="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Password">

  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div id="grid">
  <div class="grid-btn" onclick="setMode('chat')">💬<span>Chat</span></div>
  <div class="grid-btn" onclick="setMode('story')">📖<span>Story</span></div>
  <div class="grid-btn" onclick="setMode('image')">🖼<span>Image</span></div>
  <div class="grid-btn" onclick="setMode('video')">🎬<span>Video</span></div>
  <div class="grid-btn" onclick="viewProjects()">📂<span>Projects</span></div>
  <div class="grid-btn" onclick="logout()">🚪<span>Logout</span></div>
</div>

<div id="chat"></div>

<div id="bottom">
  <input id="input" placeholder="Ask anything...">
  <button onclick="send()">➤</button>
</div>

</div>

<script>

// USER
let currentUser=null;

// REGISTER
function register(){
  let email=emailEl.value;
  let pass=passEl.value;

  if(!email || !pass){alert("Fill all");return;}

  let users=JSON.parse(localStorage.getItem("users")||"{}");

  if(users[email]){alert("User exists");return;}

  users[email]={pass:pass,projects:[]};
  localStorage.setItem("users",JSON.stringify(users));

  alert("Registered!");
}

// LOGIN
function login(){
  let email=emailEl.value;
  let pass=passEl.value;

  let users=JSON.parse(localStorage.getItem("users")||"{}");

  if(!users[email] || users[email].pass!==pass){
    alert("Wrong login");
    return;
  }

  currentUser=email;
  localStorage.setItem("currentUser",email);

  auth.style.display="none";
  app.style.display="block";
}

// LOGOUT
function logout(){
  localStorage.removeItem("currentUser");
  location.reload();
}

// AUTO LOGIN
window.onload=function(){
  let saved=localStorage.getItem("currentUser");
  if(saved){
    currentUser=saved;
    auth.style.display="none";
    app.style.display="block";
  }
}

// SAVE PROJECT (PER USER)
function saveProject(data){
  let users=JSON.parse(localStorage.getItem("users"));
  users[currentUser].projects.unshift(data);
  localStorage.setItem("users",JSON.stringify(users));
}

// VIEW PROJECTS
function viewProjects(){
  let users=JSON.parse(localStorage.getItem("users"));
  let list=users[currentUser].projects;

  if(!list.length){
    add("No projects yet","ai");
    return;
  }

  add("📂 Your Projects:<br><br>"+list.join("<br><br>"),"ai");
}

// UI
let mode="chat";

function setMode(m){
  mode=m;
  add("Mode: "+m,"ai");
}

function add(t,type){
  let d=document.createElement("div");
  d.className="msg "+type;
  d.innerHTML=t;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

// DOWNLOAD
function downloadFile(url,type){
  let a=document.createElement("a");
  a.href=url;
  a.download= type==="video"?"video.mp4":"image.jpg";
  a.click();
}

// SEND
async function send(){
  let txt=input.value.trim();
  if(!txt) return;

  add(txt,"user");

  // IMAGE
  if(mode==="image"){
    let url="https://image.pollinations.ai/prompt/"+encodeURIComponent(txt);

    add(`
      <img src="${url}">
      <button onclick="downloadFile('${url}','image')">⬇ Download</button>
    `,"ai");

    saveProject("Image: "+txt);
    return;
  }

  // VIDEO
  if(mode==="video"){
    let vid="https://samplelib.com/lib/preview/mp4/sample-5s.mp4";

    add(`
      <video controls>
        <source src="${vid}">
      </video>
      <button onclick="downloadFile('${vid}','video')">⬇ Download</button>
    `,"ai");

    saveProject("Video: "+txt);
    return;
  }

  // STORY
  if(mode==="story"){
    let story=`
📖 Story:

${txt}

A deep cinematic journey filled with emotion, power and transformation.

✨ A story that feels real and unforgettable.
`;

    add(story,"ai");
    saveProject(story);
    return;
  }

  // CHAT
  add("🤖 AI: " + txt,"ai");
}

</script>

</body>
</html>
