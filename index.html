<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReelMind AI</title>

<!-- AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXX"
crossorigin="anonymous"></script>

<style>
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  color:white;
  text-align:center;
  overflow:hidden;
  background:linear-gradient(135deg,#020024,#090979,#00d4ff);
}

/* BRAIN BACKGROUND */
#brain{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* GLASS UI */
.glass{
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  border-radius:20px;
  padding:20px;
  margin:15px;
  box-shadow:0 0 25px rgba(0,255,255,0.3);
}

/* CUBE */
.scene{
  width:220px;
  height:220px;
  margin:20px auto;
  perspective:800px;
}

.cube{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
}

.face{
  position:absolute;
  width:220px;
  height:220px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
}

.face button{
  padding:12px;
  border:none;
  border-radius:12px;
  background:#00eaff;
  color:black;
  font-weight:bold;
}

.front{transform:translateZ(110px)}
.back{transform:rotateY(180deg) translateZ(110px)}
.right{transform:rotateY(90deg) translateZ(110px)}
.left{transform:rotateY(-90deg) translateZ(110px)}
.top{transform:rotateX(90deg) translateZ(110px)}
.bottom{transform:rotateX(-90deg) translateZ(110px)}

input{
  width:80%;
  padding:14px;
  border:none;
  border-radius:12px;
  margin-top:10px;
}

button{
  margin:10px;
  padding:12px 20px;
  border:none;
  border-radius:12px;
  background:#00eaff;
  color:black;
  font-weight:bold;
}

#app{display:none;}
</style>
</head>

<body>

<canvas id="brain"></canvas>

<h2>🚀 ReelMind AI</h2>

<!-- LOGIN -->
<div id="login" class="glass">
<h3>Login / Register</h3>

<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>
<button onclick="register()">Register</button>
</div>

<!-- APP -->
<div id="app" class="glass">

<div class="scene">
<div class="cube" id="cube">
<div class="face front"><button onclick="setMode('chat')">Chat</button></div>
<div class="face back"><button onclick="setMode('story')">Story</button></div>
<div class="face right"><button onclick="setMode('image')">Image</button></div>
<div class="face left"><button onclick="setMode('video')">Video</button></div>
<div class="face top"><button onclick="setMode('music')">Music</button></div>
<div class="face bottom"><button onclick="setMode('money')">Money</button></div>
</div>
</div>

<input id="prompt" placeholder="Enter your idea...">

<br>

<button onclick="generate()">Generate</button>
<button onclick="logout()">Logout</button>

<div id="output"></div>

<!-- ADS -->
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-XXXX"
     data-ad-slot="1234567890"
     data-ad-format="auto"></ins>

<script>
(adsbygoogle = window.adsbygoogle || []).push({});
</script>

<button onclick="buy()">Unlock Premium ($9)</button>

<h3>Powered by Artical Neavy</h3>
<p>$9/month | $99/year</p>

</div>

<script>
let mode="chat";
let user="";
let rotateY=0;

/* AUTO LOGIN */
window.onload=()=>{
  let saved=localStorage.getItem("user");
  if(saved){
    user=saved;
    showApp();
  }
};

/* ROTATE CUBE */
setInterval(()=>{
  rotateY+=1;
  document.getElementById("cube").style.transform =
  `rotateX(20deg) rotateY(${rotateY}deg)`;
},50);

/* MODE */
function setMode(m){
  mode=m;
}

/* REGISTER */
function register(){
  let u=user.value;
  let p=pass.value;

  fetch("https://reelmindbackend-1.onrender.com/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username:u,password:p})
  })
  .then(r=>r.json())
  .then(d=>{
    if(d.success) alert("Registered!");
    else alert("User exists");
  });
}

/* LOGIN */
function login(){
  let u=user.value;
  let p=pass.value;

  fetch("https://reelmindbackend-1.onrender.com/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username:u,password:p})
  })
  .then(r=>r.json())
  .then(d=>{
    if(d.success){
      user=u;
      localStorage.setItem("user",u);
      showApp();
    }else{
      alert("Login failed");
    }
  });
}

function showApp(){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("user");
  location.reload();
}

/* GENERATE */
async function generate(){
  let prompt=document.getElementById("prompt").value;
  let output=document.getElementById("output");

  if(!prompt){
    alert("Enter prompt");
    return;
  }

  output.innerHTML="⏳ Generating...";

  try{
    let res=await fetch("https://reelmindbackend-1.onrender.com/generate",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({prompt,type:mode})
    });

    let data=await res.json();

    if(mode==="image"){
      output.innerHTML=`<img src="${data.result}" width="260">`;
    }else{
      output.innerHTML=data.result;
    }

  }catch{
    output.innerHTML="❌ Error";
  }
}

/* PREMIUM */
function buy(){
  fetch("https://reelmindbackend-1.onrender.com/verify",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username:user})
  })
  .then(r=>r.json())
  .then(d=>{
    if(d.success) alert("Premium unlocked!");
  });
}

/* BRAIN ANIMATION */
const canvas=document.getElementById("brain");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let nodes=[];

for(let i=0;i<80;i++){
  nodes.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    vx:(Math.random()-0.5)*1.5,
    vy:(Math.random()-0.5)*1.5
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let i=0;i<nodes.length;i++){
    for(let j=i+1;j<nodes.length;j++){
      let dx=nodes[i].x-nodes[j].x;
      let dy=nodes[i].y-nodes[j].y;
      let dist=Math.sqrt(dx*dx+dy*dy);

      if(dist<120){
        ctx.strokeStyle="rgba(0,255,255,0.2)";
        ctx.beginPath();
        ctx.moveTo(nodes[i].x,nodes[i].y);
        ctx.lineTo(nodes[j].x,nodes[j].y);
        ctx.stroke();
      }
    }
  }

  nodes.forEach(n=>{
    n.x+=n.vx;
    n.y+=n.vy;

    if(n.x<0||n.x>canvas.width) n.vx*=-1;
    if(n.y<0||n.y>canvas.height) n.vy*=-1;

    ctx.fillStyle="#00ffff";
    ctx.beginPath();
    ctx.arc(n.x,n.y,2,0,Math.PI*2);
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
