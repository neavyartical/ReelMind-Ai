<script>
const API_KEY = "YOUR_OPENROUTER_API_KEY";

let chatHistory = JSON.parse(localStorage.getItem("chat")) || [];

// LOAD CHAT
window.onload = () => {
  chatHistory.forEach(msg => addMessage(msg.text, msg.type));
};

function saveChat(text, type) {
  chatHistory.push({ text, type });
  localStorage.setItem("chat", JSON.stringify(chatHistory));
}

function addMessage(text, type) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "message " + type;
  div.innerHTML = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  saveChat(text, type);
}

function generate() {
  const input = document.getElementById("prompt");
  let prompt = input.value.trim();

  if (!prompt) return;

  addMessage(prompt, "user");
  input.value = "";

  addMessage("⏳ Thinking...", "bot");

  // 🖼 IMAGE
  if (prompt.toLowerCase().includes("image")) {
    let enhanced = prompt + ", cinematic lighting, glassy glowing background, ultra detailed, 4k";

    let html = "";
    for (let i = 0; i < 4; i++) {
      const url = "https://image.pollinations.ai/prompt/" + encodeURIComponent(enhanced + " " + i);
      html += `<img src="${url}">`;
    }

    setTimeout(() => {
      document.querySelector(".bot:last-child").remove();
      addMessage(html, "bot");
    }, 1000);

    return;
  }

  // 🔥 CONVERT CHAT TO OPENROUTER FORMAT
  const messages = [
    { role: "system", content: "You are ReelMind AI. Generate viral, engaging, smart content." }
  ];

  chatHistory.forEach(msg => {
    if (msg.type === "user") {
      messages.push({ role: "user", content: msg.text });
    } else {
      messages.push({ role: "assistant", content: msg.text });
    }
  });

  // 🧠 OPENROUTER REQUEST
  fetch("https://openrouter.ai/api/v1/chat/completions", {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + API_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      model: "openai/gpt-4o-mini",
      messages: messages
    })
  })
  .then(res => res.json())
  .then(data => {
    document.querySelector(".bot:last-child").remove();

    const reply = data.choices?.[0]?.message?.content || "No response";
    addMessage(reply, "bot");
  })
  .catch(() => {
    addMessage("Error connecting to AI", "bot");
  });
}

// 🎤 VOICE
function startVoice() {
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.start();

  recognition.onresult = function(event) {
    document.getElementById("prompt").value = event.results[0][0].transcript;
  };
}

// ENTER KEY
document.getElementById("prompt").addEventListener("keypress", function(e) {
  if (e.key === "Enter") generate();
});
</script>
