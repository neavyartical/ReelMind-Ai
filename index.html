<!DOCTYPE html>
<html lang="en">
<head>
  <title>ReelMind AI | Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1714638410489429" crossorigin="anonymous"></script>

  <style>
    :root {
      --primary: #00ffc3;
      --bg-dark: #0a0a0a;
      --glass: rgba(255, 255, 255, 0.05);
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: white;
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=1920&q=80');
      background-size: cover;
      background-attachment: fixed;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #nav {
      background: rgba(0, 0, 0, 0.9);
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #333;
    }

    #nav a { color: var(--primary); margin: 0 10px; text-decoration: none; font-size: 14px; transition: 0.3s; }
    #nav a:hover { text-shadow: 0 0 10px var(--primary); }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .msg {
      padding: 14px 18px;
      border-radius: 18px;
      max-width: 85%;
      line-height: 1.5;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .user { background: #0066ff; align-self: flex-end; border-bottom-right-radius: 2px; }
    .ai { background: #222; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #333; }

    img.gen-image {
      width: 100%;
      max-width: 400px;
      border-radius: 12px;
      margin-top: 10px;
      border: 2px solid var(--primary);
    }

    #inputArea {
      background: #111;
      padding: 20px;
      display: flex;
      gap: 10px;
      align-items: center;
      border-top: 1px solid #222;
    }

    input {
      flex: 1;
      padding: 14px;
      border-radius: 25px;
      border: 1px solid #333;
      background: #000;
      color: white;
      outline: none;
    }

    button {
      background: var(--primary);
      color: black;
      border: none;
      padding: 12px 20px;
      border-radius: 25px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--primary); }
    button:disabled { background: #444; cursor: not-allowed; }

    .loader {
      width: 20px; height: 20px;
      border: 3px solid #333;
      border-top: 3px solid var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="nav">
  <div style="font-size: 1.2rem;">REELMIND <span style="color:var(--primary)">AI</span></div>
  <div>
    <a href="#">Docs</a>
    <span id="userStatus" style="color: #666; font-size: 12px;">● Online</span>
    <button onclick="subscribe()" id="premiumBtn" style="padding: 5px 10px; font-size: 11px; margin-left: 10px;">Upgrade</button>
  </div>
</div>

<div id="chat">
  <div class="msg ai">Hello! I'm upgraded with Pollinations and OpenRouter. Ask me to write a story or generate an image!</div>
</div>

<div id="inputArea">
  <button onclick="document.getElementById('fileInput').click()" style="background:transparent; color:white; font-size:20px;">📎</button>
  <input id="userInput" placeholder="Type a message or 'Generate an image of...'" />
  <button id="sendBtn" onclick="processInput()">Send</button>
</div>

<input type="file" id="fileInput" hidden />

<script>
  // CONFIGURATION
  const OPENROUTER_API_KEY = "YOUR_OPENROUTER_KEY"; // Get one at openrouter.ai
  const IS_PREMIUM = localStorage.getItem("premium") === "true";
  if(IS_PREMIUM) document.getElementById('premiumBtn').innerText = "PRO ACTIVE";

  async function processInput() {
    const inputField = document.getElementById("userInput");
    const chat = document.getElementById("chat");
    const text = inputField.value.trim();
    
    if (!text) return;
    
    // Add User Message
    addMessage(text, 'user');
    inputField.value = "";
    
    // Show Loader
    const loaderId = "loader-" + Date.now();
    chat.innerHTML += `<div class="msg ai" id="${loaderId}"><div class="loader"></div></div>`;
    scrollDown();

    try {
      // IMAGE GENERATION LOGIC (Pollinations)
      if (text.toLowerCase().startsWith("generate image") || text.toLowerCase().startsWith("draw")) {
        const prompt = encodeURIComponent(text.replace(/generate image|draw/gi, "").trim());
        const imageUrl = `https://pollinations.ai/p/${prompt}?width=1024&height=1024&seed=${Math.floor(Math.random() * 1000000)}&nologo=true`;
        
        document.getElementById(loaderId).innerHTML = `
          <p>Generated Image:</p>
          <img src="${imageUrl}" class="gen-image" onload="scrollDown()">
          <br><a href="${imageUrl}" target="_blank" style="color:var(--primary); font-size:12px;">Open Full Resolution</a>
        `;
      } 
      // TEXT GENERATION LOGIC (OpenRouter / Runway via Proxy)
      else {
        const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${OPENROUTER_API_KEY}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            "model": "google/gemini-2.0-flash-001", // High speed, reliable
            "messages": [{"role": "user", "content": text}]
          })
        });

        const data = await response.json();
        const aiReply = data.choices[0].message.content;
        document.getElementById(loaderId).innerHTML = aiReply.replace(/\n/g, "<br>");
      }
    } catch (err) {
      document.getElementById(loaderId).innerHTML = "⚠️ Connection Error. Check API Key.";
    }
    scrollDown();
  }

  function addMessage(content, role) {
    const chat = document.getElementById("chat");
    chat.innerHTML += `<div class="msg ${role}">${content}</div>`;
    scrollDown();
  }

  function scrollDown() {
    const chat = document.getElementById("chat");
    chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' });
  }

  function subscribe() {
    localStorage.setItem("premium", "true");
    alert("Premium Features Unlocked!");
    location.reload();
  }

  document.getElementById("userInput").addEventListener("keypress", (e) => { if(e.key === "Enter") processInput(); });
</script>

</body>
</html>
