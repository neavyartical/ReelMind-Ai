<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #6a00ff, #ff6a00);
      color: white;
      text-align: center;
    }

    /* 🔥 SPLASH SCREEN */
    #splash {
      position: fixed;
      top:0; left:0;
      width:100%; height:100%;
      background: linear-gradient(135deg, #6a00ff, #ff6a00);
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      z-index:9999;
    }

    #splash h1 {
      font-size: 32px;
      animation: fade 2s infinite alternate;
    }

    @keyframes fade {
      from {opacity:0.5;}
      to {opacity:1;}
    }

    .container {
      padding: 15px;
      display:none;
    }

    input, select {
      width: 90%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      margin-bottom: 10px;
    }

    button {
      padding: 12px 18px;
      margin: 5px;
      border-radius: 12px;
      border: none;
      background: rgba(255,255,255,0.2);
      color: white;
      font-size: 14px;
    }

    .tabs button {
      background: rgba(0,0,0,0.3);
    }

    .active {
      background: #fff;
      color: #000;
    }

    .card {
      margin-top: 20px;
      background: rgba(0,0,0,0.3);
      padding: 10px;
      border-radius: 15px;
    }

    img {
      width:100%;
      border-radius:10px;
      animation: zoom 6s infinite alternate;
    }

    @keyframes zoom {
      100% { transform: scale(1.2); }
    }

    video {
      width:100%;
      border-radius:10px;
    }
  </style>
</head>

<body>

<!-- 🔥 SPLASH -->
<div id="splash">
  <h1>🎬 ReelMind AI</h1>
  <p>Creating the future...</p>
</div>

<div class="container" id="app">

  <h2>ReelMind AI</h2>

  <!-- 🔥 MODES -->
  <div class="tabs">
    <button onclick="switchMode('image')" class="active">🖼 Image</button>
    <button onclick="switchMode('story')">🧠 Story</button>
    <button onclick="switchMode('video')">🎬 Video</button>
  </div>

  <input id="prompt" placeholder="Enter idea..." />

  <select id="musicSelect">
    <option value="">No Music</option>
    <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">Chill</option>
    <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3">Hype</option>
  </select>

  <input type="file" id="uploadMusic" accept="audio/*">

  <button onclick="generate()">✨ Generate</button>

  <div id="output"></div>

  <audio id="music" loop></audio>

</div>

<script>
let mode = "image";

setTimeout(() => {
  document.getElementById("splash").style.display = "none";
  document.getElementById("app").style.display = "block";
}, 2000);

function switchMode(m) {
  mode = m;
  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");
}

function generateStory(prompt) {
  return "One day, " + prompt + " and everything changed forever...";
}

async function generate() {
  const prompt = document.getElementById("prompt").value;
  const output = document.getElementById("output");
  const music = document.getElementById("music");

  if (!prompt) return;

  output.innerHTML = "Loading...";

  const res = await fetch("https://backend-ppyz.onrender.com/generate", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({prompt: prompt + ", ultra realistic"})
  });

  const data = await res.json();

  // 🎧 MUSIC
  const uploaded = document.getElementById("uploadMusic").files[0];
  const selected = document.getElementById("musicSelect").value;

  if(uploaded) music.src = URL.createObjectURL(uploaded);
  else if(selected) music.src = selected;

  if(music.src) music.play();

  if(mode === "image") {
    output.innerHTML = `
      <div class="card">
        <img src="${data.url}">
      </div>
    `;
  }

  if(mode === "story") {
    output.innerHTML = `
      <div class="card">
        <img src="${data.url}">
        <p>${generateStory(prompt)}</p>
      </div>
    `;
  }

  if(mode === "video") {
    output.innerHTML = `
      <div class="card">
        <img id="vidImg" src="${data.url}">
        <button onclick="record()">🎥 Export Video</button>
      </div>
    `;
  }
}

// 🎬 RECORD VIDEO
function record() {
  const img = document.getElementById("vidImg");
  const stream = img.captureStream(30);

  const rec = new MediaRecorder(stream);
  let chunks=[];

  rec.ondataavailable = e=>chunks.push(e.data);

  rec.onstop = ()=>{
    const blob = new Blob(chunks);
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "video.mp4";
    a.click();
  };

  rec.start();
  setTimeout(()=>rec.stop(),5000);
}
</script>

</body>
</html>
