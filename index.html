<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReelMind AI • Unlimited</title>
    <style>
        body { margin:0; font-family:'Segoe UI', Arial, sans-serif; background: radial-gradient(circle, #0f2027, #2c5364); color:white; text-align:center; min-height:100vh; }
        .logo-container { padding: 30px 0; }
        .logo-img { width: 180px; filter: drop-shadow(0 0 15px cyan); }
        
        /* SOCIAL LOGIN UI */
        .social-login { margin: 15px 0; }
        .social-btn { padding:10px 18px; margin:5px; border:none; border-radius:8px; background:white; color:black; font-size:12px; cursor:pointer; font-weight:bold; transition: 0.3s; }
        .social-btn:hover { background: cyan; box-shadow: 0 0 10px cyan; }
        
        textarea { width:85%; max-width:650px; padding:18px; border-radius:20px; border:1px solid rgba(0,255,255,0.4); margin-top:10px; background:rgba(0,0,0,0.4); color:white; font-size:16px; outline:none; }
        
        /* THE ICE CUBE CURE */
        .cube { width:170px; height:170px; margin:40px auto; background:rgba(255,255,255,0.05); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border-radius:30px; display:flex; align-items:center; justify-content:center; box-shadow:0 0 60px cyan; border: 1px solid rgba(255,255,255,0.2); transition: 0.4s; }
        .cube:hover { transform: scale(1.05); box-shadow: 0 0 90px cyan; }

        .gen-btn { padding:14px 28px; border:none; border-radius:12px; background:cyan; color:black; font-weight:bold; cursor:pointer; text-transform:uppercase; letter-spacing: 1px; }

        #output { margin-top:20px; padding:20px; }
        .result-card { background: rgba(0,0,0,0.5); padding:25px; border-radius:20px; border: 1px solid cyan; margin:20px auto; max-width:850px; text-align:left; line-height: 1.7; animation: slideUp 0.5s ease-out; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        img, video { max-width:100%; border-radius:15px; margin-top:20px; box-shadow:0 0 25px cyan; border: 1px solid rgba(0, 255, 255, 0.4); }
        
        .action-icon { background: rgba(255,255,255,0.1); border: 1px solid #fff; color: #fff; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 13px; margin-top: 15px; }
        
        footer { margin: 60px 0; font-size:12px; color:#777; padding-bottom: 20px; }
    </style>
</head>
<body>

<div class="logo-container">
    <img src="442630.png" alt="ReelMind AI" class="logo-img"> <h1>REELMIND <span style="color:cyan">UNLIMITED</span></h1>
</div>

<div class="social-login">
  <button class="social-btn" onclick="alert('Google Login Ready')">Google</button>
  <button class="social-btn" onclick="alert('Apple Login Ready')">Apple</button>
  <button class="social-btn" onclick="alert('Facebook Login Ready')">Facebook</button>
</div>

<p style="color:cyan; font-weight: bold; letter-spacing: 1px;">✅ UNLIMITED MODE ACTIVE • V2.2.0</p>

<textarea id="prompt" placeholder="Ask a question or describe a cinematic vision..."></textarea>

<div class="cube">
  <button class="gen-btn" onclick="generate()">Generate</button>
</div>

<div id="output"></div>

<footer>Powered by Artical Neavy • SaaS Studio 2026</footer>

<script>
const BASE = "https://reelmindbackend-1.onrender.com";

/* 🔊 NARRATION ENGINE */
function speak(text) {
  window.speechSynthesis.cancel();
  const speech = new SpeechSynthesisUtterance(text);
  speech.rate = 1.0;
  window.speechSynthesis.speak(speech);
}

/* 🎬 CORE GENERATOR */
async function generate() {
  const promptValue = document.getElementById("prompt").value;
  const output = document.getElementById("output");

  if (!promptValue) return alert("Vision prompt required!");
  output.innerHTML = "⚡ <span style='color:cyan'>REELMIND CORE</span> is decoding your request...";

  // --- SMART INTENT ROUTING ---
  let action = "chat"; // Default
  const p = promptValue.toLowerCase();
  if (p.includes("image") || p.includes("photo") || p.includes("picture")) action = "image";
  if (p.includes("video") || p.includes("movie") || p.includes("reel")) action = "video";

  try {
    const res = await fetch(BASE + "/generate", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ action, input: promptValue })
    });

    const result = await res.json();
    
    // --- DISPLAY LOGIC ---
    if(result.type === 'text') {
        output.innerHTML = `
          <div class="result-card">
            <h3 style="color:cyan;">🧠 AI Insights & Script</h3>
            <p>${result.data}</p>
            <button class="action-icon" onclick="speak(\`${result.data.replace(/`/g, "'")}\`)">🔊 Narrate Text</button>
          </div>
        `;
    } else if(result.type === 'image') {
        output.innerHTML = `
          <div class="result-card">
            <h3 style="color:cyan;">🖼 4K Cinematic Render</h3>
            <img src="${result.data}">
            <br>
            <button class="action-icon" onclick="window.open('${result.data}')">⬇ Download 4K Image</button>
          </div>
        `;
    } else if(result.type === 'video') {
        output.innerHTML = `
          <div class="result-card">
            <h3 style="color:cyan;">🎬 AI Motion Video</h3>
            <video controls src="${result.data}"></video>
          </div>
        `;
    }

    // Always generate a caption for social media as a bonus
    const caption = `🔥 Generated by ReelMind AI:\n${promptValue}\n\n#AI #Reels #Cinematic #Unlimited #Viral`;
    output.innerHTML += `
      <div class="result-card" style="border-color: rgba(255,255,255,0.2);">
        <h3 style="color:#aaa;">📱 Social Media Caption</h3>
        <pre style="white-space: pre-wrap; font-family: inherit; color: #cyan;">${caption}</pre>
        <button class="action-icon" onclick="navigator.clipboard.writeText(\`${caption}\`); alert('Copied!');">📋 Copy Caption</button>
      </div>
    `;

  } catch (err) {
    output.innerHTML = "<p style='color:red;'>⚠️ Server error. Wait 30 seconds for the engine to wake up and try again.</p>";
  }
}
</script>
</body>
</html>
