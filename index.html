<!DOCTYPE html>
<!-- v16 FINAL PRO SYSTEM -->
<html>
<head>
  <title>ReelMind AI PRO</title>

  <style>
    body {
      background:#0b1d2a;
      color:white;
      text-align:center;
      font-family:sans-serif;
    }

    .card {
      background:#12283a;
      padding:10px;
      border-radius:10px;
      position:relative;
    }

    .watermark {
      position:absolute;
      bottom:8px;
      right:10px;
      font-size:12px;
      opacity:0.7;
    }

    .ad-box {
      background:#1f2937;
      padding:10px;
      margin:10px;
      border-radius:10px;
    }

    @keyframes panzoom {
      0% { transform: scale(1) translate(0px,0px); }
      50% { transform: scale(1.2) translate(-15px,10px); }
      100% { transform: scale(1.3) translate(10px,-10px); }
    }

    button {
      padding:12px 20px;
      margin:5px;
      border:none;
      border-radius:8px;
      background:#3b82f6;
      color:white;
    }
  </style>
</head>

<body>

  <h1>🎬 ReelMind AI PRO</h1>

  <div class="ad-box">🚀 Your Ad Here</div>

  <input id="prompt" placeholder="Describe your scene..."
    style="width:80%;padding:14px;border-radius:10px;border:none;" />

  <br><br>

  <button onclick="setStyle('cinematic lighting')">🎬 Cinematic</button>
  <button onclick="setStyle('anime style')">🎌 Anime</button>
  <button onclick="setStyle('realistic')">📸 Realistic</button>

  <br><br>

  <button id="imgBtn">Generate Images</button>
  <button id="vidBtn">Generate Video 🎬</button>
  <button onclick="goPro()">💰 Upgrade PRO</button>

  <p id="status"></p>

  <div id="gallery" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;padding:20px;"></div>

  <script defer>

    let selectedStyle = "cinematic lighting";

    function setStyle(style) {
      selectedStyle = style;
    }

    /* PRO SYSTEM */
    let isPro = false;

    if (window.location.href.includes("success=true")) {
      isPro = true;
      localStorage.setItem("pro", "true");
    }

    if (localStorage.getItem("pro") === "true") {
      isPro = true;
    }

    /* LIMIT */
    function checkLimit() {
      let count = localStorage.getItem("usage") || 0;

      if (!isPro && count >= 5) {
        alert("Free limit reached. Upgrade to PRO 💰");
        return false;
      }

      localStorage.setItem("usage", parseInt(count) + 1);
      return true;
    }

    /* PAYMENT */
    async function goPro() {
      const res = await fetch("https://backend-ppyz.onrender.com/create-checkout-session", {
        method: "POST"
      });

      const data = await res.json();
      window.location.href = data.url;
    }

    document.getElementById("imgBtn").onclick = generateImages;
    document.getElementById("vidBtn").onclick = generateVideo;

    async function generateImages() {
      if (!checkLimit()) return;

      const prompt = document.getElementById("prompt").value;
      const gallery = document.getElementById("gallery");

      gallery.innerHTML = "";

      const finalPrompt = prompt + ", " + selectedStyle;

      const res = await fetch("https://backend-ppyz.onrender.com/generate", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ prompt: finalPrompt })
      });

      const blob = await res.blob();
      const url = URL.createObjectURL(blob);

      const card = document.createElement("div");
      card.className = "card";

      const img = document.createElement("img");
      img.src = url;
      img.style.width = "100%";

      if (!isPro) {
        const mark = document.createElement("div");
        mark.className = "watermark";
        mark.innerText = "NeavyArtical";
        card.appendChild(mark);
      }

      card.appendChild(img);
      gallery.appendChild(card);
    }

    async function generateVideo() {
      if (!checkLimit()) return;

      const prompt = document.getElementById("prompt").value;
      const gallery = document.getElementById("gallery");

      gallery.innerHTML = "";

      const finalPrompt = prompt + ", cinematic scene";

      const res = await fetch("https://backend-ppyz.onrender.com/generate", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ prompt: finalPrompt })
      });

      const blob = await res.blob();
      const url = URL.createObjectURL(blob);

      const img = document.createElement("img");
      img.src = url;
      img.style.width = "100%";
      img.style.animation = "panzoom 10s infinite alternate";

      gallery.appendChild(img);
    }

  </script>

</body>
</html>
