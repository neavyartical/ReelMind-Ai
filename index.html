<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ReelMind AI</title>

<!-- AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1714638410489429"
crossorigin="anonymous"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  text-align:center;
}

h1{
  margin-top:20px;
}

.container{
  padding:20px;
}

input,select{
  width:90%;
  padding:12px;
  margin:10px;
  border:none;
  border-radius:10px;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#00c6ff;
  color:white;
  font-weight:bold;
  margin:5px;
}

#output{
  margin-top:20px;
  padding:15px;
  background:rgba(255,255,255,0.1);
  border-radius:10px;
}

.ads{
  margin:20px 0;
}

.hidden{
  display:none;
}
</style>
</head>

<body>

<h1>🚀 ReelMind AI</h1>
<p>Powered by Artical Neavy</p>

<div class="container">

<!-- LOGIN -->
<div id="auth">
<input id="username" placeholder="Username">
<input id="password" placeholder="Password" type="password">
<br>
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<select id="type">
<option value="chat">Chat</option>
<option value="story">Story</option>
<option value="image">Image</option>
<option value="video">Video</option>
</select>

<input id="prompt" placeholder="Enter your idea...">

<br>

<button onclick="generate()">Generate</button>
<button onclick="buy()">Unlock Premium ($9)</button>
<button onclick="logout()">Logout</button>

<div id="output"></div>

<!-- ADS -->
<div class="ads">
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-1714638410489429"
     data-ad-slot="1234567890"
     data-ad-format="auto"
     data-full-width-responsive="true"></ins>

<script>
(adsbygoogle = window.adsbygoogle || []).push({});
</script>
</div>

</div>

</div>

<script>

const API = "https://reelmindbackend-1.onrender.com";

let user = localStorage.getItem("user");

if(user){
  document.getElementById("auth").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
}

// REGISTER
async function register(){
  let username = document.getElementById("username").value;
  let password = document.getElementById("password").value;

  let res = await fetch(API+"/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username,password})
  });

  let data = await res.json();

  alert(data.success ? "Registered!" : "User exists");
}

// LOGIN
async function login(){
  let username = document.getElementById("username").value;
  let password = document.getElementById("password").value;

  let res = await fetch(API+"/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username,password})
  });

  let data = await res.json();

  if(data.success){
    localStorage.setItem("user",username);
    location.reload();
  }else{
    alert("Login failed");
  }
}

// LOGOUT
function logout(){
  localStorage.removeItem("user");
  location.reload();
}

// GENERATE (FIXED)
async function generate(){
  let prompt = document.getElementById("prompt").value;
  let type = document.getElementById("type").value;

  if(!prompt){
    alert("Enter prompt");
    return;
  }

  document.getElementById("output").innerHTML = "⏳ Generating...";

  try{
    let res = await fetch(API+"/generate",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({prompt,type})
    });

    let data = await res.json();

    if(type==="image"){
      document.getElementById("output").innerHTML =
        `<img src="${data.result}" width="100%">`;
    }else{
      document.getElementById("output").innerText = data.result;
    }

  }catch{
    document.getElementById("output").innerText = "❌ Error connecting to server";
  }
}

// STRIPE PAYMENT
async function buy(){
  let res = await fetch(API+"/create-checkout",{method:"POST"});
  let data = await res.json();
  window.location = data.url;
}

// AUTO PREMIUM AFTER PAYMENT
if(window.location.search.includes("success")){
  fetch(API+"/verify",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username:user})
  });
  alert("✅ Premium Activated!");
}

</script>

</body>
</html>
