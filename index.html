<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ReelMind AI</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: radial-gradient(circle,#1a1a2e,#000);
  color: white;
  text-align: center;
}

/* ROTATING MENU */
.circle {
  position: relative;
  width: 300px;
  height: 300px;
  margin: 40px auto;
  border-radius: 50%;
}

.item {
  position: absolute;
  width: 80px;
  height: 80px;
  background: rgba(255,255,255,0.1);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  backdrop-filter: blur(10px);
}

/* POSITION ITEMS IN CIRCLE */
.item:nth-child(1){top:0;left:110px;}
.item:nth-child(2){top:60px;right:0;}
.item:nth-child(3){bottom:60px;right:0;}
.item:nth-child(4){bottom:0;left:110px;}
.item:nth-child(5){bottom:60px;left:0;}
.item:nth-child(6){top:60px;left:0;}

.center {
  position: absolute;
  top:110px;
  left:110px;
  width:80px;
  height:80px;
  background: linear-gradient(135deg,#ff4ecd,#7a5cff);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

/* RESULT */
#result {
  margin: 20px;
}

/* INPUT */
input {
  width: 70%;
  padding: 10px;
  border-radius: 20px;
  border: none;
}

button {
  padding: 10px 15px;
  border-radius: 20px;
  border: none;
  background: #ff4ecd;
  color: white;
}
</style>
</head>

<body>

<h2>🚀 ReelMind AI</h2>

<div class="circle">
  <div class="item" onclick="setMode('chat')">💬</div>
  <div class="item" onclick="setMode('image')">🖼</div>
  <div class="item" onclick="setMode('video')">🎬</div>
  <div class="item" onclick="setMode('story')">📖</div>
  <div class="item" onclick="setMode('money')">💰</div>
  <div class="item" onclick="setMode('tiktok')">🚀</div>

  <div class="center">GO</div>
</div>

<div>
  <input id="input" placeholder="Type your idea..." />
  <button onclick="send()">Send</button>
</div>

<div id="result">Select a mode 👆</div>

<script>
let mode = "chat";

// FREE IMAGE API (no key)
function getImage(prompt){
  return `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}`;
}

function setMode(m){
  mode = m;
  document.getElementById("result").innerText = "Mode: " + m;
}

async function send(){
  const text = document.getElementById("input").value;
  if(!text) return;

  document.getElementById("result").innerText = "⏳ Loading...";

  // 🖼 IMAGE MODE (REAL IMAGE)
  if(mode === "image"){
    const img = getImage(text);

    document.getElementById("result").innerHTML =
      `<img src="${img}" width="300"/>`;
    return;
  }

  // 🎬 VIDEO (SIMULATED)
  if(mode === "video"){
    document.getElementById("result").innerText =
      "🎬 Video generation requires advanced API (coming soon)";
    return;
  }

  // 💬 OTHER MODES (USE BACKEND)
  try{
    const res = await fetch("https://reelmindbackend-1.onrender.com/generate",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ prompt: text })
    });

    const data = await res.json();

    document.getElementById("result").innerText = data.result;

  }catch(e){
    document.getElementById("result").innerText = "❌ Error";
  }
}
</script>

</body>
</html>
