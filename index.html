<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: white;
      text-align: center;
      background: radial-gradient(circle at top, #7b2ff7, #020617, #ff7a18);
      overflow-x: hidden;
    }

    /* 🚀 SPLASH SCREEN */
    #splash {
      position: fixed;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, #020617, #000);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    #splash img {
      width: 200px;
      margin-bottom: 20px;
    }

    /* MAIN APP */
    #app {
      display: none;
    }

    h1 {
      margin-top: 20px;
    }

    input {
      padding: 14px;
      width: 85%;
      border-radius: 12px;
      border: none;
      margin-top: 15px;
      font-size: 16px;
    }

    /* 🧊 ROTATING CUBE */
    .cube {
      width: 200px;
      height: 200px;
      margin: 50px auto;
      background: linear-gradient(135deg, #7b2ff7, #ff7a18);
      border-radius: 25px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: rotate 6s infinite linear;
      box-shadow: 0 0 50px rgba(255,100,0,0.6);
    }

    @keyframes rotate {
      0% { transform: rotateY(0deg) rotateX(0deg); }
      100% { transform: rotateY(360deg) rotateX(360deg); }
    }

    button {
      padding: 14px 22px;
      border-radius: 12px;
      border: none;
      background: white;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    #result {
      margin: 20px;
      padding: 20px;
      text-align: left;
      white-space: pre-wrap;
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
    }

    footer {
      margin-top: 30px;
      font-size: 14px;
      opacity: 0.8;
    }

    a {
      color: #00ffcc;
      text-decoration: none;
    }
  </style>
</head>

<body>

<!-- 🚀 SPLASH -->
<div id="splash">
  <img src="logo.png" alt="ReelMind Logo">
  <h2>Loading...</h2>
</div>

<!-- APP -->
<div id="app">

<h1>🧠 ReelMind AI</h1>

<input id="prompt" placeholder="Enter your viral idea..." />

<div class="cube">
  <button onclick="generate()">Generate ⚡</button>
</div>

<button onclick="download()">⬇ Download</button>

<div id="result"></div>

<footer>
  🚀 Powered by <b>Artical Neavy</b><br>
  <a href="terms.html">Terms & Conditions</a>
</footer>

</div>

<script>
let lastResult = "";

// Splash screen
setTimeout(() => {
  document.getElementById("splash").style.display = "none";
  document.getElementById("app").style.display = "block";
}, 2500);

async function generate() {
  const prompt = document.getElementById("prompt").value;
  const result = document.getElementById("result");

  if (!prompt) {
    result.innerText = "Enter a prompt ❌";
    return;
  }

  result.innerText = "Generating... 🚀";

  try {
    const res = await fetch("https://reelmindbackend-1.onrender.com/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt })
    });

    const data = await res.json();
    lastResult = data.result;
    result.innerText = lastResult;

  } catch (err) {
    result.innerText = "Connection error ❌";
  }
}

function download() {
  if (!lastResult) return;

  const blob = new Blob([lastResult], { type: "text/plain" });
  const a = document.createElement("a");

  a.href = URL.createObjectURL(blob);
  a.download = "reelmind.txt";
  a.click();
}
</script>

</body>
</html>
