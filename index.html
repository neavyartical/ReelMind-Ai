<!DOCTYPE html>
<!-- v4 final clean -->
<html>
<head>
  <title>ReelMind AI</title>
</head>

<body style="background:#0b1d2a;color:white;text-align:center;font-family:sans-serif;">

  <h1>🎬 ReelMind AI</h1>

  <input id="prompt" placeholder="Type prompt..." style="width:80%;padding:10px;" />
  <br><br>

  <button onclick="generate()">Generate</button>
  <br><br>

  <button id="downloadBtn" style="display:none;padding:10px 20px;background:#3b82f6;color:white;border:none;">
    Download Image
  </button>

  <p id="status"></p>

  <img id="result" style="max-width:90%;margin-top:20px;border-radius:10px;" />

  <script>
    let imageURL = "";

    async function generate() {
      const prompt = document.getElementById("prompt").value;
      const status = document.getElementById("status");
      const img = document.getElementById("result");
      const downloadBtn = document.getElementById("downloadBtn");

      status.innerText = "Generating...";
      img.src = "";
      downloadBtn.style.display = "none";

      try {
        const response = await fetch("https://backend-ppyz.onrender.com/generate?v=4", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ prompt })
        });

        if (!response.ok) {
          status.innerText = "Error generating image";
          return;
        }

        const blob = await response.blob();
        imageURL = URL.createObjectURL(blob);

        img.src = imageURL;
        status.innerText = "Done!";
        downloadBtn.style.display = "inline-block";

      } catch {
        status.innerText = "Error generating image";
      }
    }

    document.getElementById("downloadBtn").onclick = function () {
      if (!imageURL) return;

      const a = document.createElement("a");
      a.href = imageURL;
      a.download = "reelmind-image.png";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    };
  </script>

</body>
</html>
