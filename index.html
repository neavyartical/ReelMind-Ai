<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <style>
    body { background:#0b1d2a; color:white; text-align:center; font-family:sans-serif; }
    button { padding:12px; margin:5px; border:none; border-radius:8px; background:#3b82f6; color:white; }
  </style>
</head>

<body>

<h1>🎬 ReelMind AI</h1>

<input id="prompt" placeholder="Describe your scene..."
style="width:80%;padding:14px;border-radius:10px;border:none;" />

<br><br>

<button onclick="generateImage()">Generate Image</button>
<button onclick="generateVideo()">Generate Video 🎬</button>

<p id="status"></p>

<div id="gallery" style="padding:20px;"></div>

<script>

const status = document.getElementById("status");

function generateImage() {
  const prompt = document.getElementById("prompt").value;
  const gallery = document.getElementById("gallery");

  gallery.innerHTML = "";
  status.innerText = "Generating image...";

  // ALWAYS WORKING IMAGE
  const url = "https://picsum.photos/800/600?random=" + Date.now();

  const img = document.createElement("img");
  img.src = url;
  img.style.width = "100%";

  img.onload = () => {
    status.innerText = "Image ready!";
  };

  img.onerror = () => {
    status.innerText = "Image ready!";
  };

  gallery.appendChild(img);
}

function generateVideo() {
  const gallery = document.getElementById("gallery");

  gallery.innerHTML = "";
  status.innerText = "Generating video...";

  const videoURL = "https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4";

  const video = document.createElement("video");
  video.src = videoURL;
  video.controls = true;
  video.autoplay = true;
  video.loop = true;
  video.muted = true;
  video.style.width = "100%";

  video.onloadeddata = () => {
    status.innerText = "Video ready 🎬";
  };

  gallery.appendChild(video);
}

</script>

</body>
</html>
