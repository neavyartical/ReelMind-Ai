<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:linear-gradient(135deg,#0f0018,#ff6a00);
  color:white;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* GRID CUBES */
#grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  padding:10px;
}

.grid-btn{
  text-align:center;
  padding:14px;
  border-radius:14px;
  background:linear-gradient(145deg,#1a1a1a,#2a2a2a);
  box-shadow:5px 5px 15px #000,-5px -5px 15px #333;
}

.grid-btn span{
  display:block;
  font-size:12px;
}

/* CHAT */
#chat{
  flex:1;
  overflow:auto;
  padding:10px;
}

.msg{
  margin:8px;
  padding:12px;
  border-radius:12px;
  max-width:85%;
}

.user{background:#ff6a00;margin-left:auto;}
.ai{background:#222;}

img,video{
  width:100%;
  border-radius:10px;
  margin-top:5px;
}

/* INPUT */
#bottom{
  display:flex;
  padding:10px;
}

#bottom input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
}

#bottom button{
  margin-left:5px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#ff6a00;
  color:white;
}
</style>
</head>

<body>

<!-- GRID -->
<div id="grid">
  <!-- MODES -->
  <div class="grid-btn" onclick="setMode('chat')">💬<span>Chat</span></div>
  <div class="grid-btn" onclick="setMode('story')">📖<span>Story</span></div>
  <div class="grid-btn" onclick="setMode('image')">🖼<span>Image</span></div>
  <div class="grid-btn" onclick="setMode('video')">🎬<span>Video</span></div>

  <!-- TEMPLATES -->
  <div class="grid-btn" onclick="template('funny')">😂<span>Funny</span></div>
  <div class="grid-btn" onclick="template('sad')">💔<span>Emotional</span></div>
  <div class="grid-btn" onclick="template('anime')">🔥<span>Anime</span></div>
  <div class="grid-btn" onclick="template('money')">💰<span>Money</span></div>

  <!-- EXTRA -->
  <div class="grid-btn" onclick="toggleTikTok()">🚀<span>TikTok</span></div>
  <div class="grid-btn" onclick="viewProjects()">📂<span>Projects</span></div>
</div>

<div id="chat"></div>

<div id="bottom">
  <input id="input" placeholder="Ask anything...">
  <button onclick="send()">➤</button>
</div>

<script>

// STATE
let mode="chat";
let tiktok=false;

// MODE
function setMode(m){
  mode=m;
  add("Mode: "+m,"ai");
}

// TEMPLATE SYSTEM
function template(type){
  if(type==="funny"){
    input.value="Create a funny viral story with unexpected twist";
    mode="story";
  }
  if(type==="sad"){
    input.value="Write a deep emotional story that makes people cry";
    mode="story";
  }
  if(type==="anime"){
    input.value="Create an epic anime battle story with powers and transformation";
    mode="story";
  }
  if(type==="money"){
    input.value="Explain how to make money online step by step";
    mode="chat";
  }
  add("Template loaded: "+type,"ai");
}

// TIKTOK MODE
function toggleTikTok(){
  tiktok=!tiktok;
  add("TikTok Mode: "+(tiktok?"ON 🔥":"OFF"),"ai");
}

// SMART PROMPT ENGINE
function enhancePrompt(text){
  if(mode==="story"){
    return "Write a long cinematic, detailed, emotional story with plot twists about: "+text;
  }
  if(mode==="chat"){
    return "Answer in a smart, helpful and powerful way: "+text;
  }
  if(mode==="image"){
    return "high quality cinematic image of "+text;
  }
  return text;
}

// UI
function add(t,type){
  let d=document.createElement("div");
  d.className="msg "+type;
  d.innerHTML=t;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

// DOWNLOAD
function download(url,type){
  let a=document.createElement("a");
  a.href=url;
  a.download= type==="video"?"video.mp4":"image.jpg";
  a.click();
}

// PROJECTS (simple)
function saveProject(data){
  let p=JSON.parse(localStorage.getItem("projects")||"[]");
  p.unshift(data);
  localStorage.setItem("projects",JSON.stringify(p));
}

function viewProjects(){
  let p=JSON.parse(localStorage.getItem("projects")||"[]");
  if(!p.length){
    add("No projects yet","ai");
    return;
  }
  add("📂 Projects:<br><br>"+p.join("<br><br>"),"ai");
}

// SEND
async function send(){
  let txt=input.value.trim();
  if(!txt) return;

  add(txt,"user");

  let prompt = enhancePrompt(txt);

  // IMAGE
  if(mode==="image"){
    let url="https://image.pollinations.ai/prompt/"+encodeURIComponent(prompt);

    add(`
      <img src="${url}">
      <button onclick="download('${url}','image')">⬇ Download</button>
    `,"ai");

    saveProject("Image: "+txt);
    return;
  }

  // VIDEO
  if(mode==="video"){
    let vid="https://samplelib.com/lib/preview/mp4/sample-5s.mp4";

    add(`
      <video controls>
        <source src="${vid}">
      </video>
      <button onclick="download('${vid}','video')">⬇ Download</button>
    `,"ai");

    saveProject("Video: "+txt);
    return;
  }

  // STORY
  if(mode==="story"){
    let story = `
🎬 Cinematic Story

${txt}

━━━━━━━━━━━━━━━

In a world where ${txt}, everything changed.

At first, it seemed normal. But soon, emotions, struggles, and powerful challenges began to rise.

A moment came that changed everything forever.

🔥 Transformation happened.

✨ And this was only the beginning...

━━━━━━━━━━━━━━━
`;

    if(tiktok){
      story += `
🔥 Caption: This will shock everyone 😳
#viral #fyp #trending #story
`;
    }

    add(story,"ai");
    saveProject(story);
    return;
  }

  // CHAT
  let reply = `
🤖 AI:

${txt}

Think smart. Move smart. Build something powerful.
`;

  add(reply,"ai");
}

</script>

</body>
</html>
