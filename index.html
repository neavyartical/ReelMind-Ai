<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
    }

    #chat {
      height: 80vh;
      overflow-y: auto;
      padding: 10px;
    }

    .msg {
      padding: 10px;
      margin: 8px;
      border-radius: 10px;
      max-width: 80%;
    }

    .user {
      background: #333;
      margin-left: auto;
    }

    .ai {
      background: #222;
      margin-right: auto;
    }

    #inputArea {
      display: flex;
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #000;
      padding: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: none;
    }

    button {
      margin-left: 5px;
      padding: 10px;
      border-radius: 20px;
      border: none;
      background: #00ffc3;
    }

    img {
      width: 100%;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" placeholder="Ask anything..." />
  <button onclick="sendPrompt()">Send</button>
</div>

<script>
const BASE_URL = "https://reelmindbackend-1.onrender.com";

let TOKEN = localStorage.getItem("token");

// AUTO LOGIN
async function autoLogin() {
  if (TOKEN) return;

  const res = await fetch(BASE_URL + "/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      email: "neavyartical@gmail.com"
    })
  });

  const data = await res.json();
  TOKEN = data.token;
  localStorage.setItem("token", TOKEN);
}

// SEND PROMPT
async function sendPrompt() {
  const input = document.getElementById("userInput").value;
  const chat = document.getElementById("chat");

  if (!input) return;

  chat.innerHTML += `<div class="msg user">${input}</div>`;

  await autoLogin();

  let endpoint = "/generate-text";

  if (input.toLowerCase().includes("image")) {
    endpoint = "/generate-image";
  }

  const res = await fetch(BASE_URL + endpoint, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + TOKEN
    },
    body: JSON.stringify({ prompt: input })
  });

  const data = await res.json();

  if (data.image) {
    chat.innerHTML += `<div class="msg ai"><img src="${data.image}"></div>`;
  } else {
    chat.innerHTML += `<div class="msg ai">${data.result || data.error}</div>`;
  }

  document.getElementById("userInput").value = "";
}
</script>

</body>
</html>
