<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 20px;
    }

    input {
      width: 90%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-bottom: 15px;
      font-size: 16px;
    }

    button {
      padding: 12px 25px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    #loading {
      margin-top: 20px;
      display: none;
      font-size: 14px;
    }

    img {
      margin-top: 20px;
      max-width: 100%;
      border-radius: 15px;
    }
  </style>
</head>

<body>

  <h1>🎬 ReelMind AI Generator</h1>

  <input id="prompt" placeholder="Enter your idea... (e.g. cinematic poor boy story)" />

  <br>

  <button onclick="generateContent()">Generate</button>

  <div id="loading">⏳ Generating... please wait</div>

  <img id="result" />

  <script>
    async function generateContent() {
      const prompt = document.getElementById("prompt").value;

      if (!prompt) {
        alert("Please enter a prompt");
        return;
      }

      document.getElementById("loading").style.display = "block";
      document.getElementById("result").src = "";

      try {
        const response = await fetch("https://backend-ppyz.onrender.com/generate", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ prompt })
        });

        const data = await response.json();

        console.log(data); // for debugging

        if (data.output && data.output.length > 0) {
          document.getElementById("result").src = data.output[0];
        } else {
          alert("Generation failed. Check console.");
        }

      } catch (error) {
        alert("Error connecting to server");
        console.error(error);
      }

      document.getElementById("loading").style.display = "none";
    }
  </script>

</body>
</html>
