<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReelMind AI</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
  color: white;
  text-align: center;
}

/* 🔥 BACKGROUND LOGO */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: url('YOUR_LOGO_LINK_HERE') no-repeat center;
  background-size: contain;
  opacity: 0.08;
  z-index: -1;
}

/* 🔥 POWERED TEXT */
.powered {
  position: fixed;
  bottom: 10px;
  width: 100%;
  text-align: center;
  font-size: 12px;
  opacity: 0.6;
}

/* INPUT */
input {
  width: 80%;
  padding: 15px;
  border-radius: 10px;
  border: none;
  margin-top: 20px;
  font-size: 16px;
}

/* 🔥 GLOW BUTTON */
button {
  padding: 12px 20px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

/* GENERATE GLOW */
.generate-btn {
  background: #00ff88;
  color: black;
  box-shadow: 0 0 10px #00ff88, 0 0 20px #00ff88;
}

/* ASK BUTTON */
.ask-btn {
  background: #0088ff;
  color: white;
}

/* GRID BUTTONS */
.button-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin: 15px;
}

/* OUTPUT */
.box {
  background: #111;
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
}

img {
  width: 100%;
  border-radius: 10px;
}

video {
  width: 100%;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>🧠 ReelMind Global</h1>

<input id="prompt" placeholder="Enter your idea...">

<br>

<!-- 🔥 MAIN BUTTON -->
<button class="generate-btn" onclick="generate()">Generate</button>

<!-- 🔥 GRID BUTTONS -->
<div class="button-grid">
  <button onclick="generateStory()">📖 Story</button>
  <button onclick="generateImage()">🖼 Image</button>
  <button onclick="generateVideo()">🎬 Video</button>
  <button class="ask-btn" onclick="ask()">🌍 Ask Anything</button>
</div>

<!-- OUTPUT -->
<div class="box" id="storyBox"></div>
<div class="box"><img id="imageBox"></div>
<div class="box"><video id="videoBox" controls></video></div>
<div class="box" id="answerBox"></div>

<!-- POWERED -->
<div class="powered">Powered by Artical Neavy</div>

<script>
const API = "https://your-backend-url.onrender.com";

/* 🔥 GENERATE ALL */
async function generate() {
  const prompt = document.getElementById("prompt").value;

  const res = await fetch(API + "/generate", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ prompt })
  });

  const data = await res.json();

  document.getElementById("storyBox").innerText = data.story || "";
  document.getElementById("imageBox").src = data.image || "";
  document.getElementById("videoBox").src = data.video || "";
}

/* 🔥 STORY ONLY */
async function generateStory() {
  const prompt = document.getElementById("prompt").value;

  const res = await fetch(API + "/generate-story", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ prompt })
  });

  const data = await res.json();
  document.getElementById("storyBox").innerText = data.story;
}

/* 🔥 IMAGE ONLY */
async function generateImage() {
  const prompt = document.getElementById("prompt").value;

  const res = await fetch(API + "/generate-image", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ prompt })
  });

  const data = await res.json();
  document.getElementById("imageBox").src = data.image;
}

/* 🔥 VIDEO ONLY */
async function generateVideo() {
  const prompt = document.getElementById("prompt").value;

  const res = await fetch(API + "/generate-video", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ prompt })
  });

  const data = await res.json();
  document.getElementById("videoBox").src = data.video;
}

/* 🔥 ASK ANYTHING */
async function ask() {
  const question = document.getElementById("prompt").value;

  const res = await fetch(API + "/ask", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ question })
  });

  const data = await res.json();
  document.getElementById("answerBox").innerText = data.answer;
}
</script>

</body>
</html>
