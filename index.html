<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReelMind AI</title>

<style>
body {
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;
  overflow-x:hidden;
}

/* 🔥 BACKGROUND WITH YOUR LOGO */
body::before {
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:url("logo.jpg") center/cover no-repeat;
  filter:brightness(0.4) blur(6px);
  z-index:-2;
}

/* Glow effect */
body::after {
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background: radial-gradient(circle, rgba(0,255,255,0.2), transparent);
  z-index:-1;
}

h1 {
  margin-top:30px;
  font-size:28px;
}

/* INPUT */
input {
  width:80%;
  padding:15px;
  border-radius:15px;
  border:none;
  margin-top:20px;
  outline:none;
}

/* ❄️ ICE CUBE */
.cube {
  width:160px;
  height:160px;
  margin:40px auto;
  background:rgba(255,255,255,0.1);
  backdrop-filter: blur(25px);
  border-radius:25px;
  display:flex;
  justify-content:center;
  align-items:center;
  box-shadow:0 0 50px cyan;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0% { transform: translateY(0px);}
  50% { transform: translateY(-10px);}
  100% { transform: translateY(0px);}
}

/* BUTTON */
button {
  padding:12px 25px;
  border:none;
  border-radius:10px;
  background:cyan;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

/* OUTPUT */
#output {
  margin-top:20px;
  padding:15px;
}

/* IMAGE */
#imagePreview {
  max-width:90%;
  margin-top:20px;
  display:none;
  border-radius:15px;
  box-shadow:0 0 20px cyan;
}

/* DOWNLOAD */
#downloadBtn {
  display:none;
  margin-top:10px;
}

/* FOOTER */
.footer {
  margin-top:40px;
  font-size:12px;
  opacity:0.7;
}
</style>
</head>

<body>

<h1>🧠 ReelMind AI</h1>

<input id="prompt" placeholder="Ask anything (image, video, story...)">

<div class="cube">
  <button onclick="generate()">Generate</button>
</div>

<div id="output"></div>

<img id="imagePreview">
<br>
<button id="downloadBtn">Download Image</button>

<div class="footer">
  Powered by Artical Neavy 🚀
</div>

<script>
async function generate() {
  const prompt = document.getElementById("prompt").value;
  const output = document.getElementById("output");
  const img = document.getElementById("imagePreview");
  const downloadBtn = document.getElementById("downloadBtn");

  output.innerHTML = "⚡ Generating...";
  img.style.display = "none";
  downloadBtn.style.display = "none";

  try {
    const res = await fetch("https://reelmindbackend-1.onrender.com/generate", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({prompt})
    });

    const data = await res.json();

    /* TEXT */
    output.innerHTML = data.result || "";

    /* IMAGE */
    if (data.image) {
      img.src = data.image;
      img.style.display = "block";

      downloadBtn.style.display = "inline-block";
      downloadBtn.onclick = () => {
        const a = document.createElement("a");
        a.href = data.image;
        a.download = "reelmind.png";
        a.click();
      };
    }

    /* VIDEO */
    if (data.video) {
      output.innerHTML += `
        <br><br>
        🎬 Video Preview:<br>
        <video controls width="300">
          <source src="${data.video}">
        </video>
      `;
    }

  } catch (err) {
    console.error(err);
    output.innerHTML = "❌ Server error";
  }
}
</script>

</body>
</html>
