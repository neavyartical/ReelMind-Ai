<!DOCTYPE html>
<!-- v2 force update -->
<html>
<head>
  <title>ReelMind AI</title>
</head>

<body style="background:#0b1d2a;color:white;text-align:center;font-family:sans-serif;">

  <h1>🎬 ReelMind AI</h1>

  <input id="prompt" placeholder="Type prompt..." style="width:80%;padding:10px;" />
  <br><br>

  <button onclick="generate()">Generate</button>

  <p id="status"></p>

  <img id="result" style="max-width:90%;margin-top:20px;border-radius:10px;" />

  <script>
    async function generate() {
      const prompt = document.getElementById("prompt").value;
      const status = document.getElementById("status");
      const img = document.getElementById("result");

      status.innerText = "Generating...";
      img.src = "";

      try {
        const response = await fetch("https://backend-ppyz.onrender.com/generate?v=2", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ prompt })
        });

        if (!response.ok) {
          status.innerText = "Error generating image";
          return;
        }

        const blob = await response.blob();
        const url = URL.createObjectURL(blob);

        img.src = url;
        status.innerText = "Done!";

      } catch {
        status.innerText = "Error generating image";
      }
    }
  </script>

</body>
</html>
