<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ADSENSE -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1714638410489429" crossorigin="anonymous"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: white;
      background: #0b0b0b;
    }

    #nav {
      background: #111;
      padding: 12px;
      text-align: center;
      font-weight: bold;
    }

    #nav a {
      color: #00ffc3;
      margin: 0 6px;
      text-decoration: none;
    }

    #status {
      margin-top: 5px;
      font-size: 12px;
      color: #aaa;
    }

    #chat {
      height: 60vh;
      overflow-y: auto;
      padding: 15px;
    }

    .msg {
      padding: 12px;
      margin: 10px;
      border-radius: 12px;
      max-width: 80%;
    }

    .user {
      background: #1f1f1f;
      margin-left: auto;
      text-align: right;
    }

    .ai {
      background: #2b2b2b;
      margin-right: auto;
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    #inputArea {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      padding: 10px;
      background: #111;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 20px;
      border: none;
    }

    button {
      margin-left: 5px;
      border-radius: 20px;
      padding: 10px;
      border: none;
      background: #00ffc3;
      font-weight: bold;
    }

    .modeBtn {
      background: #222;
      color: #00ffc3;
    }

    .loader {
      border: 4px solid #333;
      border-top: 4px solid #00ffc3;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      margin: 10px;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: gray;
    }
  </style>
</head>

<body>

<!-- NAV -->
<div id="nav">
  ReelMind AI 🚀 |
  <a href="about.html">About</a>
  <a href="blog.html">Blog</a>
  <a href="contact.html">Contact</a>
  <a href="privacy.html">Privacy</a>
  <a href="terms.html">Terms</a>

  <div id="status">
    User | Credits: 10 | Premium: No
  </div>
</div>

<!-- CHAT -->
<div id="chat"></div>

<!-- ADS -->
<div style="text-align:center;">
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-1714638410489429"
       data-ad-slot="1234567890"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
</div>

<script>
(adsbygoogle = window.adsbygoogle || []).push({});
</script>

<!-- MODE BUTTONS -->
<div style="text-align:center; margin:10px;">
  <button class="modeBtn" onclick="setMode('text')">AI</button>
  <button class="modeBtn" onclick="setMode('image')">Image</button>
  <button class="modeBtn" onclick="setMode('reel')">Reel</button>
  <button onclick="alert('Premium Coming Soon')">Premium</button>
  <button onclick="showDashboard()">Dashboard</button>
</div>

<!-- INPUT -->
<div id="inputArea">
  <input id="userInput" placeholder="Ask anything..." />
  <button onclick="send()">Send</button>
</div>

<!-- FOOTER -->
<footer>
  Powered by Artical Neavy ⚡
</footer>

<script>
let mode = "text";

function setMode(m) {
  mode = m;
}

// MAIN FUNCTION
async function send() {
  const input = userInput.value;
  const chat = document.getElementById("chat");

  if (!input) return;

  chat.innerHTML += `<div class="msg user">${input}</div>`;

  const loader = document.createElement("div");
  loader.className = "loader";
  chat.appendChild(loader);

  try {

    // 🧠 AI TEXT
    if (mode === "text") {
      loader.remove();
      chat.innerHTML += `<div class="msg ai">🤖 AI: "${input}" is a great idea! 🚀</div>`;
    }

    // 🖼 IMAGE (WORKING)
    if (mode === "image") {
      loader.remove();
      const imgUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(input)}`;

      chat.innerHTML += `
        <div class="msg ai">
          <img src="${imgUrl}">
          <br><a href="${imgUrl}" download>⬇ Download</a>
        </div>`;
    }

    // 🎬 REEL GENERATOR
    if (mode === "reel") {
      loader.remove();
      chat.innerHTML += `
        <div class="msg ai">
        🎬 Viral Reel Script:<br><br>
        1. Hook: ${input}<br>
        2. Action Scene<br>
        3. Emotional Ending<br><br>

        🔥 Caption:<br>
        "You won’t believe this 😱"<br><br>

        #viral #reels #fyp
        </div>`;
    }

  } catch {
    loader.remove();
    chat.innerHTML += `<div class="msg ai">⚠️ Error</div>`;
  }

  userInput.value = "";
  chat.scrollTop = chat.scrollHeight;
}

// DASHBOARD
function showDashboard() {
  const chat = document.getElementById("chat");

  chat.innerHTML += `
    <div class="msg ai">
      📊 Dashboard<br><br>
      Credits: 10<br>
      Premium: No<br>
      Earnings: $0<br><br>
      Upgrade to unlock more 🚀
    </div>`;
}
</script>

</body>
</html>
