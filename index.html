<!DOCTYPE html>
<html>
<body style="background:#0a0a0a;color:white;font-family:Arial;">

<div style="max-width:500px;margin:auto;padding:20px;background:#111;border-radius:20px;">

<h2>🎬 ReelMind AI</h2>

<div id="creditsBox">Credits: 0</div>

<input id="prompt" placeholder="Enter idea..." style="width:100%;padding:10px;margin-top:10px;">

<button onclick="generate()">Generate Script</button>
<button onclick="generateImage()">Generate Image</button>
<button onclick="generateVideo()">Generate Video</button>

<pre id="output"></pre>

<h3>🔥 Viral Templates</h3>
<button onclick="template('breakup revenge story')">Breakup Story</button>
<button onclick="template('rags to riches')">Motivation</button>
<button onclick="template('crazy plot twist')">Plot Twist</button>

<h3>Plans</h3>
<button onclick="buyPlan('basic')">100 Credits</button>
<button onclick="buyPlan('pro')">300 Credits</button>
<button onclick="buyPlan('ultimate')">1000 Credits</button>

</div>

<script>
const API = "YOUR_BACKEND_URL";

/* PERMANENT LOGIN */
window.onload = () => {
  if (!localStorage.getItem("token")) {
    alert("Login first");
  }

  document.getElementById("creditsBox").innerText =
    "Credits: " + localStorage.getItem("credits");
};

function template(text) {
  document.getElementById("prompt").value = text;
}

async function generate() {
  const res = await fetch(API + "/generate", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": localStorage.getItem("token")
    },
    body: JSON.stringify({ prompt: prompt.value })
  });

  const data = await res.json();
  output.innerText = data.result;
  creditsBox.innerText = "Credits: " + data.credits;
  localStorage.setItem("credits", data.credits);
}

async function generateImage() {
  const res = await fetch(API + "/generate-image", {
    method: "POST",
    headers: {
      "Authorization": localStorage.getItem("token")
    },
    body: JSON.stringify({ prompt: prompt.value })
  });

  const data = await res.json();
  output.innerHTML = `<img src="${data.image}" width="100%">`;
}

async function generateVideo() {
  const res = await fetch(API + "/generate-video", {
    method: "POST",
    headers: {
      "Authorization": localStorage.getItem("token")
    },
    body: JSON.stringify({ prompt: prompt.value })
  });

  const data = await res.json();
  output.innerText = data.video;
}

async function buyPlan(plan) {
  const res = await fetch(API + "/buy-plan", {
    method: "POST",
    headers: {
      "Authorization": localStorage.getItem("token"),
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ plan })
  });

  const data = await res.json();
  creditsBox.innerText = "Credits: " + data.credits;
  localStorage.setItem("credits", data.credits);
}
</script>

</body>
</html>
