<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle, #000, #020617);
      color: white;
      text-align: center;
      font-family: Arial;
    }

    h1 {
      margin-top: 20px;
    }

    input {
      padding: 12px;
      width: 85%;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
    }

    .cube {
      width: 180px;
      height: 180px;
      margin: 40px auto;
      background: rgba(0,255,255,0.1);
      border-radius: 25px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    button {
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #00ffcc;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    #result {
      margin: 20px;
      padding: 15px;
      text-align: left;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

<h1>🧠 ReelMind AI</h1>

<input id="prompt" placeholder="Enter viral idea (e.g. sad story, magic, anime...)" />

<div class="cube">
  <button onclick="generate()">Generate</button>
</div>

<div id="result"></div>

<script>
async function generate() {
  const prompt = document.getElementById("prompt").value;
  const result = document.getElementById("result");

  if (!prompt) {
    result.innerText = "Enter a prompt first ❌";
    return;
  }

  result.innerText = "Generating viral ideas... 🚀";

  try {
    const res = await fetch("https://reelmindbackend-1.onrender.com/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt })
    });

    const data = await res.json();

    result.innerText = data.result || "No response";

  } catch (err) {
    console.error(err);
    result.innerText = "Connection error ❌";
  }
}
</script>

</body>
</html>
