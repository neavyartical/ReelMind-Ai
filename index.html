<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🚀 ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    input {
      width: 90%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-top: 15px;
      font-size: 16px;
    }

    button {
      margin-top: 15px;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: #06b6d4;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #0891b2;
    }

    #result {
      margin-top: 20px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <h1>🚀 ReelMind AI</h1>

  <div id="user"></div>

  <input id="prompt" placeholder="Type something like: image of lion..." />

  <br>
  <button onclick="generate()">⚡ Generate</button>
  <br>
  <button onclick="logout()">Logout</button>

  <div id="result"></div>

  <!-- FIREBASE SCRIPT -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCz9rReG2zuaj0AGuafpTzpCUopuHMD_wQ",
      authDomain: "reelmind-ai-f07cb.firebaseapp.com",
      projectId: "reelmind-ai-f07cb",
      storageBucket: "reelmind-ai-f07cb.firebasestorage.app",
      messagingSenderId: "731354245603",
      appId: "1:731354245603:web:7810ca9154efda2f82d8d6",
      measurementId: "G-2H2MRJJP9R"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let TOKEN = null;

    // LOGIN STATE
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        document.getElementById("user").innerText =
          "Logged in as: " + user.email;

        TOKEN = await user.getIdToken();
      } else {
        login();
      }
    });

    // LOGIN FUNCTION
    function login() {
      signInWithPopup(auth, provider)
        .then(async (result) => {
          const user = result.user;
          TOKEN = await user.getIdToken();

          document.getElementById("user").innerText =
            "Logged in as: " + user.email;
        })
        .catch((error) => {
          alert("Login error: " + error.message);
        });
    }

    // LOGOUT
    window.logout = function () {
      signOut(auth);
      location.reload();
    };

    // GENERATE FUNCTION (UPGRADED)
    window.generate = async function () {
      const prompt = document.getElementById("prompt").value;

      if (!prompt) return alert("Type something first");
      if (!TOKEN) return alert("Login first");

      const resultBox = document.getElementById("result");

      resultBox.innerHTML = `
        <p style="color:#06b6d4;">⏳ Generating...</p>
      `;

      try {
        const res = await fetch("https://reelmindbackend-1.onrender.com/generate-text", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + TOKEN
          },
          body: JSON.stringify({ prompt })
        });

        const data = await res.json();

        if (data.error) {
          resultBox.innerHTML = `<p style="color:red;">❌ ${data.error}</p>`;
          return;
        }

        resultBox.innerHTML = `
          <div class="card">
            <p>${data.data.content}</p>
          </div>
        `;

      } catch (err) {
        resultBox.innerHTML = `<p style="color:red;">❌ ${err.message}</p>`;
      }
    };
  </script>

</body>
</html>
