<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReelMind AI • Level 17</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            text-align: center;
            background: radial-gradient(circle, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
        }

        /* HEADER */
        .header-box { margin-top: 30px; }
        .logo-img { width: 120px; filter: drop-shadow(0 0 15px cyan); }

        /* AUTH BOX */
        .auth {
            margin: 20px auto;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 15px;
            width: fit-content;
            border: 1px solid rgba(0, 255, 255, 0.2);
        }

        input {
            padding: 10px;
            border-radius: 10px;
            border: 1px solid cyan;
            background: rgba(0,0,0,0.3);
            color: white;
            margin: 5px;
            outline: none;
        }

        #credits { font-weight: bold; color: cyan; margin: 10px 0; }

        /* INPUT */
        textarea {
            width: 85%;
            max-width: 600px;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(0, 255, 255, 0.5);
            margin-top: 20px;
            font-size: 16px;
            background: rgba(0,0,0,0.4);
            color: white;
            outline: none;
        }

        /* ICE CUBE */
        .cube {
            width: 180px;
            height: 180px;
            margin: 40px auto;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 80px rgba(0, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: 0.5s;
        }

        .cube:hover { transform: scale(1.05); box-shadow: 0 0 100px cyan; }

        /* BUTTONS */
        button {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            background: cyan;
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover { background: white; transform: translateY(-2px); }

        .buy-btn { background: #8b5cf6; color: white; margin-top: 20px; }

        /* OUTPUT */
        #output { margin-top: 20px; padding: 20px; }
        .result-card {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(0,255,255,0.2);
            margin: 20px auto;
            max-width: 700px;
        }

        img, video {
            max-width: 100%;
            border-radius: 15px;
            margin-top: 20px;
            box-shadow: 0 0 25px cyan;
        }

        /* FOOTER */
        footer { margin-top: 50px; padding-bottom: 30px; font-size: 12px; color: #aaa; }
    </style>
</head>

<body>

<div class="header-box">
    <img src="442630.png" alt="Logo" class="logo-img">
    <h1>🧠 ReelMind AI • <span style="color:cyan">Level 17</span></h1>
</div>

<div class="auth">
  <input id="username" placeholder="Username">
  <button onclick="login()">Login</button>
  <p id="credits">Credits: 5</p>
</div>

<textarea id="prompt" placeholder="Create cinematic videos, avatars, reels..."></textarea>

<div class="cube">
  <button onclick="generate()">Generate</button>
</div>

<div id="output"></div>

<footer>
Powered by Artical Neavy • SaaS Mode • &copy; 2026
</footer>

<script>
// --- CONFIGURATION ---
const BASE = "https://reelmindbackend-1.onrender.com";

// --- CREDIT SYSTEM ---
let credits = parseInt(localStorage.getItem("credits")) || 5;
updateCreditDisplay();

function updateCreditDisplay() {
    document.getElementById("credits").innerText = "Credits: " + credits;
}

function login() {
  const user = document.getElementById("username").value;
  if (!user) return alert("Enter username");
  localStorage.setItem("user", user);
  alert("Welcome " + user + " to Level 17");
}

/* VOICE SYNTHESIS */
function speak(text) {
  window.speechSynthesis.cancel();
  const speech = new SpeechSynthesisUtterance(text);
  speech.rate = 1;
  window.speechSynthesis.speak(speech);
}

/* DOWNLOAD TOOL */
function download(url) {
  const a = document.createElement("a");
  a.href = url;
  a.target = "_blank";
  a.download = "reelmind_export";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

/* MAIN GENERATION ENGINE */
async function generate() {
  let promptText = document.getElementById("prompt").value;
  const output = document.getElementById("output");

  if (!promptText) return alert("Enter a prompt!");

  if (credits <= 0) {
    return alert("No credits! Upgrade to Pro 💰");
  }

  // Deduct Credit
  credits--;
  localStorage.setItem("credits", credits);
  updateCreditDisplay();

  output.innerHTML = "<h3 style='color:cyan'>⚡ Level 17 Engine Processing...</h3><p>Connecting to 4K Cinematic Nodes...</p>";

  try {
    /* 1. STORY / CHAT CALL */
    const storyRes = await fetch(`${BASE}/generate`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "chat", input: "Write a short cinematic script for: " + promptText })
    });
    const storyData = await storyRes.json();
    const story = storyData.data || "The story engine is warming up...";

    /* 2. IMAGE CALL */
    const imgRes = await fetch(`${BASE}/generate`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "image", input: promptText })
    });
    const imgData = await imgRes.json();
    const imageUrl = imgData.data;

    /* 3. DISPLAY RESULTS */
    output.innerHTML = `
        <div class="result-card">
            <h3>🎬 Cinematic Script</h3>
            <p style="text-align:left; line-height:1.6;">${story}</p>
            <button onclick="speak(\`${story.replace(/`/g, "'")}\`)">🔊 Narrate</button>
        </div>

        <div class="result-card">
            <h3>🖼 4K Cinematic Render</h3>
            <img src="${imageUrl}">
            <br><br>
            <button onclick="download('${imageUrl}')">Download Image</button>
        </div>

        <div class="result-card">
            <h3>🎥 Video Status</h3>
            <p>Video rendering initiated on Runway Gen-3 nodes.</p>
            <button class="buy-btn" style="margin-top:0" onclick="alert('Checking render queue... Please wait 60 seconds.')">Check Video Progress</button>
        </div>

        <button class="buy-btn" onclick="buyCredits()">💰 Add 10 Credits</button>
    `;

  } catch (err) {
    console.error(err);
    output.innerHTML = "<p style='color:red'>Connection Error. Is your Render server online?</p>";
  }
}

/* MONETIZATION */
function buyCredits() {
  credits += 10;
  localStorage.setItem("credits", credits);
  updateCreditDisplay();
  alert("10 Credits added to your Level 17 account!");
}
</script>

</body>
</html>
