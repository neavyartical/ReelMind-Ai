<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🚀 ReelMind AI GOD MODE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Segoe UI;background:#020617;color:white;}
#topbar{position:fixed;top:0;width:100%;background:#111;padding:10px;display:flex;justify-content:space-around;z-index:1000;}
.section{display:none;margin-top:80px;padding:20px;}
.active{display:block;}
#prompt{position:fixed;bottom:90px;width:90%;left:5%;padding:12px;border-radius:25px;border:none;}
#controls{position:fixed;bottom:0;width:100%;height:70px;display:flex;justify-content:center;background:#111;}
.btn{width:60px;height:60px;border-radius:50%;background:#06b6d4;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;}
.card{background:#111;padding:15px;border-radius:12px;margin-top:15px;}
#creditsBox{position:fixed;top:50px;right:10px;background:#111;padding:8px;border-radius:10px;}
input{padding:10px;margin:5px;width:90%;border-radius:8px;border:none;}
button{padding:10px;border:none;border-radius:8px;background:#06b6d4;color:white;margin-top:5px;cursor:pointer;}
</style>
</head>

<body>

<div id="topbar">
  <div onclick="switchTab('home')">🏠</div>
  <div onclick="switchTab('create')">➕</div>
  <div onclick="switchTab('profile')">👤</div>
  <div onclick="switchTab('admin')">👑</div>
</div>

<div id="creditsBox">💰 Credits: <span id="credits">...</span></div>

<div id="home" class="section active">
  <div class="card">
    <h2>⚡ ReelMind AI GOD MODE</h2>
    <p>Secure • Fast • Multi-AI</p>
  </div>

  <div class="card">
    <h3>💰 Buy Credits</h3>
    <a href="https://ko-fi.com/articalneavy" target="_blank">
      <button>Ko-fi ☕</button>
    </a>
  </div>
</div>

<div id="create" class="section">
  <select id="mode">
    <option value="text">Text</option>
    <option value="image">Image</option>
    <option value="video">Video</option>
  </select>

  <div id="result"></div>
</div>

<div id="profile" class="section">
  <h3>User</h3>
  <p id="userEmail">Guest Mode</p>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="emailLogin()">Login</button>
  <button onclick="emailRegister()">Register</button>
  <button onclick="googleLogin()">Google</button>
  <button onclick="logout()">Logout</button>
</div>

<div id="admin" class="section">
  <h3>👑 Admin Panel</h3>
  <button onclick="loadStats()">Load Stats</button>
  <div id="stats"></div>
</div>

<input id="prompt" placeholder="Ask anything..." />

<div id="controls">
  <div id="generate" class="btn">⚡</div>
</div>

<script type="module">

// 🔥 PUT YOUR BACKEND HERE
const API = "https://YOUR_BACKEND_URL";

// ================= FIREBASE =================
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const app = initializeApp({
  apiKey: "YOUR_FIREBASE_KEY",
  authDomain: "reelmind-ai-f07cb.firebaseapp.com"
});

const auth = getAuth(app);
const provider = new GoogleAuthProvider();

let token = null;
let credits = 0;

// ================= AUTH =================
window.googleLogin = async ()=> await signInWithPopup(auth, provider);

window.emailLogin = async ()=>{
  await signInWithEmailAndPassword(auth, val("email"), val("password"));
};

window.emailRegister = async ()=>{
  await createUserWithEmailAndPassword(auth, val("email"), val("password"));
};

window.logout = ()=> signOut(auth);

function val(id){return document.getElementById(id).value;}

onAuthStateChanged(auth, async user=>{
  if(user){
    token = await user.getIdToken();
    document.getElementById("userEmail").innerText = user.email;
    loadUser();
  } else {
    token = null;
    document.getElementById("userEmail").innerText = "Guest Mode";
    document.getElementById("credits").innerText = "∞";
  }
});

// ================= NAV =================
window.switchTab = (tab)=>{
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(tab).classList.add("active");
};

// ================= LOAD USER =================
async function loadUser(){
  if(!token) return;

  try{
    const res = await fetch(API+"/me",{
      headers:{ Authorization:"Bearer "+token }
    });

    const data = await res.json();
    credits = data.credits;
    document.getElementById("credits").innerText = credits;

  }catch{
    console.log("User load failed");
  }
}

// ================= GENERATE =================
document.getElementById("generate").onclick = async ()=>{

  const prompt = val("prompt").trim();
  const mode = document.getElementById("mode").value;

  if(!prompt) return alert("Enter prompt");

  const result = document.getElementById("result");
  result.innerHTML = "⚡ Generating...";

  try{

    // GUEST MODE
    if(!token){
      if(mode==="image"){
        const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}`;
        result.innerHTML = `<div class="card"><img src="${url}" style="width:100%"></div>`;
      } else {
        result.innerHTML = `<div class="card">⚠️ Login required for text</div>`;
      }
      return;
    }

    let endpoint = "/generate-text";
    if(mode==="image") endpoint="/generate-image";
    if(mode==="video") endpoint="/generate-video";

    const res = await fetch(API+endpoint,{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+token
      },
      body:JSON.stringify({ prompt })
    });

    const data = await res.json();

    console.log("🔥 RESPONSE:", data);

    // TEXT
    if(mode==="text"){
      const output =
        data?.data?.content ||
        data?.output ||
        "⚠️ No response";

      result.innerHTML = `<div class="card">${output}</div>`;
    }

    // IMAGE
    if(mode==="image"){
      const url =
        data?.data?.url ||
        data?.output;

      result.innerHTML = `<div class="card"><img src="${url}" style="width:100%"></div>`;
    }

    // VIDEO
    if(mode==="video"){
      const vid = data?.preview || "";
      result.innerHTML =
        `<div class="card"><video src="${vid}" controls style="width:100%"></video></div>`;
    }

    loadUser();

  }catch(e){
    console.error(e);
    result.innerHTML = `<div class="card">❌ Failed to connect</div>`;
  }
};

// ================= ADMIN =================
window.loadStats = async ()=>{
  try{
    const res = await fetch(API+"/admin");
    const data = await res.json();

    document.getElementById("stats").innerHTML =
      `<div class="card">
        Users: ${data.users}<br>
        Requests: ${data.requests}
      </div>`;
  }catch{
    document.getElementById("stats").innerHTML =
      `<div class="card">❌ Failed to load stats</div>`;
  }
};

</script>

</body>
</html>
