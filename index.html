<style>
body{
margin:0;
background:#0b0f14;
color:white;

/* LOGO BACKGROUND FIX */

/* CARD */

/* INPUT */
#prompt{
position:fixed;
bottom:90px;
width:90%;

/* CONTROLS */
#controls{
position:fixed;

height:70px;
display:flex;
justify-content:space-around;

.btn{

justify-content:center;

}

#generate{
background:cyan;
color:black;
font-weight:bold;
width:70px;height:70px;
}

/* ADS */

position:fixed;
bottom:70px;
width:100%;

}

<body>

<!-- DASHBOARD -->
<div id="topbar">

</div>

<div id="feed"></div>

<!-- INPUT -->
<input id="prompt" placeholder="Create anything..." />

<!-- CONTROLS -->
<div id="controls">
<div class="btn" onclick="upload()">+</div>
<div id="generate" class="btn" onclick="generate()">⚡</div>
<div class="btn" onclick="startVoice()">🎤</div>
</div>

<script>
const API="https://reelmindbackend-1.onrender.com";
const feed=document.getElementById("feed");

// ===== MEMORY AI =====
let memory = JSON.parse(localStorage.getItem("reelmind_memory") || "[]");

function saveMemory(user, ai){
memory.push({user, ai});
if(memory.length > 10) memory.shift();
localStorage.setItem("reelmind_memory", JSON.stringify(memory));
}

function buildMemoryContext(){
return memory.map(m => `User: ${m.user}\nAI: ${m.ai}`).join("\n");
}

// ===== LOGIN =====
async function ensureLogin(){
if(!localStorage.token){
let r=await fetch(API+"/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email:"neavyartical@gmail.com"})
});
let d=await r.json();
localStorage.token=d.data.token;
}
loadUser();
}

// ===== USER =====
async function loadUser(){
let r=await fetch(API+"/me",{
headers:{Authorization:"Bearer "+localStorage.token}
});
let d=await r.json();

document.getElementById("status").innerText="🟢 Online";
document.getElementById("credits").innerText="Credits: "+d.data.credits;
document.getElementById("ref").innerText="Ref: "+d.data.referrals;
}

// ===== ADD CARD =====
function addCard(content,type){
let c=document.createElement("div");
c.className="card";

let media="";
if(type==="image") media=`<img src="${content}">`;
else if(type==="video") media=`<video controls autoplay loop muted src="${content}"></video>`;
else media=`<div class="overlay">${content}</div>`;

c.innerHTML=`
${media}
<div class="actions">
<div class="action">❤️</div>
<div class="action">💬</div>
<div class="action">🔗</div>
</div>
`;

feed.prepend(c);
}

// ===== SPEAK =====
function speak(text){
let u=new SpeechSynthesisUtterance(text);
let voices = speechSynthesis.getVoices();
u.voice = voices.find(v => v.lang) || voices[0];
speechSynthesis.speak(u);
}

// ===== GENERATE =====
async function generate(){
await ensureLogin();

let p=document.getElementById("prompt").value;
if(!p) return;

// ROUTING
let route="/generate-text";
if(/image|photo|picture|art/i.test(p)) route="/generate-image";
else if(/video|clip|movie/i.test(p)) route="/generate-video";

// MEMORY
let context = buildMemoryContext();
let finalPrompt = p;

// TEXT MODE
if(route==="/generate-text"){
finalPrompt = `
Use memory:
${context}

Create VIRAL content:
- Hook
- Story
- Caption
- Hashtags

AND also generate 3 cinematic long versions.

${p}
`;
}

// IMAGE MODE
if(route==="/generate-image"){
finalPrompt = p + ", ultra realistic, cinematic lighting, 8k";
}

// CALL API
let r=await fetch(API+route,{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+localStorage.token
},
body:JSON.stringify({prompt:finalPrompt})
});

let d=await r.json();

// OUTPUT
if(route==="/generate-image"){
addCard(d.data.url,"image");
saveMemory(p,d.data.url);
}
else if(route==="/generate-video"){
addCard(d.data.url,"video");
saveMemory(p,d.data.url);
}
else{
addCard(d.data.content,"text");
saveMemory(p,d.data.content);
speak(d.data.content);
}

loadUser();
}

// ===== MIC =====
function startVoice(){
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if(!SpeechRecognition){
alert("Use Chrome browser");
return;
}

let rec=new SpeechRecognition();
rec.lang="en-US";

rec.onresult=e=>{
document.getElementById("prompt").value=e.results[0][0].transcript;
};

rec.start();
}

// ===== UPLOAD =====
function upload(){
alert("Upload coming soon");
}

// ===== PAYMENT =====
function upgrade(){
window.open("https://ko-fi.com/articalneavy","_blank");
}

// START
ensureLogin();
</script>

</body>
</html>
