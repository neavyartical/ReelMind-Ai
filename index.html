<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family: Arial;
      background: radial-gradient(circle at center, #0a0a0a, #1a0033);
      color:white;
      text-align:center;
    }

    h2 {
      background: linear-gradient(90deg,#ff6a00,#6a00ff);
      -webkit-background-clip:text;
      color:transparent;
    }

    input {
      width:85%;
      padding:12px;
      margin:8px;
      border-radius:10px;
      border:none;
      background:#111;
      color:white;
    }

    button {
      padding:12px;
      margin:5px;
      border:none;
      border-radius:10px;
      background: linear-gradient(90deg,#ff6a00,#6a00ff);
      color:white;
      cursor:pointer;
      width:85%;
    }

    .social-btn {
      background:#222;
    }

    .card {
      margin-top:20px;
      padding:10px;
      background:#111;
      border-radius:15px;
      box-shadow:0 0 20px rgba(255,106,0,0.3);
    }

    img, video { width:100%; border-radius:10px; }

    pre {
      text-align:left;
      white-space:pre-wrap;
    }

    #ads {
      margin-top:15px;
      height:60px;
      background:#222;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:12px;
    }

    .hidden { display:none; }
  </style>
</head>

<body>

<h2>🎬 ReelMind AI</h2>

<!-- AUTH -->
<div id="auth">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>

  <!-- FUTURE SOCIAL LOGIN -->
  <button class="social-btn" onclick="fakeSocial('Google')">Continue with Google</button>
  <button class="social-btn" onclick="fakeSocial('Apple')">Continue with Apple</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <button onclick="logout()">Logout</button>

  <input id="prompt" placeholder="Create anything (safe only)">
  <button onclick="generate()">✨ Generate</button>

  <div id="output"></div>

  <div class="card">
    <h3>💎 Premium</h3>
    <p>$9/month • $99/year</p>
    <button onclick="subscribe()">Upgrade</button>
  </div>

  <div id="ads">🤖 Ad Space (AdMob)</div>

  <div class="card">
    <h4>🛡 AI Policy</h4>
    <p>No harmful, illegal, or explicit content allowed</p>
  </div>

</div>

<script>

// ==========================
// 🔐 LOGIN + ADMIN
// ==========================
const ADMIN_EMAILS = [
  "neavyartical@gmail.com",
  "arsesay89@gmail.com"
];

let premium = false;

function signup(){
  const email = emailInput();
  const pass = passInput();

  if(!email || !pass){
    alert("Enter email & password");
    return;
  }

  const isAdmin = ADMIN_EMAILS.includes(email);

  const user = {
    email,
    pass,
    premium: isAdmin
  };

  localStorage.setItem("user", JSON.stringify(user));
  premium = user.premium;

  startApp();
}

function login(){
  const email = emailInput();
  const pass = passInput();

  const saved = JSON.parse(localStorage.getItem("user"));

  if(saved && saved.email === email && saved.pass === pass){
    premium = saved.premium || ADMIN_EMAILS.includes(saved.email);
    startApp();
  } else {
    alert("Invalid login");
  }
}

function logout(){
  const saved = JSON.parse(localStorage.getItem("user"));

  if(saved && ADMIN_EMAILS.includes(saved.email)){
    alert("Admin cannot logout 🔒");
    return;
  }

  localStorage.removeItem("user");
  location.reload();
}

function emailInput(){
  return document.getElementById("email").value.trim();
}

function passInput(){
  return document.getElementById("password").value.trim();
}

function startApp(){
  document.getElementById("auth").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");

  if(premium){
    document.getElementById("ads").style.display="none";
  }
}

// AUTO LOGIN
window.onload = function(){
  const saved = JSON.parse(localStorage.getItem("user"));
  if(saved){
    premium = saved.premium || ADMIN_EMAILS.includes(saved.email);
    startApp();
  }
}

// ==========================
// 💰 PREMIUM
// ==========================
function subscribe(){
  premium = true;

  let saved = JSON.parse(localStorage.getItem("user"));
  saved.premium = true;
  localStorage.setItem("user", JSON.stringify(saved));

  document.getElementById("ads").style.display="none";
}

// ==========================
// 🔘 FAKE SOCIAL LOGIN (READY)
// ==========================
function fakeSocial(type){
  alert(type + " login will be activated with Firebase later 🔥");
}

// ==========================
// 🤖 AI ENGINE
// ==========================
async function generate(){
  const promptInput = document.getElementById("prompt");
  const output = document.getElementById("output");

  let prompt = promptInput.value.trim();

  if(!prompt){
    alert("Enter something");
    return;
  }

  const blocked = ["nude","porn","illegal"];
  if(blocked.some(w => prompt.toLowerCase().includes(w))){
    output.innerHTML = "❌ Blocked";
    return;
  }

  output.innerHTML = "🤖 Creating...";

  const isText = /story|ideas|write|script|caption|explain/i.test(prompt);
  const isVideo = /video|cinematic|movie/i.test(prompt);
  const isAnime = /anime|naruto|dragon/i.test(prompt);

  // TEXT
  if(isText){
    let result = "";

    for(let i=1;i<=20;i++){
      result += `${i}. Idea about ${prompt}\n`;
    }

    output.innerHTML = `<div class="card"><pre>${result}</pre></div>`;
    return;
  }

  // ENHANCE PROMPT
  if(isVideo){
    prompt += ", cinematic lighting, ultra realistic, 4k";
  }

  if(isAnime){
    prompt += ", anime style, vibrant colors";
  }

  try{
    const res = await fetch("https://backend-ppyz.onrender.com/generate",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({prompt})
    });

    const data = await res.json();

    if(isVideo){
      output.innerHTML = `
        <div class="card">
          <video src="${data.url}" autoplay loop controls muted></video>
        </div>
      `;
    } else {
      output.innerHTML = `
        <div class="card">
          <img src="${data.url}">
        </div>
      `;
    }

  } catch {
    output.innerHTML = "❌ Error";
  }
}

</script>

</body>
</html>
