<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReelMind Global</title>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial;
  background:black;
  color:white;
  text-align:center;
}

/* BACKGROUND */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:url("https://neavyartical.github.io/ReelMind-Ai/logo.png") center/cover no-repeat;
  opacity:0.15;
  z-index:-1;
}

/* TITLE */
h1{
  margin-top:20px;
  color:#00ff88;
  text-shadow:0 0 20px #00ff88;
}

/* INPUT */
input{
  width:90%;
  padding:15px;
  border-radius:30px;
  border:none;
  margin-top:15px;
}

/* MODE BUTTONS */
.mode-btn{
  margin:5px;
  padding:10px 15px;
  border-radius:15px;
  background:#222;
  color:white;
}

/* ICE BUTTON */
.generate-box{
  width:180px;
  height:180px;
  margin:20px auto;
  border-radius:25px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 40px cyan;
}

button{
  padding:15px 30px;
  border-radius:20px;
  border:none;
  background:linear-gradient(135deg,#00ff88,#00ccff);
  color:black;
  font-weight:bold;
}

/* BOX */
.box{
  margin:15px;
  padding:15px;
  background:#111;
  border-radius:10px;
}

img,video{
  width:90%;
  border-radius:10px;
}

/* DOWNLOAD */
.download{
  display:inline-block;
  margin-top:10px;
  padding:10px;
  background:green;
}

</style>
</head>

<body>

<h1>🧠 ReelMind Global</h1>

<input id="prompt" placeholder="Type anything...">

<!-- MODE -->
<div>
<button class="mode-btn" onclick="setMode('story')">Story</button>
<button class="mode-btn" onclick="setMode('image')">Image</button>
<button class="mode-btn" onclick="setMode('video')">Video</button>
<button class="mode-btn" onclick="setMode('all')">All</button>
</div>

<div class="generate-box">
<button onclick="generate()">Generate</button>
</div>

<!-- STORY -->
<div class="box">
<h3>Story</h3>
<p id="story"></p>
<button onclick="downloadStory()">Download</button>
</div>

<!-- IMAGE -->
<div class="box">
<h3>Image</h3>
<img id="image">
<a id="imgDownload" class="download">Download</a>
</div>

<!-- VIDEO -->
<div class="box">
<h3>Video</h3>
<video id="video" controls></video>
<a id="vidDownload" class="download">Download</a>
</div>

<!-- ASK -->
<div class="box">
<h3>Ask Anything</h3>
<input id="ask">
<button onclick="askAI()">Ask</button>
<p id="answer"></p>
</div>

<script>
const API="https://reelmindbackend-1.onrender.com";
let mode="all";

function setMode(m){mode=m;}

async function generate(){
  const prompt=document.getElementById("prompt").value;

  document.getElementById("story").innerText="Loading...";

  const res=await fetch(API+"/generate",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({prompt,mode})
  });

  const data=await res.json();

  if(data.story) document.getElementById("story").innerText=data.story;
  if(data.image){
    document.getElementById("image").src=data.image;
    document.getElementById("imgDownload").href=data.image;
  }
  if(data.video){
    document.getElementById("video").src=data.video;
    document.getElementById("vidDownload").href=data.video;
  }
}

async function askAI(){
  const q=document.getElementById("ask").value;

  const res=await fetch(API+"/ask",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({question:q})
  });

  const data=await res.json();
  document.getElementById("answer").innerText=data.answer;
}

function downloadStory(){
  const text=document.getElementById("story").innerText;
  const blob=new Blob([text]);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="story.txt";
  a.click();
}
</script>

</body>
</html>
