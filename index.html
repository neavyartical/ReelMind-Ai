<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: white;
      background: #0f0f0f;
    }

    #nav {
      background: #000;
      padding: 12px;
      text-align: center;
    }

    #chat {
      height: 70vh;
      overflow-y: auto;
      padding: 15px;
    }

    .msg {
      padding: 12px;
      margin: 10px;
      border-radius: 12px;
      max-width: 80%;
    }

    .user { background: #1f1f1f; margin-left: auto; }
    .ai { background: #2b2b2b; }

    #inputArea {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      padding: 10px;
      background: #111;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 20px;
      border: none;
    }

    button {
      margin-left: 5px;
      border-radius: 20px;
      padding: 10px;
      border: none;
      background: #00ffc3;
    }
  </style>
</head>

<body>

<div id="nav">
  ReelMind AI 🚀 | <span id="userStatus"></span>
</div>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" placeholder="Ask anything..." />
  <button onclick="sendPrompt()">Send</button>
</div>

<script>
const BASE_URL = "https://reelmindbackend-1.onrender.com";

// AUTO USER (REAL SaaS STYLE)
let USER_ID = localStorage.getItem("user_id");

if (!USER_ID) {
  USER_ID = "user_" + crypto.randomUUID();
  localStorage.setItem("user_id", USER_ID);
}

document.getElementById("userStatus").innerText = "User: " + USER_ID;

// ENTER SEND
document.getElementById("userInput").addEventListener("keypress", e => {
  if (e.key === "Enter") sendPrompt();
});

async function sendPrompt() {
  const input = document.getElementById("userInput").value.trim();
  const chat = document.getElementById("chat");

  if (!input) return;

  chat.innerHTML += `<div class="msg user">${input}</div>`;

  try {
    const res = await fetch(BASE_URL + "/ai", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        userId: USER_ID,
        prompt: input
      })
    });

    const data = await res.json();

    let reply = data.reply || "No response";

    // IMAGE SUPPORT
    if (data.image) {
      reply += `<br><img src="${data.image}" style="width:100%">`;
    }

    chat.innerHTML += `<div class="msg ai">${reply}</div>`;

  } catch (err) {
    chat.innerHTML += `<div class="msg ai">⚠️ Server error</div>`;
  }

  document.getElementById("userInput").value = "";
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
