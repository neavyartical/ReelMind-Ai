<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #0a0a0a;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    input, textarea {
      width: 90%;
      padding: 12px;
      margin: 10px;
      border-radius: 10px;
      border: none;
    }

    button {
      padding: 12px 20px;
      margin: 10px;
      border-radius: 10px;
      border: none;
      background: cyan;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    #output {
      margin-top: 20px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

<h1>🧠 ReelMind AI</h1>

<!-- LOGIN -->
<input id="email" placeholder="Email">
<input id="password" placeholder="Password" type="password">
<br>
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

<hr>

<!-- AI -->
<textarea id="prompt" placeholder="Enter your idea..."></textarea>
<br>
<button onclick="generate()">🔥 Generate</button>
<button onclick="save()">💾 Save</button>
<button onclick="load()">📂 Load</button>

<div id="output"></div>

<script>
const API = "https://reelmindbackend-1.onrender.com";

let token = "";

// REGISTER
async function register() {
  const res = await fetch(API + "/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();
  alert(data.msg);
}

// LOGIN
async function login() {
  const res = await fetch(API + "/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();
  token = data.token;

  alert("Logged in!");
}

// GENERATE
async function generate() {
  output.innerText = "⏳ Generating...";

  const res = await fetch(API + "/generate", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      prompt: prompt.value
    })
  });

  const data = await res.json();
  output.innerText = data.result;
}

// SAVE
async function save() {
  const res = await fetch(API + "/save", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": token
    },
    body: JSON.stringify({
      content: output.innerText,
      type: "text"
    })
  });

  const data = await res.json();
  alert(data.msg);
}

// LOAD
async function load() {
  const res = await fetch(API + "/projects", {
    headers: {
      "Authorization": token
    }
  });

  const data = await res.json();

  output.innerText = JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
