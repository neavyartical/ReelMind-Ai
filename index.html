<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ADSENSE -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1714638410489429" crossorigin="anonymous"></script>

  <style>
    body {
      margin: 0;
      background: #0b0b0b;
      font-family: Arial;
      color: white;
    }

    #nav {
      background: #111;
      padding: 10px;
      text-align: center;
      font-weight: bold;
    }

    #chat {
      height: 65vh;
      overflow-y: auto;
      padding: 15px;
    }

    .msg {
      padding: 12px;
      margin: 10px;
      border-radius: 12px;
      max-width: 80%;
    }

    .user {
      background: #1f1f1f;
      margin-left: auto;
      text-align: right;
    }

    .ai {
      background: #2b2b2b;
      margin-right: auto;
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    #inputArea {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      padding: 10px;
      background: #111;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 20px;
      border: none;
    }

    button {
      margin-left: 5px;
      border-radius: 20px;
      padding: 10px;
      border: none;
      background: #00ffc3;
    }

    .loader {
      border: 4px solid #333;
      border-top: 4px solid #00ffc3;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      margin: 10px;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    #loginBox {
      text-align: center;
      padding: 20px;
    }

    .premium {
      color: gold;
      font-size: 12px;
    }
  </style>
</head>

<body>

<div id="nav">
  ReelMind AI 🚀 | <span id="userStatus">Guest</span>
</div>

<!-- LOGIN -->
<div id="loginBox">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- CHAT -->
<div id="chat"></div>

<!-- ADS -->
<div style="text-align:center;">
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-1714638410489429"
       data-ad-slot="1234567890"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
</div>

<script>
(adsbygoogle = window.adsbygoogle || []).push({});
</script>

<!-- INPUT -->
<div id="inputArea">
  <input id="userInput" placeholder="Ask anything..." />
  <button onclick="sendPrompt()">Send</button>
</div>

<script>
const BASE_URL = "https://reelmindbackend-1.onrender.com";
let TOKEN = localStorage.getItem("token") || null;

// LOGIN
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch(BASE_URL + "/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (data.token) {
    TOKEN = data.token;
    localStorage.setItem("token", TOKEN);
    document.getElementById("userStatus").innerText = "Logged In";
    document.getElementById("loginBox").style.display = "none";
  } else {
    alert("Login failed");
  }
}

// MAIN FUNCTION
async function sendPrompt() {
  const input = document.getElementById("userInput").value;
  const chat = document.getElementById("chat");

  if (!input) return;

  chat.innerHTML += `<div class="msg user">${input}</div>`;

  // LOADER
  const loader = document.createElement("div");
  loader.className = "loader";
  chat.appendChild(loader);

  try {

    // IMAGE
    if (input.toLowerCase().includes("image")) {
      loader.remove();

      const imgUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(input)}`;

      chat.innerHTML += `
        <div class="msg ai">
          <img src="${imgUrl}">
          <br><a href="${imgUrl}" download>⬇ Download</a>
        </div>`;
    }

    // TEXT (CHATGPT)
    else {
      const res = await fetch(BASE_URL + "/generate-text", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": TOKEN ? "Bearer " + TOKEN : ""
        },
        body: JSON.stringify({ prompt: input })
      });

      const data = await res.json();

      loader.remove();

      const reply =
        data.choices?.[0]?.message?.content ||
        "No response";

      chat.innerHTML += `<div class="msg ai">${reply}</div>`;
    }

  } catch {
    loader.remove();
    chat.innerHTML += `<div class="msg ai">⚠️ Error</div>`;
  }

  document.getElementById("userInput").value = "";
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
