<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:Arial;
  background: linear-gradient(135deg,#2a003f,#ff6a00);
  color:white;
  display:flex;
  flex-direction:column;
  height:100vh;
}

#topBar {
  display:flex;
  gap:8px;
  padding:10px;
  overflow-x:auto;
}

#topBar button {
  padding:10px;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,0.1);
  color:white;
}

#chat {
  flex:1;
  overflow:auto;
  padding:10px;
}

.msg {
  margin:8px;
  padding:10px;
  border-radius:10px;
  max-width:80%;
}

.user {
  background:#ff6a00;
  margin-left:auto;
}

.ai {
  background:#1f1f1f;
}

#bottomBar {
  display:flex;
  padding:10px;
}

#bottomBar input {
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
}

#bottomBar button {
  margin-left:5px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#ff6a00;
  color:white;
}

img,video {
  width:100%;
  border-radius:10px;
}
</style>
</head>

<body>

<div id="topBar">
  <button onclick="quick('Funny TikTok story')">😂</button>
  <button onclick="quick('Sad emotional story')">💔</button>
  <button onclick="quick('Anime battle')">🔥</button>
  <button onclick="quick('Make money online')">💰</button>
  <button onclick="quick('Create video')">🎬</button>
</div>

<div id="chat"></div>

<input type="file" id="upload" onchange="handleUpload()">

<div id="bottomBar">
  <input id="input" placeholder="Ask anything...">
  <button onclick="send()">Send</button>
</div>

<script>

// SAFE VARIABLES
let tiktok = false;
let queue = [];
let processing = false;

// ADD MESSAGE
function addMessage(text,type){
  let chat = document.getElementById("chat");
  if(!chat) return;

  let div = document.createElement("div");
  div.className = "msg " + type;
  div.innerHTML = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// TYPE (SAFE)
function typeMessage(text){
  return new Promise(resolve => {
    let i = 0;
    let chat = document.getElementById("chat");

    let div = document.createElement("div");
    div.className = "msg ai";
    chat.appendChild(div);

    function typing(){
      if(i < text.length){
        div.innerHTML += text.charAt(i);
        i++;
        setTimeout(typing, 10);
      } else {
        resolve();
      }
    }

    typing();
  });
}

// QUEUE
async function processQueue(){
  if(processing) return;
  processing = true;

  while(queue.length){
    let job = queue.shift();
    await job();
  }

  processing = false;
}

// QUICK
function quick(text){
  document.getElementById("input").value = text;
}

// UPLOAD
function handleUpload(){
  let file = document.getElementById("upload").files[0];
  if(!file) return;

  let url = URL.createObjectURL(file);

  addMessage(`
    🖼 Uploaded:
    <img src="${url}">
    🎬 Video preview:
    <video controls>
      <source src="https://samplelib.com/lib/preview/mp4/sample-5s.mp4">
    </video>
  `,"ai");
}

// SEND
function send(){
  let inputEl = document.getElementById("input");
  if(!inputEl) return;

  let input = inputEl.value.trim();
  if(!input) return;

  addMessage(input,"user");

  let lower = input.toLowerCase();

  // IMAGE
  if(lower.includes("image")){
    let url = "https://image.pollinations.ai/prompt/" + encodeURIComponent(input);

    addMessage(`<img src="${url}">`,"ai");
    return;
  }

  // VIDEO
  if(lower.includes("video")){
    addMessage(`
      <video controls>
        <source src="https://samplelib.com/lib/preview/mp4/sample-5s.mp4">
      </video>
    `,"ai");
    return;
  }

  // STORY
  if(lower.includes("story")){
    queue.push(async ()=>{
      let story = "Once upon a time... " + input + " and it became something powerful.";

      await typeMessage(story);
    });

    processQueue();
    return;
  }

  // DEFAULT
  queue.push(async ()=>{
    await typeMessage("AI: I understand " + input);
  });

  processQueue();
}

</script>

</body>
</html>
