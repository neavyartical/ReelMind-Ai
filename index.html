<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: white;
      text-align: center;
      background: radial-gradient(circle, #0f0c29, #302b63, #24243e);
      transition: 0.5s;
    }

    h1 {
      margin-top: 20px;
    }

    input {
      padding: 12px;
      width: 85%;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
    }

    /* 🧊 CUBE */
    .cube {
      margin: 40px auto;
      width: 220px;
      height: 220px;
      background: rgba(0,255,255,0.1);
      border-radius: 25px;
      backdrop-filter: blur(20px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 0 30px cyan;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: cyan;
      color: black;
      cursor: pointer;
      font-weight: bold;
    }

    #result {
      margin: 20px;
      padding: 15px;
      background: rgba(0,0,0,0.6);
      border-radius: 10px;
      white-space: pre-wrap;
    }

    #imageBox img {
      width: 90%;
      border-radius: 15px;
      margin-top: 10px;
    }

    .download-btn {
      display: inline-block;
      margin-top: 10px;
      color: yellow;
      font-weight: bold;
    }

    footer {
      margin-top: 20px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<h1>🧠 ReelMind AI</h1>

<input id="prompt" placeholder="Type anything (dog, anime, story...)" />

<div class="cube">
  <button onclick="generate('text')">🧠 Generate Text</button>
  <button onclick="generate('image')">🖼️ Generate Image</button>
  <button onclick="generate('video')">🎬 Generate Video Idea</button>
</div>

<div id="result"></div>
<div id="imageBox"></div>

<footer>
  🚀 Powered by <b>Artical Neavy</b>
</footer>

<script>
const API = "https://reelmindbackend-1.onrender.com";

async function generate(type) {
  const input = document.getElementById("prompt").value;
  const resultBox = document.getElementById("result");
  const imageBox = document.getElementById("imageBox");

  if (!input) {
    resultBox.innerHTML = "Enter something first ❌";
    return;
  }

  resultBox.innerHTML = "⚡ Generating...";
  imageBox.innerHTML = "";

  let endpoint = "";

  if (type === "text") endpoint = "/generate-text";
  if (type === "image") endpoint = "/generate-image";
  if (type === "video") endpoint = "/generate-video";

  try {
    const res = await fetch(API + endpoint, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt: input })
    });

    const data = await res.json();

    // 🖼️ IMAGE
    if (data.image) {
      imageBox.innerHTML = `
        <img src="${data.image}" />
        <br>
        <a href="${data.image}" download class="download-btn">⬇ Download Image</a>
      `;

      // Background blend
      document.body.style.backgroundImage = `url(${data.image})`;
      document.body.style.backgroundSize = "cover";

      resultBox.innerHTML = "🖼️ Image Generated!";
      return;
    }

    // 🧠 TEXT / 🎬 VIDEO
    resultBox.innerHTML = data.result;

  } catch (err) {
    resultBox.innerHTML = "Error ❌ Check backend";
  }
}
</script>

</body>
</html>
