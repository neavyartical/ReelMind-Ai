<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI PRO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #000;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 15px;
    }

    input, select {
      width: 90%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-bottom: 10px;
    }

    button {
      padding: 12px 20px;
      margin: 5px;
      background: #00c853;
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 16px;
    }

    #feed {
      margin-top: 20px;
    }

    .card {
      margin-bottom: 20px;
      border-radius: 15px;
      overflow: hidden;
      background: #111;
      padding: 10px;
    }

    .card img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      animation: zoom 6s infinite alternate;
      border-radius: 10px;
    }

    @keyframes zoom {
      100% { transform: scale(1.2); }
    }

    .caption {
      margin-top: 10px;
      font-size: 14px;
      opacity: 0.9;
    }

    .loader {
      margin: 20px auto;
      border: 5px solid #333;
      border-top: 5px solid #00e676;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

  <h2>🎬 ReelMind AI PRO</h2>

  <input id="prompt" placeholder="Describe your scene..." />

  <!-- 🎧 MUSIC SELECT -->
  <select id="musicSelect">
    <option value="">🎵 No Music</option>
    <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">Chill</option>
    <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3">Hype</option>
  </select>

  <!-- 🎤 UPLOAD MUSIC -->
  <input type="file" id="uploadMusic" accept="audio/*" />

  <br>

  <button onclick="generate()">✨ Generate</button>

  <p id="status"></p>

  <div id="feed"></div>

  <audio id="bgMusic" loop></audio>

  <script>
    const captions = [
      "This is insane 🔥",
      "Wait for it... 😳",
      "You won’t believe this 🤯",
      "AI is crazy now 🚀",
      "This goes hard 💯",
      "POV: Future vibes 🌌"
    ];

    let recorder, chunks = [];

    async function generate() {
      const prompt = document.getElementById("prompt").value;
      const status = document.getElementById("status");
      const feed = document.getElementById("feed");
      const music = document.getElementById("bgMusic");

      if (!prompt) {
        status.innerText = "Enter something ⚠️";
        return;
      }

      const enhancedPrompt = prompt + ", ultra realistic, cinematic lighting, 4k";

      status.innerText = "Generating... ⏳";

      const loader = document.createElement("div");
      loader.className = "loader";
      feed.prepend(loader);

      try {
        const res = await fetch("https://backend-ppyz.onrender.com/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt: enhancedPrompt })
        });

        const data = await res.json();
        loader.remove();

        if (data.url) {
          // 🎧 MUSIC HANDLING
          const uploaded = document.getElementById("uploadMusic").files[0];
          const selected = document.getElementById("musicSelect").value;

          if (uploaded) {
            music.src = URL.createObjectURL(uploaded);
          } else if (selected) {
            music.src = selected;
          }

          if (music.src) {
            music.currentTime = 0;
            music.play();
          }

          // 🧠 RANDOM CAPTION
          const caption = captions[Math.floor(Math.random() * captions.length)];

          // 📱 CREATE FEED CARD
          const card = document.createElement("div");
          card.className = "card";

          card.innerHTML = `
            <img src="${data.url}" />
            <div class="caption">${caption}</div>
            <button onclick="downloadImage('${data.url}')">📥 Image</button>
            <button onclick="recordVideo(this)">🎥 Video</button>
          `;

          feed.prepend(card);
          status.innerText = "Done ✅";
        }

      } catch (err) {
        status.innerText = "Error ❌";
      }
    }

    function downloadImage(url) {
      window.open(url, "_blank");
    }

    function recordVideo(btn) {
      const img = btn.parentElement.querySelector("img");

      const stream = img.captureStream(30);
      recorder = new MediaRecorder(stream);

      chunks = [];

      recorder.ondataavailable = e => chunks.push(e.data);

      recorder.onstop = () => {
        const blob = new Blob(chunks, { type: "video/mp4" });
        const url = URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = "reelmind-video.mp4";
        a.click();
      };

      recorder.start();

      setTimeout(() => {
        recorder.stop();
      }, 5000);
    }
  </script>

</body>
</html>
