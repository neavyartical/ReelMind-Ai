<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ReelMind AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;background:#0b0f14;color:white;font-family:Arial;text-align:center}
#loginBox{position:fixed;width:100%;height:100%;background:#000;display:flex;justify-content:center;align-items:center}
.btn{padding:15px;margin:10px;background:cyan;color:black;border:none;border-radius:10px}
#app{display:none;padding:20px}
</style>
</head>

<body>

<div id="loginBox">
<button class="btn" onclick="emailLogin()">Login</button>
</div>

<div id="app">
<h2>🚀 ReelMind AI</h2>
<p id="userEmail"></p>
<p id="userStats">Credits: --</p>

<input id="promptInput" placeholder="Type something..." style="width:80%;padding:10px">

<br><br>

<button class="btn" onclick="generate()">⚡ Generate</button>

<div id="feed"></div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/12.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.12.0/firebase-auth-compat.js"></script>

<script>
const API = "https://reelmindbackend-1.onrender.com";

/* INIT AFTER LOAD */
window.onload = function(){

firebase.initializeApp({
apiKey: "AIzaSyCraJ2lDNrPU7O_qDz4J6_aCNrR_l4ex-I",
authDomain: "reelmind-ai-a11eb.firebaseapp.com",
projectId: "reelmind-ai-a11eb"
});

const auth = firebase.auth();

/* ELEMENTS */
const loginBox = document.getElementById("loginBox");
const app = document.getElementById("app");
const userEmail = document.getElementById("userEmail");
const userStats = document.getElementById("userStats");
const promptInput = document.getElementById("promptInput");
const feed = document.getElementById("feed");

/* TOKEN */
async function getToken(){
const user = auth.currentUser;
if(!user) return null;
return await user.getIdToken(true);
}

/* LOGIN */
window.emailLogin = async function(){
let email = prompt("Email");
let pass = prompt("Password");

try{
await auth.signInWithEmailAndPassword(email,pass);
}catch{
await auth.createUserWithEmailAndPassword(email,pass);
}
}

/* AUTH */
auth.onAuthStateChanged(async user=>{
if(user){
loginBox.style.display="none";
app.style.display="block";

const token = await getToken();

let r = await fetch(API+"/me",{
headers:{Authorization:"Bearer "+token}
});

let d = await r.json();

userEmail.innerText = d.data.email;
userStats.innerText = "Credits: " + d.data.credits;
}
});

/* GENERATE */
window.generate = async function(){

const token = await getToken();
if(!token) return alert("Login first");

let text = promptInput.value;
if(!text) return;

let r = await fetch(API+"/generate-text",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},
body:JSON.stringify({prompt:text})
});

let d = await r.json();

if(d.error){
alert(d.error);
return;
}

let div = document.createElement("div");
div.innerText = d.data.content;

feed.prepend(div);
}

};
</script>

</body>
</html>
