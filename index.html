<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReelMind AI</title>

<style>
body {
  background: radial-gradient(circle, #0a0a0a, #000);
  color: white;
  font-family: Arial;
  text-align: center;
  padding: 10px;
}

/* GLASS UI */
.glass {
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  padding: 15px;
  margin: 10px;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 20px cyan;
}

/* INPUT */
input, textarea {
  width: 90%;
  padding: 12px;
  margin: 8px;
  border-radius: 10px;
  border: none;
}

/* ICE BUTTON */
.generate-btn {
  width: 80px;
  height: 80px;
  margin: 20px auto;
  background: cyan;
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  cursor: pointer;
  box-shadow: 0 0 40px cyan;
}

/* CHAT */
#chat {
  max-height: 300px;
  overflow-y: auto;
  text-align: left;
}

.msg {
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
}

.user { background: #111; }
.ai { background: #003333; }

video, img, audio {
  width: 90%;
  margin-top: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h2>🧠 ReelMind AI</h2>
<p>⚡ Powered by Artical Neavy</p>

<div class="glass">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<br>
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
</div>

<div class="glass">
<textarea id="prompt" placeholder="Ask anything (any language)..."></textarea>

<div class="generate-btn" onclick="generate()">🧊</div>

<button onclick="generateImage()">🎨 Image</button>
<button onclick="generateVideo()">🎬 Video</button>
<button onclick="speak()">🔊 Speak</button>
</div>

<div class="glass" id="chat"></div>

<div class="glass">
<button onclick="save()">💾 Save</button>
<button onclick="load()">📂 Load</button>
</div>

<div class="glass">
<input type="file" id="fileInput">
<button onclick="upload()">📤 Upload & AI Edit</button>
</div>

<div class="glass">
<video id="camera" autoplay></video><br>
<button onclick="startCamera()">📸 Camera</button>
<button onclick="stopCamera()">⛔ Stop</button>
</div>

<div class="glass">
<button onclick="startRecording()">🎤 Record</button>
<button onclick="stopRecording()">⛔ Stop</button>
</div>

<script>
const API = "https://reelmindbackend-1.onrender.com";
let token = localStorage.getItem("token") || "";

// ================= AUTH =================
async function register() {
  const res = await fetch(API + "/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });
  alert((await res.json()).msg);
}

async function login() {
  const res = await fetch(API + "/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();
  token = data.token;
  localStorage.setItem("token", token);

  alert("Logged in forever ✅");
}

// ================= CHAT =================
function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// ================= AI TEXT =================
async function generate() {
  const text = prompt.value;

  if (!text.trim()) {
    addMessage("❌ Enter something", "ai");
    return;
  }

  addMessage(text, "user");
  addMessage("⏳ Thinking...", "ai");

  const res = await fetch(API + "/generate", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ prompt: text })
  });

  const data = await res.json();
  chat.lastChild.innerText = data.result;
}

// ================= IMAGE =================
async function generateImage() {
  const text = prompt.value;

  addMessage("🎨 Generating image...", "ai");

  const res = await fetch(API + "/image", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ prompt: text })
  });

  const data = await res.json();

  if (data.image) {
    const img = document.createElement("img");
    img.src = data.image;
    chat.appendChild(img);
  } else {
    addMessage("❌ Image failed", "ai");
  }
}

// ================= VIDEO =================
async function generateVideo() {
  const text = prompt.value;

  addMessage("🎬 Editing video...", "ai");

  const res = await fetch(API + "/video-edit", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ prompt: text })
  });

  const data = await res.json();

  if (data.video) {
    const vid = document.createElement("video");
    vid.src = data.video;
    vid.controls = true;
    chat.appendChild(vid);
  } else {
    addMessage(data.edit, "ai");
  }
}

// ================= SPEECH =================
async function speak() {
  const text = prompt.value;

  const res = await fetch(API + "/tts", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ text })
  });

  const data = await res.json();

  const audio = document.createElement("audio");
  audio.src = data.audio;
  audio.controls = true;
  audio.autoplay = true;

  chat.appendChild(audio);
}

// ================= SAVE =================
async function save() {
  await fetch(API + "/save", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": token
    },
    body: JSON.stringify({
      content: chat.innerText,
      type: "chat"
    })
  });

  alert("Saved!");
}

// ================= LOAD =================
async function load() {
  const res = await fetch(API + "/projects", {
    headers: { "Authorization": token }
  });

  const data = await res.json();
  addMessage(JSON.stringify(data, null, 2), "ai");
}

// ================= UPLOAD =================
function upload() {
  const file = fileInput.files[0];
  if (!file) return alert("Select file");

  addMessage("📤 Uploaded: " + file.name, "ai");
}

// ================= CAMERA =================
let stream;

async function startCamera() {
  stream = await navigator.mediaDevices.getUserMedia({ video: true });
  camera.srcObject = stream;
}

function stopCamera() {
  stream?.getTracks().forEach(t => t.stop());
}

// ================= VOICE RECORD =================
let recorder;
let chunks = [];

async function startRecording() {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  recorder = new MediaRecorder(stream);

  recorder.ondataavailable = e => chunks.push(e.data);

  recorder.onstop = () => {
    addMessage("🎤 Voice recorded", "ai");
    chunks = [];
  };

  recorder.start();
}

function stopRecording() {
  recorder?.stop();
}
</script>

</body>
</html>
