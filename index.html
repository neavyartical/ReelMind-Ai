<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <style>
    body {
      background: #0f0f0f;
      color: white;
      font-family: Arial;
      padding: 20px;
    }
    input, button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      border: none;
    }
    button {
      background: #00c853;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    #output {
      margin-top: 20px;
      background: #1c1c1c;
      padding: 15px;
      border-radius: 6px;
    }
    img {
      width: 100%;
      margin-top: 10px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<h1>🚀 ReelMind AI</h1>

<!-- LOGIN -->
<input id="email" placeholder="Enter your email">
<button onclick="login()">Login</button>

<!-- PROMPT -->
<input id="prompt" placeholder="Tell me a story">
<button onclick="generateText()">Generate Text</button>
<button onclick="generateImage()">Generate Image</button>

<!-- OUTPUT -->
<div id="output"></div>

<script>
const API = "https://reelmindbackend-1.onrender.com"; // 🔥 CHANGE if your backend URL is different

// ===== LOGIN =====
async function login() {
  const email = document.getElementById("email").value;

  const res = await fetch(API + "/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ email })
  });

  const data = await res.json();

  if (data.token) {
    localStorage.setItem("token", data.token);
    document.getElementById("output").innerText = "✅ Logged in!";
  } else {
    document.getElementById("output").innerText = "❌ Login failed";
  }
}

// ===== GENERATE TEXT =====
async function generateText() {
  const token = localStorage.getItem("token");
  const prompt = document.getElementById("prompt").value;

  const res = await fetch(API + "/generate-text", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token  // ✅ FIXED HERE
    },
    body: JSON.stringify({ prompt })
  });

  const data = await res.json();

  if (data.error) {
    document.getElementById("output").innerText = data.error;
  } else {
    document.getElementById("output").innerText =
      data.result + "\n\nCredits: " + data.credits;
  }
}

// ===== GENERATE IMAGE =====
async function generateImage() {
  const token = localStorage.getItem("token");
  const prompt = document.getElementById("prompt").value;

  const res = await fetch(API + "/generate-image", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token  // ✅ FIXED HERE
    },
    body: JSON.stringify({ prompt })
  });

  const data = await res.json();

  if (data.error) {
    document.getElementById("output").innerText = data.error;
  } else {
    document.getElementById("output").innerHTML =
      `<p>Credits: ${data.credits}</p><img src="${data.image}" />`;
  }
}
</script>

</body>
</html>
