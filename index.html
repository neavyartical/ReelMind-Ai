<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:linear-gradient(135deg,#0f0018,#ff6a00);
  color:white;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* GRID */
#grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  padding:10px;
}

.grid-btn{
  text-align:center;
  padding:14px;
  border-radius:14px;
  background:linear-gradient(145deg,#1a1a1a,#2a2a2a);
  box-shadow:5px 5px 15px #000,-5px -5px 15px #333;
}

/* CHAT */
#chat{flex:1;overflow:auto;padding:10px;}
.msg{margin:8px;padding:12px;border-radius:12px;max-width:85%;}
.user{background:#ff6a00;margin-left:auto;}
.ai{background:#222;}

img,video{width:100%;border-radius:10px;margin-top:5px;}

#bottom{display:flex;padding:10px;}
#bottom input{flex:1;padding:12px;border:none;border-radius:10px;}
#bottom button{margin-left:5px;padding:12px;border:none;border-radius:10px;background:#ff6a00;color:white;}
</style>
</head>

<body>

<div id="grid">
  <div class="grid-btn" onclick="setMode('chat')">💬 Chat</div>
  <div class="grid-btn" onclick="setMode('story')">📖 Story</div>
  <div class="grid-btn" onclick="setMode('image')">🖼 Image</div>
  <div class="grid-btn" onclick="setMode('video')">🎬 Video</div>
  <div class="grid-btn" onclick="toggleTikTok()">🚀 TikTok</div>
</div>

<div id="chat"></div>

<div id="bottom">
  <input id="input" placeholder="Ask anything...">
  <button onclick="send()">➤</button>
  <button onclick="startVoice()">🎤</button>
</div>

<script>

// OWNER MODE (NEVER LOG OUT)
const OWNER_EMAIL = "your@email.com"; 
let currentUser = localStorage.getItem("currentUser") || OWNER_EMAIL;

// USAGE LIMIT SYSTEM
let usage = parseInt(localStorage.getItem("usage") || "0");
let premium = localStorage.getItem("premium")==="true";

// MODE
let mode="chat";
let tiktok=false;

function setMode(m){
  mode=m;
  add("Mode: "+m,"ai");
}

function toggleTikTok(){
  tiktok=!tiktok;
  add("TikTok: "+(tiktok?"ON 🔥":"OFF"),"ai");
}

// UI
function add(t,type){
  let d=document.createElement("div");
  d.className="msg "+type;
  d.innerHTML=t;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

// VOICE INPUT
function startVoice(){
  let rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  rec.lang="en-US";

  rec.onresult = e=>{
    input.value = e.results[0][0].transcript;
  };

  rec.start();
}

// AI VOICE OUTPUT
function speak(text){
  let speech = new SpeechSynthesisUtterance(text);
  speech.rate=1;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(speech);
}

// DOWNLOAD
function download(url,type){
  let a=document.createElement("a");
  a.href=url;
  a.download= type==="video"?"video.mp4":"image.jpg";
  a.click();
}

// PREMIUM CHECK
function checkLimit(){
  if(currentUser===OWNER_EMAIL) return true;

  if(premium) return true;

  usage++;
  localStorage.setItem("usage",usage);

  if(usage > 5){
    add("💎 Upgrade to Premium ($9/month) to continue","ai");
    return false;
  }

  add("Free uses left: "+(5-usage),"ai");
  return true;
}

// SEND
function send(){
  let txt=input.value.trim();
  if(!txt) return;

  add(txt,"user");

  if(!checkLimit()) return;

  // IMAGE
  if(mode==="image"){
    let url="https://image.pollinations.ai/prompt/"+encodeURIComponent(txt);
    add(`<img src="${url}">
    <button onclick="download('${url}','image')">⬇</button>`,"ai");
    speak("Image ready");
    return;
  }

  // VIDEO
  if(mode==="video"){
    let vid="https://samplelib.com/lib/preview/mp4/sample-5s.mp4";

    let music = "🔥 Suggested sound: Trending TikTok Beat";

    add(`
      <video controls src="${vid}"></video>
      <button onclick="download('${vid}','video')">⬇</button>
      <br>${music}
    `,"ai");

    speak("Video ready");
    return;
  }

  // STORY
  if(mode==="story"){
    let story = `
🎬 Story:

${txt}

A powerful emotional journey with twists and transformation.

🔥 Turning point changes everything.

✨ Beginning of greatness.
`;

    if(tiktok){
      story += "\n🔥 Caption: This will go viral #fyp #viral";
    }

    add(story,"ai");
    speak(story);
    return;
  }

  // CHAT
  let reply = "🤖 " + txt + " — think bigger and execute smart.";
  add(reply,"ai");
  speak(reply);
}

</script>

</body>
</html>
