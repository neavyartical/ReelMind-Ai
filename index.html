<!DOCTYPE html>
<!-- v7 PRO UI -->
<html>
<head>
  <title>ReelMind AI PRO</title>
</head>

<body style="background:#0b1d2a;color:white;text-align:center;font-family:sans-serif;">

  <h1>🎬 ReelMind AI PRO</h1>

  <input id="prompt" placeholder="Describe your scene..." style="width:80%;padding:12px;border-radius:8px;border:none;" />
  <br><br>

  <div>
    <button onclick="setStyle('cinematic lighting, ultra realistic, 8k')">🎬 Cinematic</button>
    <button onclick="setStyle('anime style, vibrant colors')">🎌 Anime</button>
    <button onclick="setStyle('pixar style, 3d render')">🧸 Pixar</button>
    <button onclick="setStyle('photorealistic, ultra detailed')">📸 Realistic</button>
  </div>

  <br>

  <button onclick="generate()" style="padding:12px 25px;background:#3b82f6;color:white;border:none;border-radius:8px;">
    Generate
  </button>

  <p id="status"></p>

  <div id="gallery" style="display:grid;grid-template-columns:1fr;gap:20px;padding:20px;"></div>

  <script>
    let selectedStyle = "cinematic lighting, ultra realistic, 8k";

    function setStyle(style) {
      selectedStyle = style;
    }

    async function generate() {
      const prompt = document.getElementById("prompt").value;
      const status = document.getElementById("status");
      const gallery = document.getElementById("gallery");

      const finalPrompt = prompt + ", " + selectedStyle + ", ultra detailed, sharp focus, 8k";

      status.innerText = "Generating 3 images...";
      gallery.innerHTML = "";

      for (let i = 0; i < 3; i++) {
        try {
          const response = await fetch("https://backend-ppyz.onrender.com/generate?v=7", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ prompt: finalPrompt })
          });

          const blob = await response.blob();
          const url = URL.createObjectURL(blob);

          const card = document.createElement("div");

          const img = document.createElement("img");
          img.src = url;
          img.style.width = "100%";
          img.style.borderRadius = "10px";

          const btn = document.createElement("button");
          btn.innerText = "Download";
          btn.style.marginTop = "10px";
          btn.onclick = () => {
            const a = document.createElement("a");
            a.href = url;
            a.download = "image.png";
            a.click();
          };

          card.appendChild(img);
          card.appendChild(btn);
          gallery.appendChild(card);

        } catch {
          status.innerText = "Error generating image";
        }
      }

      status.innerText = "Done!";
    }
  </script>

</body>
</html>
