<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:linear-gradient(135deg,#0f0018,#ff6a00);
  color:white;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* GRID MENU */
#grid{
  display:grid;
  grid-template-columns: repeat(4,1fr);
  gap:10px;
  padding:10px;
}

.grid-btn{
  text-align:center;
  padding:12px;
  border-radius:12px;
  background:rgba(255,255,255,0.1);
}

.grid-btn span{
  display:block;
  font-size:12px;
  margin-top:5px;
}

/* CHAT */
#chat{
  flex:1;
  overflow:auto;
  padding:10px;
}

.msg{
  margin:8px;
  padding:12px;
  border-radius:14px;
  max-width:85%;
}

.user{background:#ff6a00;margin-left:auto;}
.ai{background:#222;}

/* INPUT */
#bottom{
  display:flex;
  padding:10px;
}

#bottom input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
}

#bottom button{
  margin-left:5px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#ff6a00;
  color:white;
}

/* ADS */
#ad{
  text-align:center;
  padding:8px;
  font-size:12px;
  background:#000;
}
</style>
</head>

<body>

<!-- GRID -->
<div id="grid">
  <div class="grid-btn" onclick="setMode('chat')">💬<span>Chat</span></div>
  <div class="grid-btn" onclick="setMode('story')">📖<span>Story</span></div>
  <div class="grid-btn" onclick="setMode('image')">🖼<span>Image</span></div>
  <div class="grid-btn" onclick="setMode('video')">🎬<span>Video</span></div>
  <div class="grid-btn" onclick="upgrade()">💎<span>Premium</span></div>
  <div class="grid-btn" onclick="viewProjects()">📂<span>Projects</span></div>
</div>

<div id="chat"></div>

<div id="ad">🔥 Your Ad Here (AdMob later)</div>

<div id="bottom">
  <input id="input" placeholder="Ask or create...">
  <button onclick="send()">➤</button>
</div>

<script>

// MODE
let mode="chat";
let premium=false;

function setMode(m){
  mode=m;
  add("Mode: "+m,"ai");
}

// ADD MESSAGE
function add(t,type){
  let d=document.createElement("div");
  d.className="msg "+type;
  d.innerHTML=t;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

// SAVE PROJECT
function save(type,data){
  let p=JSON.parse(localStorage.getItem(type)||"[]");
  p.unshift(data);
  localStorage.setItem(type,JSON.stringify(p));
}

function viewProjects(){
  let s=JSON.parse(localStorage.getItem("stories")||"[]");
  add("Saved:<br>"+s.join("<br><br>"),"ai");
}

// PREMIUM LOCK
function upgrade(){
  premium=true;
  alert("Premium unlocked 💎");
}

function checkPremium(){
  if(!premium){
    alert("Upgrade to Premium 💎");
    return false;
  }
  return true;
}

// REAL AI CALL (IMPORTANT)
async function realAI(prompt){
  try{
    let res = await fetch("https://YOUR-BACKEND-URL/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({prompt})
    });

    let data = await res.json();
    return data.reply;

  }catch(e){
    return "⚠️ AI not connected yet";
  }
}

// SEND
async function send(){
  let txt=input.value.trim();
  if(!txt) return;

  add(txt,"user");

  // IMAGE
  if(mode==="image"){
    let url="https://image.pollinations.ai/prompt/"+encodeURIComponent(txt);
    add(`<img src="${url}">`,"ai");
    save("images",url);
    return;
  }

  // VIDEO (PREMIUM)
  if(mode==="video"){
    if(!checkPremium()) return;

    add(`
      <video controls>
      <source src="https://samplelib.com/lib/preview/mp4/sample-5s.mp4">
      </video>
      🔥 Viral caption ready
    `,"ai");

    return;
  }

  // STORY
  if(mode==="story"){
    let story = `
🎬 Story:

${txt}

A journey filled with emotion and power.

🔥 Viral ending.
`;

    add(story,"ai");
    save("stories",story);
    return;
  }

  // CHAT (REAL AI)
  let reply = await realAI(txt);
  add("🤖 "+reply,"ai");
}

</script>

</body>
</html>
