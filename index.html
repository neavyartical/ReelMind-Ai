<!DOCTYPE html>
<!-- v11 FINAL STABLE -->
<html>
<head>
  <title>ReelMind AI PRO</title>
</head>

<body style="background:#0b1d2a;color:white;text-align:center;font-family:sans-serif;">

  <h1>🎬 ReelMind AI PRO</h1>

  <input id="prompt" placeholder="Describe your scene..." 
    style="width:80%;padding:14px;border-radius:10px;border:none;" />

  <br><br>

  <div style="display:flex;justify-content:center;gap:10px;flex-wrap:wrap;">
    <button onclick="setStyle('cinematic lighting, ultra realistic, 8k')">🎬 Cinematic</button>
    <button onclick="setStyle('anime style, vibrant colors')">🎌 Anime</button>
    <button onclick="setStyle('pixar style, 3d render')">🧸 Pixar</button>
    <button onclick="setStyle('photorealistic, ultra detailed')">📸 Realistic</button>
  </div>

  <br>

  <button id="imgBtn" style="padding:12px 25px;background:#3b82f6;color:white;border:none;border-radius:8px;">
    Generate Images
  </button>

  <button id="vidBtn" style="padding:12px 25px;background:#10b981;color:white;border:none;border-radius:8px;">
    Generate Video 🎬
  </button>

  <p id="status"></p>

  <div id="gallery" 
    style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;padding:20px;">
  </div>

  <script defer>
    let selectedStyle = "cinematic lighting, ultra realistic, 8k";

    function setStyle(style) {
      selectedStyle = style;
    }

    /* LIMIT SYSTEM */
    function checkLimit() {
      let count = localStorage.getItem("usage") || 0;

      if (count >= 5) {
        alert("Free limit reached. Upgrade to PRO 💰");
        return false;
      }

      localStorage.setItem("usage", parseInt(count) + 1);
      return true;
    }

    /* BUTTON BINDING */
    document.getElementById("imgBtn").onclick = generateImages;
    document.getElementById("vidBtn").onclick = generateVideo;

    /* IMAGE GENERATION */
    async function generateImages() {
      if (!checkLimit()) return;

      const prompt = document.getElementById("prompt").value;
      const status = document.getElementById("status");
      const gallery = document.getElementById("gallery");

      const finalPrompt = prompt + ", " + selectedStyle + ", ultra detailed, sharp focus, 8k";

      status.innerText = "Generating (fast)...";
      gallery.innerHTML = "";

      try {
        const requests = Array.from({ length: 3 }, () =>
          fetch("https://backend-ppyz.onrender.com/generate?v=11", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({ prompt: finalPrompt })
          })
        );

        const responses = await Promise.all(requests);

        for (let res of responses) {
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);

          const card = document.createElement("div");
          card.style.background = "#12283a";
          card.style.padding = "10px";
          card.style.borderRadius = "10px";

          const img = document.createElement("img");
          img.src = url;
          img.style.width = "100%";
          img.style.borderRadius = "10px";

          const btn = document.createElement("button");
          btn.innerText = "Download";
          btn.style.marginTop = "10px";
          btn.onclick = () => {
            const a = document.createElement("a");
            a.href = url;
            a.download = "image.png";
            a.click();
          };

          card.appendChild(img);
          card.appendChild(btn);
          gallery.appendChild(card);
        }

        status.innerText = "Done!";
      } catch {
        status.innerText = "Error generating images";
      }
    }

    /* VIDEO GENERATION (FIXED) */
    async function generateVideo() {
      if (!checkLimit()) return;

      const prompt = document.getElementById("prompt").value;
      const status = document.getElementById("status");
      const gallery = document.getElementById("gallery");

      const finalPrompt = prompt + ", cinematic motion, smooth camera";

      gallery.innerHTML = "";
      status.innerText = "Generating video...";

      try {
        const res = await fetch("https://backend-ppyz.onrender.com/video?v=11", {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({ prompt: finalPrompt })
        });

        const contentType = res.headers.get("content-type");

        if (!res.ok || !contentType || !contentType.includes("video")) {
          status.innerText = "Video failed (model busy or unavailable)";
          return;
        }

        const blob = await res.blob();

        if (blob.size < 1000) {
          status.innerText = "Video failed (empty response)";
          return;
        }

        const url = URL.createObjectURL(blob);

        const video = document.createElement("video");
        video.src = url;
        video.controls = true;
        video.autoplay = true;
        video.muted = true;
        video.style.width = "100%";

        video.onerror = () => {
          status.innerText = "Video cannot play (format issue)";
        };

        gallery.appendChild(video);

        status.innerText = "Video ready!";
      } catch {
        status.innerText = "Video failed, try again";
      }
    }
  </script>

</body>
</html>
