<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0f14;
      color: white;
    }

    #header {
      padding: 15px;
      background: #111;
      text-align: center;
      font-weight: bold;
      border-bottom: 1px solid #222;
    }

    #chat {
      height: 70vh;
      overflow-y: auto;
      padding: 10px;
    }

    .msg {
      padding: 12px;
      margin: 10px;
      border-radius: 12px;
      max-width: 80%;
      animation: fadeIn 0.3s ease;
    }

    .user {
      background: #1f1f1f;
      margin-left: auto;
    }

    .ai {
      background: #16212b;
      margin-right: auto;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      background: #111;
      position: fixed;
      bottom: 0;
      width: 100%;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 20px;
      border: none;
    }

    button {
      margin-left: 5px;
      border-radius: 20px;
      padding: 10px;
      border: none;
      background: #00ff88;
      font-weight: bold;
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    @keyframes fadeIn {
      from {opacity:0;}
      to {opacity:1;}
    }

    #topbar {
      display: flex;
      justify-content: space-around;
      padding: 10px;
      background: #0d1117;
    }

    .topbtn {
      background: #222;
      color: white;
      padding: 8px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div id="header">🚀 ReelMind AI</div>

<div id="topbar">
  <button class="topbtn" onclick="login()">Login</button>
  <button class="topbtn" onclick="generateImage()">Image</button>
  <button class="topbtn" onclick="loadHistory()">History</button>
  <button class="topbtn" onclick="pay()">💰 Upgrade</button>
</div>

<div id="chat"></div>

<div id="inputArea">
  <input id="prompt" placeholder="Ask anything..." />
  <button onclick="send()">Send</button>
</div>

<script>
const API = "https://reelmindbackend-1.onrender.com";

// ===== LOGIN =====
async function login(){
  let email = prompt("Enter email:");
  const res = await fetch(API+"/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({email})
  });
  const data = await res.json();
  localStorage.setItem("token", data.token);
  alert("Logged in!");
}

// ===== CHAT SEND =====
async function send(){
  const input = document.getElementById("prompt").value;
  const chat = document.getElementById("chat");
  const token = localStorage.getItem("token");

  if(!token) return alert("Login first");

  chat.innerHTML += `<div class="msg user">${input}</div>`;

  let aiDiv = document.createElement("div");
  aiDiv.className = "msg ai";
  aiDiv.innerHTML = "⚡ Thinking...";
  chat.appendChild(aiDiv);

  const res = await fetch(API+"/generate-text",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+token
    },
    body: JSON.stringify({prompt: input})
  });

  const data = await res.json();

  if(data.error){
    aiDiv.innerHTML = data.error;
    return;
  }

  // ===== STREAM EFFECT =====
  let text = data.result;
  aiDiv.innerHTML = "";
  let i = 0;

  function type(){
    if(i < text.length){
      aiDiv.innerHTML += text.charAt(i);
      i++;
      setTimeout(type, 10); // speed
    }
  }

  type();
}

// ===== IMAGE =====
async function generateImage(){
  const input = document.getElementById("prompt").value;
  const token = localStorage.getItem("token");
  const chat = document.getElementById("chat");

  chat.innerHTML += `<div class="msg user">${input}</div>`;

  const res = await fetch(API+"/generate-image",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+token
    },
    body: JSON.stringify({prompt: input})
  });

  const data = await res.json();

  chat.innerHTML += `
    <div class="msg ai">
      <img src="${data.image}">
    </div>`;
}

// ===== HISTORY =====
async function loadHistory(){
  const token = localStorage.getItem("token");
  const chat = document.getElementById("chat");

  const res = await fetch(API+"/history",{
    headers:{"Authorization":"Bearer "+token}
  });

  const data = await res.json();

  data.forEach(p=>{
    chat.innerHTML += `
      <div class="msg user">${p.prompt}</div>
      <div class="msg ai">${p.result}</div>
    `;
  });
}

// ===== PAYMENT =====
function pay(){
  window.open("https://ko-fi.com/articalneavy", "_blank");
}
</script>

</body>
</html>
