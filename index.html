<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:sans-serif;
  color:white;
  text-align:center;
  overflow:hidden;

  background:
    radial-gradient(circle at 30% 30%, rgba(0,255,255,0.2), transparent),
    radial-gradient(circle at 70% 70%, rgba(0,150,255,0.2), transparent),
    linear-gradient(135deg,#0f2027,#1c92d2,#000428);
}

/* CANVAS BACKGROUND */
#brain{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* TITLE */
h2{
  margin-top:20px;
}

/* CUBE */
.scene{
  width:220px;
  height:220px;
  margin:30px auto;
  perspective:800px;
}

.cube{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transform:rotateX(20deg) rotateY(20deg);
}

.face{
  position:absolute;
  width:220px;
  height:220px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  border-radius:20px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
}

.front{transform:translateZ(110px)}
.back{transform:rotateY(180deg) translateZ(110px)}
.right{transform:rotateY(90deg) translateZ(110px)}
.left{transform:rotateY(-90deg) translateZ(110px)}
.top{transform:rotateX(90deg) translateZ(110px)}
.bottom{transform:rotateX(-90deg) translateZ(110px)}

input{
  width:80%;
  padding:12px;
  border:none;
  border-radius:12px;
  margin-top:10px;
}

button{
  margin:10px;
  padding:12px 20px;
  border:none;
  border-radius:12px;
  background:#00c6ff;
  color:white;
  font-weight:bold;
}

#output{
  margin:15px;
}

#app{display:none;}
</style>
</head>

<body>

<canvas id="brain"></canvas>

<h2>ReelMind AI</h2>

<div id="login">
<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>
<button onclick="login()">Enter</button>
</div>

<div id="app">

<div class="scene">
<div class="cube" id="cube">
<div class="face front" onclick="setMode('chat')">Chat</div>
<div class="face back" onclick="setMode('story')">Story</div>
<div class="face right" onclick="setMode('image')">Image</div>
<div class="face left" onclick="setMode('video')">Video</div>
<div class="face top" onclick="setMode('music')">Music</div>
<div class="face bottom" onclick="setMode('money')">Money</div>
</div>
</div>

<input id="prompt" placeholder="Enter your idea...">

<br>

<button onclick="generate()">Generate</button>
<button onclick="logout()">Logout</button>

<div id="output"></div>

<button onclick="buy()">Unlock Premium ($9)</button>

</div>

<script>
let mode="chat";
let user="";

/* AUTO LOGIN FIX */
window.onload=()=>{
  let saved=localStorage.getItem("user");
  if(saved){
    user=saved;
    showApp();
  }
};

/* MODE SELECT */
function setMode(m){
  mode=m;
  alert("Mode: "+m);
}

/* LOGIN */
function login(){
  user=document.getElementById("user").value;
  let pass=document.getElementById("pass").value;

  if(!user||!pass){alert("Enter details");return;}

  fetch("https://reelmindbackend-1.onrender.com/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username:user,password:pass})
  })
  .then(r=>r.json())
  .then(d=>{
    if(d.success){
      localStorage.setItem("user",user);
      showApp();
    }else alert("Login failed");
  });
}

function showApp(){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("user");
  location.reload();
}

/* GENERATE FIX */
async function generate(){
  let prompt=document.getElementById("prompt").value;

  if(!prompt){
    alert("Enter prompt");
    return;
  }

  let output=document.getElementById("output");
  output.innerHTML="⏳ Generating...";

  try{
    let res=await fetch("https://reelmindbackend-1.onrender.com/generate",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({prompt:prompt,type:mode})
    });

    let data=await res.json();

    if(!data || !data.result){
      output.innerHTML="⚠️ No response";
      return;
    }

    if(mode==="image"){
      output.innerHTML=`<img src="${data.result}" width="220">`;
    } else {
      output.innerText=data.result;
    }

  }catch(e){
    output.innerHTML="❌ Server error";
  }
}

/* PAYPAL */
function buy(){
  window.open("https://www.paypal.com/paypalme/YOURNAME/9");
}

/* SWIPE CONTROL */
let startX=0;
let rotateY=20;

const cube=document.getElementById("cube");

document.querySelector(".scene").addEventListener("touchstart",e=>{
  startX=e.touches[0].clientX;
});

document.querySelector(".scene").addEventListener("touchmove",e=>{
  let moveX=e.touches[0].clientX;
  let diff=moveX-startX;

  rotateY += diff*0.4;

  cube.style.transform=`rotateX(20deg) rotateY(${rotateY}deg)`;

  startX=moveX;
});

/* BRAIN BACKGROUND */
const canvas=document.getElementById("brain");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<100;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    vx:Math.random()*2-1,
    vy:Math.random()*2-1
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    p.x+=p.vx;
    p.y+=p.vy;

    ctx.fillStyle="cyan";
    ctx.fillRect(p.x,p.y,2,2);
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
