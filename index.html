<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ADSENSE -->
  <script async 
    src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1714638410489429"
    crossorigin="anonymous"></script>

  <style>
    body { margin:0; font-family:Arial; background:#0b0f14; color:white; }

    #chat { height:75vh; overflow-y:auto; padding:10px; }

    .msg {
      padding:12px; margin:10px;
      border-radius:12px; max-width:80%;
      line-height:1.4;
    }

    .user { background:#1f1f1f; margin-left:auto; }
    .ai { background:#16212b; }

    #inputArea {
      position:fixed; bottom:0; width:100%;
      display:flex; padding:10px; background:#111;
    }

    input {
      flex:1; padding:12px;
      border-radius:20px; border:none;
      outline:none;
    }

    button {
      margin-left:5px;
      padding:10px 15px;
      border-radius:20px;
      border:none;
      background:#00ff88;
      cursor:pointer;
    }

    img { width:100%; border-radius:10px; }

    .topbar {
      display:flex;
      justify-content:space-around;
      background:#111;
      padding:10px;
      font-size:12px;
    }

    .status {
      text-align:center;
      font-size:12px;
      color:#00ff88;
    }
  </style>
</head>

<body>

<div class="topbar">
  <button onclick="login()">Login</button>
  <button onclick="generateImage()">Image</button>
  <button onclick="loadHistory()">History</button>
  <button onclick="upgrade()">💰 Upgrade</button>
  <button onclick="confirmPayment()">✅ Paid</button>
</div>

<div class="status" id="status">🔴 Not logged in</div>

<div id="chat"></div>

<!-- ADS -->
<div style="text-align:center;">
  <ins class="adsbygoogle"
    style="display:block"
    data-ad-client="ca-pub-1714638410489429"
    data-ad-slot="1234567890"
    data-ad-format="auto"></ins>
</div>
<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>

<div id="inputArea">
  <input id="prompt" placeholder="Ask anything..." />
  <button onclick="send()">Send</button>
</div>

<script>
const API = "https://reelmindbackend-1.onrender.com";
const chat = document.getElementById("chat");

// ===== LOGIN =====
async function login(){
  let email = prompt("Enter email:");
  if(!email) return;

  const res = await fetch(API+"/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({email})
  });

  const data = await res.json();

  if(data.token){
    localStorage.setItem("token", data.token);
    document.getElementById("status").innerText = "🟢 Logged in: " + email;
  } else {
    alert("Login failed");
  }
}

// ===== SEND TEXT =====
async function send(){
  const input = document.getElementById("prompt").value;
  const token = localStorage.getItem("token");

  if(!token){
    alert("Login first!");
    return;
  }

  if(!input || input.trim() === ""){
    alert("Enter something!");
    return;
  }

  chat.innerHTML += `<div class="msg user">${input}</div>`;

  let ai = document.createElement("div");
  ai.className="msg ai";
  ai.innerHTML="⚡ Thinking...";
  chat.appendChild(ai);

  document.getElementById("prompt").value = "";

  try{
    const res = await fetch(API+"/generate-text",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+token
      },
      body: JSON.stringify({prompt:input})
    });

    const data = await res.json();
    console.log(data);

    if(data.error){
      ai.innerHTML = "❌ " + data.error;
      return;
    }

    // typing effect
    ai.innerHTML = "";
    let i = 0;

    function type(){
      if(i < data.result.length){
        ai.innerHTML += data.result.charAt(i);
        i++;
        setTimeout(type, 8);
      }
    }

    type();

  } catch(err){
    ai.innerHTML = "❌ Network error";
  }
}

// ===== IMAGE =====
async function generateImage(){
  const token = localStorage.getItem("token");
  const input = document.getElementById("prompt").value;

  if(!token){
    alert("Login first!");
    return;
  }

  let ai = document.createElement("div");
  ai.className="msg ai";
  ai.innerHTML="🖼️ Generating image...";
  chat.appendChild(ai);

  const res = await fetch(API+"/generate-image",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+token
    },
    body: JSON.stringify({prompt:input})
  });

  const data = await res.json();

  if(data.error){
    ai.innerHTML = "❌ " + data.error;
    return;
  }

  ai.innerHTML = `<img src="${data.image}">`;
}

// ===== HISTORY =====
async function loadHistory(){
  const token = localStorage.getItem("token");

  chat.innerHTML = "<div class='msg ai'>📜 Loading history...</div>";

  const res = await fetch(API+"/history",{
    headers:{ "Authorization":"Bearer "+token }
  });

  const data = await res.json();

  chat.innerHTML = "";

  data.forEach(p=>{
    chat.innerHTML += `
      <div class="msg user">${p.prompt}</div>
      <div class="msg ai">${p.result}</div>
    `;
  });
}

// ===== PAYMENT =====
function upgrade(){
  window.open("https://ko-fi.com/articalneavy","_blank");
}

async function confirmPayment(){
  const token = localStorage.getItem("token");

  const res = await fetch(API+"/verify-payment",{
    method:"POST",
    headers:{ "Authorization":"Bearer "+token }
  });

  const data = await res.json();
  alert(data.message);
}
</script>

</body>
</html>
