<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReelMind AI</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  color:white;
  text-align:center;
  background:linear-gradient(135deg,#0f2027,#2c5364,#1c92d2);
  background-size:400% 400%;
  animation:water 12s infinite ease-in-out;
}

@keyframes water{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* CUBE */
.scene{
  width:250px;
  height:250px;
  margin:60px auto;
  perspective:900px;
}

.cube{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  animation:spin 10s infinite linear;
}

@keyframes spin{
  from{transform:rotateX(0deg) rotateY(0deg);}
  to{transform:rotateX(360deg) rotateY(360deg);}
}

.face{
  position:absolute;
  width:250px;
  height:250px;
  background:rgba(255,255,255,0.1);
  border-radius:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  backdrop-filter:blur(10px);
}

.front{ transform:rotateY(0deg) translateZ(125px);}
.back{ transform:rotateY(180deg) translateZ(125px);}
.right{ transform:rotateY(90deg) translateZ(125px);}
.left{ transform:rotateY(-90deg) translateZ(125px);}
.top{ transform:rotateX(90deg) translateZ(125px);}
.bottom{ transform:rotateX(-90deg) translateZ(125px);}

input{
  padding:10px;
  width:75%;
  border-radius:10px;
  border:none;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#00c6ff;
  color:white;
  margin:5px;
}

#output{
  margin:20px;
  min-height:100px;
}
</style>
</head>

<body>

<h2>🌊 ReelMind AI</h2>
<p>Powered by Artical Neavy</p>

<div class="scene">
  <div class="cube">

    <div class="face front" onclick="select('chat')">Chat</div>
    <div class="face back" onclick="select('story')">Story</div>
    <div class="face right" onclick="select('image')">Image</div>
    <div class="face left" onclick="select('video')">Video</div>
    <div class="face top" onclick="select('music')">Music</div>
    <div class="face bottom" onclick="select('money')">Money</div>

  </div>
</div>

<input id="prompt" placeholder="Enter your idea"><br><br>

<button onclick="generate()">Generate</button>

<div id="output">Select a feature 👆</div>

<script>
let mode="chat";

function select(m){
  mode=m;
}

// SIMPLE GENERATE (ALWAYS WORKS)
function generate(){
  let prompt=document.getElementById("prompt").value;

  if(!prompt){
    alert("Enter something!");
    return;
  }

  // IMAGE
  if(mode==="image"){
    document.getElementById("output").innerHTML =
      `<img src="https://image.pollinations.ai/prompt/${prompt}" width="250">`;
    return;
  }

  // VIDEO
  if(mode==="video"){
    document.getElementById("output").innerText =
      "🎬 Video feature coming soon";
    return;
  }

  // TEXT MODES
  if(mode==="story"){
    document.getElementById("output").innerText =
      "📖 Story: " + prompt + " becomes an amazing story...";
    return;
  }

  if(mode==="music"){
    document.getElementById("output").innerText =
      "🎵 Music idea generated from: " + prompt;
    return;
  }

  if(mode==="money"){
    document.getElementById("output").innerText =
      "💰 Business idea: " + prompt + " can make money online.";
    return;
  }

  // DEFAULT
  document.getElementById("output").innerText =
    "🤖 AI says: " + prompt + " is a powerful idea!";
}
</script>

</body>
</html>
