<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <style>
    body {
      background: #0d0d0d;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    input, button {
      width: 90%;
      padding: 12px;
      margin: 8px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      background: #00ff88;
      color: black;
      font-weight: bold;
    }

    #output {
      margin-top: 20px;
      white-space: pre-wrap;
    }

    img {
      max-width: 100%;
      margin-top: 10px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h2>🚀 ReelMind AI</h2>

<input id="email" placeholder="Enter your email" />
<button onclick="login()">Login</button>

<input id="prompt" placeholder="Tell me a story..." />

<button onclick="generateText()">Generate Text</button>
<button onclick="generateImage()">Generate Image</button>

<div id="output"></div>

<script>
const API = "https://reelmindbackend-1.onrender.com";

// ===== LOGIN =====
async function login() {
  const email = document.getElementById("email").value;
  const output = document.getElementById("output");

  output.innerText = "⏳ Logging in...";

  try {
    const res = await fetch(API + "/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email })
    });

    const data = await res.json();
    console.log("LOGIN RESPONSE:", data);

    if (data.token) {
      localStorage.setItem("token", data.token);
      output.innerText = "✅ Logged in successfully!";
    } else {
      output.innerText = "❌ Login failed";
    }

  } catch (err) {
    console.error(err);
    output.innerText = "❌ Server error";
  }
}

// ===== GENERATE TEXT =====
async function generateText() {
  const token = localStorage.getItem("token");
  const prompt = document.getElementById("prompt").value;
  const output = document.getElementById("output");

  if (!token) {
    output.innerText = "⚠️ Please login first!";
    return;
  }

  output.innerText = "⏳ Generating text...";

  try {
    const res = await fetch(API + "/generate-text", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({ prompt })
    });

    const data = await res.json();
    console.log(data);

    if (data.error) {
      output.innerText = "❌ " + data.error;
    } else {
      output.innerText = data.result + "\nCredits: " + data.credits;
    }

  } catch (err) {
    output.innerText = "❌ Error generating text";
  }
}

// ===== GENERATE IMAGE =====
async function generateImage() {
  const token = localStorage.getItem("token");
  const prompt = document.getElementById("prompt").value;
  const output = document.getElementById("output");

  if (!token) {
    output.innerText = "⚠️ Please login first!";
    return;
  }

  output.innerText = "⏳ Generating image...";

  try {
    const res = await fetch(API + "/generate-image", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({ prompt })
    });

    const data = await res.json();
    console.log(data);

    if (data.error) {
      output.innerText = "❌ " + data.error;
    } else {
      output.innerHTML = `<p>Credits: ${data.credits}</p><img src="${data.image}" />`;
    }

  } catch (err) {
    output.innerText = "❌ Error generating image";
  }
}
</script>

</body>
</html>
