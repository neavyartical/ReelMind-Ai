<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReelMind AI</title>

<style>
body {
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;
}

/* Background */
body::before {
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:url("logo.jpg") center/cover no-repeat;
  filter:brightness(0.4) blur(3px);
  z-index:-2;
}

body::after {
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background: radial-gradient(circle, rgba(0,255,255,0.2), transparent);
  z-index:-1;
}

input {
  width:80%;
  padding:15px;
  border-radius:10px;
  border:none;
  margin-top:20px;
}

.cube {
  width:150px;
  height:150px;
  margin:40px auto;
  background:rgba(0,255,255,0.1);
  backdrop-filter: blur(15px);
  border-radius:20px;
  display:flex;
  justify-content:center;
  align-items:center;
  box-shadow:0 0 40px cyan;
}

button {
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:cyan;
  color:black;
  cursor:pointer;
}

#output {
  margin-top:20px;
}

#imagePreview {
  max-width:90%;
  margin-top:20px;
  display:none;
  border-radius:10px;
}

#downloadBtn {
  display:none;
  margin-top:10px;
}
</style>
</head>

<body>

<h1>🧠 ReelMind AI</h1>

<input id="prompt" placeholder="Ask anything (image, video, ideas...)">

<div class="cube">
  <button onclick="generate()">Generate</button>
</div>

<div id="output"></div>

<img id="imagePreview">
<br>
<button id="downloadBtn">Download</button>

<script>
async function generate() {
  const prompt = document.getElementById("prompt").value;
  const output = document.getElementById("output");
  const img = document.getElementById("imagePreview");
  const downloadBtn = document.getElementById("downloadBtn");

  output.innerHTML = "⏳ Generating...";
  img.style.display = "none";
  downloadBtn.style.display = "none";

  try {
    const res = await fetch("https://reelmindbackend-1.onrender.com/generate", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({prompt})
    });

    const data = await res.json();
    console.log(data);

    if (data.image) {
      img.src = data.image;
      img.style.display = "block";

      downloadBtn.style.display = "inline-block";
      downloadBtn.onclick = () => {
        const a = document.createElement("a");
        a.href = data.image;
        a.download = "image.png";
        a.click();
      };

      output.innerHTML = "🖼 Image Generated!";
      return;
    }

    if (data.video) {
      output.innerHTML = `
        🎬 Video Generated<br>
        <video controls width="300">
          <source src="${data.video}">
        </video>
      `;
      return;
    }

    output.innerHTML = data.result;

  } catch (err) {
    console.error(err);
    output.innerHTML = "❌ Error connecting to server";
  }
}
</script>

</body>
</html>
