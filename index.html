<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReelMind AI</title>

<style>
body {
  margin:0;
  font-family:Arial, sans-serif;
  color:white;
  text-align:center;
  overflow-x:hidden;
}

/* 🔥 BACKGROUND */
body::before {
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:url("logo.jpg") center/cover no-repeat;
  filter:brightness(0.4) blur(6px);
  z-index:-2;
}

/* Glow */
body::after {
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background: radial-gradient(circle, rgba(0,255,255,0.2), transparent);
  z-index:-1;
}

/* INPUT */
input {
  width:80%;
  padding:15px;
  border-radius:15px;
  border:none;
  margin-top:20px;
  font-size:16px;
  outline:none;
}

/* ❄️ ICE CUBE */
.cube {
  width:160px;
  height:160px;
  margin:40px auto;
  background:rgba(255,255,255,0.1);
  backdrop-filter: blur(25px);
  border-radius:25px;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 50px cyan;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0% { transform:translateY(0);}
  50% { transform:translateY(-10px);}
  100% { transform:translateY(0);}
}

/* BUTTON */
button {
  padding:12px 25px;
  border:none;
  border-radius:10px;
  background:cyan;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

/* OUTPUT */
#output {
  margin-top:20px;
  padding:20px;
  text-align:left;
  white-space:pre-wrap;
}

/* IMAGE */
img {
  max-width:90%;
  margin-top:20px;
  border-radius:15px;
  box-shadow:0 0 20px cyan;
}

/* VIDEO */
video {
  margin-top:20px;
  border-radius:15px;
}

/* FOOTER */
.footer {
  margin-top:40px;
  font-size:12px;
  opacity:0.7;
}
</style>
</head>

<body>

<h1>🧠 ReelMind AI</h1>

<input id="prompt" placeholder="Ask anything (story, image, video idea...)">

<div class="cube">
  <button onclick="handleGenerate()">Generate</button>
</div>

<div id="output"></div>

<div class="footer">
  Powered by Artical Neavy 🚀
</div>

<script src="script.js"></script>

</body>
</html>
