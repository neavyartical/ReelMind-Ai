<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🚀 ReelMind AI GOD MODE FINAL</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Segoe UI;background:#020617;color:white;}
#topbar{position:fixed;top:0;width:100%;background:#111;padding:10px;display:flex;justify-content:space-around;z-index:1000;}
.section{display:none;margin-top:80px;padding:20px;}
.active{display:block;}
#prompt{position:fixed;bottom:90px;width:90%;left:5%;padding:12px;border-radius:25px;border:none;}
#controls{position:fixed;bottom:0;width:100%;height:70px;display:flex;justify-content:center;background:#111;}
.btn{width:60px;height:60px;border-radius:50%;background:#06b6d4;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;}
.card{background:#111;padding:15px;border-radius:12px;margin-top:15px;}
#creditsBox{position:fixed;top:50px;right:10px;background:#111;padding:8px;border-radius:10px;}
input,select{padding:10px;margin:5px;width:90%;border-radius:8px;border:none;}
button{padding:10px;border:none;border-radius:8px;background:#06b6d4;color:white;margin-top:5px;cursor:pointer;}
</style>
</head>
<body>

<div id="topbar">
  <div onclick="switchTab('home')">🏠</div>
  <div onclick="switchTab('create')">➕</div>
  <div onclick="switchTab('profile')">👤</div>
  <div onclick="switchTab('admin')">👑</div>
</div>

<div id="creditsBox">💰 Credits: <span id="credits">∞</span></div>

<div id="home" class="section active">
  <div class="card">
    <h2>⚡ ReelMind AI GOD MODE</h2>
    <p>Secure • Fast • Multi-AI</p>
  </div>

  <div class="card">
    <h3>💰 Buy Credits</h3>
    <a href="https://ko-fi.com/articalneavy" target="_blank">
      <button>Ko-fi ☕</button>
    </a>
  </div>
</div>

<div id="create" class="section">
  <select id="mode">
    <option value="text">Text / Story</option>
    <option value="image">Image</option>
    <option value="video">Video</option>
  </select>
  <div id="result"></div>
</div>

<div id="profile" class="section">
  <h3>User</h3>
  <p id="userEmail">Guest Mode</p>
</div>

<div id="admin" class="section">
  <h3>👑 Admin Panel</h3>
  <div id="stats"></div>
</div>

<input id="prompt" placeholder="Ask anything..." />

<div id="controls">
  <div id="generate" class="btn">⚡</div>
</div>

<script>
const API = "https://YOUR_BACKEND_URL";
let token = null;

function val(id){
  return document.getElementById(id).value;
}

function switchTab(tab){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(tab).classList.add("active");
}

document.getElementById("generate").onclick = async ()=>{

  const prompt = val("prompt").trim();
  const mode = document.getElementById("mode").value;
  const result = document.getElementById("result");

  if(!prompt) return alert("Enter prompt");

  result.innerHTML = "<div class='card'>⚡ Generating...</div>";

  try{

    // ===== GUEST MODE =====
    if(!token){

      if(mode==="image"){
        const url=`https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?seed=${Date.now()}`;
        result.innerHTML=`<div class="card"><img src="${url}" style="width:100%"></div>`;
        return;
      }

      if(mode==="text"){
        const res = await fetch(API+"/generate-text",{
          method:"POST",
          headers:{
            "Content-Type":"application/json"
          },
          body:JSON.stringify({prompt})
        });

        const data = await res.json();

        const output =
          data?.data?.content ||
          data?.text ||
          data?.story ||
          data?.response ||
          data?.output ||
          "⚠️ No response";

        result.innerHTML=`<div class="card">${output}</div>`;
        return;
      }

      result.innerHTML=`<div class="card">⚠️ Login required for video</div>`;
      return;
    }

    // ===== LOGGED IN MODE =====
    let endpoint="/generate-text";
    if(mode==="image") endpoint="/generate-image";
    if(mode==="video") endpoint="/generate-video";

    const res = await fetch(API+endpoint,{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+token
      },
      body:JSON.stringify({prompt})
    });

    const data = await res.json();

    if(mode==="text"){
      const output =
        data?.data?.content ||
        data?.text ||
        data?.story ||
        data?.response ||
        data?.output ||
        "⚠️ No response";

      result.innerHTML=`<div class="card">${output}</div>`;
    }

    if(mode==="image"){
      const url =
        data?.data?.url ||
        data?.image ||
        data?.output;

      result.innerHTML=`<div class="card"><img src="${url}" style="width:100%"></div>`;
    }

    if(mode==="video"){
      const vid =
        data?.preview ||
        data?.video ||
        data?.output;

      result.innerHTML=`<div class="card"><video src="${vid}" controls style="width:100%"></video></div>`;
    }

  }catch(err){
    console.error(err);
    result.innerHTML="<div class='card'>❌ Failed</div>";
  }
};
</script>

</body>
</html>
