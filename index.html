<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
</head>

<body style="background:#0b1d2a;color:white;text-align:center;font-family:sans-serif;">

  <h1>🎬 ReelMind AI</h1>

  <input id="prompt" placeholder="Generate image..." style="width:80%;padding:10px;" />
  <br><br>

  <button onclick="generateImage()" style="padding:10px 20px;background:green;color:white;">
    Generate
  </button>

  <br><br>

  <a id="downloadBtn" style="display:block;margin-bottom:10px;color:white;">Download Image</a>

  <p id="status"></p>

  <img id="resultImage" style="max-width:90%;border-radius:10px;" />

  <script>
    async function generateImage() {
      const prompt = document.getElementById("prompt").value;
      const image = document.getElementById("resultImage");
      const status = document.getElementById("status");
      const downloadBtn = document.getElementById("downloadBtn");

      status.innerText = "Generating...";
      image.src = "";

      try {
        const response = await fetch("https://backend-ppyz.onrender.com/generate", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ prompt })
        });

        if (!response.ok) {
          status.innerText = "Error generating image";
          return;
        }

        const blob = await response.blob();
        const url = URL.createObjectURL(blob);

        image.src = url;
        downloadBtn.href = url;
        downloadBtn.download = "image.png";

        status.innerText = "Done!";

      } catch {
        status.innerText = "Error generating image";
      }
    }
  </script>

</body>
</html>
