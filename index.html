<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#1a002b,#ff5e00);
  color:white;
}

.header {text-align:center;padding:15px;font-size:22px;font-weight:bold;}

.icon-bar {
  display:flex;
  justify-content:space-around;
  padding:12px;
}

.icon-btn {
  background: rgba(255,255,255,0.1);
  padding:12px;
  border-radius:15px;
}

.tab {padding:20px;}
.hidden {display:none;}

.card {
  background: rgba(255,255,255,0.1);
  padding:20px;
  border-radius:20px;
  margin-top:15px;
}

button {
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  background:orange;
  color:white;
}

input {
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">🔥 ReelMind AI</div>

<div class="icon-bar">
  <div class="icon-btn" onclick="switchTab('home')">🏠</div>
  <div class="icon-btn" onclick="switchTab('ai')">🤖</div>
  <div class="icon-btn" onclick="switchTab('music')">🎵</div>
  <div class="icon-btn" onclick="switchTab('upload')">📤</div>
</div>

<div id="home" class="tab">
  <div class="card">
    <h2>Welcome</h2>
    <p>Real AI-powered reel generator.</p>
  </div>
</div>

<div id="ai" class="tab hidden">
  <div class="card">
    <h2>AI Generator</h2>
    <input id="prompt" placeholder="Enter idea...">
    <button onclick="generate()">Generate</button>
    <p id="result"></p>
  </div>
</div>

<div id="music" class="tab hidden">
  <div class="card">
    <h2>Music</h2>
    <audio controls src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
  </div>
</div>

<div id="upload" class="tab hidden">
  <div class="card">
    <h2>Upload</h2>
    <input type="file">
  </div>
</div>

<script>
const BACKEND_URL = "https://YOUR-BACKEND.onrender.com/generate";

function switchTab(tab){
  document.querySelectorAll(".tab").forEach(t=>t.classList.add("hidden"));
  document.getElementById(tab).classList.remove("hidden");
}

async function generate(){
  let input = document.getElementById("prompt").value;

  if(!input){ alert("Enter something"); return; }

  document.getElementById("result").innerText = "Generating...";

  try{
    let res = await fetch(BACKEND_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({prompt:input})
    });

    let data = await res.json();
    document.getElementById("result").innerText = data.result;

  }catch(e){
    document.getElementById("result").innerText = "Error connecting to AI";
  }
}
</script>

</body>
</html>
