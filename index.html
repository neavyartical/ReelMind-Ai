<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
</head>

<body style="text-align:center;font-family:Arial;padding:20px;">

<h1>🎬 ReelMind AI</h1>

<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button id="regBtn">Register</button>
<button id="logBtn">Login</button>
<button id="outBtn">Logout</button>

<hr>

<textarea id="prompt" placeholder="Enter idea..." rows="5" cols="30"></textarea><br><br>
<button id="genBtn">Generate</button>

<h3 id="status"></h3>
<p id="output"></p>

<!-- 🔥 SCRIPT MUST BE HERE (BOTTOM) -->
<script>
const API = "https://reelmindbackend-1.onrender.com";

const regBtn = document.getElementById("regBtn");
const logBtn = document.getElementById("logBtn");
const outBtn = document.getElementById("outBtn");
const genBtn = document.getElementById("genBtn");

const email = document.getElementById("email");
const password = document.getElementById("password");
const prompt = document.getElementById("prompt");
const status = document.getElementById("status");
const output = document.getElementById("output");

/* REGISTER */
regBtn.onclick = async () => {
  status.innerText = "Registering...";

  const res = await fetch(API + "/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();
  status.innerText = data.message || data.error;
};

/* LOGIN */
logBtn.onclick = async () => {
  status.innerText = "Logging in...";

  const res = await fetch(API + "/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();

  if (data.token) {
    localStorage.setItem("token", data.token);
    status.innerText = "Login success ✅";
  } else {
    status.innerText = data.error;
  }
};

/* LOGOUT */
outBtn.onclick = () => {
  localStorage.removeItem("token");
  status.innerText = "Logged out ✅";
};

/* GENERATE */
genBtn.onclick = async () => {
  const token = localStorage.getItem("token");

  if (!token) {
    status.innerText = "Login first ❌";
    return;
  }

  status.innerText = "Generating...";
  output.innerText = "";

  const res = await fetch(API + "/generate", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": token
    },
    body: JSON.stringify({
      prompt: prompt.value
    })
  });

  const data = await res.json();

  if (data.result) {
    status.innerText = "Done ✅";
    output.innerText = data.result;
  } else {
    status.innerText = data.error;
  }
};
</script>

</body>
</html>
