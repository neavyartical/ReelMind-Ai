<!DOCTYPE html>
<html>
<head>
  <title>ReelMind AI</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
      text-align: center;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 20px;
    }

    input, button {
      padding: 12px;
      margin: 6px;
      border-radius: 10px;
      border: none;
      width: 80%;
      max-width: 300px;
    }

    button {
      background: #22c55e;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #16a34a;
    }

    #output {
      margin-top: 20px;
      padding: 15px;
      background: #1e293b;
      border-radius: 12px;
      min-height: 50px;
    }
  </style>
</head>

<body>

  <h1>🔥 ReelMind AI</h1>

  <!-- AUTH -->
  <h3>Account</h3>
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>

  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
  <button onclick="logout()">Logout</button>

  <hr style="margin: 30px 0;">

  <!-- GENERATE -->
  <h3>Generate Content</h3>
  <input id="prompt" placeholder="Enter prompt"><br>
  <button onclick="generate()">Generate</button>

  <div id="output">Result will appear here...</div>

  <script>
    const API = "https://reelmindbackend-1.onrender.com";

    // REGISTER
    async function register() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const res = await fetch(API + "/register", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();
      alert(data.message || "Registered ✅ Now login");
    }

    // LOGIN
    async function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const res = await fetch(API + "/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (data.token) {
        localStorage.setItem("token", data.token);
        alert("Login successful 🚀");
      } else {
        alert("Login failed ❌");
      }
    }

    // GENERATE
    async function generate() {
      const prompt = document.getElementById("prompt").value;
      const token = localStorage.getItem("token");

      if (!token) {
        alert("Please login first ❌");
        return;
      }

      const res = await fetch(API + "/generate", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": token
        },
        body: JSON.stringify({ prompt })
      });

      const data = await res.json();

      if (data.result) {
        document.getElementById("output").innerText = data.result;
      } else {
        document.getElementById("output").innerText = "Error generating ❌";
      }
    }

    // LOGOUT
    function logout() {
      localStorage.removeItem("token");
      alert("Logged out 👋");
    }
  </script>

</body>
</html>
