<script>
const API="https://reelmindbackend-1.onrender.com";
const chat=document.getElementById("chat");

// ===== MEMORY AI (FIXED) =====
let memory = JSON.parse(localStorage.getItem("reelmind_memory") || "[]");

function saveMemory(user, ai){
memory.push({user, ai});
if(memory.length > 10) memory.shift();
localStorage.setItem("reelmind_memory", JSON.stringify(memory));
}

function buildMemoryContext(){
return memory.map(m => `User: ${m.user}\nAI: ${m.ai}`).join("\n");
}

// ===== LOGIN (FORCE ADMIN) =====
async function ensureLogin(){
if(!localStorage.token){
let r=await fetch(API+"/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email:"neavyartical@gmail.com"})
});
let d=await r.json();
localStorage.token=d.data.token;
}
loadUser();
}

// ===== LOAD USER =====
async function loadUser(){
let r=await fetch(API+"/me",{
headers:{Authorization:"Bearer "+localStorage.token}
});
let d=await r.json();

document.getElementById("status").innerText="🟢 Online";
document.getElementById("user").innerText="User: neavyartical@gmail.com";
document.getElementById("credits").innerText="Credits: "+d.data.credits;
document.getElementById("ref").innerText="Ref: "+d.data.referrals;
}

// ===== MESSAGE =====
function addMsg(t,c){
let d=document.createElement("div");
d.className="msg "+c;
d.innerText=t;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;
return d;
}

// ===== SPEAK (MULTI LANGUAGE) =====
function speak(text){
let u=new SpeechSynthesisUtterance(text);
let voices = speechSynthesis.getVoices();
u.voice = voices.find(v => v.lang.includes("en")) || voices[0];
speechSynthesis.speak(u);
}

// ===== GENERATE (FIXED ROUTING) =====
async function generate(){
await ensureLogin();

let p=document.getElementById("prompt").value;
if(!p) return;

addMsg(p,"user");
let box=addMsg("⚡ Generating...","ai");

// ROUTE FIX
let route="/generate-text";
if(/image|photo|picture|art/i.test(p)) route="/generate-image";
else if(/video|clip|movie/i.test(p)) route="/generate-video";

// MEMORY
let context = buildMemoryContext();
let finalPrompt = p;

// TEXT
if(route==="/generate-text"){
finalPrompt = `
Use memory:
${context}

Generate 3 DIFFERENT long cinematic stories (1000+ words each).

${p}
`;
}

// IMAGE
if(route==="/generate-image"){
finalPrompt = p + ", ultra realistic, cinematic lighting, 8k";
}

let r=await fetch(API+route,{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+localStorage.token
},
body:JSON.stringify({prompt:finalPrompt})
});

let d=await r.json();

// OUTPUT FIX
if(route==="/generate-image"){
box.innerHTML=`<img src="${d.data.url}">`;
saveMemory(p,d.data.url);
}
else if(route==="/generate-video"){
box.innerHTML=`<video controls src="${d.data.url}"></video>`;
saveMemory(p,d.data.url);
}
else{
box.innerText=d.data.content;
saveMemory(p,d.data.content);
speak(d.data.content);
}

loadUser();
}

// ===== MIC =====
function startVoice(){
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if(!SpeechRecognition){
alert("Use Chrome browser");
return;
}

let rec=new SpeechRecognition();
rec.lang="en-US";

rec.onresult=e=>{
prompt.value=e.results[0][0].transcript;
};

rec.start();
}

// ===== UPLOAD =====
function uploadFile(e){
addMsg("📁 "+e.target.files[0].name,"user");
}

// ===== PAYMENT =====
function upgrade(){
window.open("https://ko-fi.com/articalneavy","_blank");
}

// START
ensureLogin();
</script>
