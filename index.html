<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🚀 POWERED BY ARTICAL NEAVY </title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#020617;
  color:white;
}
#topbar{
  position:fixed;
  top:0;
  width:100%;
  background:#111;
  padding:10px;
  display:flex;
  justify-content:space-around;
  z-index:1000;
}
.section{
  display:none;
  margin-top:70px;
  padding:20px;
}
.active{
  display:block;
}
.card{
  background:#111;
  padding:15px;
  border-radius:14px;
  margin-top:15px;
}
#prompt{
  position:fixed;
  bottom:90px;
  width:78%;
  left:5%;
  padding:14px;
  border-radius:25px;
  border:none;
}
#controls{
  position:fixed;
  bottom:0;
  width:100%;
  height:75px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:15px;
  background:#111;
}
.circle{
  width:55px;
  height:55px;
  border-radius:50%;
  background:#06b6d4;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:22px;
}
#uploadBtn{
  position:fixed;
  bottom:95px;
  right:18px;
  font-size:22px;
  cursor:pointer;
}
#creditsBox{
  position:fixed;
  top:50px;
  right:10px;
  background:#111;
  padding:8px;
  border-radius:10px;
}
button{
  padding:10px;
  border:none;
  border-radius:8px;
  background:#06b6d4;
  color:white;
  cursor:pointer;
}
input{
  padding:10px;
  margin:5px;
  width:90%;
  border:none;
  border-radius:8px;
}
</style>
</head>
<body>

<div id="topbar">
  <div onclick="switchTab('home')">🏠</div>
  <div onclick="switchTab('create')">➕</div>
  <div onclick="switchTab('profile')">👤</div>
  <div onclick="switchTab('admin')">👑</div>
</div>

<div id="creditsBox">💰 Credits: <span id="credits">∞</span></div>

<div id="home" class="section active">
  <div class="card">
    <h2>🚀 Welcome to ReelMind AI</h2>
    <p>Create viral stories, cinematic images and premium AI content.</p>
  </div>
</div>

<div id="create" class="section">
  <select id="mode">
    <option value="text">Story</option>
    <option value="image">Image</option>
    <option value="video">Video</option>
  </select>

  <div id="result"></div>
</div>

<div id="profile" class="section">
  <h3>User</h3>
  <p id="userEmail">Guest Mode</p>
</div>

<div id="admin" class="section">
  <h3>👑 Admin Panel</h3>

  <div class="card">
    <h3>💰 Support Project</h3>
    <a href="https://ko-fi.com/articalneavy" target="_blank">
      <button>Ko-fi ☕</button>
    </a>
  </div>
</div>

<input id="prompt" placeholder="Ask anything...">
<input type="file" id="fileInput" hidden>

<div id="uploadBtn" onclick="document.getElementById('fileInput').click()">📎</div>

<div id="controls">
  <div id="micBtn" class="circle">🎤</div>
  <div id="generate" class="circle">⚡</div>
</div>

<script>
const API = "https://reelmindbackend-1.onrender.com";
let token = null;

function val(id){
  return document.getElementById(id).value;
}

window.switchTab=(tab)=>{
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(tab).classList.add("active");
};

function typeText(element,text){
  element.innerHTML="";
  const words=text.split(" ");
  let i=0;

  const timer=setInterval(()=>{
    if(i>=words.length){
      clearInterval(timer);
      return;
    }
    element.innerHTML += words[i] + " ";
    i++;
  },40);
}

document.getElementById("micBtn").onclick=()=>{
  const SpeechRecognition =
    window.SpeechRecognition || window.webkitSpeechRecognition;

  if(!SpeechRecognition){
    alert("Voice not supported");
    return;
  }

  const recognition=new SpeechRecognition();
  recognition.lang="en-US";

  recognition.onresult=(e)=>{
    document.getElementById("prompt").value =
      e.results[0][0].transcript;
  };

  recognition.start();
};

document.getElementById("fileInput").onchange=()=>{
  alert("✅ File selected");
};

document.getElementById("generate").onclick = async ()=>{

  const prompt = val("prompt").trim();
  const mode = document.getElementById("mode").value;
  const result = document.getElementById("result");

  if(!prompt) return alert("Enter prompt");

  result.innerHTML="<div class='card'>⚡ Generating...</div>";

  try{

    if(mode==="image"){
      const url=`https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?seed=${Date.now()}`;
      result.innerHTML=`<div class="card"><img src="${url}" style="width:100%"></div>`;
      return;
    }

    if(mode==="text"){
      const fullPrompt=`
Write a detailed premium cinematic story based on:
${prompt}

Requirements:
- emotional
- realistic
- engaging
- minimum 10 paragraphs
- no short answers
`;

      const res=await fetch(`https://text.pollinations.ai/${encodeURIComponent(fullPrompt)}`);
      const text=await res.text();

      result.innerHTML=`<div class="card" id="storyBox"></div>`;
      typeText(document.getElementById("storyBox"),text);
      return;
    }

    if(mode==="video"){
      result.innerHTML=`<div class="card">⚠️ Video backend endpoint not configured yet.</div>`;
      return;
    }

  }catch(e){
    result.innerHTML=`<div class="card">❌ Failed</div>`;
  }
};
</script>

</body>
</html>
