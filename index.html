<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🚀 ReelMind AI</title>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 40px;
    }

    input {
      width: 80%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-bottom: 15px;
    }

    button {
      padding: 12px 25px;
      border-radius: 10px;
      border: none;
      background: #06b6d4;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
    }

    img {
      max-width: 90%;
      margin-top: 20px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>🚀 ReelMind AI</h1>

<input id="prompt" placeholder="Type something like: image of dragon" />

<br>
<button onclick="generate()">⚡ Generate</button>

<div id="result"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth,
    signInAnonymously
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  // 🔥 YOUR FIREBASE CONFIG
  const firebaseConfig = {
    apiKey: "AIzaSyCz9rReG2zuaj0AGuafpTzpCUopuHMD_wQ",
    authDomain: "reelmind-ai-f07cb.firebaseapp.com",
    projectId: "reelmind-ai-f07cb",
    storageBucket: "reelmind-ai-f07cb.appspot.com",
    messagingSenderId: "731354245603",
    appId: "1:731354245603:web:67a20d31c7a4eff382d8d6"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  let token = null;

  // 🔐 LOGIN (IMPORTANT)
  signInAnonymously(auth)
    .then(async (userCred) => {
      token = await userCred.user.getIdToken();
      console.log("✅ Logged in");
    })
    .catch(err => {
      alert("Firebase Auth Error: " + err.message);
    });

  // 🚀 GENERATE FUNCTION
  window.generate = async () => {
    const prompt = document.getElementById("prompt").value;
    const resultDiv = document.getElementById("result");

    if (!token) {
      alert("Wait... logging in");
      return;
    }

    resultDiv.innerHTML = "⏳ Generating...";

    try {
      const res = await fetch("https://YOUR-BACKEND-URL/generate-image", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ prompt })
      });

      const data = await res.json();

      if (data.error) {
        resultDiv.innerHTML = "❌ " + data.error;
        return;
      }

      resultDiv.innerHTML = `<img src="${data.data.url}" />`;

    } catch (err) {
      resultDiv.innerHTML = "❌ Error: " + err.message;
    }
  };
</script>

</body>
</html>
