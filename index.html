<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- GOOGLE ADSENSE -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js"
    crossorigin="anonymous"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    header {
      padding: 15px;
      background: #020617;
    }

    header a {
      color: #38bdf8;
      margin: 0 10px;
      text-decoration: none;
    }

    h1 {
      margin-top: 20px;
    }

    .container {
      margin-top: 30px;
    }

    input {
      width: 80%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      margin-bottom: 10px;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: #38bdf8;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      background: #1e293b;
      border-radius: 10px;
      width: 80%;
      margin-left: auto;
      margin-right: auto;
    }

    .error {
      margin-top: 15px;
      color: yellow;
    }

    .ads {
      margin: 20px 0;
    }

    .lock {
      margin-top: 20px;
      padding: 15px;
      background: #dc2626;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <!-- NAV -->
  <header>
    <a href="#">Home</a>
    <a href="#">Privacy</a>
    <a href="#">Contact</a>
  </header>

  <h1>🚀 ReelMind AI</h1>

  <!-- ADSENSE TOP -->
  <div class="ads">
    <ins class="adsbygoogle"
      style="display:block"
      data-ad-client="ca-pub-XXXXXXXXXXXX"
      data-ad-slot="1234567890"
      data-ad-format="auto"
      data-full-width-responsive="true"></ins>
  </div>

  <div class="container">

    <input type="text" id="prompt" placeholder="Enter your idea...">

    <br>

    <button onclick="generate()">Generate</button>

    <!-- AD LOCK -->
    <div id="lock" class="lock">
      🔒 Watch an ad to unlock AI generation
      <br><br>
      <button onclick="unlock()">Watch Ad</button>
    </div>

    <div id="result" class="result"></div>
    <div id="error" class="error"></div>

  </div>

  <!-- ADSENSE BOTTOM -->
  <div class="ads">
    <ins class="adsbygoogle"
      style="display:block"
      data-ad-client="ca-pub-XXXXXXXXXXXX"
      data-ad-slot="9876543210"
      data-ad-format="auto"
      data-full-width-responsive="true"></ins>
  </div>

<script>
  let unlocked = false;

  function unlock() {
    alert("Ad watched (simulate). Unlocking...");
    unlocked = true;
    document.getElementById("lock").style.display = "none";
  }

  async function generate() {
    const prompt = document.getElementById("prompt").value;
    const resultDiv = document.getElementById("result");
    const errorDiv = document.getElementById("error");

    resultDiv.innerHTML = "";
    errorDiv.innerHTML = "";

    if (!unlocked) {
      errorDiv.innerHTML = "⚠️ You must watch ad first!";
      return;
    }

    try {
      const res = await fetch("https://your-backend-url.onrender.com/generate-text", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ prompt })
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.error || "Backend error");
      }

      resultDiv.innerHTML = data.choices?.[0]?.message?.content || "No response";

    } catch (err) {
      console.error(err);
      errorDiv.innerHTML = "⚠️ Backend error: " + err.message;
    }
  }

  // LOAD ADS
  (adsbygoogle = window.adsbygoogle || []).push({});
  (adsbygoogle = window.adsbygoogle || []).push({});
</script>

</body>
</html>
