<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: system-ui, Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 90%;
      max-width: 500px;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
      color: #38bdf8;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      margin-bottom: 15px;
      font-size: 16px;
      outline: none;
    }

    .buttons {
      margin-bottom: 15px;
    }

    button {
      padding: 10px 16px;
      margin: 5px;
      border: none;
      border-radius: 8px;
      background: #38bdf8;
      color: #0f172a;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #0ea5e9;
    }

    #result {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      min-height: 60px;
      text-align: left;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>ReelMind AI</h1>

  <input id="prompt" type="text" placeholder="Enter your idea...">

  <div class="buttons">
    <button onclick="generate('story')">Story</button>
    <button onclick="generate('image')">Image</button>
    <button onclick="generate('video')">Video</button>
  </div>

  <div id="result">Your result will appear here...</div>
</div>

<script>
async function generate(type) {
  const prompt = document.getElementById("prompt").value;
  const result = document.getElementById("result");

  if (!prompt) {
    result.textContent = "Please enter something.";
    return;
  }

  result.textContent = "Generating...";

  try {
    const response = await fetch("https://reelmindbackend-1.onrender.com/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt: prompt, type: type })
    });

    const data = await response.json();
    result.textContent = data.result;

  } catch (error) {
    result.textContent = "Error connecting to server.";
  }
}
</script>

</body>
</html>
