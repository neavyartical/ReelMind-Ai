<!DOCTYPE html>
<html>
<body style="background:black;color:white;text-align:center">

<h2>TEST BACKEND</h2>

<input id="prompt" placeholder="cat" />
<button onclick="go()">Generate</button>

<p id="status"></p>
<img id="img" style="width:300px"/>

<script>
async function go() {
  document.getElementById("status").innerText = "Sending request...";

  try {
    const res = await fetch("https://backend-ppyz.onrender.com/generate", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({prompt: "cat"})
    });

    const blob = await res.blob();
    const url = URL.createObjectURL(blob);

    document.getElementById("img").src = url;
    document.getElementById("status").innerText = "Done";

  } catch (e) {
    document.getElementById("status").innerText = "FAILED";
  }
}
</script>

</body>
</html>
