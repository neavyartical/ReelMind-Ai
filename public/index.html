<script>
async function generate(type) {
  const prompt = document.getElementById("prompt").value;
  const result = document.getElementById("result");

  if (!prompt) {
    result.textContent = "Please enter something.";
    return;
  }

  result.innerHTML = "Generating...";

  // 🖼️ IMAGE MODE (Pollinations)
  if (type === "image") {
    const imgUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}`;
    result.innerHTML = `<img src="${imgUrl}" style="width:100%; border-radius:10px;" />`;
    return;
  }

  // 🎬 VIDEO MODE (Runway-style idea)
  if (type === "video") {
    const videoPrompt = `Create a cinematic viral video idea about: ${prompt}`;
    
    const response = await fetch("https://reelmindbackend-1.onrender.com/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt: videoPrompt })
    });

    const data = await response.json();
    result.textContent = data.result;
    return;
  }

  // 📖 STORY / NORMAL AI
  try {
    const response = await fetch("https://reelmindbackend-1.onrender.com/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt })
    });

    const data = await response.json();
    result.textContent = data.result;

  } catch (error) {
    result.textContent = "Error connecting to server.";
  }
}
</script>
