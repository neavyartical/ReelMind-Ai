<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ReelMind AI</title>

  <!-- MOBILE VIEW -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- GOOGLE FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- STYLE -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- APP CONTAINER -->
  <div class="app">

    <!-- LOGO -->
    <div class="logo">
      <h1>ReelMind <span>AI</span></h1>
    </div>

    <p class="powered">Powered by Artical Neavy</p>

    <!-- INPUT -->
    <textarea id="prompt" placeholder="Describe your idea..."></textarea>

    <!-- GENERATE BUTTON -->
    <button id="generateBtn" onclick="generate('all')">✨ Generate</button>

    <!-- OPTIONS -->
    <div class="grid">
      <button onclick="generate('story')">📖 Story</button>
      <button onclick="generate('image')">🖼 Image</button>
      <button onclick="generate('video')">🎬 Video</button>
      <button onclick="askAI()">🌍 Ask AI</button>
    </div>

    <!-- RESULT -->
    <div id="result">
      <p>Your result will appear here...</p>
    </div>

    <!-- DOWNLOAD -->
    <button id="downloadBtn" onclick="downloadResult()">⬇ Download</button>

  </div>

  <!-- SCRIPT -->
  <script src="script.js"></script>

</body>
</html>
