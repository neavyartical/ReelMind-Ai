<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>ReelMind <span>AI</span></h1>
  <p class="subtitle">Create viral stories, images & videos with AI</p>

  <textarea id="prompt" placeholder="Type your idea here..."></textarea>

  <button class="generate" onclick="generate('all')">✨ Generate</button>

  <div class="grid">
    <button onclick="generate('story')">📖 Story</button>
    <button onclick="generate('image')">🖼 Image</button>
    <button onclick="generate('video')">🎬 Video</button>
    <button onclick="askAI()">🌍 Ask AI</button>
  </div>

  <div id="result">Your result will appear here...</div>

</div>

<script src="script.js"></script>

</body>
</html>
