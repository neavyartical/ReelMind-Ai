<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ReelMind AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: system-ui, Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 90%;
      max-width: 500px;
      text-align: center;
    }

    h1 {
      color: #38bdf8;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      margin-bottom: 15px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #38bdf8;
      color: #0f172a;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #0ea5e9;
    }

    #result {
      margin-top: 15px;
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      min-height: 60px;
      text-align: left;
    }

    img {
      width: 100%;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>ReelMind AI</h1>

  <input id="prompt" type="text" placeholder="Enter your idea...">

  <!-- 🔥 GENERATE BUTTON -->
  <button onclick="generate()">✨ Generate</button>

  <div id="result">Your result will appear here...</div>
</div>

<script>
async function generate() {
  const prompt = document.getElementById("prompt").value.toLowerCase();
  const result = document.getElementById("result");

  if (!prompt) {
    result.textContent = "Please enter something.";
    return;
  }

  result.textContent = "Generating...";

  // 🖼️ IMAGE
  if (prompt.includes("image") || prompt.includes("photo") || prompt.includes("picture")) {
    const imgUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}`;
    result.innerHTML = `<img src="${imgUrl}" />`;
    return;
  }

  // 🎬 VIDEO IDEA
  if (prompt.includes("video") || prompt.includes("reel") || prompt.includes("cinematic")) {
    const videoPrompt = `Create a cinematic viral video idea about: ${prompt}`;

    try {
      const response = await fetch("https://reelmindbackend-1.onrender.com/generate", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ prompt: videoPrompt })
      });

      const data = await response.json();
      result.textContent = data.result;

    } catch {
      result.textContent = "Error generating video idea.";
    }

    return;
  }

  // 📖 STORY / AI
  try {
    const response = await fetch("https://reelmindbackend-1.onrender.com/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt })
    });

    const data = await response.json();
    result.textContent = data.result;

  } catch {
    result.textContent = "Error connecting to server.";
  }
}
</script>

</body>
</html>
